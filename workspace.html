<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>StudioOS Map Engine - 3D Lane Guidance</title>
    <!-- MapLibre GL CSS and JS -->
    <script src="https://unpkg.com/maplibre-gl@4.5.0/dist/maplibre-gl.js"></script>
    <link href="https://unpkg.com/maplibre-gl@4.5.0/dist/maplibre-gl.css" rel="stylesheet" />
    <style>
        body { margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #0a0a0a; color: #fff; overflow: hidden; }
        #map { position: absolute; top: 0; bottom: 0; width: 100%; }
        
        /* High-fidelity Red/Black UI Panel overlay */
        #nav-panel {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 10;
            width: 320px;
            background: rgba(15, 15, 15, 0.9);
            border: 1px solid #2a0808;
            border-radius: 8px;
            padding: 20px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.5);
            backdrop-filter: blur(8px);
        }
        h3 { margin: 0 0 10px 0; font-size: 16px; text-transform: uppercase; letter-spacing: 1px; color: #ff3b30; }
        p { font-size: 13px; color: #aaa; margin: 0 0 20px 0; line-height: 1.4; }
        
        .btn {
            display: block;
            width: 100%;
            background: #ff3b30;
            color: #fff;
            border: none;
            padding: 12px;
            border-radius: 6px;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
            text-align: center;
        }
        .btn:hover { background: #e03228; }
        .btn:active { transform: scale(0.98); }
        .hidden { display: none !important; }
    </style>
</head>
<body>

<div id="map"></div>

<!-- Route & Control Interface Panel -->
<div id="nav-panel">
    <div id="route-summary">
        <h3>Route Calculated</h3>
        <p>Localized trajectory ready. Optimized lane configurations loaded client-side.</p>
        <button class="btn" id="start-route-btn">Start Route</button>
    </div>
    <div id="navigation-active" class="hidden">
        <h3>3D Guidance Active</h3>
        <p style="color: #fff; font-weight: 500;">Follow the highlighted red lane track ahead.</p>
        <button class="btn" id="stop-route-btn" style="background: #222; border: 1px solid #444;">Exit Route</button>
    </div>
</div>

<script>
// --- SAMPLE GEOMETRY DATA ---
// Mock coordinates to simulate a computed route path
const SAMPLE_ROUTE = [
    [-123.2078, 39.1502],
    [-123.2065, 39.1501],
    [-123.2050, 39.1500],
    [-123.2048, 39.1525],
    [-123.2045, 39.1550],
    [-123.2020, 39.1552]
];

// --- INITIALIZE MAP CONTAINER ---
const map = new maplibregl.Map({
    container: 'map',
    style: 'https://basemaps.cartocdn.com/gl/dark-matter-gl-style/style.json', // Sleek dark baseline canvas
    center: [-123.2055, 39.1520],
    zoom: 14.5,
    pitch: 0,
    bearing: 0
});

// Add 3D building profiles when map baseline finishes loading
map.on('load', () => {
    // Add atmospheric mist/fog handling for smooth low-horizon perspective transitions
    map.setFog({
        'range': [1, 8],
        'color': '#0a0a0a',
        'horizon-blend': 0.3
    });

    // Fit view frame slightly around the route overview track initially
    const bounds = SAMPLE_ROUTE.reduce((acc, coord) => acc.extend(coord), new maplibregl.LngLatBounds(SAMPLE_ROUTE[0], SAMPLE_ROUTE[0]));
    map.fitBounds(bounds, { padding: 60 });
});


// --- WEBGL CUSTOM 3D LANE LAYER CLASS ---
class Custom3DLaneLayer {
    constructor(id, coordinates, laneWidthMeters = 7.5) {
        this.id = id;
        this.type = 'custom';
        this.renderingMode = '3d';
        this.coordinates = coordinates;
        this.width = laneWidthMeters;
        this.program = null;
        this.vertexBuffer = null;
        this.vertexCount = 0;
    }

    onAdd(map, gl) {
        const vertexShaderSource = `
            uniform mat4 u_matrix;
            attribute vec3 a_position;
            attribute vec2 a_texcoord;
            varying vec2 v_texcoord;
            void main() {
                v_texcoord = a_texcoord;
                gl_Position = u_matrix * vec4(a_position, 1.0);
            }
        `;

        const fragmentShaderSource = `
            precision mediump float;
            varying vec2 v_texcoord;
            void main() {
                vec4 baseColor = vec4(0.5, 0.02, 0.02, 0.85); // Dark deep red track base
                float centerDist = abs(v_texcoord.x - 0.5);
                
                // Procedural neon center navigation lane track
                if (centerDist < 0.04) {
                    float dashPattern = step(0.4, fract(v_texcoord.y * 14.0));
                    baseColor = mix(baseColor, vec4(1.0, 0.15, 0.15, 1.0), dashPattern);
                }
                // Glowing side boundaries
                if (centerDist > 0.46) {
                    baseColor = vec4(1.0, 0.1, 0.1, 0.95);
                }
                gl_FragColor = baseColor;
            }
        `;

        const vertexShader = gl.createShader(gl.VERTEX_SHADER);
        gl.shaderSource(vertexShader, vertexShaderSource);
        gl.compileShader(vertexShader);

        const fragmentShader = gl.createShader(gl.FRAGMENT_SHADER);
        gl.shaderSource(fragmentShader, fragmentShaderSource);
        gl.compileShader(fragmentShader);

        this.program = gl.createProgram();
        gl.attachShader(this.program, vertexShader);
        gl.attachShader(this.program, fragmentShader);
        gl.linkProgram(this.program);

        this.generateRibbonMesh(map, gl);
    }

    generateRibbonMesh(map, gl) {
        const vertices = [];
        const totalPoints = this.coordinates.length;
        if (totalPoints < 2) return;

        const meterScale = 1.0 / (40075016.686 / 360.0) / 111320.0;
        const offsetDist = this.width * meterScale;

        for (let i = 0; i < totalPoints; i++) {
            const curr = maplibregl.MercatorCoordinate.fromLngLat(this.coordinates[i]);
            let next = (i < totalPoints - 1) ? maplibregl.MercatorCoordinate.fromLngLat(this.coordinates[i + 1]) : curr;
            let prev = (i > 0) ? maplibregl.MercatorCoordinate.fromLngLat(this.coordinates[i - 1]) : curr;

            let dx = next.x - prev.x;
            let dy = next.y - prev.y;
            let len = Math.sqrt(dx * dx + dy * dy);
            if (len === 0) len = 1;
            
            let nx = -dy / len;
            let ny = dx / len;

            const leftX = curr.x + nx * offsetDist;
            const leftY = curr.y + ny * offsetDist;
            const rightX = curr.x - nx * offsetDist;
            const rightY = curr.y - ny * offsetDist;

            const progress = i / (totalPoints - 1);

            // Left Vertex Node (Elevated 0.000005 to float seamlessly above road surfaces)
            vertices.push(leftX, leftY, 0.000005, 0.0, progress);
            // Right Vertex Node
            vertices.push(rightX, rightY, 0.000005, 1.0, progress);
        }

        this.vertexCount = vertices.length / 5;
        this.vertexBuffer = gl.createBuffer();
        gl.bindBuffer(gl.ARRAY_BUFFER, this.vertexBuffer);
        gl.bufferData(gl.ARRAY_BUFFER, new Float32Array(vertices), gl.STATIC_DRAW);
    }

    render(gl, matrix) {
        gl.useProgram(this.program);
        gl.uniformMatrix4fv(gl.getUniformLocation(this.program, 'u_matrix'), false, matrix);
        gl.bindBuffer(gl.ARRAY_BUFFER, this.vertexBuffer);

        const positionLocation = gl.getAttribLocation(this.program, 'a_position');
        gl.enableVertexAttribArray(positionLocation);
        gl.vertexAttribPointer(positionLocation, 3, gl.FLOAT, false, 20, 0);

        const texcoordLocation = gl.getAttribLocation(this.program, 'a_texcoord');
        gl.enableVertexAttribArray(texcoordLocation);
        gl.vertexAttribPointer(texcoordLocation, 2, gl.FLOAT, false, 20, 12);

        gl.enable(gl.BLEND);
        gl.blendFunc(gl.SRC_ALPHA, gl.ONE_MINUS_SRC_ALPHA);
        gl.drawArrays(gl.TRIANGLE_STRIP, 0, this.vertexCount);
    }
}


// --- INTERACTION LIFE-CYCLE MANAGEMENT ---

const startBtn = document.getElementById('start-route-btn');
const stopBtn = document.getElementById('stop-route-btn');
const routeSummary = document.getElementById('route-summary');
const navActivePanel = document.getElementById('navigation-active');

// Function: Compute target angle to face forward down the line segments
function getBearing(p1, p2) {
    const dLng = p2[0] - p1[0];
    const dLat = p2[1] - p1[1];
    return (Math.atan2(dLng, dLat) * 180 / Math.PI + 360) % 360;
}

// Trigger: Action button clicked -> Plunge into 3D Guidance Mode
startBtn.addEventListener('click', () => {
    routeSummary.classList.add('hidden');
    navActivePanel.classList.remove('hidden');

    // 1. Inject custom 3D WebGL meshes directly into map registry layers
    if (!map.getLayer('custom-3d-lanes')) {
        const laneEngineInstance = new Custom3DLaneLayer('custom-3d-lanes', SAMPLE_ROUTE, 8.0);
        map.addLayer(laneEngineInstance);
    }

    // 2. Animate camera to high-immersion driver perspective
    const initialBearing = getBearing(SAMPLE_ROUTE[0], SAMPLE_ROUTE[1]);
    map.flyTo({
        center: SAMPLE_ROUTE[0],
        zoom: 18.8,
        pitch: 68,
        bearing: initialBearing,
        duration: 2500,
        essential: true
    });
});

// Trigger: Terminate navigation view state
stopBtn.addEventListener('click', () => {
    navActivePanel.classList.add('hidden');
    routeSummary.classList.remove('hidden');

    // Clean out custom WebGL lane asset layers safely
    if (map.getLayer('custom-3d-lanes')) {
        map.removeLayer('custom-3d-lanes');
    }

    // Return to default birds-eye map view geometry bounds
    const bounds = SAMPLE_ROUTE.reduce((acc, coord) => acc.extend(coord), new maplibregl.LngLatBounds(SAMPLE_ROUTE[0], SAMPLE_ROUTE[0]));
    map.flyTo({
        pitch: 0,
        bearing: 0,
        duration: 1500
    });
    setTimeout(() => { map.fitBounds(bounds, { padding: 60 }); }, 200);
});
</script>
</body>
</html>
