<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GeoPro | Autonomous Spatial Workspace</title>

    <!-- MapLibre GL JS Core (100% Open Source Fork) -->
    <script src="https://unpkg.com/maplibre-gl@4.1.2/dist/maplibre-gl.js"></script>
    <link href="https://unpkg.com/maplibre-gl@4.1.2/dist/maplibre-gl.css" rel="stylesheet" />

    <style>
        :root {
            --bg-base: #020203;
            --bg-panel: rgba(10, 10, 12, 0.94);
            --bg-surface: rgba(20, 20, 25, 0.7);
            --bg-surface-hover: rgba(35, 35, 42, 0.9);
            --action-red: #ff2222;
            --action-red-glow: rgba(255, 34, 34, 0.35);
            --border-subtle: rgba(255, 255, 255, 0.06);
            --text-main: #ffffff;
            --text-secondary: #a0a0ab;
            --text-muted: #4b4b54;
            --accent-green: #30d158;
            --sidebar-width: 400px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", Roboto, monospace;
            letter-spacing: -0.2px;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: var(--bg-base);
            color: var(--text-main);
        }

        #app-viewport {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
        }

        #map {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        button { font: inherit; background: none; border: none; cursor: pointer; color: inherit; transition: all 0.2s cubic-bezier(0.16, 1, 0.3, 1); }
        input { font: inherit; }

        /* ── TACTILE DRAGGABLE PANEL ── */
        #control-panel-deck {
            position: absolute;
            bottom: 25px;
            left: 25px;
            width: var(--sidebar-width);
            max-height: calc(100% - 50px);
            z-index: 10;
            background: var(--bg-panel);
            backdrop-filter: blur(35px) saturate(210%);
            -webkit-backdrop-filter: blur(35px) saturate(210%);
            border: 1px solid var(--border-subtle);
            border-radius: 24px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.8);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            transform: translateY(0);
            transition: transform 0.1s ease-out;
            user-select: none;
        }

        #control-panel-deck.snapping {
            transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .drag-handle-bar {
            width: 100%;
            padding: 14px 0 8px 0;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: grab;
            background: transparent;
            z-index: 12;
        }
        .drag-handle-bar:active { cursor: grabbing; }
        .drag-handle-pill {
            width: 40px;
            height: 5px;
            background: rgba(255, 255, 255, 0.15);
            border-radius: 3px;
        }
        .drag-handle-bar:hover .drag-handle-pill { background: rgba(255, 255, 255, 0.3); }

        .panel-scrollable-body {
            flex: 1;
            overflow-y: auto;
            padding: 0 20px 20px 20px;
            display: flex;
            flex-direction: column;
            gap: 18px;
        }

        .panel-branding-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .brand-logo { font-size: 1.3rem; font-weight: 900; text-transform: uppercase; letter-spacing: 1px; }
        .brand-logo span { color: var(--action-red); text-shadow: 0 0 12px var(--action-red-glow); }

        /* Search Interface */
        .search-field-container { position: relative; width: 100%; }
        .search-input-wrapper {
            display: flex;
            background: var(--bg-surface);
            border: 1px solid var(--border-subtle);
            border-radius: 14px;
            padding: 2px;
            align-items: center;
        }
        .search-input-wrapper:focus-within {
            border-color: var(--action-red);
            background: var(--bg-surface-hover);
        }
        .search-input-node {
            flex: 1;
            background: transparent;
            border: none;
            outline: none;
            color: var(--text-main);
            padding: 12px 14px;
            font-size: 0.9rem;
        }
        .search-input-node::placeholder { color: var(--text-muted); }

        .osm-dropdown-menu {
            position: absolute;
            top: 100%;
            left: 0;
            width: 100%;
            background: #09090b;
            border: 1px solid var(--border-subtle);
            border-radius: 14px;
            margin-top: 6px;
            max-height: 220px;
            overflow-y: auto;
            z-index: 150;
            display: none;
        }
        .osm-suggest-item {
            padding: 12px 16px;
            font-size: 0.85rem;
            cursor: pointer;
            color: var(--text-secondary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .osm-suggest-item:hover { background: rgba(255, 34, 34, 0.08); color: var(--action-red); }

        /* Context Workspace Card */
        #context-destination-panel {
            background: linear-gradient(135deg, var(--bg-surface), rgba(10,10,14,0.1));
            border: 1px solid var(--border-subtle);
            border-radius: 16px;
            padding: 16px;
            display: none;
            flex-direction: column;
            gap: 12px;
        }
        .panel-header-title { font-size: 1rem; font-weight: 700; }
        .panel-address-sub { font-size: 0.8rem; color: var(--text-secondary); line-height: 1.4; }
        
        .action-button-matrix { display: flex; gap: 8px; }
        .primary-action-btn { flex: 1; background: var(--action-red); padding: 12px; border-radius: 12px; font-size: 0.8rem; font-weight: 700; text-align: center; box-shadow: 0 6px 16px var(--action-red-glow); }
        .kill-action-btn { background: rgba(255,255,255,0.03); border: 1px solid var(--border-subtle); width: 44px; border-radius: 12px; display: flex; align-items: center; justify-content: center; }
        .kill-action-btn:hover { border-color: var(--action-red); color: var(--action-red); }

        .hardware-diagnostics-deck {
            background: rgba(0,0,0,0.3);
            border: 1px solid var(--border-subtle);
            border-radius: 14px;
            padding: 12px;
            display: flex;
            flex-direction: column;
            gap: 6px;
            font-family: monospace;
            font-size: 0.7rem;
        }
        .diagnostic-row { display: flex; justify-content: space-between; align-items: center; }
        .diagnostic-row span:first-child { color: var(--text-muted); text-transform: uppercase; }
        .diagnostic-row span:last-child { color: var(--text-secondary); font-weight: bold; }

        /* Toolstack Controls */
        #right-floating-console-stack {
            position: absolute; top: 25px; right: 25px; z-index: 100; display: flex; flex-direction: column; gap: 8px;
        }
        .console-action-btn-node {
            background: var(--bg-panel); backdrop-filter: blur(20px); border: 1px solid var(--border-subtle); width: 44px; height: 44px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 1.05rem;
        }
        .console-action-btn-node:hover { background: var(--bg-surface-hover); border-color: var(--text-secondary); }
        .console-action-btn-node.active { border-color: var(--action-red); color: var(--action-red); box-shadow: 0 0 12px var(--action-red-glow); }

        #coordinate-overlay-tracker { position: absolute; bottom: 25px; right: 25px; background: var(--bg-panel); backdrop-filter: blur(10px); padding: 8px 12px; border-radius: 10px; border: 1px solid var(--border-subtle); font-family: monospace; font-size: 0.7rem; z-index: 5; color: var(--text-secondary); }
    </style>
</head>
<body>

    <div id="app-viewport">
        <div id="map"></div>

        <!-- Draggable UI Deck Panel -->
        <div id="control-panel-deck">
            <div class="drag-handle-bar" id="drag-handle">
                <div class="drag-handle-pill"></div>
            </div>
            
            <div class="panel-scrollable-body">
                <div class="panel-branding-header">
                    <div class="brand-logo">Geo<span>Pro</span></div>
                    <div style="font-family: monospace; font-size: 0.7rem; color: var(--text-muted); font-weight: bold;">AUTONOMOUS STACK</div>
                </div>

                <!-- 100% Free Open-Source Search Node -->
                <div class="search-field-container">
                    <div class="search-input-wrapper">
                        <input type="text" class="search-input-node" id="osm-engine-input" placeholder="Search physical vectors via Photon...">
                    </div>
                    <div class="osm-dropdown-menu" id="osm-engine-dropdown"></div>
                </div>

                <div id="context-destination-panel">
                    <div class="panel-header-title" id="node-panel-title">Target Vector</div>
                    <div class="panel-address-sub" id="node-panel-address">Analyzing coordinates...</div>
                    <div class="action-button-matrix">
                        <button class="primary-action-btn" id="launch-routing-action">Calculate Route</button>
                        <button class="kill-action-btn" id="flush-workspace-trigger">✖</button>
                    </div>
                </div>

                <div class="hardware-diagnostics-deck">
                    <div class="diagnostic-row"><span>Tile Engine</span><span style="color: var(--accent-green);">MAPLIBRE (OPEN)</span></div>
                    <div class="diagnostic-row"><span>Search Engine</span><span>PHOTON / OSM</span></div>
                    <div class="diagnostic-row"><span>Routing Logic</span><span id="routing-engine-status">OSRM PUBLIC ROUTER</span></div>
                </div>
            </div>
        </div>

        <!-- Toolstack Array -->
        <div id="right-floating-console-stack">
            <button class="console-action-btn-node" id="force-gps-recenter" title="Recenter Engine">🎯</button>
            <button class="console-action-btn-node" id="compass-orientation-lock" title="True North">🧭</button>
        </div>

        <div id="coordinate-overlay-tracker">X: -- | Y: --</div>
    </div>

    <script>
        // Set up MapLibre with an open, keyless vector map style layer
        // FOR TRUE OFFLINE/SELF-HOSTED OPERATION: Point this URL directly to your local tileserver config
        const map = new maplibregl.Map({
            container: 'map',
            style: 'https://tiles.openfreemap.org/styles/dark', 
            center: [-123.2078, 39.1502], 
            zoom: 13,
            pitch: 30,
            bearing: 0,
            antialias: true
        });

        let userCurrentPositionCoordinates = [-123.2078, 39.1502];
        let temporaryTargetDestinationCoords = null;
        let openSourceSearchDebounceTimer = null;

        map.on('load', () => {
            initTacticalPanelDraggingPhysics();
            bindAutonomousSearchEngine();
            bindMapClickInteractions();
            bindConsoleInterfaceControlTriggers();

            // Track cursor coordinates across the global data matrix
            map.on('mousemove', (e) => {
                document.getElementById('coordinate-overlay-tracker').innerText = `X: ${e.lngLat.lng.toFixed(5)} | Y: ${e.lngLat.lat.toFixed(5)}`;
            });
        });

        /* ── INTERACTIVE DRAG PHYSICS ── */
        function initTacticalPanelDraggingPhysics() {
            const panel = document.getElementById('control-panel-deck');
            const handle = document.getElementById('drag-handle');
            
            let isDragging = false;
            let startY = 0;
            let currentTranslateY = 0;
            let lastTranslateY = 0;

            handle.addEventListener('mousedown', startDrag);
            window.addEventListener('mousemove', processDrag);
            window.addEventListener('mouseup', endDrag);

            handle.addEventListener('touchstart', (e) => { startDrag(e.touches[0]); }, { passive: true });
            window.addEventListener('touchmove', (e) => { processDrag(e.touches[0]); }, { passive: false });
            window.addEventListener('touchend', endDrag);

            function startDrag(e) {
                isDragging = true;
                startY = e.clientY;
                panel.classList.remove('snapping');
            }

            function processDrag(e) {
                if (!isDragging) return;
                let deltaY = e.clientY - startY;
                let nextY = lastTranslateY + deltaY;

                if (nextY < -300) nextY = -300;
                if (nextY > 500) nextY = 500;

                currentTranslateY = nextY;
                panel.style.transform = `translateY(${currentTranslateY}px)`;
            }

            function endDrag() {
                if (!isDragging) return;
                isDragging = false;
                panel.classList.add('snapping');

                if (currentTranslateY > 150) {
                    currentTranslateY = 420; // Docked Viewport Profile
                } else if (currentTranslateY < -80) {
                    currentTranslateY = -120; // Extended Focus Frame
                } else {
                    currentTranslateY = 0; // Standard Floating Viewport Baseline
                }

                panel.style.transform = `translateY(${currentTranslateY}px)`;
                lastTranslateY = currentTranslateY;
            }
        }

        /* ── PHOTON SEARCH ENGINE INTEGRATION ── */
        function bindAutonomousSearchEngine() {
            const input = document.getElementById('osm-engine-input');
            const dropdown = document.getElementById('osm-engine-dropdown');

            input.addEventListener('input', (e) => {
                const val = e.target.value.trim();
                clearTimeout(openSourceSearchDebounceTimer);
                if (val.length < 3) { dropdown.style.display = 'none'; return; }
                
                // Using Photon API — completely free geocoding with no restrictions
                openSourceSearchDebounceTimer = setTimeout(async () => {
                    try {
                        const res = await fetch(`https://photon.komoot.io/api/?q=${encodeURIComponent(val)}&limit=5`);
                        const data = await res.json();
                        if (!data.features || data.features.length === 0) { dropdown.style.display = 'none'; return; }
                        
                        dropdown.innerHTML = '';
                        data.features.forEach(f => {
                            const el = document.createElement('div');
                            el.className = 'osm-suggest-item';
                            const props = f.properties;
                            const nameStr = [props.name, props.city, props.state].filter(Boolean).join(', ');
                            el.innerText = nameStr;
                            
                            el.addEventListener('click', () => {
                                const target = f.geometry.coordinates;
                                dropdown.style.display = 'none';
                                input.value = nameStr;
                                map.flyTo({ center: target, zoom: 15 });
                                showTargetDetailsCard(target, props.name || "Resolved Node", nameStr);
                            });
                            dropdown.appendChild(el);
                        });
                        dropdown.style.display = 'block';
                    } catch (err) { console.error(err); }
                }, 300);
            });
        }

        function bindMapClickInteractions() {
            map.on('click', async (e) => {
                const coords = [e.lngLat.lng, e.lngLat.lat];
                showTargetDetailsCard(coords, "Selected Grid Pointer", `X: ${coords[0].toFixed(5)} | Y: ${coords[1].toFixed(5)}`);
                
                // Reverse lookup via Photon's free reverse index
                try {
                    const res = await fetch(`https://photon.komoot.io/api/?lon=${coords[0]}&lat=${coords[1]}`);
                    const data = await res.json();
                    if (data.features && data.features.length > 0) {
                        const props = data.features[0].properties;
                        const nameStr = [props.name, props.street, props.city].filter(Boolean).join(', ');
                        showTargetDetailsCard(coords, props.name || "Identified Feature", nameStr || "Discovered Geometry Coordinates");
                    }
                } catch(err){}
            });
        }

        function showTargetDetailsCard(coords, title, address) {
            temporaryTargetDestinationCoords = coords;
            document.getElementById('node-panel-title').innerText = title;
            document.getElementById('node-panel-address').innerText = address;
            document.getElementById('context-destination-panel').style.display = 'flex';
        }

        /* ── FREE ROUTING LOGIC ENGINE ── */
        async function calculateAutonomousRoutingPath() {
            if (!temporaryTargetDestinationCoords) return;
            
            // Querying a completely keyless public OSRM demonstration engine instance
            // Swap out with your own local server endpoint: http://localhost:5000/route/v1/...
            const queryUrl = `https://router.project-osrm.org/route/v1/driving/${userCurrentPositionCoordinates.join(',')};${temporaryTargetDestinationCoords.join(',')}?overview=full&geometries=geojson`;
            
            try {
                const res = await fetch(queryUrl);
                const data = await res.json();
                if (data.code !== 'Ok' || !data.routes[0]) return;
                
                const routeGeom = data.routes[0].geometry;
                
                if (map.getLayer('active-route-line')) map.removeLayer('active-route-line');
                if (map.getSource('active-route-source')) map.removeSource('active-route-source');
                
                map.addSource('active-route-source', { type: 'geojson', data: { type: 'Feature', geometry: routeGeom } });
                map.addLayer({
                    id: 'active-route-line', type: 'line', source: 'active-route-source',
                    paint: { 'line-color': '#ff2222', 'line-width': 5, 'line-opacity': 0.85 }
                });
            } catch (err) { console.error("Routing resolution calculation pipeline failure:", err); }
        }

        function bindConsoleInterfaceControlTriggers() {
            document.getElementById('compass-orientation-lock').addEventListener('click', () => map.easeTo({ bearing: 0, pitch: 30 }));
            document.getElementById('force-gps-recenter').addEventListener('click', () => map.flyTo({ center: userCurrentPositionCoordinates, zoom: 14 }));
            document.getElementById('launch-routing-action').addEventListener('click', calculateAutonomousRoutingPath);
            document.getElementById('flush-workspace-trigger').addEventListener('click', () => {
                if (map.getLayer('active-route-line')) map.removeLayer('active-route-line');
                if (map.getSource('active-route-source')) map.removeSource('active-route-source');
                document.getElementById('context-destination-panel').style.display = 'none';
                temporaryTargetDestinationCoords = null;
            });
        }
    </script>
</body>
</html>
