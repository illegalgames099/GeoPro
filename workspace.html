<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GeoPro Quantum Navigation</title>

    <!-- Mapbox GL JS Core Engine -->
    <script src="https://api.mapbox.com/mapbox-gl-js/v3.3.0/mapbox-gl.js"></script>
    <link href="https://api.mapbox.com/mapbox-gl-js/v3.3.0/mapbox-gl.css" rel="stylesheet" />

    <!-- Mapbox Geocoder (Single Input Spatial Engine) -->
    <script src="https://api.mapbox.com/mapbox-gl-js/plugins/mapbox-gl-geocoder/v5.0.0/mapbox-gl-geocoder.min.js"></script>
    <link rel="stylesheet" href="https://api.mapbox.com/mapbox-gl-js/plugins/mapbox-gl-geocoder/v5.0.0/mapbox-gl-geocoder.css" type="text/css">

    <style>
        :root {
            --bg-pure: #000000;
            --hud-bg: rgba(10, 10, 12, 0.85);
            --card-surface: rgba(22, 22, 26, 0.7);
            --neon-red: #ff2222;
            --neon-blue: #0071e3;
            --neon-purple: #b46bff;
            --border-glow: rgba(255, 34, 34, 0.15);
            --border-line: rgba(255, 255, 255, 0.08);
            --text-primary: #ffffff;
            --text-secondary: #8e8e93;
            --traffic-green: #30d158;
            --traffic-yellow: #ffcc00;
            --traffic-red: #ff453a;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", Roboto, sans-serif;
            letter-spacing: -0.2px;
        }

        body, html {
            width: 100%;
            height: 100vh;
            overflow: hidden;
            background-color: var(--bg-pure);
            color: var(--text-primary);
        }

        #app-viewport {
            position: relative;
            width: 100%;
            height: 100vh;
            display: flex;
        }

        #map {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: var(--bg-pure);
            z-index: 1;
        }

        button { font: inherit; }

        /* ── FUTURE-FORWARD FLOATING HUD COMMAND DECK ── */
        #command-deck {
            position: absolute;
            top: 20px;
            left: 20px;
            width: 380px;
            max-height: calc(100vh - 40px);
            z-index: 10;
            background: var(--hud-bg);
            backdrop-filter: blur(30px) saturate(200%);
            -webkit-backdrop-filter: blur(30px) saturate(200%);
            border: 1px solid var(--border-line);
            border-radius: 24px;
            padding: 24px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.7), 0 0 40px var(--border-glow);
            display: flex;
            flex-direction: column;
            gap: 16px;
            transform: translateY(0px);
            transition: transform 0.35s cubic-bezier(0.16, 1, 0.3, 1);
            overflow-y: auto;
        }

        .drag-handle-zone {
            width: 100%;
            padding: 14px 0 8px;
            margin: -14px 0 -8px;
            display: flex;
            justify-content: center;
            cursor: grab;
            touch-action: none;
        }
        .drag-handle-zone:active { cursor: grabbing; }
        .drag-handle-bar {
            width: 36px;
            height: 5px;
            background: rgba(255, 255, 255, 0.25);
            border-radius: 3px;
            pointer-events: none;
        }
        .drag-handle-zone:active .drag-handle-bar { background: rgba(255, 255, 255, 0.45); }

        #command-deck.is-dragging { transition: none !important; }

        .deck-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .brand-logo {
            font-size: 1.35rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .brand-logo span { color: var(--neon-red); text-shadow: 0 0 10px rgba(255,34,34,0.4); }

        .header-actions { display: flex; gap: 8px; align-items: center; }

        .sys-exit-btn {
            background: var(--card-surface);
            border: 1px solid var(--border-line);
            color: var(--text-secondary);
            padding: 6px 14px;
            border-radius: 10px;
            font-size: 0.8rem;
            font-weight: 600;
            text-decoration: none;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .sys-exit-btn:hover {
            color: var(--text-primary);
            border-color: rgba(255,255,255,0.2);
            background: rgba(255,255,255,0.05);
        }

        .unit-toggle-btn {
            background: var(--card-surface);
            border: 1px solid var(--border-line);
            color: var(--text-secondary);
            padding: 6px 10px;
            border-radius: 10px;
            font-size: 0.72rem;
            font-weight: 700;
            cursor: pointer;
            letter-spacing: 0.5px;
        }
        .unit-toggle-btn:hover { color: var(--text-primary); }

        /* ── MODE SELECTOR (drive / bike / walk) ── */
        .mode-selector-row {
            display: flex;
            gap: 8px;
            background: rgba(0,0,0,0.3);
            padding: 6px;
            border-radius: 14px;
            border: 1px solid var(--border-line);
        }
        .mode-btn {
            flex: 1;
            background: transparent;
            border: none;
            color: var(--text-secondary);
            padding: 9px 6px;
            border-radius: 10px;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 3px;
            font-size: 0.65rem;
            font-weight: 600;
            transition: all 0.2s ease;
        }
        .mode-btn svg { stroke: var(--text-secondary); }
        .mode-btn.active {
            background: rgba(255, 34, 34, 0.15);
            color: var(--neon-red);
        }
        .mode-btn.active svg { stroke: var(--neon-red); }

        /* ── FIXED & RE-ENGINEERED SINGLE INPUT GEOCODER ── */
        .search-container-box {
            width: 100%;
            position: relative;
        }

        .mapboxgl-ctrl-geocoder {
            width: 100% !important;
            max-width: 100% !important;
            background-color: var(--card-surface) !important;
            border: 1px solid var(--border-line) !important;
            border-radius: 16px !important;
            box-shadow: none !important;
            height: 52px !important;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .mapboxgl-ctrl-geocoder:focus-within {
            border-color: rgba(255, 34, 34, 0.6) !important;
            box-shadow: 0 0 15px rgba(255, 34, 34, 0.2) !important;
            background-color: rgba(15, 15, 18, 0.95) !important;
        }

        .mapboxgl-ctrl-geocoder--input {
            height: 52px !important;
            color: var(--text-primary) !important;
            font-size: 1rem !important;
            font-weight: 500 !important;
            padding: 12px 16px 12px 48px !important;
            background: transparent !important;
        }
        .mapboxgl-ctrl-geocoder--input::placeholder { color: var(--text-secondary); }

        .mapboxgl-ctrl-geocoder--icon-search {
            top: 16px !important;
            left: 16px !important;
            fill: var(--text-secondary) !important;
            width: 20px !important;
            height: 20px !important;
        }
        .mapboxgl-ctrl-geocoder--button { top: 14px !important; background: transparent !important; }
        .mapboxgl-ctrl-geocoder--icon-close { fill: var(--text-secondary) !important; }

        /* Autocomplete Suggestions Menu Configuration */
        .mapboxgl-ctrl-geocoder .suggestions {
            background-color: #0f0f11 !important;
            border: 1px solid rgba(255,255,255,0.1) !important;
            backdrop-filter: blur(25px) !important;
            border-radius: 18px !important;
            box-shadow: 0 16px 40px rgba(0,0,0,0.8) !important;
            padding: 6px !important;
            margin-top: 8px !important;
            position: absolute;
            width: 100%;
            z-index: 1000;
        }
        .mapboxgl-ctrl-geocoder .suggestions > li { border-radius: 10px !important; }
        .mapboxgl-ctrl-geocoder .suggestions > li > a {
            color: var(--text-primary) !important;
            padding: 12px 14px !important;
            font-size: 0.9rem !important;
            font-weight: 500 !important;
        }
        .mapboxgl-ctrl-geocoder .suggestions > .active > a,
        .mapboxgl-ctrl-geocoder .suggestions > li > a:hover {
            background-color: rgba(255, 255, 255, 0.08) !important;
            color: var(--neon-red) !important;
        }

        /* ── RECENT / SAVED QUICK ACCESS LIST ── */
        .quick-access-panel {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        .quick-access-label {
            font-size: 0.68rem;
            font-weight: 700;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.6px;
            padding: 2px 4px;
        }
        .quick-access-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 8px;
            border-radius: 12px;
            cursor: pointer;
            transition: background 0.15s ease;
        }
        .quick-access-item:hover { background: rgba(255,255,255,0.06); }
        .quick-access-icon {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: rgba(255,255,255,0.06);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            color: var(--text-secondary);
        }
        .quick-access-text { display: flex; flex-direction: column; overflow: hidden; flex: 1; }
        .quick-access-title { font-size: 0.86rem; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .quick-access-sub { font-size: 0.72rem; color: var(--text-secondary); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .quick-access-star {
            background: transparent;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            padding: 4px;
            flex-shrink: 0;
        }
        .quick-access-star.starred { color: var(--traffic-yellow); }

        /* ── DYNAMIC DESTINATION SUMMARY CARD ── */
        #destination-card {
            background: var(--card-surface);
            border: 1px solid var(--border-line);
            border-radius: 16px;
            padding: 16px;
            display: none;
            flex-direction: column;
            gap: 12px;
            animation: slideIn 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
        @keyframes slideIn {
            from { transform: translateY(10px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .dest-title { font-size: 1.05rem; font-weight: 700; color: var(--text-primary); }
        .dest-address { font-size: 0.85rem; color: var(--text-secondary); line-height: 1.3; }

        /* Alternate route pills */
        .route-alt-row { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 2px; }
        .route-alt-pill {
            flex-shrink: 0;
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--border-line);
            color: var(--text-secondary);
            padding: 8px 12px;
            border-radius: 12px;
            font-size: 0.75rem;
            font-weight: 600;
            cursor: pointer;
            white-space: nowrap;
        }
        .route-alt-pill.selected {
            border-color: var(--neon-blue);
            color: var(--text-primary);
            background: rgba(0, 113, 227, 0.18);
        }
        .route-alt-pill .alt-eta { font-weight: 800; }
        .route-alt-pill.fastest .alt-eta { color: var(--traffic-green); }

        .nav-action-row { display: flex; gap: 10px; margin-top: 4px; }
        .nav-btn {
            flex: 1;
            background: var(--neon-blue);
            color: #fff;
            border: none;
            padding: 12px;
            border-radius: 12px;
            font-size: 0.88rem;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }
        .nav-btn:hover { opacity: 0.9; }
        .clear-route-btn, .voice-toggle-btn {
            background: rgba(255,255,255,0.08);
            border: 1px solid var(--border-line);
            color: var(--text-primary);
            width: 48px;
            border-radius: 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .voice-toggle-btn.muted { color: var(--text-secondary); }

        /* ── TURN-BY-TURN STEP LIST ── */
        #steps-list {
            display: none;
            flex-direction: column;
            gap: 2px;
            max-height: 260px;
            overflow-y: auto;
            border-top: 1px solid var(--border-line);
            padding-top: 8px;
        }
        .step-row {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 6px;
            border-radius: 10px;
        }
        .step-icon {
            width: 30px;
            height: 30px;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--neon-blue);
        }
        .step-text { flex: 1; font-size: 0.82rem; font-weight: 500; line-height: 1.25; }
        .step-dist { font-size: 0.72rem; color: var(--text-secondary); font-family: monospace; flex-shrink: 0; }

        /* ── TELEMETRY CONSOLE WIDGETS ── */
        .telemetry-grid {
            display: flex;
            flex-direction: column;
            gap: 8px;
            background: rgba(0,0,0,0.3);
            padding: 14px 16px;
            border-radius: 16px;
            border: 1px solid var(--border-line);
        }
        .matrix-row { display: flex; justify-content: space-between; font-size: 0.8rem; }
        .matrix-row span:first-child { color: var(--text-secondary); font-weight: 500; }
        .matrix-row span:last-child { font-family: monospace; font-weight: 600; }

        .traffic-status-indicator { display: flex; align-items: center; gap: 6px; }
        .pulse-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            animation: blink 1.5s infinite;
        }
        @keyframes blink { 0%, 100% { opacity: 0.4; } 50% { opacity: 1; } }

        /* ── ACTIVE NAVIGATION HUD (turn-by-turn drive mode) ── */
        #active-nav-hud {
            display: none;
            position: absolute;
            top: 20px;
            left: 20px;
            width: 380px;
            z-index: 15;
            flex-direction: column;
            gap: 10px;
        }
        .nav-instruction-card {
            background: linear-gradient(160deg, rgba(0,113,227,0.35), rgba(10,10,12,0.92));
            backdrop-filter: blur(30px) saturate(200%);
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 24px;
            padding: 22px;
            display: flex;
            align-items: center;
            gap: 18px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.7);
        }
        .nav-instruction-icon {
            width: 54px;
            height: 54px;
            flex-shrink: 0;
            background: rgba(255,255,255,0.1);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .nav-instruction-body { flex: 1; overflow: hidden; }
        .nav-instruction-dist { font-size: 1.6rem; font-weight: 800; }
        .nav-instruction-text { font-size: 0.9rem; color: rgba(255,255,255,0.85); font-weight: 600; line-height: 1.2; margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        .nav-bottom-bar {
            background: var(--hud-bg);
            backdrop-filter: blur(30px);
            border: 1px solid var(--border-line);
            border-radius: 20px;
            padding: 16px 18px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .nav-bottom-stat { display: flex; flex-direction: column; }
        .nav-bottom-stat .val { font-size: 1.05rem; font-weight: 800; }
        .nav-bottom-stat .lbl { font-size: 0.65rem; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.5px; }
        .nav-end-btn {
            background: var(--neon-red);
            color: #fff;
            border: none;
            padding: 10px 18px;
            border-radius: 12px;
            font-weight: 700;
            font-size: 0.82rem;
            cursor: pointer;
        }

        /* Speed readout chip shown while navigating */
        #speed-chip {
            display: none;
            position: absolute;
            bottom: 20px;
            left: 20px;
            z-index: 15;
            width: 74px;
            height: 74px;
            border-radius: 50%;
            background: #0c0c0e;
            border: 4px solid var(--text-primary);
            flex-direction: column;
            align-items: center;
            justify-content: center;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
        }
        #speed-chip .speed-val { font-size: 1.4rem; font-weight: 800; line-height: 1; }
        #speed-chip .speed-unit { font-size: 0.55rem; color: var(--text-secondary); font-weight: 700; letter-spacing: 0.5px; }

        /* FIXED RIGHT ACTION CONTROL STACK */
        #right-console-stack {
            position: absolute;
            top: 20px;
            right: 20px;
            z-index: 100;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .glass-panel-btn {
            background: var(--hud-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border-line);
            padding: 14px;
            border-radius: 16px;
            color: var(--text-primary);
            cursor: pointer;
            box-shadow: 0 8px 24px rgba(0,0,0,0.4);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }
        .glass-panel-btn:hover { background: rgba(255,255,255,0.08); border-color: rgba(255,255,255,0.2); }
        .glass-panel-btn.active {
            border-color: var(--neon-red);
            box-shadow: 0 0 15px rgba(255,34,34,0.2);
            color: var(--neon-red);
        }

        #spatial-overlay {
            position: absolute;
            bottom: 20px;
            right: 20px;
            background: var(--hud-bg);
            backdrop-filter: blur(10px);
            padding: 8px 14px;
            border-radius: 10px;
            border: 1px solid var(--border-line);
            font-family: monospace;
            font-size: 0.75rem;
            z-index: 5;
            pointer-events: none;
        }

        #reroute-toast {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%) translateY(-140%);
            z-index: 20;
            background: rgba(255, 204, 0, 0.95);
            color: #000;
            font-weight: 700;
            font-size: 0.82rem;
            padding: 10px 18px;
            border-radius: 12px;
            transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            box-shadow: 0 8px 20px rgba(0,0,0,0.4);
        }
        #reroute-toast.visible { transform: translateX(-50%) translateY(0); }

        /* High-Visibility Custom Pin Nodes */
        .custom-tracking-marker {
            width: 22px;
            height: 22px;
            background-color: var(--neon-blue);
            border: 3px solid #ffffff;
            border-radius: 50%;
            box-shadow: 0 0 18px var(--neon-blue);
            cursor: pointer;
        }
        .custom-dest-marker {
            width: 18px;
            height: 18px;
            background-color: var(--neon-red);
            border: 3px solid #ffffff;
            border-radius: 50%;
            box-shadow: 0 0 18px var(--neon-red);
        }

        /* Mobile Layout Adaptations */
        @media(max-width: 480px) {
            #command-deck, #active-nav-hud {
                width: calc(100% - 40px);
                left: 20px;
            }
            #command-deck { top: auto; bottom: 20px; max-height: 70vh; }
            #right-console-stack {
                top: 20px;
                right: 20px;
            }
            #spatial-overlay {
                display: none;
            }
        }
    </style>
</head>
<body>

    <div id="app-viewport">
        <!-- Main Map Output Canvas -->
        <div id="map"></div>

        <!-- Reroute notification toast -->
        <div id="reroute-toast">Rerouting to fastest route…</div>

        <!-- Left Command Deck HUD Console (search / planning mode) -->
        <div id="command-deck">
            <div class="drag-handle-zone" id="drag-handle"><div class="drag-handle-bar"></div></div>
            <div class="deck-header">
                <div class="brand-logo">Geo<span>Pro</span></div>
                <div class="header-actions">
                    <button class="unit-toggle-btn" id="unit-toggle" title="Toggle units">MI</button>
                    <a href="index.html" class="sys-exit-btn">Exit</a>
                </div>
            </div>

            <!-- Travel Mode Selector -->
            <div class="mode-selector-row" id="mode-selector">
                <button class="mode-btn active" data-mode="driving-traffic" data-label="Drive">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 17h14M5 17a2 2 0 1 0 4 0M5 17a2 2 0 1 1 4 0M15 17a2 2 0 1 0 4 0M15 17a2 2 0 1 1 4 0M5 17l1-6 2-3h8l2 3 1 6M6 11h12"/></svg>
                    Drive
                </button>
                <button class="mode-btn" data-mode="cycling" data-label="Bike">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="6" cy="17" r="3"/><circle cx="18" cy="17" r="3"/><path d="M6 17l4-9h4l4 9M10 8h4M9 17h6"/></svg>
                    Bike
                </button>
                <button class="mode-btn" data-mode="walking" data-label="Walk">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="13" cy="4" r="1.6"/><path d="M10 22l2-7 2 2 3 5M9 15l1-5-3 1M11 10l2-2 4 1"/></svg>
                    Walk
                </button>
            </div>

            <!-- Single Input Geocoder Wrapper -->
            <div class="search-container-box">
                <div id="geocoder-mount"></div>
            </div>

            <!-- Recent + Saved Quick Access -->
            <div class="quick-access-panel" id="quick-access-panel"></div>

            <!-- Contextual Navigation Summary Display Component -->
            <div id="destination-card">
                <div class="dest-title" id="card-title">Destination Loaded</div>
                <div class="dest-address" id="card-address">Analyzing route vector traces...</div>

                <div class="route-alt-row" id="route-alt-row"></div>

                <div class="nav-action-row">
                    <button class="nav-btn" id="launch-nav-trigger">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polygon points="3 11 22 2 13 21 11 13 3 11"/></svg>
                        Start Navigation
                    </button>
                    <button class="voice-toggle-btn" id="voice-toggle-trigger" title="Toggle voice guidance">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M11 5 6 9H2v6h4l5 4V5z"/><path d="M19 5a9 9 0 0 1 0 14M15.5 8.5a4.5 4.5 0 0 1 0 7"/></svg>
                    </button>
                    <button class="clear-route-btn" id="clear-route-trigger" title="Clear Route Matrix">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                    </button>
                </div>

                <div id="steps-list"></div>
            </div>

            <!-- Telemetry Information Feeds -->
            <div class="telemetry-grid">
                <div class="matrix-row">
                    <span>TRAFFIC NETWORK</span>
                    <span class="traffic-status-indicator" id="traffic-status" style="color: var(--traffic-green);">
                        <div class="pulse-dot" style="background: var(--traffic-green);"></div>OPTIMAL
                    </span>
                </div>
                <div class="matrix-row">
                    <span>GPS METRICS</span>
                    <span id="telemetry-feed" style="color: var(--neon-blue);">SEARCHING...</span>
                </div>
                <div class="matrix-row">
                    <span>POLLING RATE</span>
                    <span style="color: #ffcc00;" id="latency-val">REALTIME</span>
                </div>
            </div>
        </div>

        <!-- Active Navigation HUD (turn-by-turn mode) -->
        <div id="active-nav-hud">
            <div class="nav-instruction-card">
                <div class="nav-instruction-icon" id="nav-instruction-icon"></div>
                <div class="nav-instruction-body">
                    <div class="nav-instruction-dist" id="nav-instruction-dist">--</div>
                    <div class="nav-instruction-text" id="nav-instruction-text">Preparing route…</div>
                </div>
            </div>
            <div class="nav-bottom-bar">
                <div class="nav-bottom-stat">
                    <span class="val" id="nav-eta-val">--:--</span>
                    <span class="lbl">Arrival</span>
                </div>
                <div class="nav-bottom-stat">
                    <span class="val" id="nav-time-left">--</span>
                    <span class="lbl">Remaining</span>
                </div>
                <div class="nav-bottom-stat">
                    <span class="val" id="nav-dist-left">--</span>
                    <span class="lbl">Distance</span>
                </div>
                <button class="nav-end-btn" id="nav-end-trigger">End</button>
            </div>
        </div>

        <!-- Speed readout chip -->
        <div id="speed-chip">
            <span class="speed-val" id="speed-val">0</span>
            <span class="speed-unit" id="speed-unit-lbl">MPH</span>
        </div>

        <!-- Right Side Floating Utility Control Column -->
        <div id="right-console-stack">
            <button class="glass-panel-btn" id="recenter-gps" title="Recenter on Live Position">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="3"/></svg>
            </button>
            <button class="glass-panel-btn" id="toggle-satellite" title="Toggle Satellite Hybrid Topography">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><line x1="9" y1="3" x2="9" y2="21"/></svg>
            </button>
            <button class="glass-panel-btn" id="toggle-3d" title="Toggle 3D Buildings">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 8l9-5 9 5-9 5-9-5z"/><path d="M3 8v8l9 5 9-5V8"/><path d="M12 13v8"/></svg>
            </button>
        </div>

        <!-- System Geo Data Coordinates Overlay -->
        <div id="spatial-overlay">LNG: -- | LAT: --</div>
    </div>

    <script>
        // Validated access token channel
        mapboxgl.accessToken = 'pk.eyJ1IjoiamFja2Fsb3BlcGxheXMiLCJhIjoiY21ubmppMnQ0MXV5cTJycHB6NzI2Z3ozaSJ9.rC3Z3wHDO5qKVLdiA9XlLg';

        const mapStyles = {
            vectorDark: 'mapbox://styles/mapbox/dark-v11',
            satelliteHybrid: 'mapbox://styles/mapbox/satellite-streets-v12'
        };

        // ── Persistent state (recent searches + saved places) ──
        const STORAGE_KEY_RECENTS = 'geopro_recents';
        const STORAGE_KEY_SAVED = 'geopro_saved';
        const STORAGE_KEY_UNITS = 'geopro_units';

        function loadJSON(key, fallback) {
            try { return JSON.parse(localStorage.getItem(key)) || fallback; }
            catch (e) { return fallback; }
        }
        function saveJSON(key, val) {
            try { localStorage.setItem(key, JSON.stringify(val)); } catch (e) {}
        }

        let recents = loadJSON(STORAGE_KEY_RECENTS, []);
        let saved = loadJSON(STORAGE_KEY_SAVED, []);
        let units = localStorage.getItem(STORAGE_KEY_UNITS) || 'imperial'; // 'imperial' | 'metric'

        // Fallback global coordination matrix points
        let currentOriginCoords = [-123.2078, 39.1502];
        let selectedDestinationCoords = null;
        let selectedDestinationMeta = null; // {text, place_name}
        let destinationMarker = null;
        let firstSignalLock = false;
        let currentTravelMode = 'driving-traffic'; // driving-traffic | cycling | walking
        let voiceEnabled = true;
        let routeAlternatives = [];
        let selectedRouteIdx = 0;
        let isNavigating = false;
        let navSteps = [];
        let navStepIdx = 0;
        let lastSpokenStepIdx = -1;
        let rerouteCooldown = false;
        let lastSpeedKmh = 0;

        // Initialize core engine workspace
        const map = new mapboxgl.Map({
            container: 'map',
            style: mapStyles.vectorDark,
            center: currentOriginCoords,
            zoom: 14,
            pitch: 20,
            bearing: 0
        });

        map.on('load', () => {
            // 3D building extrusion layer (off by default)
            const layers = map.getStyle().layers;
            const labelLayerId = layers.find(l => l.type === 'symbol' && l.layout['text-field'])?.id;
            map.addLayer({
                id: '3d-buildings',
                source: 'composite',
                'source-layer': 'building',
                filter: ['==', 'extrude', 'true'],
                type: 'fill-extrusion',
                minzoom: 14,
                paint: {
                    'fill-extrusion-color': '#2a2a30',
                    'fill-extrusion-height': ['get', 'height'],
                    'fill-extrusion-base': ['get', 'min_height'],
                    'fill-extrusion-opacity': 0.85
                },
                layout: { visibility: 'none' }
            }, labelLayerId);
        });

        // Initialize user tracking marker node element properties
        const userMarkerEl = document.createElement('div');
        userMarkerEl.className = 'custom-tracking-marker';
        const userLocationMarker = new mapboxgl.Marker({ element: userMarkerEl })
            .setLngLat(currentOriginCoords)
            .addTo(map);

        // ── Unit helpers ──
        function metersToDistanceLabel(m) {
            if (units === 'metric') {
                return m >= 1000 ? (m / 1000).toFixed(1) + ' km' : Math.round(m) + ' m';
            }
            const feet = m * 3.28084;
            const miles = m / 1609.34;
            return miles >= 0.1 ? miles.toFixed(1) + ' mi' : Math.round(feet) + ' ft';
        }
        function msToKmh(ms) { return ms * 3.6; }
        function speedLabel(kmh) {
            if (units === 'metric') return Math.round(kmh);
            return Math.round(kmh * 0.621371);
        }
        function updateUnitToggleUI() {
            document.getElementById('unit-toggle').innerText = units === 'metric' ? 'KM' : 'MI';
            document.getElementById('speed-unit-lbl').innerText = units === 'metric' ? 'KM/H' : 'MPH';
        }
        updateUnitToggleUI();

        document.getElementById('unit-toggle').addEventListener('click', () => {
            units = units === 'metric' ? 'imperial' : 'metric';
            localStorage.setItem(STORAGE_KEY_UNITS, units);
            updateUnitToggleUI();
            if (routeAlternatives.length) renderRouteAltPills();
            if (isNavigating) updateNavHudFromRemaining();
        });

        // ── Live geolocation tracking ──
        if ('geolocation' in navigator) {
            navigator.geolocation.watchPosition(
                (position) => {
                    currentOriginCoords = [position.coords.longitude, position.coords.latitude];
                    userLocationMarker.setLngLat(currentOriginCoords);
                    document.getElementById('telemetry-feed').innerText = 'LOCKED_GPS';
                    document.getElementById('telemetry-feed').style.color = '#30d158';

                    if (typeof position.coords.speed === 'number' && position.coords.speed !== null && position.coords.speed >= 0) {
                        lastSpeedKmh = msToKmh(position.coords.speed);
                        if (isNavigating) {
                            document.getElementById('speed-val').innerText = speedLabel(lastSpeedKmh);
                        }
                    }

                    if (!firstSignalLock) {
                        centerMapOnUser();
                        firstSignalLock = true;
                    }

                    if (isNavigating) handleNavigationTick();
                },
                (err) => {
                    console.warn("GPS Tracking Exception. Relying on default hardware configuration parameters.", err);
                    document.getElementById('telemetry-feed').innerText = 'SIGNAL_ERROR';
                    document.getElementById('telemetry-feed').style.color = 'var(--neon-red)';
                },
                { enableHighAccuracy: true, maximumAge: 0, timeout: 5000 }
            );
        }

        function centerMapOnUser() {
            map.flyTo({ center: currentOriginCoords, zoom: 15, pitch: 35, essential: true, speed: 1.2 });
        }
        document.getElementById('recenter-gps').addEventListener('click', centerMapOnUser);

        // ── Travel mode selector ──
        document.getElementById('mode-selector').addEventListener('click', (e) => {
            const btn = e.target.closest('.mode-btn');
            if (!btn) return;
            document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            currentTravelMode = btn.dataset.mode;
            if (selectedDestinationCoords) compileHighSpeedRoutingVector();
        });

        // ── Single Input Search Geocoder ──
        const geocoder = new MapboxGeocoder({
            accessToken: mapboxgl.accessToken,
            mapboxgl: mapboxgl,
            types: 'poi,address,neighborhood,place',
            placeholder: 'Search destination...',
            marker: false
        });
        document.getElementById('geocoder-mount').appendChild(geocoder.onAdd(map));

        geocoder.on('result', (data) => {
            const result = data.result;
            setDestination(result.center, { text: result.text, place_name: result.place_name });
            addToRecents({ text: result.text || result.place_name, place_name: result.place_name, center: result.center });
        });

        function setDestination(coords, meta) {
            selectedDestinationCoords = coords;
            selectedDestinationMeta = meta;

            if (destinationMarker) destinationMarker.remove();
            const destEl = document.createElement('div');
            destEl.className = 'custom-dest-marker';
            destinationMarker = new mapboxgl.Marker({ element: destEl }).setLngLat(coords).addTo(map);

            document.getElementById('card-title').innerText = meta.text || "Target Lock";
            document.getElementById('card-address').innerText = meta.place_name || "";
            document.getElementById('destination-card').style.display = 'flex';

            map.flyTo({ center: coords, zoom: 15, pitch: 45, essential: true });
            clearActiveNavigationTracks();
            compileHighSpeedRoutingVector();
        }

        // ── Recent + Saved quick access panel ──
        function addToRecents(entry) {
            recents = recents.filter(r => r.place_name !== entry.place_name);
            recents.unshift(entry);
            recents = recents.slice(0, 6);
            saveJSON(STORAGE_KEY_RECENTS, recents);
            renderQuickAccess();
        }

        function toggleSaved(entry) {
            const idx = saved.findIndex(s => s.place_name === entry.place_name);
            if (idx >= 0) saved.splice(idx, 1);
            else saved.unshift(entry);
            saveJSON(STORAGE_KEY_SAVED, saved);
            renderQuickAccess();
        }

        const pinIconSvg = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s7-7.4 7-12.5A7 7 0 0 0 5 9.5C5 14.6 12 22 12 22z"/><circle cx="12" cy="9.5" r="2.3"/></svg>';
        const clockIconSvg = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 3"/></svg>';
        const starIconSvg = (filled) => `<svg width="15" height="15" viewBox="0 0 24 24" fill="${filled ? 'currentColor' : 'none'}" stroke="currentColor" stroke-width="2"><polygon points="12 2 15 9 22 9.5 17 14.5 18.5 22 12 18 5.5 22 7 14.5 2 9.5 9 9 12 2"/></svg>`;

        function renderQuickAccess() {
            const panel = document.getElementById('quick-access-panel');
            if (!recents.length && !saved.length) { panel.innerHTML = ''; return; }
            let html = '';
            if (saved.length) {
                html += '<div class="quick-access-label">Saved Places</div>';
                saved.slice(0, 4).forEach((s, i) => { html += quickAccessRow(s, true, 'saved', i); });
            }
            if (recents.length) {
                html += '<div class="quick-access-label">Recent</div>';
                recents.slice(0, 4).forEach((r, i) => { html += quickAccessRow(r, saved.some(s => s.place_name === r.place_name), 'recent', i); });
            }
            panel.innerHTML = html;

            panel.querySelectorAll('.quick-access-item').forEach(row => {
                row.addEventListener('click', (e) => {
                    if (e.target.closest('.quick-access-star')) return;
                    const src = row.dataset.src === 'saved' ? saved : recents;
                    const entry = src[parseInt(row.dataset.idx, 10)];
                    if (!entry) return;
                    setDestination(entry.center, { text: entry.text, place_name: entry.place_name });
                });
            });
            panel.querySelectorAll('.quick-access-star').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    const row = btn.closest('.quick-access-item');
                    const src = row.dataset.src === 'saved' ? saved : recents;
                    const entry = src[parseInt(row.dataset.idx, 10)];
                    if (entry) toggleSaved(entry);
                });
            });
        }

        function quickAccessRow(entry, isStarred, src, idx) {
            return `<div class="quick-access-item" data-src="${src}" data-idx="${idx}">
                <div class="quick-access-icon">${src === 'saved' ? pinIconSvg : clockIconSvg}</div>
                <div class="quick-access-text">
                    <div class="quick-access-title">${entry.text || ''}</div>
                    <div class="quick-access-sub">${entry.place_name || ''}</div>
                </div>
                <button class="quick-access-star ${isStarred ? 'starred' : ''}" title="Save place">${starIconSvg(isStarred)}</button>
            </div>`;
        }
        renderQuickAccess();

        // ── Maneuver icon mapping for turn-by-turn ──
        function maneuverIcon(type, modifier) {
            const arrow = (rot) => `<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="transform:rotate(${rot}deg)"><path d="M12 19V5M5 12l7-7 7 7"/></svg>`;
            if (type === 'depart') return arrow(0);
            if (type === 'arrive') return '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 22s7-7.4 7-12.5A7 7 0 0 0 5 9.5C5 14.6 12 22 12 22z"/><circle cx="12" cy="9.5" r="2.3"/></svg>';
            if (type === 'roundabout' || type === 'rotary') return '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="7"/><path d="M12 5v4M19 12l-3-2"/></svg>';
            switch (modifier) {
                case 'left': return arrow(-90);
                case 'sharp left': return arrow(-135);
                case 'slight left': return arrow(-45);
                case 'right': return arrow(90);
                case 'sharp right': return arrow(135);
                case 'slight right': return arrow(45);
                case 'uturn': return arrow(180);
                default: return arrow(0);
            }
        }

        // ── Route alternatives rendering ──
        function renderRouteAltPills() {
            const row = document.getElementById('route-alt-row');
            if (routeAlternatives.length < 2) { row.innerHTML = ''; return; }
            const fastestIdx = routeAlternatives.reduce((best, r, i, arr) => r.duration < arr[best].duration ? i : best, 0);
            row.innerHTML = routeAlternatives.map((r, i) => {
                const mins = Math.round(r.duration / 60);
                const dist = metersToDistanceLabel(r.distance);
                return `<button class="route-alt-pill ${i === selectedRouteIdx ? 'selected' : ''} ${i === fastestIdx ? 'fastest' : ''}" data-idx="${i}">
                    <span class="alt-eta">${mins} min</span> · ${dist}
                </button>`;
            }).join('');
            row.querySelectorAll('.route-alt-pill').forEach(pill => {
                pill.addEventListener('click', () => {
                    selectedRouteIdx = parseInt(pill.dataset.idx, 10);
                    renderRouteAltPills();
                    drawSelectedRoute();
                });
            });
        }

        // ── Navigation Optimization Vectors Engine Calculations ──
        async function compileHighSpeedRoutingVector() {
            if (!currentOriginCoords || !selectedDestinationCoords) return;

            const profile = currentTravelMode;
            const directionApiEndpoint = `https://api.mapbox.com/directions/v5/mapbox/${profile}/${currentOriginCoords[0]},${currentOriginCoords[1]};${selectedDestinationCoords[0]},${selectedDestinationCoords[1]}?geometries=geojson&overview=full&steps=true&alternatives=true&annotations=congestion&access_token=${mapboxgl.accessToken}`;

            try {
                const query = await fetch(directionApiEndpoint);
                const response = await query.json();

                if (response.code !== 'Ok' || !response.routes.length) {
                    alert("Unable to safely resolve structural route calculation vectors parameters.");
                    return;
                }

                routeAlternatives = response.routes;
                selectedRouteIdx = 0;
                renderRouteAltPills();
                drawSelectedRoute();

            } catch (error) {
                console.error("Critical operational navigation routing compile system failure tracking exception:", error);
            }
        }

        function drawSelectedRoute(fitView = true) {
            const routeData = routeAlternatives[selectedRouteIdx];
            if (!routeData) return;
            const routeGeoJson = routeData.geometry;

            const durationMinutes = Math.round(routeData.duration / 60);
            const distanceLabel = metersToDistanceLabel(routeData.distance);
            document.getElementById('card-title').innerText = `${durationMinutes} min (${distanceLabel})`;

            // Congestion-colored line using line-gradient-esque segments via data-driven paint
            const congestion = routeData.legs?.[0]?.annotation?.congestion || [];

            if (map.getSource('route-line-source')) {
                map.getSource('route-line-source').setData(routeGeoJson);
            } else {
                map.addSource('route-line-source', { type: 'geojson', data: routeGeoJson });
                map.addLayer({
                    id: 'route-line-layer',
                    type: 'line',
                    source: 'route-line-source',
                    layout: { 'line-join': 'round', 'line-cap': 'round' },
                    paint: { 'line-color': '#ff2222', 'line-width': 6, 'line-opacity': 0.9 }
                });
            }

            // Traffic status indicator based on congestion mix
            updateTrafficStatus(congestion);

            navSteps = (routeData.legs || []).flatMap(leg => leg.steps);
            renderStepsList();

            if (fitView) {
                const coordinates = routeGeoJson.coordinates;
                const bounds = coordinates.reduce((acc, coord) => acc.extend(coord), new mapboxgl.LngLatBounds(coordinates[0], coordinates[0]));
                map.fitBounds(bounds, { padding: { top: 60, bottom: 60, left: 440, right: 60 }, exponential: true });
            }
        }

        function updateTrafficStatus(congestion) {
            const el = document.getElementById('traffic-status');
            const dot = el.querySelector('.pulse-dot');
            const heavy = congestion.filter(c => c === 'heavy' || c === 'severe').length;
            const ratio = congestion.length ? heavy / congestion.length : 0;
            let color = 'var(--traffic-green)', label = 'OPTIMAL';
            if (ratio > 0.35) { color = 'var(--traffic-red)'; label = 'CONGESTED'; }
            else if (ratio > 0.12) { color = 'var(--traffic-yellow)'; label = 'MODERATE'; }
            el.style.color = color;
            dot.style.background = color;
            el.childNodes[el.childNodes.length - 1].textContent = label;
        }

        function renderStepsList() {
            const list = document.getElementById('steps-list');
            if (!navSteps.length) { list.style.display = 'none'; return; }
            list.style.display = 'flex';
            list.innerHTML = navSteps.map((step, i) => `
                <div class="step-row" data-idx="${i}">
                    <div class="step-icon">${maneuverIcon(step.maneuver.type, step.maneuver.modifier)}</div>
                    <div class="step-text">${step.maneuver.instruction}</div>
                    <div class="step-dist">${metersToDistanceLabel(step.distance)}</div>
                </div>
            `).join('');
        }

        function clearActiveNavigationTracks() {
            if (map.getLayer('route-line-layer')) map.removeLayer('route-line-layer');
            if (map.getSource('route-line-source')) map.removeSource('route-line-source');
            routeAlternatives = [];
            navSteps = [];
            document.getElementById('route-alt-row').innerHTML = '';
            document.getElementById('steps-list').innerHTML = '';
            document.getElementById('steps-list').style.display = 'none';
        }

        // ── Turn-by-turn navigation mode ──
        document.getElementById('launch-nav-trigger').addEventListener('click', startNavigation);
        document.getElementById('nav-end-trigger').addEventListener('click', endNavigation);

        function startNavigation() {
            if (!navSteps.length) return;
            isNavigating = true;
            navStepIdx = 0;
            lastSpokenStepIdx = -1;
            document.getElementById('command-deck').style.display = 'none';
            document.getElementById('active-nav-hud').style.display = 'flex';
            document.getElementById('speed-chip').style.display = 'flex';
            map.flyTo({ center: currentOriginCoords, zoom: 17, pitch: 60, bearing: 0, essential: true });
            updateNavHudFromRemaining();
            speakInstruction(navSteps[0]);
        }

        function endNavigation() {
            isNavigating = false;
            document.getElementById('command-deck').style.display = 'flex';
            document.getElementById('active-nav-hud').style.display = 'none';
            document.getElementById('speed-chip').style.display = 'none';
            window.speechSynthesis && window.speechSynthesis.cancel();
        }

        document.getElementById('voice-toggle-trigger').addEventListener('click', (e) => {
            voiceEnabled = !voiceEnabled;
            e.currentTarget.classList.toggle('muted', !voiceEnabled);
            if (!voiceEnabled) window.speechSynthesis && window.speechSynthesis.cancel();
        });

        function speakInstruction(step) {
            if (!voiceEnabled || !step || !('speechSynthesis' in window)) return;
            const utter = new SpeechSynthesisUtterance(step.maneuver.instruction);
            utter.rate = 1.02;
            window.speechSynthesis.cancel();
            window.speechSynthesis.speak(utter);
        }

        function haversineMeters(a, b) {
            const R = 6371000;
            const toRad = (d) => d * Math.PI / 180;
            const dLat = toRad(b[1] - a[1]);
            const dLng = toRad(b[0] - a[0]);
            const lat1 = toRad(a[1]), lat2 = toRad(b[1]);
            const h = Math.sin(dLat / 2) ** 2 + Math.cos(lat1) * Math.cos(lat2) * Math.sin(dLng / 2) ** 2;
            return 2 * R * Math.asin(Math.sqrt(h));
        }

        function handleNavigationTick() {
            if (!navSteps.length || navStepIdx >= navSteps.length) return;
            const step = navSteps[navStepIdx];
            const maneuverLoc = step.maneuver.location;
            const distToManeuver = haversineMeters(currentOriginCoords, maneuverLoc);

            // Advance to next step once close enough
            const arrivalThreshold = currentTravelMode === 'walking' ? 15 : 30;
            if (distToManeuver < arrivalThreshold && navStepIdx < navSteps.length - 1) {
                navStepIdx++;
                speakInstruction(navSteps[navStepIdx]);
            } else if (lastSpokenStepIdx !== navStepIdx && distToManeuver < 200) {
                // Pre-announce upcoming turn once
                lastSpokenStepIdx = navStepIdx;
            }

            updateNavHud(step, distToManeuver);
            updateNavHudFromRemaining();

            // Off-route detection -> reroute
            const offRoute = distanceFromRouteLine() > 60;
            if (offRoute && !rerouteCooldown) triggerReroute();

            map.flyTo({ center: currentOriginCoords, bearing: bearingBetween(currentOriginCoords, maneuverLoc), pitch: 60, essential: true, duration: 800 });
        }

        function bearingBetween(a, b) {
            const toRad = (d) => d * Math.PI / 180, toDeg = (r) => r * 180 / Math.PI;
            const lat1 = toRad(a[1]), lat2 = toRad(b[1]), dLng = toRad(b[0] - a[0]);
            const y = Math.sin(dLng) * Math.cos(lat2);
            const x = Math.cos(lat1) * Math.sin(lat2) - Math.sin(lat1) * Math.cos(lat2) * Math.cos(dLng);
            return (toDeg(Math.atan2(y, x)) + 360) % 360;
        }

        function distanceFromRouteLine() {
            const routeData = routeAlternatives[selectedRouteIdx];
            if (!routeData) return 0;
            const coords = routeData.geometry.coordinates;
            let min = Infinity;
            for (let i = 0; i < coords.length; i += 3) { // sample for perf
                const d = haversineMeters(currentOriginCoords, coords[i]);
                if (d < min) min = d;
            }
            return min;
        }

        async function triggerReroute() {
            rerouteCooldown = true;
            const toast = document.getElementById('reroute-toast');
            toast.classList.add('visible');
            await compileHighSpeedRoutingVector();
            navStepIdx = 0;
            lastSpokenStepIdx = -1;
            setTimeout(() => { toast.classList.remove('visible'); rerouteCooldown = false; }, 2200);
        }

        function updateNavHud(step, distToManeuver) {
            document.getElementById('nav-instruction-icon').innerHTML = maneuverIcon(step.maneuver.type, step.maneuver.modifier);
            document.getElementById('nav-instruction-dist').innerText = metersToDistanceLabel(distToManeuver);
            document.getElementById('nav-instruction-text').innerText = step.maneuver.instruction;
        }

        function updateNavHudFromRemaining() {
            const routeData = routeAlternatives[selectedRouteIdx];
            if (!routeData) return;
            const totalSteps = navSteps.length || 1;
            const fractionDone = navStepIdx / totalSteps;
            const remainingDuration = routeData.duration * (1 - fractionDone);
            const remainingDistance = routeData.distance * (1 - fractionDone);

            const arrival = new Date(Date.now() + remainingDuration * 1000);
            document.getElementById('nav-eta-val').innerText = arrival.toLocaleTimeString([], { hour: 'numeric', minute: '2-digit' });
            document.getElementById('nav-time-left').innerText = Math.max(1, Math.round(remainingDuration / 60)) + ' min';
            document.getElementById('nav-dist-left').innerText = metersToDistanceLabel(remainingDistance);
        }

        document.getElementById('clear-route-trigger').addEventListener('click', () => {
            clearActiveNavigationTracks();
            if (destinationMarker) destinationMarker.remove();
            geocoder.clear();
            document.getElementById('destination-card').style.display = 'none';
            selectedDestinationCoords = null;
            centerMapOnUser();
        });

        const satelliteBtn = document.getElementById('toggle-satellite');
        satelliteBtn.addEventListener('click', () => {
            const isSat = satelliteBtn.classList.toggle('active');
            map.setStyle(isSat ? mapStyles.satelliteHybrid : mapStyles.vectorDark);
            map.once('style.load', () => {
                if (routeAlternatives.length) {
                    map.addSource('route-line-source', { type: 'geojson', data: routeAlternatives[selectedRouteIdx].geometry });
                    map.addLayer({
                        id: 'route-line-layer', type: 'line', source: 'route-line-source',
                        layout: { 'line-join': 'round', 'line-cap': 'round' },
                        paint: { 'line-color': '#ff2222', 'line-width': 6, 'line-opacity': 0.9 }
                    });
                }
            });
        });

        const buildings3dBtn = document.getElementById('toggle-3d');
        let is3dActive = false;
        buildings3dBtn.addEventListener('click', () => {
            is3dActive = !is3dActive;
            buildings3dBtn.classList.toggle('active', is3dActive);
            if (map.getLayer('3d-buildings')) {
                map.setLayoutProperty('3d-buildings', 'visibility', is3dActive ? 'visible' : 'none');
            }
            map.easeTo({ pitch: is3dActive ? 55 : 20, duration: 600 });
        });

        // ── Draggable Command Deck (bottom-sheet style drag handle) ──
        const commandDeck = document.getElementById('command-deck');
        const dragHandle = document.getElementById('drag-handle');

        let deckTranslateY = 0;
        let dragStartY = 0;
        let dragStartTranslate = 0;
        let isDraggingDeck = false;

        function clampValue(value, min, max) { return Math.min(Math.max(value, min), max); }

        function getMaxDragOffset() {
            const header = commandDeck.querySelector('.deck-header');
            const peekHeight = (header ? header.offsetHeight : 40) + 28;
            return Math.max(commandDeck.scrollHeight - peekHeight, 0);
        }

        function setDeckTranslate(value, animate) {
            commandDeck.classList.toggle('is-dragging', !animate);
            commandDeck.style.transform = `translateY(${value}px)`;
        }

        dragHandle.addEventListener('pointerdown', (e) => {
            isDraggingDeck = true;
            dragStartY = e.clientY;
            dragStartTranslate = deckTranslateY;
            dragHandle.setPointerCapture(e.pointerId);
            setDeckTranslate(deckTranslateY, false);
        });

        dragHandle.addEventListener('pointermove', (e) => {
            if (!isDraggingDeck) return;
            const deltaY = e.clientY - dragStartY;
            const maxOffset = getMaxDragOffset();
            deckTranslateY = clampValue(dragStartTranslate + deltaY, 0, maxOffset);
            setDeckTranslate(deckTranslateY, false);
        });

        function endDeckDrag() {
            if (!isDraggingDeck) return;
            isDraggingDeck = false;
            const maxOffset = getMaxDragOffset();
            deckTranslateY = deckTranslateY > maxOffset / 2 ? maxOffset : 0;
            setDeckTranslate(deckTranslateY, true);
        }

        dragHandle.addEventListener('pointerup', endDeckDrag);
        dragHandle.addEventListener('pointercancel', endDeckDrag);

        window.addEventListener('resize', () => {
            const maxOffset = getMaxDragOffset();
            if (deckTranslateY > maxOffset) {
                deckTranslateY = maxOffset;
                setDeckTranslate(deckTranslateY, true);
            }
        });

        // Live Spatial Coordinate Hover Metrics Monitoring
        const spatialOverlay = document.getElementById('spatial-overlay');
        map.on('mousemove', (e) => {
            spatialOverlay.innerHTML = `LNG: ${e.lngLat.lng.toFixed(4)} | LAT: ${e.lngLat.lat.toFixed(4)}`;
        });
    </script>
</body>
</html>
