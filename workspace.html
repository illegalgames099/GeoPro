<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GeoPro Quantum Navigation</title>
    
    <!-- Mapbox GL JS Core Engine -->
    <script src="https://api.mapbox.com/mapbox-gl-js/v3.3.0/mapbox-gl.js"></script>
    <link href="https://api.mapbox.com/mapbox-gl-js/v3.3.0/mapbox-gl.css" rel="stylesheet" />

    <!-- Mapbox Geocoder (Single Input Spatial Engine) -->
    <script src="https://api.mapbox.com/mapbox-gl-js/plugins/mapbox-gl-geocoder/v5.0.0/mapbox-gl-geocoder.min.js"></script>
    <link rel="stylesheet" href="https://api.mapbox.com/mapbox-gl-js/plugins/mapbox-gl-geocoder/v5.0.0/mapbox-gl-geocoder.css" type="text/css">

    <style>
        :root {
            --bg-pure: #000000;
            --hud-bg: rgba(10, 10, 12, 0.85);
            --card-surface: rgba(22, 22, 26, 0.7);
            --neon-red: #ff2222;
            --neon-blue: #0071e3;
            --border-glow: rgba(255, 34, 34, 0.15);
            --border-line: rgba(255, 255, 255, 0.08);
            --text-primary: #ffffff;
            --text-secondary: #8e8e93;
            --traffic-green: #30d158;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", Roboto, sans-serif;
            letter-spacing: -0.2px;
        }

        body, html {
            width: 100%;
            height: 100vh;
            overflow: hidden;
            background-color: var(--bg-pure);
            color: var(--text-primary);
        }

        #app-viewport {
            position: relative;
            width: 100%;
            height: 100vh;
            display: flex;
        }

        #map {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: var(--bg-pure);
            z-index: 1;
        }

        /* ── FUTURE-FORWARD FLOATING HUD COMMAND DECK ── */
        #command-deck {
            position: absolute;
            top: 20px;
            left: 20px;
            width: 380px;
            z-index: 10;
            background: var(--hud-bg);
            backdrop-filter: blur(30px) saturate(200%);
            -webkit-backdrop-filter: blur(30px) saturate(200%);
            border: 1px solid var(--border-line);
            border-radius: 24px;
            padding: 24px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.7), 0 0 40px var(--border-glow);
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .deck-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .brand-logo {
            font-size: 1.35rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .brand-logo span { color: var(--neon-red); text-shadow: 0 0 10px rgba(255,34,34,0.4); }

        .sys-exit-btn {
            background: var(--card-surface);
            border: 1px solid var(--border-line);
            color: var(--text-secondary);
            padding: 6px 14px;
            border-radius: 10px;
            font-size: 0.8rem;
            font-weight: 600;
            text-decoration: none;
            transition: all 0.2s ease;
        }
        .sys-exit-btn:hover {
            color: var(--text-primary);
            border-color: rgba(255,255,255,0.2);
            background: rgba(255,255,255,0.05);
        }

        /* ── FIXED & RE-ENGINEERED SINGLE INPUT GEOCODER ── */
        .search-container-box {
            width: 100%;
            position: relative;
        }

        .mapboxgl-ctrl-geocoder {
            width: 100% !important;
            max-width: 100% !important;
            background-color: var(--card-surface) !important;
            border: 1px solid var(--border-line) !important;
            border-radius: 16px !important;
            box-shadow: none !important;
            height: 52px !important;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .mapboxgl-ctrl-geocoder:focus-within {
            border-color: rgba(255, 34, 34, 0.6) !important;
            box-shadow: 0 0 15px rgba(255, 34, 34, 0.2) !important;
            background-color: rgba(15, 15, 18, 0.95) !important;
        }

        .mapboxgl-ctrl-geocoder--input {
            height: 52px !important;
            color: var(--text-primary) !important;
            font-size: 1rem !important;
            font-weight: 500 !important;
            padding: 12px 16px 12px 48px !important;
            background: transparent !important;
        }
        .mapboxgl-ctrl-geocoder--input::placeholder { color: var(--text-secondary); }

        .mapboxgl-ctrl-geocoder--icon-search {
            top: 16px !important;
            left: 16px !important;
            fill: var(--text-secondary) !important;
            width: 20px !important;
            height: 20px !important;
        }
        .mapboxgl-ctrl-geocoder--button { top: 14px !important; background: transparent !important; }
        .mapboxgl-ctrl-geocoder--icon-close { fill: var(--text-secondary) !important; }

        /* Autocomplete Suggestions Menu Configuration */
        .mapboxgl-ctrl-geocoder .suggestions {
            background-color: #0f0f11 !important;
            border: 1px solid rgba(255,255,255,0.1) !important;
            backdrop-filter: blur(25px) !important;
            border-radius: 18px !important;
            box-shadow: 0 16px 40px rgba(0,0,0,0.8) !important;
            padding: 6px !important;
            margin-top: 8px !important;
            position: absolute;
            width: 100%;
            z-index: 1000;
        }
        .mapboxgl-ctrl-geocoder .suggestions > li { border-radius: 10px !important; }
        .mapboxgl-ctrl-geocoder .suggestions > li > a {
            color: var(--text-primary) !important;
            padding: 12px 14px !important;
            font-size: 0.9rem !important;
            font-weight: 500 !important;
        }
        .mapboxgl-ctrl-geocoder .suggestions > .active > a,
        .mapboxgl-ctrl-geocoder .suggestions > li > a:hover {
            background-color: rgba(255, 255, 255, 0.08) !important;
            color: var(--neon-red) !important;
        }

        /* ── DYNAMIC DESTINATION SUMMARY CARD ── */
        #destination-card {
            background: var(--card-surface);
            border: 1px solid var(--border-line);
            border-radius: 16px;
            padding: 16px;
            display: none;
            flex-direction: column;
            gap: 12px;
            animation: slideIn 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
        @keyframes slideIn {
            from { transform: translateY(10px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .dest-title { font-size: 1.05rem; font-weight: 700; color: var(--text-primary); }
        .dest-address { font-size: 0.85rem; color: var(--text-secondary); line-height: 1.3; }
        
        .nav-action-row { display: flex; gap: 10px; margin-top: 4px; }
        .nav-btn {
            flex: 1;
            background: var(--neon-blue);
            color: #fff;
            border: none;
            padding: 12px;
            border-radius: 12px;
            font-size: 0.88rem;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }
        .nav-btn:hover { opacity: 0.9; }
        .clear-route-btn {
            background: rgba(255,255,255,0.08);
            border: 1px solid var(--border-line);
            color: var(--text-primary);
            width: 48px;
            border-radius: 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* ── TELEMETRY CONSOLE WIDGETS ── */
        .telemetry-grid {
            display: flex;
            flex-direction: column;
            gap: 8px;
            background: rgba(0,0,0,0.3);
            padding: 14px 16px;
            border-radius: 16px;
            border: 1px solid var(--border-line);
        }
        .matrix-row { display: flex; justify-content: space-between; font-size: 0.8rem; }
        .matrix-row span:first-child { color: var(--text-secondary); font-weight: 500; }
        .matrix-row span:last-child { font-family: monospace; font-weight: 600; }
        
        .traffic-status-indicator { color: var(--traffic-green); display: flex; align-items: center; gap: 6px; }
        .pulse-dot {
            width: 8px;
            height: 8px;
            background-color: var(--traffic-green);
            border-radius: 50%;
            animation: blink 1.5s infinite;
        }
        @keyframes blink { 0%, 100% { opacity: 0.4; } 50% { opacity: 1; } }

        /* FIXED RIGHT ACTION CONTROL STACK */
        #right-console-stack {
            position: absolute;
            top: 20px;
            right: 20px;
            z-index: 100; /* Shifted above standard overlays */
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .glass-panel-btn {
            background: var(--hud-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border-line);
            padding: 14px;
            border-radius: 16px;
            color: var(--text-primary);
            cursor: pointer;
            box-shadow: 0 8px 24px rgba(0,0,0,0.4);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }
        .glass-panel-btn:hover { background: rgba(255,255,255,0.08); border-color: rgba(255,255,255,0.2); }
        .glass-panel-btn.active {
            border-color: var(--neon-red);
            box-shadow: 0 0 15px rgba(255,34,34,0.2);
            color: var(--neon-red);
        }

        #spatial-overlay {
            position: absolute;
            bottom: 20px;
            right: 20px;
            background: var(--hud-bg);
            backdrop-filter: blur(10px);
            padding: 8px 14px;
            border-radius: 10px;
            border: 1px solid var(--border-line);
            font-family: monospace;
            font-size: 0.75rem;
            z-index: 5;
            pointer-events: none;
        }

        /* High-Visibility Custom Pin Nodes */
        .custom-tracking-marker {
            width: 22px;
            height: 22px;
            background-color: var(--neon-blue);
            border: 3px solid #ffffff;
            border-radius: 50%;
            box-shadow: 0 0 18px var(--neon-blue);
            cursor: pointer;
        }
        .custom-dest-marker {
            width: 18px;
            height: 18px;
            background-color: var(--neon-red);
            border: 3px solid #ffffff;
            border-radius: 50%;
            box-shadow: 0 0 18px var(--neon-red);
        }

        /* Mobile Layout Adaptations */
        @media(max-width: 480px) {
            #command-deck {
                width: calc(100% - 40px);
                left: 20px;
                top: auto;
                bottom: 20px;
            }
            #right-console-stack {
                top: 20px;
                right: 20px;
            }
            #spatial-overlay {
                display: none;
            }
        }
    </style>
</head>
<body>

    <div id="app-viewport">
        <!-- Main Map Output Canvas -->
        <div id="map"></div>

        <!-- Left Command Deck HUD Console -->
        <div id="command-deck">
            <div class="deck-header">
                <div class="brand-logo">Geo<span>Pro</span></div>
                <a href="index.html" class="sys-exit-btn">Exit</a>
            </div>

            <!-- Single Input Geocoder Wrapper -->
            <div class="search-container-box">
                <div id="geocoder-mount"></div>
            </div>

            <!-- Contextual Navigation Summary Display Component -->
            <div id="destination-card">
                <div class="dest-title" id="card-title">Destination Loaded</div>
                <div class="dest-address" id="card-address">Analyzing route vector traces...</div>
                <div class="nav-action-row">
                    <button class="nav-btn" id="launch-nav-trigger">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polygon points="3 11 22 2 13 21 11 13 3 11"/></svg>
                        Start Navigation
                    </button>
                    <button class="clear-route-btn" id="clear-route-trigger" title="Clear Route Matrix">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                    </button>
                </div>
            </div>

            <!-- Telemetry Information Feeds -->
            <div class="telemetry-grid">
                <div class="matrix-row">
                    <span>TRAFFIC NETWORK</span>
                    <span class="traffic-status-indicator" id="traffic-status">
                        <div class="pulse-dot"></div>OPTIMAL
                    </span>
                </div>
                <div class="matrix-row">
                    <span>GPS METRICS</span>
                    <span id="telemetry-feed" style="color: var(--neon-blue);">SEARCHING...</span>
                </div>
                <div class="matrix-row">
                    <span>POLLING RATE</span>
                    <span style="color: #ffcc00;" id="latency-val">REALTIME</span>
                </div>
            </div>
        </div>

        <!-- Right Side Floating Utility Control Column -->
        <div id="right-console-stack">
            <button class="glass-panel-btn" id="recenter-gps" title="Recenter on Live Position">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="3"/></svg>
            </button>
            <button class="glass-panel-btn" id="toggle-satellite" title="Toggle Satellite Hybrid Topography">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><line x1="9" y1="3" x2="9" y2="21"/></svg>
            </button>
        </div>

        <!-- System Geo Data Coordinates Overlay -->
        <div id="spatial-overlay">LNG: -- | LAT: --</div>
    </div>

    <script>
        // Validated access token channel
        mapboxgl.accessToken = 'pk.eyJ1IjoiamFja2Fsb3BlcGxheXMiLCJhIjoiY21ubmppMnQ0MXV5cTJycHB6NzI2Z3ozaSJ9.rC3Z3wHDO5qKVLdiA9XlLg';

        // Using standard Mapbox Dark style endpoint directly to ensure complete loading layout performance
        const mapStyles = {
            vectorDark: 'mapbox://styles/mapbox/dark-v11',
            satelliteHybrid: 'mapbox://styles/mapbox/satellite-streets-v12'
        };

        // Fallback global coordination matrix points
        let currentOriginCoords = [-123.2078, 39.1502]; 
        let selectedDestinationCoords = null;
        let destinationMarker = null;
        let firstSignalLock = false;

        // Initialize core engine workspace 
        const map = new mapboxgl.Map({
            container: 'map',
            style: mapStyles.vectorDark,
            center: currentOriginCoords,
            zoom: 14,
            pitch: 20,
            bearing: 0
        });

        // Initialize user tracking marker node element properties
        const userMarkerEl = document.createElement('div');
        userMarkerEl.className = 'custom-tracking-marker';
        const userLocationMarker = new mapboxgl.Marker({ element: userMarkerEl })
            .setLngLat(currentOriginCoords)
            .addTo(map);

        // Maximize low-latency positional performance parameters via native device sensors
        if ('geolocation' in navigator) {
            navigator.geolocation.watchPosition(
                (position) => {
                    currentOriginCoords = [position.coords.longitude, position.coords.latitude];
                    userLocationMarker.setLngLat(currentOriginCoords);
                    document.getElementById('telemetry-feed').innerText = 'LOCKED_GPS';
                    document.getElementById('telemetry-feed').style.color = '#30d158';

                    // Force camera adjustments on initial hardware synchronization updates
                    if (!firstSignalLock) {
                        centerMapOnUser();
                        firstSignalLock = true;
                    }
                },
                (err) => {
                    console.warn("GPS Tracking Exception. Relying on default hardware configuration parameters.", err);
                    document.getElementById('telemetry-feed').innerText = 'SIGNAL_ERROR';
                    document.getElementById('telemetry-feed').style.color = 'var(--neon-red)';
                },
                { 
                    enableHighAccuracy: true, 
                    maximumAge: 0, 
                    timeout: 5000 
                }
            );
        }

        function centerMapOnUser() {
            map.flyTo({
                center: currentOriginCoords,
                zoom: 15,
                pitch: 35,
                essential: true,
                speed: 1.2
            });
        }

        // ── Single Input Search Geocoder Structural Engine Mounting ──
        const geocoder = new MapboxGeocoder({
            accessToken: mapboxgl.accessToken,
            mapboxgl: mapboxgl,
            types: 'poi,address,neighborhood,place',
            placeholder: 'Search destination...',
            marker: false
        });

        // Mount clean target hook parameters manually inside custom designated overlay container element boxes
        document.getElementById('geocoder-mount').appendChild(geocoder.onAdd(map));

        // Route generation tracking logic
        geocoder.on('result', (data) => {
            const result = data.result;
            selectedDestinationCoords = result.center;

            if (destinationMarker) destinationMarker.remove();

            const destEl = document.createElement('div');
            destEl.className = 'custom-dest-marker';
            destinationMarker = new mapboxgl.Marker({ element: destEl })
                .setLngLat(selectedDestinationCoords)
                .addTo(map);

            document.getElementById('card-title').innerText = result.text || "Target Lock";
            document.getElementById('card-address').innerText = result.place_name || "";
            document.getElementById('destination-card').style.display = 'flex';

            map.flyTo({
                center: selectedDestinationCoords,
                zoom: 15,
                pitch: 45,
                essential: true
            });

            clearActiveNavigationTracks();
        });

        // ── Navigation Optimization Vectors Engine Calculations ──
        async function compileHighSpeedRoutingVector() {
            if (!currentOriginCoords || !selectedDestinationCoords) return;

            // Swapped routing algorithm parameter profile tracks over to high performance criteria routes mapping
            const directionApiEndpoint = `https://api.mapbox.com/directions/v5/mapbox/driving/${currentOriginCoords[0]},${currentOriginCoords[1]};${selectedDestinationCoords[0]},${selectedDestinationCoords[1]}?geometries=geojson&overview=full&access_token=${mapboxgl.accessToken}`;

            try {
                const query = await fetch(directionApiEndpoint);
                const response = await query.json();
                
                if (response.code !== 'Ok') {
                    alert("Unable to safely resolve structural route calculation vectors parameters.");
                    return;
                }

                const routeData = response.routes[0];
                const routeGeoJson = routeData.geometry;

                const durationMinutes = Math.round(routeData.duration / 60);
                const distanceMiles = (routeData.distance / 1609.34).toFixed(1);
                
                document.getElementById('card-title').innerText = `${durationMinutes} min (${distanceMiles} mi)`;

                if (map.getSource('route-line-source')) {
                    map.getSource('route-line-source').setData(routeGeoJson);
                } else {
                    map.addSource('route-line-source', {
                        type: 'geojson',
                        data: routeGeoJson
                    });

                    map.addLayer({
                        id: 'route-line-layer',
                        type: 'line',
                        source: 'route-line-source',
                        layout: { 'line-join': 'round', 'line-cap': 'round' },
                        paint: {
                            'line-color': '#ff2222',
                            'line-width': 6,
                            'line-opacity': 0.9
                        }
                    });
                }

                const coordinates = routeGeoJson.coordinates;
                const bounds = coordinates.reduce((acc, coord) => {
                    return acc.extend(coord);
                }, new mapboxgl.LngLatBounds(coordinates[0], coordinates[0]));

                map.fitBounds(bounds, {
                    padding: { top: 60, bottom: 60, left: 440, right: 60 },
                    exponential: true
                });

            } catch (error) {
                console.error("Critical operational navigation routing compile system failure tracking exception:", error);
            }
        }

        function clearActiveNavigationTracks() {
            if (map.getLayer('route-line-layer')) map.removeLayer('route-line-layer');
            if (map.getSource('route-line-source')) map.removeSource('route-line-source');
        }

        // Interface System Operational Control Listeners
        document.getElementById('launch-nav-trigger').addEventListener('click', compileHighSpeedRoutingVector);
        document.getElementById('recenter-gps').addEventListener('click', centerMapOnUser);
        
        document.getElementById('clear-route-trigger').addEventListener('click', () => {
            clearActiveNavigationTracks();
            if (destinationMarker) destinationMarker.remove();
            geocoder.clear();
            document.getElementById('destination-card').style.display = 'none';
            centerMapOnUser();
        });

        const satelliteBtn = document.getElementById('toggle-satellite');
        satelliteBtn.addEventListener('click', () => {
            const isSat = satelliteBtn.classList.toggle('active');
            map.setStyle(isSat ? mapStyles.satelliteHybrid : mapStyles.vectorDark);
        });

        // Live Spatial Coordinate Hover Metrics Monitoring
        const spatialOverlay = document.getElementById('spatial-overlay');
        const trackCursorCoordinates = (lngLat) => {
            spatialOverlay.innerHTML = `LNG: ${lngLat.lng.toFixed(4)} | LAT: ${lngLat.lat.toFixed(4)}`;
        };
        map.on('mousemove', (e) => trackCursorCoordinates(e.lngLat));
    </script>
</body>
</html>
