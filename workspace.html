<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GeoPro Workspace</title>
    
    <!-- Mapbox GL JS Core (v3 Natively Handles PMTiles) -->
    <script src="https://api.mapbox.com/mapbox-gl-js/v3.3.0/mapbox-gl.js"></script>
    <link href="https://api.mapbox.com/mapbox-gl-js/v3.3.0/mapbox-gl.css" rel="stylesheet" />

    <style>
        :root {
            --bg-color: #0a0a0a;
            --panel-bg: #141414;
            --accent-color: #ff3333;
            --border-color: #242424;
            --text-color: #e5e5e5;
            --text-muted: #777;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        body, html {
            width: 100%;
            height: 100vh;
            overflow: hidden;
            background-color: var(--bg-color);
            color: var(--text-color);
        }

        #workspace-container {
            display: flex;
            width: 100%;
            height: 100vh;
        }

        /* Sidebar Control Center Layout */
        #sidebar {
            width: 320px;
            height: 100%;
            background-color: var(--panel-bg);
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            z-index: 10;
            box-shadow: 10px 0 30px rgba(0,0,0,0.6);
        }

        .sidebar-header {
            padding: 24px 20px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .sidebar-header h1 {
            font-size: 1.15rem;
            font-weight: 800;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .sidebar-header h1 span {
            color: var(--accent-color);
        }

        .back-home {
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.8rem;
            text-transform: uppercase;
            border: 1px solid var(--border-color);
            padding: 4px 8px;
            border-radius: 4px;
            transition: color 0.2s, border-color 0.2s;
        }

        .back-home:hover {
            color: var(--text-color);
            border-color: var(--text-muted);
        }

        .sidebar-content {
            padding: 20px;
            flex-grow: 1;
            overflow-y: auto;
        }

        .control-group {
            margin-bottom: 30px;
        }

        .control-group h3 {
            font-size: 0.8rem;
            text-transform: uppercase;
            color: var(--text-muted);
            letter-spacing: 1px;
            margin-bottom: 15px;
        }

        /* Interface Toggle Layouts */
        .toggle-container {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: #1a1a1a;
            padding: 14px 12px;
            border-radius: 4px;
            border: 1px solid var(--border-color);
            margin-bottom: 12px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .toggle-container:hover {
            background: #222;
        }

        .toggle-label {
            font-size: 0.85rem;
            font-weight: 500;
            letter-spacing: 0.3px;
        }

        .switch {
            position: relative;
            display: inline-block;
            width: 36px;
            height: 18px;
        }

        .switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #333;
            transition: .25s;
            border-radius: 20px;
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 12px;
            width: 12px;
            left: 3px;
            bottom: 3px;
            background-color: #fff;
            transition: .25s;
            border-radius: 50%;
        }

        input:checked + .slider {
            background-color: var(--accent-color);
        }

        input:checked + .slider:before {
            transform: translateX(18px);
        }

        /* Map Window */
        #map {
            flex-grow: 1;
            height: 100%;
            position: relative;
            background-color: #0e0e0e;
        }

        /* Live Location Matrix Display */
        #geo-overlay {
            position: absolute;
            bottom: 24px;
            right: 24px;
            background: rgba(10, 10, 10, 0.85);
            padding: 10px 16px;
            border-radius: 4px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.8rem;
            color: var(--text-color);
            pointer-events: none;
            z-index: 5;
            backdrop-filter: blur(5px);
            letter-spacing: 0.5px;
        }
    </style>
</head>
<body>

    <div id="workspace-container">
        <!-- Application Control Core -->
        <div id="sidebar">
            <div class="sidebar-header">
                <h1>Geo<span>Pro</span></h1>
                <a href="index.html" class="back-home">Home</a>
            </div>
            
            <div class="sidebar-content">
                <div class="control-group">
                    <h3>Data Visualization</h3>
                    
                    <!-- 3D Boundary Height Rendering Extrusions -->
                    <label class="toggle-container">
                        <span class="toggle-label">3D Building Extrusions</span>
                        <div class="switch">
                            <input type="checkbox" id="layer-toggle-3d" checked>
                            <span class="slider"></span>
                        </div>
                    </label>

                    <!-- Streamed Vector Local Files Architecture -->
                    <label class="toggle-container">
                        <span class="toggle-label">Local Infrastructure (PMTiles)</span>
                        <div class="switch">
                            <input type="checkbox" id="layer-toggle-pmtiles">
                            <span class="slider"></span>
                        </div>
                    </label>
                </div>
            </div>
        </div>

        <!-- Render Viewport -->
        <div id="map">
            <div id="geo-overlay">LNG: -123.2078 | LAT: 39.1502</div>
        </div>
    </div>

    <script>
        // Active Mapbox access token applied
        mapboxgl.accessToken = 'pk.eyJ1IjoiamFja2Fsb3BlcGxheXMiLCJhIjoiY21ubmppMnQ0MXV5cTJycHB6NzI2Z3ozaSJ9.rC3Z3wHDO5qKVLdiA9XlLg';

        // 1. Initialize Core Map Engine Pipeline targeting Ukiah CA coordinates
        const map = new mapboxgl.Map({
            container: 'map',
            style: 'mapbox://styles/mapbox/dark-v11', 
            center: [-123.2078, 39.1502],
            zoom: 14.5,
            pitch: 50,
            bearing: -12
        });

        map.on('load', () => {
            // Safe lookup for label layer to insert map features underneath
            const layers = map.getStyle().layers;
            let labelLayerId;
            
            for (let i = 0; i < layers.length; i++) {
                if (layers[i].type === 'symbol' && layers[i].layout && layers[i].layout['text-field']) {
                    labelLayerId = layers[i].id;
                    break;
                }
            }

            // --- A. Inject 3D Mesh Geometry Layer into Engine ---
            map.addLayer({
                'id': '3d-buildings',
                'source': 'composite',
                'source-layer': 'building',
                'filter': ['==', 'extrude', 'true'],
                'type': 'fill-extrusion',
                'minzoom': 14,
                'paint': {
                    'fill-extrusion-color': '#1f1f1f',
                    'fill-extrusion-height': [
                        'interpolate', ['linear'], ['zoom'],
                        14, 0,
                        14.5, ['get', 'height']
                    ],
                    'fill-extrusion-base': [
                        'interpolate', ['linear'], ['zoom'],
                        14, 0,
                        14.5, ['get', 'min_height']
                    ],
                    'fill-extrusion-opacity': 0.8
                }
            }, labelLayerId);


            /* 
            --- B. PMTiles Source Pipelines (Uncomment below once you have a real hosted .pmtiles file) ---
            
            map.addSource('local-infrastructure-source', {
                type: 'vector',
                url: 'https://your-server-or-bucket.com/infrastructure.pmtiles' // Mapbox v3 parses directly via file extension!
            });

            map.addLayer({
                id: 'local-infrastructure-layer',
                source: 'local-infrastructure-source',
                'source-layer': 'layer1', 
                type: 'line',
                layout: {
                    'line-join': 'round',
                    'line-cap': 'round'
                },
                paint: {
                    'line-color': '#ff3333', 
                    'line-width': 2,
                    'line-opacity': 0.85
                }
            });

            const pmtilesCheckbox = document.getElementById('layer-toggle-pmtiles');
            map.setLayoutProperty(
                'local-infrastructure-layer', 
                'visibility', 
                pmtilesCheckbox.checked ? 'visible' : 'none'
            );

            pmtilesCheckbox.addEventListener('change', (e) => {
                map.setLayoutProperty('local-infrastructure-layer', 'visibility', e.target.checked ? 'visible' : 'none');
            });
            */


            // --- C. Event Tracking Handlers ---

            // 3D Matrix Rendering Switch
            document.getElementById('layer-toggle-3d').addEventListener('change', (e) => {
                map.setLayoutProperty('3d-buildings', 'visibility', e.target.checked ? 'visible' : 'none');
            });
        });

        // Frame update rendering tick coordinate monitoring loops
        map.on('mousemove', (e) => {
            document.getElementById('geo-overlay').innerHTML = 
                `LNG: ${e.lngLat.lng.toFixed(4)} | LAT: ${e.lngLat.lat.toFixed(4)}`;
        });
    </script>
</body>
</html>
