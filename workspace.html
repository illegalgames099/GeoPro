<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <title>GeoPro - Mapping Engine Workspace</title>
    <meta name="viewport" content="initial-scale=1,maximum-scale=1,user-scalable=no" />
    
    <!-- MapLibre Core Dependencies -->
    <link href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css" rel="stylesheet" />
    <script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>

    <style>
        :root {
            --bg-primary: #111114;
            --bg-panel: #16161a;
            --bg-panel-solid: #1c1c22;
            --border-color: #2a2a32;
            --action-red: #ff3333;
            --action-red-glow: rgba(255, 51, 51, 0.35);
            --text-primary: #f5f5f7;
            --text-secondary: #c5c5ca;
            --text-muted: #72727e;
            --font-monospace: 'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: var(--bg-primary);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        #map {
            position: absolute;
            top: 0;
            bottom: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        .hud-system-header {
            position: absolute;
            top: 16px;
            left: 16px;
            right: 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 10;
            pointer-events: none;
        }

        .hud-module {
            background: rgba(22, 22, 26, 0.85);
            backdrop-filter: blur(12px);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 10px 16px;
            pointer-events: auto;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .brand-node {
            font-family: var(--font-monospace);
            font-weight: 900;
            letter-spacing: 1px;
            color: var(--text-primary);
            font-size: 0.95rem;
        }

        .brand-node span {
            color: var(--action-red);
        }

        #coordinate-overlay-tracker {
            font-family: var(--font-monospace);
            font-size: 0.75rem;
            color: var(--text-secondary);
            background: rgba(12, 12, 14, 0.9);
            border: 1px solid var(--border-color);
        }

        #telemetry-status-node {
            font-family: var(--font-monospace);
            font-size: 0.7rem;
            font-weight: bold;
            color: #007aff;
            text-transform: uppercase;
        }

        #control-panel-deck {
            position: absolute;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%) translateY(0px);
            width: 440px;
            max-width: calc(100vw - 32px);
            background: rgba(22, 22, 26, 0.92);
            backdrop-filter: blur(16px);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.6);
            z-index: 10;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            transition: transform 0.2s cubic-bezier(0.1, 0.8, 0.25, 1);
        }

        #control-panel-deck.snapping {
            transition: transform 0.35s cubic-bezier(0.25, 1, 0.5, 1);
        }

        #drag-handle {
            width: 100%;
            height: 24px;
            background: var(--bg-panel);
            cursor: grab;
            display: flex;
            align-items: center;
            justify-content: center;
            border-bottom: 1px solid rgba(255,255,255,0.03);
        }

        #drag-handle::before {
            content: '';
            width: 36px;
            height: 4px;
            background: #3a3a44;
            border-radius: 2px;
        }

        #drag-handle:active {
            cursor: grabbing;
        }

        .workspace-content-body {
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            max-height: 75vh;
            overflow-y: auto;
        }

        .search-engine-wrap {
            position: relative;
            display: flex;
            width: 100%;
        }

        .search-engine-wrap input {
            width: 100%;
            background: #0e0e11;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 12px 14px;
            color: var(--text-primary);
            font-size: 0.88rem;
            outline: none;
            transition: border-color 0.15s ease;
        }

        .search-engine-wrap input:focus {
            border-color: var(--action-red);
        }

        .suggest-dropdown-matrix {
            position: absolute;
            top: calc(100% + 6px);
            left: 0;
            right: 0;
            background: var(--bg-panel-solid);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            max-height: 200px;
            overflow-y: auto;
            display: none;
            z-index: 100;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
        }

        .osm-suggest-item {
            padding: 10px 14px;
            color: var(--text-secondary);
            font-size: 0.82rem;
            cursor: pointer;
            border-bottom: 1px solid rgba(255,255,255,0.02);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .osm-suggest-item:hover {
            background: rgba(255, 51, 51, 0.08);
            color: var(--text-primary);
        }

        #context-destination-panel {
            background: #0e0e11;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 12px;
            display: none;
            align-items: flex-start;
            gap: 12px;
        }

        .meta-vector-icon {
            width: 20px;
            height: 20px;
            margin-top: 2px;
            flex-shrink: 0;
        }

        .meta-vector-info-stack {
            flex-grow: 1;
            overflow: hidden;
        }

        #node-panel-title {
            color: var(--text-primary);
            font-size: 0.85rem;
            font-weight: bold;
            margin-bottom: 2px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        #node-panel-address {
            color: var(--text-muted);
            font-size: 0.78rem;
            line-height: 1.3;
        }

        #route-variants-dashboard {
            display: none;
            flex-direction: column;
            gap: 6px;
            background: #0e0e11;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 10px;
        }

        .route-badge-row {
            display: flex;
            flex-direction: column;
            gap: 4px;
            padding: 8px;
            background: rgba(255,255,255,0.02);
            border-radius: 6px;
            font-size: 0.78rem;
        }

        .directions-manifest {
            margin-top: 10px;
            border-top: 1px solid var(--border-color);
            padding-top: 10px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            max-height: 220px;
            overflow-y: auto;
        }

        .direction-step {
            display: flex;
            gap: 10px;
            align-items: flex-start;
            padding: 6px 4px;
            border-bottom: 1px solid rgba(255,255,255,0.02);
            color: var(--text-secondary);
            font-size: 0.8rem;
            cursor: pointer;
        }

        .direction-step:hover {
            background: rgba(255, 255, 255, 0.03);
        }

        .step-index {
            background: var(--border-color);
            color: var(--text-muted);
            font-family: var(--font-monospace);
            font-size: 0.7rem;
            min-width: 18px;
            height: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 4px;
            font-weight: bold;
            flex-shrink: 0;
        }

        .step-text {
            flex-grow: 1;
            line-height: 1.3;
        }

        .step-distance {
            color: var(--text-muted);
            font-family: var(--font-monospace);
            font-size: 0.72rem;
            flex-shrink: 0;
        }

        .workspace-hardware-row {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 8px;
        }

        .hud-btn {
            background: var(--bg-panel-solid);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 10px;
            color: var(--text-secondary);
            font-size: 0.75rem;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            transition: all 0.15s ease;
        }

        .hud-btn:hover {
            background: #24242c;
            color: var(--text-primary);
            border-color: #3e3e4a;
        }

        #launch-routing-action {
            grid-column: span 3;
            background: var(--action-red);
            color: #ffffff;
            border: none;
            padding: 14px;
            font-size: 0.85rem;
            font-weight: bold;
            letter-spacing: 0.5px;
            box-shadow: 0 4px 12px var(--action-red-glow);
        }

        #launch-routing-action:hover {
            background: #ff4d4d;
            box-shadow: 0 6px 16px rgba(255, 51, 51, 0.5);
        }

        .custom-spatial-marker {
            cursor: pointer;
            transform: translate(-50%, -100%);
        }

        .live-gps-beacon-node {
            width: 18px;
            height: 18px;
            background: #007aff;
            border: 3px solid #ffffff;
            border-radius: 50%;
            box-shadow: 0 0 16px rgba(0, 122, 255, 0.95);
            transition: transform 0.1s linear;
        }
    </style>
</head>
<body>

    <div id="map"></div>

    <div class="hud-system-header">
        <div class="hud-module">
            <div class="brand-node">GEO<span>PRO</span></div>
            <div style="width: 1px; height: 14px; background: var(--border-color);"></div>
            <div id="telemetry-status-node">BOOTING SYSTEM...</div>
        </div>

        <div id="coordinate-overlay-tracker" class="hud-module">
            X: --.----- | Y: --.-----
        </div>
    </div>

    <div id="control-panel-deck">
        <div id="drag-handle"></div>
        <div class="workspace-content-body">
            
            <div class="search-engine-wrap">
                <input type="text" id="osm-engine-input" placeholder="Search target vector coordinate pattern..." autocomplete="off"/>
                <div id="osm-engine-dropdown" class="suggest-dropdown-matrix"></div>
            </div>

            <div id="context-destination-panel">
                <svg class="meta-vector-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z" fill="#ff3333"/>
                </svg>
                <div class="meta-vector-info-stack">
                    <div id="node-panel-title">Selected Matrix Node</div>
                    <div id="node-panel-address">Tracking calculations offline...</div>
                </div>
            </div>

            <div id="route-variants-dashboard"></div>

            <div class="workspace-hardware-row">
                <button id="toggle-satellite-view" class="hud-btn">
                    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"></path></svg>
                    SATELLITE
                </button>
                <button id="compass-orientation-lock" class="hud-btn">
                    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="3 11 22 2 13 21 11 13 3 11"></polygon></svg>
                    NORTH
                </button>
                <button id="force-gps-recenter" class="hud-btn">
                    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"></circle><circle cx="12" cy="12" r="3"></circle></svg>
                    RECENTER
                </button>

                <button id="launch-routing-action" class="hud-btn" style="display:none;">
                    GET DIRECTIONS
                </button>
                <button id="flush-workspace-trigger" class="hud-btn" style="grid-column: span 3; background: transparent; border-color: rgba(255,255,255,0.05); color: var(--text-muted);">
                    CLEAR ACTIVE WORKSPACE
                </button>
            </div>

        </div>
    </div>

    <script>
        let defaultUserCoordinates = [-122.084, 37.422]; 
        let currentLiveGpsPosition = null; 
        let targetSelectedCoordinates = null;
        let querySearchDebounceTimer = null;
         
        let activeMapMarker = null; 
        let userLocationBeaconMarker = null;
        let activeRouteDataStore = []; 
        let satelliteModeActive = false;
        let cameraTrackingMode = true; 
        let currentVehicleHeading = 0;

        const REGULAR_MAP_STYLE = 'https://tiles.openfreemap.org/styles/liberty';

        const map = new maplibregl.Map({
            container: 'map',
            style: REGULAR_MAP_STYLE, 
            center: defaultUserCoordinates, 
            zoom: 2, 
            pitch: 65, 
            bearing: 0,
            antialias: true
        });

        function createCustomMarkerElement() {
            const el = document.createElement('div');
            el.className = 'custom-spatial-marker';
            el.innerHTML = `
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <circle cx="12" cy="12" r="8" fill="#ff3333" fill-opacity="0.3"/>
                    <circle cx="12" cy="12" r="4" fill="#ff3333"/>
                    <circle cx="12" cy="12" r="3.5" stroke="#ffffff" stroke-width="1"/>
                </svg>
            `;
            return el;
        }

        function calculateParallelOffsetLane(coordinates, offsetMeters) {
            const offsetDegreeFactor = offsetMeters / 111320; 
            const resultantPoints = [];

            for (let i = 0; i < coordinates.length; i++) {
                let dx = 0, dy = 0;
                
                if (i < coordinates.length - 1) {
                    dx = coordinates[i+1][0] - coordinates[i][0];
                    dy = coordinates[i+1][1] - coordinates[i][1];
                } else if (i > 0) {
                    dx = coordinates[i][0] - coordinates[i-1][0];
                    dy = coordinates[i][1] - coordinates[i-1][1];
                }

                const segmentLength = Math.sqrt(dx * dx + dy * dy);
                if (segmentLength === 0) {
                    resultantPoints.push([...coordinates[i]]);
                    continue;
                }

                const nx = -dy / segmentLength;
                const ny = dx / segmentLength;

                resultantPoints.push([
                    coordinates[i][0] + nx * offsetDegreeFactor,
                    coordinates[i][1] + ny * offsetDegreeFactor
                ]);
            }
            return resultantPoints;
        }

        function calculateBearingAngle(p1, p2) {
            const lng1 = p1[0] * Math.PI / 180;
            const lat1 = p1[1] * Math.PI / 180;
            const lng2 = p2[0] * Math.PI / 180;
            const lat2 = p2[1] * Math.PI / 180;
            const dLng = lng2 - lng1;
            const y = Math.sin(dLng) * Math.cos(lat2);
            const x = Math.cos(lat1) * Math.sin(lat2) - Math.sin(lat1) * Math.cos(lat2) * Math.cos(dLng);
            const bearing = Math.atan2(y, x) * 180 / Math.PI;
            return (bearing + 360) % 360;
        }

        map.on('load', () => {
            initTacticalPanelDraggingPhysics();
            initAutonomousSearchMatrix();
            initDirectMapInputListeners();
            initHardwareConsoleTriggers();
            injectRealtime3DGeometryAndLanes();
            establishLiveHardwarePositioningStream();

            map.on('mousemove', (e) => {
                const overlay = document.getElementById('coordinate-overlay-tracker');
                if (overlay) {
                    overlay.innerText = `X: ${e.lngLat.lng.toFixed(5)} | Y: ${e.lngLat.lat.toFixed(5)}`;
                }
            });

            map.on('dragstart', () => {
                cameraTrackingMode = false;
            });
        });

        map.on('style.data', () => {
            injectRealtime3DGeometryAndLanes();
            redrawActiveRoutePipelines();
        });

        function injectRealtime3DGeometryAndLanes() {
            const styleSources = map.getStyle().sources;
            if (!styleSources) return;
            const sourceKey = Object.keys(styleSources).find(key => styleSources[key].type === 'vector') || 'openfreemap';

            if (!map.getSource(sourceKey)) return;

            // Highly Improved Realtime Multi-Lane Architecture
            if (!map.getLayer('spatial-3d-lanes-asphalt-base')) {
                map.addLayer({
                    'id': 'spatial-3d-lanes-asphalt-base',
                    'source': sourceKey,
                    'source-layer': 'transportation',
                    'type': 'line',
                    'filter': ['==', '$geometryType', 'LineString'],
                    'layout': { 'line-join': 'round', 'line-cap': 'round' },
                    'paint': {
                        'line-color': satelliteModeActive ? '#222226' : '#a2adb9',
                        'line-width': ['interpolate', ['linear'], ['zoom'], 12, 6, 15, 24, 18, 64],
                        'line-opacity': 0.95
                    }
                });

                map.addLayer({
                    'id': 'spatial-3d-lanes-inner-bed',
                    'source': sourceKey,
                    'source-layer': 'transportation',
                    'type': 'line',
                    'filter': ['==', '$geometryType', 'LineString'],
                    'layout': { 'line-join': 'round', 'line-cap': 'round' },
                    'paint': {
                        'line-color': satelliteModeActive ? '#18181c' : '#4a535d',
                        'line-width': ['interpolate', ['linear'], ['zoom'], 12, 4, 15, 20, 18, 56],
                        'line-opacity': 1.0
                    }
                });

                map.addLayer({
                    'id': 'spatial-3d-lanes-dashed-markings',
                    'source': sourceKey,
                    'source-layer': 'transportation',
                    'type': 'line',
                    'filter': ['==', '$geometryType', 'LineString'],
                    'layout': { 'line-join': 'round', 'line-cap': 'round' },
                    'paint': {
                        'line-color': '#ffffff',
                        'line-width': ['interpolate', ['linear'], ['zoom'], 14, 1, 18, 2.5],
                        'line-dasharray': [4, 6],
                        'line-opacity': 0.85
                    }
                });
            }

            if (!map.getLayer('spatial-3d-buildings')) {
                map.addLayer({
                    'id': 'spatial-3d-buildings',
                    'source': sourceKey,
                    'source-layer': 'building',
                    'type': 'fill-extrusion',
                    'minzoom': 13,
                    'paint': {
                        'fill-extrusion-color': satelliteModeActive ? '#1a1a1f' : '#f0f2f5',
                        'fill-extrusion-height': ['coalesce', ['get', 'height'], ['get', 'render_height'], 15],
                        'fill-extrusion-base': ['coalesce', ['get', 'min_height'], ['get', 'render_min_height'], 0],
                        'fill-extrusion-opacity': satelliteModeActive ? 0.75 : 0.85
                    }
                });
            }
        }

        async function handleRoutingButtonClick() {
            const btn = document.getElementById('launch-routing-action');
            if (!btn) return;

            btn.innerText = "COMPUTING PATH...";
            btn.style.opacity = "0.6";
             
            let originCoords = currentLiveGpsPosition;
            if (!originCoords) {
                const mapCenter = map.getCenter();
                originCoords = [mapCenter.lng, mapCenter.lat];
            }
             
            const routingQueryUrl = `https://router.project-osrm.org/route/v1/driving/${originCoords.join(',')};${targetSelectedCoordinates.join(',')}?overview=full&geometries=geojson&steps=true&alternatives=false`;
             
            try {
                clearActiveRouteLayers();
                activeRouteDataStore = [];

                const controller = new AbortController();
                const timeoutId = setTimeout(() => controller.abort(), 4000);

                const stream = await fetch(routingQueryUrl, { signal: controller.signal });
                clearTimeout(timeoutId);
                
                const results = await stream.json();
                
                if (results.code === 'Ok' && results.routes && results.routes.length > 0) {
                    const primaryRoute = results.routes[0];
                    
                    let parsedInstructions = [];
                    if (primaryRoute.legs && primaryRoute.legs[0].steps) {
                        parsedInstructions = primaryRoute.legs[0].steps.map(step => {
                            let modifier = step.maneuver.modifier ? ` ${step.maneuver.modifier}` : '';
                            let type = step.maneuver.type === 'turn' ? 'Turn' : step.maneuver.type;
                            let street = step.name ? ` onto ${step.name}` : '';
                            
                            let rawMessage = `${type}${modifier}${street}`;
                            if (step.maneuver.type === 'depart') rawMessage = `Head out towards ${step.name || 'designated road'}`;
                            if (step.maneuver.type === 'arrive') rawMessage = "Arrive at vector destination node";

                            return {
                                text: rawMessage.charAt(0).toUpperCase() + rawMessage.slice(1),
                                distance: step.distance,
                                coordinates: step.maneuver.location
                            };
                        }).filter(item => item.text);
                    }

                    activeRouteDataStore = [{
                        index: 0,
                        geometry: primaryRoute.geometry,
                        duration: primaryRoute.duration,
                        distance: primaryRoute.distance,
                        steps: parsedInstructions,
                        isFallback: false
                    }];
                } else {
                    generateLocalGridRouteFallback(originCoords, targetSelectedCoordinates);
                }
            } catch (err) { 
                generateLocalGridRouteFallback(originCoords, targetSelectedCoordinates);
            }

            redrawActiveRoutePipelines();
            renderRouteDashboardUI();
            
            if (activeRouteDataStore.length > 0) {
                const coords = activeRouteDataStore[0].geometry.coordinates;
                if (coords.length > 1) {
                    const dynamicInitialBearing = calculateBearingAngle(coords[0], coords[1]);
                    map.flyTo({
                        center: coords[0],
                        zoom: 17,
                        pitch: 65,
                        bearing: dynamicInitialBearing,
                        duration: 1000
                    });
                }
            }

            btn.style.display = "none"; 
        }

        function generateLocalGridRouteFallback(start, end) {
            const midPoint = [start[0], end[1]];
            const mockGeometry = {
                type: "LineString",
                coordinates: [start, midPoint, end]
            };

            const dLng = end[0] - start[0];
            const dLat = end[1] - start[1];
            const rawDistanceMeters = Math.sqrt(dLng * dLng + dLat * dLat) * 111000; 

            activeRouteDataStore = [
                {
                    index: 0,
                    geometry: mockGeometry,
                    duration: (rawDistanceMeters / 13.4), 
                    distance: rawDistanceMeters,
                    steps: [
                        { text: "Depart initial coordinate orientation point", distance: rawDistanceMeters * 0.5, coordinates: start },
                        { text: "Perform tracking intersection grid turn adjustment", distance: rawDistanceMeters * 0.5, coordinates: midPoint },
                        { text: "Approach destination target point coordinate lock", distance: 0, coordinates: end }
                    ],
                    isFallback: true
                }
            ];
        }

        function redrawActiveRoutePipelines() {
            if (!activeRouteDataStore || activeRouteDataStore.length === 0) return;
            if (!map.isStyleLoaded()) return;

            activeRouteDataStore.forEach((r) => {
                const baseCoords = r.geometry.coordinates;

                const centerLaneLeft = calculateParallelOffsetLane(baseCoords, -4.5);
                const centerLaneRight = calculateParallelOffsetLane(baseCoords, 4.5);

                const lanesData = [
                    { id: `lane-L-${r.index}`, coords: centerLaneLeft },
                    { id: `lane-C-${r.index}`, coords: baseCoords },
                    { id: `lane-R-${r.index}`, coords: centerLaneRight }
                ];

                lanesData.forEach(lane => {
                    const srcId = `src-${lane.id}`;
                    const lyrId = `layer-${lane.id}`;

                    if (!map.getSource(srcId)) {
                        map.addSource(srcId, { 
                            type: 'geojson', 
                            data: { type: 'Feature', geometry: { type: 'LineString', coordinates: lane.coords } } 
                        });
                    }

                    if (!map.getLayer(lyrId)) {
                        map.addLayer({
                            id: lyrId,
                            type: 'line',
                            source: srcId,
                            layout: { 'line-join': 'round', 'line-cap': 'round' },
                            paint: {
                                'line-color': '#ff3333',
                                'line-width': ['interpolate', ['linear'], ['zoom'], 12, 3, 16, 8, 20, 26],
                                'line-opacity': lane.id.includes('-C-') ? 0.95 : 0.4
                            }
                        });

                        map.addLayer({
                            id: `${lyrId}-dash`,
                            type: 'line',
                            source: srcId,
                            layout: { 'line-join': 'round', 'line-cap': 'round' },
                            paint: {
                                'line-color': '#ffffff',
                                'line-width': ['interpolate', ['linear'], ['zoom'], 12, 0.8, 16, 2],
                                'line-dasharray': [4, 4],
                                'line-opacity': 0.9
                            }
                        });
                    }
                });
            });
        }

        function renderRouteDashboardUI() {
            const dashboard = document.getElementById('route-variants-dashboard');
            if (!dashboard) return;
            dashboard.innerHTML = '';
            dashboard.style.display = 'flex';

            activeRouteDataStore.forEach((r) => {
                const mins = Math.max(1, Math.round(r.duration / 60));
                const miles = (r.distance / 1609.34).toFixed(1);
                 
                const metricsRow = document.createElement('div');
                metricsRow.className = 'route-badge-row';
                metricsRow.innerHTML = `
                    <div>
                        <span class="badge-tag-label" style="color: var(--action-red); font-weight: bold;">
                            ${r.isFallback ? '⚡ LOCAL AUTONOMOUS PATH' : '★ OPTIMAL NAVIGATION TRAJECTORY'}
                        </span>
                        <div style="color: var(--text-primary); margin-top: 4px; font-size: 0.95rem; font-weight: bold;">
                            ${mins} mins <span style="color: var(--text-muted); font-weight: normal; font-size: 0.8rem;">(${miles} mi)</span>
                        </div>
                    </div>
                `;
                dashboard.appendChild(metricsRow);

                if (r.steps && r.steps.length > 0) {
                    const manifestContainer = document.createElement('div');
                    manifestContainer.className = 'directions-manifest';
                    
                    r.steps.forEach((step, stepIndex) => {
                        const stepEl = document.createElement('div');
                        stepEl.className = 'direction-step';
                        
                        const stepMiles = (step.distance / 1609.34).toFixed(2);
                        const distanceDisplay = step.distance > 0 ? `${stepMiles} mi` : '';

                        stepEl.innerHTML = `
                            <div class="step-index">${stepIndex + 1}</div>
                            <div class="step-text">${step.text}</div>
                            <div class="step-distance">${distanceDisplay}</div>
                        `;

                        stepEl.addEventListener('click', () => {
                            cameraTrackingMode = false;
                            let targetStepBearing = currentVehicleHeading;
                            
                            if (stepIndex < r.steps.length - 1) {
                                targetStepBearing = calculateBearingAngle(step.coordinates, r.steps[stepIndex + 1].coordinates);
                            }

                            map.flyTo({
                                center: step.coordinates,
                                zoom: 17.5,
                                pitch: 65,
                                bearing: targetStepBearing,
                                duration: 800
                            });
                        });

                        manifestContainer.appendChild(stepEl);
                    });
                    
                    dashboard.appendChild(manifestContainer);
                }
            });
        }

        function clearActiveRouteLayers() {
            for (let idx = 0; idx < 20; idx++) {
                const elements = [
                    `layer-lane-L-${idx}`, `layer-lane-L-${idx}-dash`,
                    `layer-lane-C-${idx}`, `layer-lane-C-${idx}-dash`,
                    `layer-lane-R-${idx}`, `layer-lane-R-${idx}-dash`
                ];
                elements.forEach(id => { if (map.getLayer(id)) map.removeLayer(id); });

                const sources = [`src-lane-L-${idx}`, `src-lane-C-${idx}`, `src-lane-R-${idx}`];
                sources.forEach(id => { if (map.getSource(id)) map.removeSource(id); });
            }
        }

        function establishLiveHardwarePositioningStream() {
            const diagnosticStatus = document.getElementById('telemetry-status-node');
            if (!diagnosticStatus) return;
            if (!navigator.geolocation) { diagnosticStatus.innerText = "UNSUPPORTED SENSOR"; return; }

            // High-Precision Location Processing Engine
            navigator.geolocation.watchPosition(
                (position) => {
                    const lon = position.coords.longitude;
                    const lat = position.coords.latitude;
                    const incomingPositionArray = [lon, lat];
                    
                    diagnosticStatus.innerText = "ONLINE (HIGH ACCURACY)";
                    diagnosticStatus.style.color = "#007aff";

                    if (position.coords.heading !== null && position.coords.heading !== undefined) {
                        currentVehicleHeading = position.coords.heading;
                    } else if (currentLiveGpsPosition) {
                        const calculatedAngle = calculateBearingAngle(currentLiveGpsPosition, incomingPositionArray);
                        if (Math.abs(calculatedAngle - currentVehicleHeading) > 2) {
                            currentVehicleHeading = calculatedAngle;
                        }
                    }

                    currentLiveGpsPosition = incomingPositionArray;

                    if (!userLocationBeaconMarker) {
                        const beaconEl = document.createElement('div');
                        beaconEl.className = 'live-gps-beacon-node';
                        userLocationBeaconMarker = new maplibregl.Marker({ element: beaconEl })
                            .setLngLat(currentLiveGpsPosition)
                            .addTo(map);
                        
                        map.flyTo({ center: currentLiveGpsPosition, zoom: 17, pitch: 65, bearing: currentVehicleHeading });
                    } else {
                        userLocationBeaconMarker.setLngLat(currentLiveGpsPosition);
                    }

                    if (cameraTrackingMode) {
                        map.easeTo({
                            center: currentLiveGpsPosition,
                            pitch: 65,
                            bearing: currentVehicleHeading,
                            zoom: 17.5,
                            duration: 300
                        });
                    }
                },
                (error) => { 
                    diagnosticStatus.style.color = "#ff9500"; 
                    diagnosticStatus.innerText = "LOCAL EDGE LINK"; 
                },
                { 
                    enableHighAccuracy: true, 
                    timeout: 10000, 
                    maximumAge: 0 
                }
            );
        }

        function initHardwareConsoleTriggers() {
            const compassBtn = document.getElementById('compass-orientation-lock');
            if (compassBtn) {
                compassBtn.addEventListener('click', () => map.easeTo({ bearing: 0, pitch: 65 }));
            }
             
            const recenterBtn = document.getElementById('force-gps-recenter');
            if (recenterBtn) {
                recenterBtn.addEventListener('click', () => {
                    cameraTrackingMode = true; 
                    if (currentLiveGpsPosition) {
                        map.flyTo({ center: currentLiveGpsPosition, zoom: 17.5, pitch: 65, bearing: currentVehicleHeading, duration: 600 });
                    }
                });
            }

            const satelliteBtn = document.getElementById('toggle-satellite-view');
            if (satelliteBtn) {
                satelliteBtn.addEventListener('click', () => {
                    satelliteModeActive = !satelliteModeActive;
                    clearActiveRouteLayers(); 

                    if (satelliteModeActive) {
                        satelliteBtn.style.borderColor = '#ff3333';
                        satelliteBtn.style.color = '#ff3333';
                        satelliteBtn.style.boxShadow = '0 0 10px rgba(255, 51, 51, 0.2)';

                        map.setStyle({
                            'version': 8,
                            'sources': {
                                'esri-satellite-imagery': {
                                    'type': 'raster',
                                    'tiles': ['https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}'],
                                    'tileSize': 256,
                                    'attribution': 'Esri'
                                },
                                'openfreemap': {
                                    'type': 'vector',
                                    'url': 'https://tiles.openfreemap.org/styles/liberty'
                                }
                            },
                            'layers': [
                                {
                                    'id': 'satellite-reality-layer',
                                    'type': 'raster',
                                    'source': 'esri-satellite-imagery',
                                    'paint': { 'raster-opacity': 0.95 }
                                }
                            ]
                        });
                    } else {
                        satelliteBtn.style.borderColor = '';
                        satelliteBtn.style.color = '';
                        satelliteBtn.style.boxShadow = '';
                        map.setStyle(REGULAR_MAP_STYLE);
                    }
                });
            }

            const routingBtn = document.getElementById('launch-routing-action');
            if (routingBtn) {
                routingBtn.addEventListener('click', handleRoutingButtonClick);
            }
            
            const flushBtn = document.getElementById('flush-workspace-trigger');
            if (flushBtn) {
                flushBtn.addEventListener('click', () => {
                    clearActiveRouteLayers();
                    activeRouteDataStore = [];
                    if (activeMapMarker) { activeMapMarker.remove(); activeMapMarker = null; }
                    document.getElementById('context-destination-panel').style.display = 'none';
                    document.getElementById('osm-engine-input').value = '';
                    document.getElementById('launch-routing-action').style.display = 'none';
                    document.getElementById('route-variants-dashboard').style.display = 'none';
                    targetSelectedCoordinates = null;
                });
            }
        }

        function initTacticalPanelDraggingPhysics() {
            const panel = document.getElementById('control-panel-deck');
            const handle = document.getElementById('drag-handle');
            if (!panel || !handle) return;
            
            let isDragging = false, startY = 0, currentTranslateY = 0, lastTranslateY = 0;

            handle.addEventListener('mousedown', startDrag);
            window.addEventListener('mousemove', processDrag);
            window.addEventListener('mouseup', endDrag);
            handle.addEventListener('touchstart', (e) => startDrag(e.touches[0]), { passive: true });
            window.addEventListener('touchmove', (e) => processDrag(e.touches[0]), { passive: false });
            window.addEventListener('touchend', endDrag);

            function startDrag(e) { isDragging = true; startY = e.clientY; panel.classList.remove('snapping'); }
            function processDrag(e) {
                if (!isDragging) return;
                let nextY = lastTranslateY + (e.clientY - startY);
                if (nextY < -250) nextY = -250; if (nextY > 400) nextY = 400;
                currentTranslateY = nextY;
                panel.style.transform = `translateX(-50%) translateY(${currentTranslateY}px)`;
            }
            function endDrag() {
                if (!isDragging) return; isDragging = false; panel.classList.add('snapping');
                if (currentTranslateY > 150) currentTranslateY = 320;
                else if (currentTranslateY < -50) currentTranslateY = -180;
                else currentTranslateY = 0;
                panel.style.transform = `translateX(-50%) translateY(${currentTranslateY}px)`;
                lastTranslateY = currentTranslateY;
            }
        }

        function initAutonomousSearchMatrix() {
            const input = document.getElementById('osm-engine-input');
            const dropdown = document.getElementById('osm-engine-dropdown');
            if (!input || !dropdown) return;

            input.addEventListener('input', (e) => {
                const queryVal = e.target.value.trim();
                clearTimeout(querySearchDebounceTimer);
                if (queryVal.length < 3) { dropdown.style.display = 'none'; return; }
                 
                querySearchDebounceTimer = setTimeout(async () => {
                    try {
                        let searchApiUrl = `https://photon.komoot.io/api/?q=${encodeURIComponent(queryVal)}&limit=5`;
                        if (currentLiveGpsPosition) searchApiUrl += `&lon=${currentLiveGpsPosition[0]}&lat=${currentLiveGpsPosition[1]}`;
                        const response = await fetch(searchApiUrl);
                        const payload = await response.json();
                        if (!payload.features || payload.features.length === 0) { dropdown.style.display = 'none'; return; }
                         
                        dropdown.innerHTML = '';
                        payload.features.forEach(feature => {
                            const segmentItem = document.createElement('div');
                            segmentItem.className = 'osm-suggest-item';
                            const p = feature.properties;
                            const labeledLocation = [p.name, p.city, p.state].filter(Boolean).join(', ');
                            segmentItem.innerText = labeledLocation;
                             
                            segmentItem.addEventListener('click', () => {
                                const targetLoc = feature.geometry.coordinates;
                                dropdown.style.display = 'none';
                                input.value = labeledLocation;
                                map.flyTo({ center: targetLoc, zoom: 17, pitch: 65 });
                                triggerWorkspaceTargetDeck(targetLoc, p.name || "Target Vector", labeledLocation);
                            });
                            dropdown.appendChild(segmentItem);
                        });
                        dropdown.style.display = 'block';
                    } catch (err) {}
                }, 250);
            });
        }

        function initDirectMapInputListeners() {
            map.on('click', async (e) => {
                const pinpoint = [e.lngLat.lng, e.lngLat.lat];
                triggerWorkspaceTargetDeck(pinpoint, "Selected Matrix Node", `Lat: ${pinpoint[1].toFixed(5)}, Lon: ${pinpoint[0].toFixed(5)}`);
                try {
                    const lookup = await fetch(`https://photon.komoot.io/api/?lon=${pinpoint[0]}&lat=${pinpoint[1]}`);
                    const details = await lookup.json();
                    if (details.features && details.features.length > 0) {
                        const p = details.features[0].properties;
                        const addressString = [p.name, p.street, p.postcode].filter(Boolean).join(', ');
                        triggerWorkspaceTargetDeck(pinpoint, p.name || "Discovered Feature Context", addressString || "Raw Geographic Geometry Data");
                    }
                } catch(error){}
            });
        }

        function triggerWorkspaceTargetDeck(coords, title, details) {
            clearActiveRouteLayers();
            activeRouteDataStore = [];
            targetSelectedCoordinates = coords;
            
            document.getElementById('node-panel-title').innerText = title;
            document.getElementById('node-panel-address').innerText = details;
            document.getElementById('context-destination-panel').style.display = 'flex';
            
            const routingBtn = document.getElementById('launch-routing-action');
            routingBtn.style.display = 'block';
            routingBtn.innerText = "GET DIRECTIONS";
            routingBtn.style.background = "var(--action-red)";
            routingBtn.style.boxShadow = "0 4px 12px var(--action-red-glow)";

            document.getElementById('route-variants-dashboard').style.display = 'none';

            if (activeMapMarker) activeMapMarker.remove();
            activeMapMarker = new maplibregl.Marker({ element: createCustomMarkerElement() })
                .setLngLat(coords)
                .addTo(map);
        }
    </script>
