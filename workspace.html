<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GeoPro | Professional Spatial Workspace</title>

    <!-- MapLibre GL JS Core -->
    <script src="https://unpkg.com/maplibre-gl@4.1.2/dist/maplibre-gl.js"></script>
    <link href="https://unpkg.com/maplibre-gl@4.1.2/dist/maplibre-gl.css" rel="stylesheet" />

    <style>
        :root {
            --bg-base: #0c0d12;
            --bg-panel: rgba(15, 17, 26, 0.95);
            --bg-surface: rgba(25, 29, 43, 0.7);
            --bg-surface-hover: rgba(40, 46, 68, 0.9);
            --action-red: #ff3333;
            --action-red-glow: rgba(255, 51, 51, 0.4);
            --border-subtle: rgba(255, 255, 255, 0.08);
            --text-main: #f0f2f5;
            --text-secondary: #a3a9b8;
            --text-muted: #525a70;
            --sidebar-width: 380px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", Roboto, monospace;
            letter-spacing: -0.2px;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: var(--bg-base);
            color: var(--text-main);
        }

        #app-viewport {
            position: relative;
            width: 100%;
            height: 100%;
        }

        #map {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        button { font: inherit; background: none; border: none; cursor: pointer; color: inherit; transition: all 0.2s ease; }
        input { font: inherit; }

        /* ── CONTROL PANEL DECK ── */
        #control-panel-deck {
            position: absolute;
            bottom: 25px;
            left: 25px;
            width: var(--sidebar-width);
            max-height: calc(100% - 50px);
            z-index: 2000;
            background: var(--bg-panel);
            backdrop-filter: blur(35px) saturate(180%);
            -webkit-backdrop-filter: blur(35px) saturate(180%);
            border: 1px solid var(--border-subtle);
            border-radius: 24px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.6);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            transform: translateY(0);
            user-select: none;
        }

        #control-panel-deck.snapping {
            transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .drag-handle-bar {
            width: 100%;
            padding: 14px 0 8px 0;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: grab;
            background: transparent;
            z-index: 2010;
        }
        .drag-handle-bar:active { cursor: grabbing; }
        .drag-handle-pill {
            width: 40px;
            height: 5px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 3px;
        }
        .drag-handle-bar:hover .drag-handle-pill { background: rgba(255, 255, 255, 0.4); }

        .panel-scrollable-body {
            flex: 1;
            overflow-y: auto;
            padding: 0 20px 20px 20px;
            display: flex;
            flex-direction: column;
            gap: 18px;
        }

        .panel-branding-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .brand-logo { font-size: 1.3rem; font-weight: 900; text-transform: uppercase; letter-spacing: 1px; color: #ffffff; }
        .brand-logo span { color: var(--action-red); text-shadow: 0 0 12px var(--action-red-glow); }

        /* Search Layout */
        .search-field-container { position: relative; width: 100%; }
        .search-input-wrapper {
            display: flex;
            background: var(--bg-surface);
            border: 1px solid var(--border-subtle);
            border-radius: 14px;
            padding: 2px;
            align-items: center;
        }
        .search-input-wrapper:focus-within {
            border-color: var(--action-red);
            background: var(--bg-surface-hover);
            box-shadow: 0 0 10px rgba(255, 51, 51, 0.15);
        }
        .search-input-node {
            flex: 1;
            background: transparent;
            border: none;
            outline: none;
            color: var(--text-main);
            padding: 12px 14px;
            font-size: 0.9rem;
        }
        .search-input-node::placeholder { color: var(--text-muted); }

        .osm-dropdown-menu {
            position: absolute;
            top: 100%;
            left: 0;
            width: 100%;
            background: #0d0f17;
            border: 1px solid var(--border-subtle);
            border-radius: 14px;
            margin-top: 6px;
            max-height: 220px;
            overflow-y: auto;
            z-index: 2500;
            display: none;
        }
        .osm-suggest-item {
            padding: 12px 16px;
            font-size: 0.85rem;
            cursor: pointer;
            color: var(--text-secondary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .osm-suggest-item:hover { background: rgba(255, 51, 51, 0.08); color: var(--action-red); }

        /* Workspace Card */
        #context-destination-panel {
            background: linear-gradient(135deg, var(--bg-surface), rgba(15,17,26,0.3));
            border: 1px solid var(--border-subtle);
            border-radius: 16px;
            padding: 16px;
            display: none;
            flex-direction: column;
            gap: 12px;
        }
        .panel-header-title { font-size: 1rem; font-weight: 700; border-left: 2px solid var(--action-red); padding-left: 8px; }
        .panel-address-sub { font-size: 0.8rem; color: var(--text-secondary); line-height: 1.4; }
         
        #route-variants-dashboard {
            display: flex;
            flex-direction: column;
            gap: 6px;
            margin-top: 4px;
            border-top: 1px dashed rgba(255, 255, 255, 0.08);
            padding-top: 10px;
        }
        .route-badge-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 8px 12px;
            background: rgba(255,255,255,0.02);
            border: 1px solid var(--border-subtle);
            border-radius: 8px;
            font-size: 0.75rem;
        }
        .route-badge-row.active-variant {
            border-color: rgba(255, 51, 51, 0.4);
            background: rgba(255, 51, 51, 0.04);
        }
        .badge-tag-label { font-weight: bold; text-transform: uppercase; font-size: 0.65rem; }

        .action-button-matrix { display: flex; gap: 8px; }
        .primary-action-btn { flex: 1; background: var(--action-red); padding: 12px; border-radius: 12px; font-size: 0.8rem; font-weight: 700; text-align: center; box-shadow: 0 6px 16px var(--action-red-glow); }
        .primary-action-btn:hover { opacity: 0.9; }
        .kill-action-btn { background: rgba(255,255,255,0.03); border: 1px solid var(--border-subtle); width: 44px; border-radius: 12px; display: flex; align-items: center; justify-content: center; }
        .kill-action-btn:hover { border-color: var(--action-red); color: var(--action-red); }

        .hardware-diagnostics-deck {
            background: rgba(0,0,0,0.2);
            border: 1px solid var(--border-subtle);
            border-radius: 14px;
            padding: 12px;
            display: flex;
            flex-direction: column;
            gap: 6px;
            font-family: monospace;
            font-size: 0.7rem;
        }
        .diagnostic-row { display: flex; justify-content: space-between; align-items: center; }
        .diagnostic-row span:first-child { color: var(--text-muted); text-transform: uppercase; }
        .diagnostic-row span:last-child { color: var(--text-secondary); font-weight: bold; }
        .diagnostic-row .brand-status { color: var(--action-red); text-shadow: 0 0 8px var(--action-red-glow); }

        /* Floating Controls */
        #right-floating-console-stack {
            position: absolute; 
            top: 25px; 
            right: 25px; 
            z-index: 2000; 
            display: flex; 
            flex-direction: column; 
            gap: 8px;
        }
        .console-action-btn-node {
            background: var(--bg-panel); 
            backdrop-filter: blur(20px); 
            border: 1px solid var(--border-subtle); 
            width: 44px; 
            height: 44px; 
            border-radius: 12px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            font-size: 1.1rem;
            color: var(--text-main);
        }
        .console-action-btn-node:hover { 
            background: var(--bg-surface-hover); 
            border-color: var(--action-red); 
            box-shadow: 0 0 10px rgba(255, 51, 51, 0.2); 
            color: var(--action-red);
        }

        #coordinate-overlay-tracker { 
            position: absolute; 
            bottom: 25px; 
            right: 25px; 
            background: var(--bg-panel); 
            backdrop-filter: blur(10px); 
            padding: 8px 12px; 
            border-radius: 10px; 
            border: 1px solid var(--border-subtle); 
            font-family: monospace; 
            font-size: 0.7rem; 
            z-index: 2000; 
            color: var(--text-secondary); 
        }

        .custom-spatial-marker {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 24px;
            height: 24px;
            cursor: pointer;
        }

        .live-gps-beacon-node {
            width: 18px;
            height: 18px;
            background: #007aff;
            border: 3px solid #ffffff;
            border-radius: 50%;
            box-shadow: 0 0 0 8px rgba(0, 122, 255, 0.25), 0 2px 6px rgba(0,0,0,0.4);
            animation: beaconPulse 2.5s infinite ease-in-out;
        }

        @keyframes beaconPulse {
            0% { box-shadow: 0 0 0 0px rgba(0, 122, 255, 0.4), 0 2px 6px rgba(0,0,0,0.4); }
            70% { box-shadow: 0 0 0 12px rgba(0, 122, 255, 0), 0 2px 6px rgba(0,0,0,0.4); }
            100% { box-shadow: 0 0 0 0px rgba(0, 122, 255, 0), 0 2px 6px rgba(0,0,0,0.4); }
        }

        @media (max-width: 480px) {
            #control-panel-deck {
                width: calc(100% - 32px);
                left: 16px;
                bottom: 16px;
            }
            --sidebar-width: 100%;
        }
    </style>
</head>
<body>

    <div id="app-viewport">
        <div id="map"></div>

        <div id="control-panel-deck">
            <div class="drag-handle-bar" id="drag-handle">
                <div class="drag-handle-pill"></div>
            </div>
             
            <div class="panel-scrollable-body">
                <div class="panel-branding-header">
                    <div class="brand-logo">Geo<span>Pro</span></div>
                    <div style="font-family: monospace; font-size: 0.7rem; color: var(--text-muted); font-weight: bold;">AUTONOMOUS STACK</div>
                </div>

                <div class="search-field-container">
                    <div class="search-input-wrapper">
                        <input type="text" class="search-input-node" id="osm-engine-input" placeholder="Search local vectors...">
                    </div>
                    <div class="osm-dropdown-menu" id="osm-engine-dropdown"></div>
                </div>

                <div id="context-destination-panel">
                    <div class="panel-header-title" id="node-panel-title">Target Vector</div>
                    <div class="panel-address-sub" id="node-panel-address">Analyzing coordinates...</div>
                     
                    <div id="route-variants-dashboard" style="display: none;"></div>

                    <div class="action-button-matrix">
                        <button class="primary-action-btn" id="launch-routing-action">Calculate Route</button>
                        <button class="kill-action-btn" id="flush-workspace-trigger">✖</button>
                    </div>
                </div>

                <div class="hardware-diagnostics-deck">
                    <div class="diagnostic-row"><span>Engine Source</span><span class="brand-status">MAPLIBRE V4</span></div>
                    <div class="diagnostic-row"><span>Telemetry Status</span><span id="telemetry-status-node" style="color: #ff9500;">WAITING PERMISSION</span></div>
                    <div class="diagnostic-row"><span>Routing Pipeline</span><span id="routing-engine-status">3D MULTI-ROUTE MATRIX</span></div>
                </div>
            </div>
        </div>

        <div id="right-floating-console-stack">
            <button class="console-action-btn-node" id="force-gps-recenter" title="Recenter Engine">🎯</button>
            <button class="console-action-btn-node" id="toggle-satellite-view" title="Toggle Satellite Reality">🛰️</button>
            <button class="console-action-btn-node" id="compass-orientation-lock" title="True North">🧭</button>
        </div>

        <div id="coordinate-overlay-tracker">X: -- | Y: --</div>
    </div>

    <script>
        let defaultUserCoordinates = [-122.084, 37.422]; 
        let currentLiveGpsPosition = null; 
        let targetSelectedCoordinates = null;
        let querySearchDebounceTimer = null;
         
        let activeMapMarker = null; 
        let userLocationBeaconMarker = null;
        let activeRouteDataStore = []; // Retains raw line arrays for seamless layer hot-swapping
        let satelliteModeActive = false;

        // OpenFreeMap physical terrain layout (Realistic natural colors over generic black canvas)
        const REGULAR_MAP_STYLE = 'https://tiles.openfreemap.org/styles/liberty';

        const map = new maplibregl.Map({
            container: 'map',
            style: REGULAR_MAP_STYLE, 
            center: defaultUserCoordinates, 
            zoom: 2, 
            pitch: 45, 
            bearing: 0,
            antialias: true
        });

        function createCustomMarkerElement() {
            const el = document.createElement('div');
            el.className = 'custom-spatial-marker';
            el.innerHTML = `
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <circle cx="12" cy="12" r="8" fill="#ff3333" fill-opacity="0.3"/>
                    <circle cx="12" cy="12" r="4" fill="#ff3333"/>
                    <circle cx="12" cy="12" r="3.5" stroke="#ffffff" stroke-width="1"/>
                </svg>
            `;
            return el;
        }

        map.on('load', () => {
            initTacticalPanelDraggingPhysics();
            initAutonomousSearchMatrix();
            initDirectMapInputListeners();
            initHardwareConsoleTriggers();
            injectRealtime3DGeometry();
            establishLiveHardwarePositioningStream();

            map.on('mousemove', (e) => {
                document.getElementById('coordinate-overlay-tracker').innerText = `X: ${e.lngLat.lng.toFixed(5)} | Y: ${e.lngLat.lat.toFixed(5)}`;
            });
        });

        // Continuous application of 3D structural building layers upon runtime changes
        map.on('style.data', () => {
            injectRealtime3DGeometry();
            redrawActiveRoutePipelines();
        });

        function injectRealtime3DGeometry() {
            const styleSources = map.getStyle().sources;
            const sourceKey = Object.keys(styleSources).find(key => styleSources[key].type === 'vector') || 'openfreemap';

            if (map.getSource(sourceKey) && !map.getLayer('spatial-3d-buildings')) {
                map.addLayer({
                    'id': 'spatial-3d-buildings',
                    'source': sourceKey,
                    'source-layer': 'building',
                    'type': 'fill-extrusion',
                    'minzoom': 13,
                    'paint': {
                        // Muted natural charcoal shade for organic embedding
                        'fill-extrusion-color': satelliteModeActive ? '#1c1c1f' : '#cbd2db',
                        'fill-extrusion-height': ['coalesce', ['get', 'height'], ['get', 'render_height'], 15],
                        'fill-extrusion-base': ['coalesce', ['get', 'min_height'], ['get', 'render_min_height'], 0],
                        'fill-extrusion-opacity': satelliteModeActive ? 0.75 : 0.45
                    }
                });
            }
        }

        /* ── VOLUMETRIC ROUTING & GROUND SHADOW OVERLAYS ── */
        async function runLocalSpatialRouteCalculation() {
            if (!targetSelectedCoordinates) return;
             
            const originCoords = currentLiveGpsPosition ? currentLiveGpsPosition : [map.getCenter().lng, map.getCenter().lat];
            const routingQueryUrl = `https://router.project-osrm.org/route/v1/driving/${originCoords.join(',')};${targetSelectedCoordinates.join(',')}?overview=full&geometries=geojson&alternatives=true&steps=true`;
             
            try {
                const stream = await fetch(routingQueryUrl);
                const results = await stream.json();
                if (results.code !== 'Ok' || !results.routes || results.routes.length === 0) return;
                 
                clearActiveRouteLayers();

                activeRouteDataStore = results.routes.map((route, idx) => {
                    let safetyPenaltyScore = 0;
                    route.legs.forEach(leg => {
                        leg.steps.forEach(step => {
                            const streetName = step.name || '';
                            if (streetName.toLowerCase().includes('alley') || streetName.toLowerCase().includes('way')) {
                                safetyPenaltyScore += step.distance * 1.2;
                            }
                            if (step.intersections && step.intersections.length > 3) safetyPenaltyScore += 40;
                        });
                    });

                    return {
                        index: idx,
                        geometry: route.geometry,
                        duration: route.duration,
                        distance: route.distance,
                        safetyPenalty: safetyPenaltyScore,
                        compositeScore: route.duration + (safetyPenaltyScore * 0.25)
                    };
                });

                activeRouteDataStore.sort((a, b) => a.compositeScore - b.compositeScore);
                
                // Mount constructed structures directly into runtime map layers
                redrawActiveRoutePipelines();
                renderRouteDashboardUI();

            } catch (err) { console.error("Routing resolution pipeline error:", err); }
        }

        function redrawActiveRoutePipelines() {
            activeRouteDataStore.forEach((r, idx) => {
                const isTopPick = (idx === 0);
                const srcId = `route-src-${r.index}`;
                
                const shadowLyrId = `route-shadow-lyr-${r.index}`;
                const coreLyrId = `route-core-lyr-${r.index}`;

                if (!map.getSource(srcId)) {
                    map.addSource(srcId, { type: 'geojson', data: { type: 'Feature', geometry: r.geometry } });
                }

                // LAYER 1: Deep Drop Shadow to create spatial 3D separation from satellite/flat surfaces
                if (!map.getLayer(shadowLyrId)) {
                    map.addLayer({
                        id: shadowLyrId, type: 'line', source: srcId,
                        layout: { 'line-join': 'round', 'line-cap': 'round' },
                        paint: {
                            'line-color': '#000000',
                            'line-width': isTopPick ? 6 : 4,
                            'line-opacity': satelliteModeActive ? 0.7 : 0.35,
                            'line-offset': 4, // Pushes line along layout coordinates to simulate height separation
                            'line-blur': 3
                        }
                    });
                }

                // LAYER 2: Core Volumetric Pipeline Track
                if (!map.getLayer(coreLyrId)) {
                    map.addLayer({
                        id: coreLyrId, type: 'line', source: srcId,
                        layout: { 'line-join': 'round', 'line-cap': 'round' },
                        paint: {
                            'line-color': isTopPick ? '#ff3333' : '#3a539b',
                            'line-width': isTopPick ? 4.5 : 3,
                            'line-opacity': isTopPick ? 1.0 : 0.65
                        }
                    });
                }
            });
        }

        function renderRouteDashboardUI() {
            const dashboard = document.getElementById('route-variants-dashboard');
            dashboard.innerHTML = '';
            dashboard.style.display = 'flex';

            activeRouteDataStore.forEach((r, idx) => {
                const isTopPick = (idx === 0);
                if (isTopPick || idx < 3) {
                    const mins = Math.round(r.duration / 60);
                    const miles = (r.distance / 1609.34).toFixed(1);
                     
                    const row = document.createElement('div');
                    row.className = `route-badge-row ${isTopPick ? 'active-variant' : ''}`;
                    row.innerHTML = `
                        <div>
                            <span class="badge-tag-label" style="color: ${isTopPick ? 'var(--action-red)' : '#5c76c7'}">
                                ${isTopPick ? '★ Safest / Fastest' : `Alternative Route`}
                            </span>
                            <div style="color: var(--text-secondary); margin-top: 2px;">${mins} mins | ${miles} mi</div>
                        </div>
                        <div style="font-family: monospace; color: var(--text-muted); font-size: 0.65rem;">
                            Hazard Index: ${Math.round(r.safetyPenalty)}
                        </div>
                    `;
                    dashboard.appendChild(row);
                }
            });
        }

        function clearActiveRouteLayers() {
            activeRouteDataStore.forEach(item => {
                const coreId = `route-core-lyr-${item.index}`;
                const shadowId = `route-shadow-lyr-${item.index}`;
                const srcId = `route-src-${item.index}`;

                if (map.getLayer(coreId)) map.removeLayer(coreId);
                if (map.getLayer(shadowId)) map.removeLayer(shadowId);
                if (map.getSource(srcId)) map.removeSource(srcId);
            });
            // Keeping activeRouteDataStore untouched allows seamless re-rendering during hot style switches
        }

        /* ── SYSTEM TIMING & CONTROL LAYER PLUMBING ── */
        function initHardwareConsoleTriggers() {
            document.getElementById('compass-orientation-lock').addEventListener('click', () => map.easeTo({ bearing: 0, pitch: 45 }));
             
            document.getElementById('force-gps-recenter').addEventListener('click', () => {
                if (currentLiveGpsPosition) {
                    map.flyTo({ center: currentLiveGpsPosition, zoom: 15 });
                } else {
                    establishLiveHardwarePositioningStream();
                }
            });

            // Satellite Raster Engine Interactivity Toggling Control
            document.getElementById('toggle-satellite-view').addEventListener('click', () => {
                satelliteModeActive = !satelliteModeActive;
                const toggleBtn = document.getElementById('toggle-satellite-view');

                clearActiveRouteLayers(); // Temporarily flush layers to prevent rendering conflicts during re-styling

                if (satelliteModeActive) {
                    toggleBtn.style.borderColor = 'var(--action-red)';
                    toggleBtn.style.color = 'var(--action-red)';
                    toggleBtn.style.boxShadow = '0 0 10px rgba(255, 51, 51, 0.2)';

                    // Hot-swap core map stack over to empty satellite platform vector map
                    map.setStyle({
                        'version': 8,
                        'sources': {
                            'esri-satellite-imagery': {
                                'type': 'raster',
                                'tiles': ['https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}'],
                                'tileSize': 256,
                                'attribution': 'Esri'
                            }
                        },
                        'layers': [
                            {
                                'id': 'satellite-reality-layer',
                                'type': 'raster',
                                'source': 'esri-satellite-imagery',
                                'paint': { 'raster-opacity': 0.95 }
                            }
                        ]
                    });
                } else {
                    toggleBtn.style.borderColor = '';
                    toggleBtn.style.color = '';
                    toggleBtn.style.boxShadow = '';

                    // Restore customized natural, organic vector mapping environment
                    map.setStyle(REGULAR_MAP_STYLE);
                }
            });

            document.getElementById('launch-routing-action').addEventListener('click', runLocalSpatialRouteCalculation);
            document.getElementById('flush-workspace-trigger').addEventListener('click', () => {
                clearActiveRouteLayers();
                activeRouteDataStore = [];
                if (activeMapMarker) { activeMapMarker.remove(); activeMapMarker = null; }
                document.getElementById('context-destination-panel').style.display = 'none';
                document.getElementById('osm-engine-input').value = '';
                targetSelectedCoordinates = null;
            });
        }

        function establishLiveHardwarePositioningStream() {
            const diagnosticStatus = document.getElementById('telemetry-status-node');
            if (!navigator.geolocation) { diagnosticStatus.innerText = "UNSUPPORTED SENSOR"; return; }

            navigator.geolocation.watchPosition(
                (position) => {
                    const lon = position.coords.longitude;
                    const lat = position.coords.latitude;
                    const initialLockAchieved = (currentLiveGpsPosition === null);
                    currentLiveGpsPosition = [lon, lat];
                    diagnosticStatus.innerText = "ONLINE (LIVE)";
                    diagnosticStatus.style.color = "#007aff";

                    if (!userLocationBeaconMarker) {
                        const beaconEl = document.createElement('div');
                        beaconEl.className = 'live-gps-beacon-node';
                        userLocationBeaconMarker = new maplibregl.Marker({ element: beaconEl })
                            .setLngLat(currentLiveGpsPosition)
                            .addTo(map);
                    } else {
                        userLocationBeaconMarker.setLngLat(currentLiveGpsPosition);
                    }

                    if (initialLockAchieved) {
                        map.flyTo({ center: currentLiveGpsPosition, zoom: 14, essential: true });
                    }
                },
                (error) => { diagnosticStatus.style.color = "#ff3333"; diagnosticStatus.innerText = "SIGNAL TIMEOUT"; },
                { enableHighAccuracy: true, timeout: 10000, maximumAge: 0 }
            );
        }

        function initTacticalPanelDraggingPhysics() {
            const panel = document.getElementById('control-panel-deck');
            const handle = document.getElementById('drag-handle');
            let isDragging = false, startY = 0, currentTranslateY = 0, lastTranslateY = 0;

            handle.addEventListener('mousedown', startDrag);
            window.addEventListener('mousemove', processDrag);
            window.addEventListener('mouseup', endDrag);
            handle.addEventListener('touchstart', (e) => startDrag(e.touches[0]), { passive: true });
            window.addEventListener('touchmove', (e) => processDrag(e.touches[0]), { passive: false });
            window.addEventListener('touchend', endDrag);

            function startDrag(e) { isDragging = true; startY = e.clientY; panel.classList.remove('snapping'); }
            function processDrag(e) {
                if (!isDragging) return;
                let nextY = lastTranslateY + (e.clientY - startY);
                if (nextY < -150) nextY = -150; if (nextY > 400) nextY = 400;
                currentTranslateY = nextY;
                panel.style.transform = `translateY(${currentTranslateY}px)`;
            }
            function endDrag() {
                if (!isDragging) return; isDragging = false; panel.classList.add('snapping');
                if (currentTranslateY > 150) currentTranslateY = 320;
                else if (currentTranslateY < -50) currentTranslateY = -80;
                else currentTranslateY = 0;
                panel.style.transform = `translateY(${currentTranslateY}px)`;
                lastTranslateY = currentTranslateY;
            }
        }

        function initAutonomousSearchMatrix() {
            const input = document.getElementById('osm-engine-input');
            const dropdown = document.getElementById('osm-engine-dropdown');

            input.addEventListener('input', (e) => {
                const queryVal = e.target.value.trim();
                clearTimeout(querySearchDebounceTimer);
                if (queryVal.length < 3) { dropdown.style.display = 'none'; return; }
                 
                querySearchDebounceTimer = setTimeout(async () => {
                    try {
                        let searchApiUrl = `https://photon.komoot.io/api/?q=${encodeURIComponent(queryVal)}&limit=5`;
                        if (currentLiveGpsPosition) searchApiUrl += `&lon=${currentLiveGpsPosition[0]}&lat=${currentLiveGpsPosition[1]}`;
                        const response = await fetch(searchApiUrl);
                        const payload = await response.json();
                        if (!payload.features || payload.features.length === 0) { dropdown.style.display = 'none'; return; }
                         
                        dropdown.innerHTML = '';
                        payload.features.forEach(feature => {
                            const segmentItem = document.createElement('div');
                            segmentItem.className = 'osm-suggest-item';
                            const p = feature.properties;
                            const labeledLocation = [p.name, p.city, p.state].filter(Boolean).join(', ');
                            segmentItem.innerText = labeledLocation;
                             
                            segmentItem.addEventListener('click', () => {
                                const targetLoc = feature.geometry.coordinates;
                                dropdown.style.display = 'none';
                                input.value = labeledLocation;
                                map.flyTo({ center: targetLoc, zoom: 15 });
                                triggerWorkspaceTargetDeck(targetLoc, p.name || "Target Vector", labeledLocation);
                            });
                            dropdown.appendChild(segmentItem);
                        });
                        dropdown.style.display = 'block';
                    } catch (err) { console.error("Search pipeline fault:", err); }
                }, 250);
            });
        }

        function initDirectMapInputListeners() {
            map.on('click', async (e) => {
                const pinpoint = [e.lngLat.lng, e.lngLat.lat];
                triggerWorkspaceTargetDeck(pinpoint, "Selected Matrix Node", `Lat: ${pinpoint[1].toFixed(5)}, Lon: ${pinpoint[0].toFixed(5)}`);
                try {
                    const lookup = await fetch(`https://photon.komoot.io/api/?lon=${pinpoint[0]}&lat=${pinpoint[1]}`);
                    const details = await lookup.json();
                    if (details.features && details.features.length > 0) {
                        const p = details.features[0].properties;
                        const addressString = [p.name, p.street, p.postcode].filter(Boolean).join(', ');
                        triggerWorkspaceTargetDeck(pinpoint, p.name || "Discovered Feature Context", addressString || "Raw Geographic Geometry Data");
                    }
                } catch(error){}
            });
        }

        function triggerWorkspaceTargetDeck(coords, title, details) {
            clearActiveRouteLayers();
            activeRouteDataStore = [];
            targetSelectedCoordinates = coords;
            document.getElementById('node-panel-title').innerText = title;
            document.getElementById('node-panel-address').innerText = details;
            document.getElementById('context-destination-panel').style.display = 'flex';

            if (activeMapMarker) activeMapMarker.remove();
            activeMapMarker = new maplibregl.Marker({ element: createCustomMarkerElement() })
                .setLngLat(coords)
                .addTo(map);
        }
    </script>
