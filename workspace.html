<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GeoPro Quantum Navigation</title>

    <!-- Mapbox GL JS Core Engine -->
    <script src="https://api.mapbox.com/mapbox-gl-js/v3.3.0/mapbox-gl.js"></script>
    <link href="https://api.mapbox.com/mapbox-gl-js/v3.3.0/mapbox-gl.css" rel="stylesheet" />

    <!-- Mapbox Geocoder (Single Input Spatial Engine) -->
    <script src="https://api.mapbox.com/mapbox-gl-js/plugins/mapbox-gl-geocoder/v5.0.0/mapbox-gl-geocoder.min.js"></script>
    <link rel="stylesheet" href="https://api.mapbox.com/mapbox-gl-js/plugins/mapbox-gl-geocoder/v5.0.0/mapbox-gl-geocoder.css" type="text/css">

    <style>
        :root {
            --bg-pure: #000000;
            --hud-bg: rgba(10, 10, 12, 0.85);
            --card-surface: rgba(22, 22, 26, 0.7);
            --neon-red: #ff2222;
            --neon-blue: #0071e3;
            --neon-purple: #b46bff;
            --border-glow: rgba(255, 34, 34, 0.15);
            --border-line: rgba(255, 255, 255, 0.08);
            --text-primary: #ffffff;
            --text-secondary: #8e8e93;
            --traffic-green: #30d158;
            --traffic-yellow: #ffcc00;
            --traffic-red: #ff453a;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", Roboto, sans-serif;
            letter-spacing: -0.2px;
        }

        body, html {
            width: 100%;
            height: 100vh;
            overflow: hidden;
            background-color: var(--bg-pure);
            color: var(--text-primary);
        }

        #app-viewport {
            position: relative;
            width: 100%;
            height: 100vh;
            display: flex;
        }

        #map {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: var(--bg-pure);
            z-index: 1;
        }

        button { font: inherit; }

        /* ── FUTURE-FORWARD FLOATING HUD COMMAND DECK ── */
        #command-deck {
            position: absolute;
            top: 20px;
            left: 20px;
            width: 380px;
            max-height: calc(100vh - 40px);
            z-index: 10;
            background: var(--hud-bg);
            backdrop-filter: blur(30px) saturate(200%);
            -webkit-backdrop-filter: blur(30px) saturate(200%);
            border: 1px solid var(--border-line);
            border-radius: 24px;
            padding: 24px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.7), 0 0 40px var(--border-glow);
            display: flex;
            flex-direction: column;
            gap: 16px;
            transform: translateY(0px);
            transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            overflow-y: auto;
            touch-action: none;
        }

        .drag-handle-zone {
            width: 100%;
            padding: 14px 0 8px;
            margin: -14px 0 -8px;
            display: flex;
            justify-content: center;
            cursor: grab;
            touch-action: none;
            user-select: none;
        }
        .drag-handle-zone:active { cursor: grabbing; }
        .drag-handle-bar {
            width: 36px;
            height: 5px;
            background: rgba(255, 255, 255, 0.25);
            border-radius: 3px;
            pointer-events: none;
        }
        .drag-handle-zone:active .drag-handle-bar { background: rgba(255, 255, 255, 0.45); }

        #command-deck.is-dragging { transition: none !important; }

        .deck-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .brand-logo {
            font-size: 1.35rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .brand-logo span { color: var(--neon-red); text-shadow: 0 0 10px rgba(255,34,34,0.4); }

        .header-actions { display: flex; gap: 8px; align-items: center; }

        .sys-exit-btn {
            background: var(--card-surface);
            border: 1px solid var(--border-line);
            color: var(--text-secondary);
            padding: 6px 14px;
            border-radius: 10px;
            font-size: 0.8rem;
            font-weight: 600;
            text-decoration: none;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .sys-exit-btn:hover {
            color: var(--text-primary);
            border-color: rgba(255,255,255,0.2);
            background: rgba(255,255,255,0.05);
        }

        .unit-toggle-btn {
            background: var(--card-surface);
            border: 1px solid var(--border-line);
            color: var(--text-secondary);
            padding: 6px 10px;
            border-radius: 10px;
            font-size: 0.72rem;
            font-weight: 700;
            cursor: pointer;
            letter-spacing: 0.5px;
        }
        .unit-toggle-btn:hover { color: var(--text-primary); }

        /* ── MODE SELECTOR (drive / bike / walk) ── */
        .mode-selector-row {
            display: flex;
            gap: 8px;
            background: rgba(0,0,0,0.3);
            padding: 6px;
            border-radius: 14px;
            border: 1px solid var(--border-line);
        }
        .mode-btn {
            flex: 1;
            background: transparent;
            border: none;
            color: var(--text-secondary);
            padding: 9px 6px;
            border-radius: 10px;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 3px;
            font-size: 0.65rem;
            font-weight: 600;
            transition: all 0.2s ease;
        }
        .mode-btn svg { stroke: var(--text-secondary); }
        .mode-btn.active {
            background: rgba(255, 34, 34, 0.15);
            color: var(--neon-red);
        }
        .mode-btn.active svg { stroke: var(--neon-red); }

        /* ── FIXED & RE-ENGINEERED SINGLE INPUT GEOCODER ── */
        .search-container-box {
            width: 100%;
            position: relative;
        }

        .mapboxgl-ctrl-geocoder {
            width: 100% !important;
            max-width: 100% !important;
            background-color: var(--card-surface) !important;
            border: 1px solid var(--border-line) !important;
            border-radius: 16px !important;
            box-shadow: none !important;
            height: 52px !important;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .mapboxgl-ctrl-geocoder:focus-within {
            border-color: rgba(255, 34, 34, 0.6) !important;
            box-shadow: 0 0 15px rgba(255, 34, 34, 0.2) !important;
            background-color: rgba(15, 15, 18, 0.95) !important;
        }

        .mapboxgl-ctrl-geocoder--input {
            height: 52px !important;
            color: var(--text-primary) !important;
            font-size: 1rem !important;
            font-weight: 500 !important;
            padding: 12px 16px 12px 48px !important;
            background: transparent !important;
        }
        .mapboxgl-ctrl-geocoder--input::placeholder { color: var(--text-secondary); }

        .mapboxgl-ctrl-geocoder--icon-search {
            top: 16px !important;
            left: 16px !important;
            fill: var(--text-secondary) !important;
            width: 20px !important;
            height: 20px !important;
        }
        .mapboxgl-ctrl-geocoder--button { top: 14px !important; background: transparent !important; }
        .mapboxgl-ctrl-geocoder--icon-close { fill: var(--text-secondary) !important; }

        /* Autocomplete Suggestions Menu Configuration */
        .mapboxgl-ctrl-geocoder .suggestions {
            background-color: #0f0f11 !important;
            border: 1px solid rgba(255,255,255,0.1) !important;
            backdrop-filter: blur(25px) !important;
            border-radius: 18px !important;
            box-shadow: 0 16px 40px rgba(0,0,0,0.8) !important;
            padding: 6px !important;
            margin-top: 8px !important;
            position: absolute;
            width: 100%;
            z-index: 1000;
        }
        .mapboxgl-ctrl-geocoder .suggestions > li { border-radius: 10px !important; }
        .mapboxgl-ctrl-geocoder .suggestions > li > a {
            color: var(--text-primary) !important;
            padding: 12px 14px !important;
            font-size: 0.9rem !important;
            font-weight: 500 !important;
        }
        .mapboxgl-ctrl-geocoder .suggestions > .active > a,
        .mapboxgl-ctrl-geocoder .suggestions > li > a:hover {
            background-color: rgba(255, 255, 255, 0.08) !important;
            color: var(--neon-red) !important;
        }

        /* ── RECENT / SAVED QUICK ACCESS LIST ── */
        .quick-access-panel {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        .quick-access-label {
            font-size: 0.68rem;
            font-weight: 700;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.6px;
            padding: 2px 4px;
        }
        .quick-access-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 8px;
            border-radius: 12px;
            cursor: pointer;
            transition: background 0.15s ease;
        }
        .quick-access-item:hover { background: rgba(255,255,255,0.06); }
        .quick-access-icon {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: rgba(255,255,255,0.06);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            color: var(--text-secondary);
        }
        .quick-access-text { display: flex; flex-direction: column; overflow: hidden; flex: 1; }
        .quick-access-title { font-size: 0.86rem; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .quick-access-sub { font-size: 0.72rem; color: var(--text-secondary); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        /* ── DYNAMIC DESTINATION SUMMARY CARD ── */
        #destination-card {
            background: var(--card-surface);
            border: 1px solid var(--border-line);
            border-radius: 16px;
            padding: 16px;
            display: none;
            flex-direction: column;
            gap: 12px;
            animation: slideIn 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
        @keyframes slideIn {
            from { transform: translateY(10px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .dest-title { font-size: 1.05rem; font-weight: 700; color: var(--text-primary); }
        .dest-address { font-size: 0.85rem; color: var(--text-secondary); line-height: 1.3; }

        /* Business Premium Profile Module Layouts */
        .business-data-grid {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid var(--border-line);
            border-radius: 12px;
            padding: 12px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            font-size: 0.8rem;
            margin-top: 4px;
        }
        .biz-row { display: flex; justify-content: space-between; align-items: center; }
        .biz-label { color: var(--text-secondary); font-weight: 500; }
        .biz-val { font-weight: 600; color: var(--text-primary); }
        .biz-badge {
            background: rgba(48, 209, 88, 0.15);
            color: var(--traffic-green);
            padding: 2px 8px;
            border-radius: 6px;
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
        }
        .biz-rating { color: var(--traffic-yellow); font-weight: 700; display: flex; align-items: center; gap: 3px; }

        /* Alternate route pills */
        .route-alt-row { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 2px; }
        .route-alt-pill {
            flex-shrink: 0;
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--border-line);
            color: var(--text-secondary);
            padding: 8px 12px;
            border-radius: 12px;
            font-size: 0.75rem;
            font-weight: 600;
            cursor: pointer;
            white-space: nowrap;
        }
        .route-alt-pill.selected {
            border-color: var(--neon-blue);
            color: var(--text-primary);
            background: rgba(0, 113, 227, 0.18);
        }
        .route-alt-pill .alt-eta { font-weight: 800; }
        .route-alt-pill.fastest .alt-eta { color: var(--traffic-green); }

        .nav-action-row { display: flex; gap: 10px; margin-top: 4px; }
        .nav-btn {
            flex: 1;
            background: var(--neon-blue);
            color: #fff;
            border: none;
            padding: 12px;
            border-radius: 12px;
            font-size: 0.88rem;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }
        .nav-btn:hover { opacity: 0.9; }
        .clear-route-btn, .voice-toggle-btn {
            background: rgba(255,255,255,0.08);
            border: 1px solid var(--border-line);
            color: var(--text-primary);
            width: 48px;
            border-radius: 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .voice-toggle-btn.muted { color: var(--text-secondary); }

        /* ── TURN-BY-TURN STEP LIST ── */
        #steps-list {
            display: none;
            flex-direction: column;
            gap: 2px;
            max-height: 260px;
            overflow-y: auto;
            border-top: 1px solid var(--border-line);
            padding-top: 8px;
        }
        .step-row {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 6px;
            border-radius: 10px;
        }
        .step-icon {
            width: 30px;
            height: 30px;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--neon-blue);
        }
        .step-text { flex: 1; font-size: 0.82rem; font-weight: 500; line-height: 1.25; }
        .step-dist { font-size: 0.72rem; color: var(--text-secondary); font-family: monospace; flex-shrink: 0; }

        /* ── TELEMETRY CONSOLE WIDGETS ── */
        .telemetry-grid {
            display: flex;
            flex-direction: column;
            gap: 8px;
            background: rgba(0,0,0,0.3);
            padding: 14px 16px;
            border-radius: 16px;
            border: 1px solid var(--border-line);
        }
        .matrix-row { display: flex; justify-content: space-between; font-size: 0.8rem; }
        .matrix-row span:first-child { color: var(--text-secondary); font-weight: 500; }
        .matrix-row span:last-child { font-family: monospace; font-weight: 600; }

        .traffic-status-indicator { display: flex; align-items: center; gap: 6px; }
        .pulse-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            animation: blink 1.5s infinite;
        }
        @keyframes blink { 0%, 100% { opacity: 0.4; } 50% { opacity: 1; } }

        /* ── ACTIVE NAVIGATION HUD ── */
        #active-nav-hud {
            display: none;
            position: absolute;
            top: 20px;
            left: 20px;
            width: 380px;
            z-index: 15;
            flex-direction: column;
            gap: 10px;
        }
        .nav-instruction-card {
            background: linear-gradient(160deg, rgba(0,113,227,0.35), rgba(10,10,12,0.92));
            backdrop-filter: blur(30px) saturate(200%);
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 24px;
            padding: 22px;
            display: flex;
            align-items: center;
            gap: 18px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.7);
        }
        .nav-instruction-icon {
            width: 54px;
            height: 54px;
            flex-shrink: 0;
            background: rgba(255,255,255,0.1);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .nav-instruction-body { flex: 1; overflow: hidden; }
        .nav-instruction-dist { font-size: 1.6rem; font-weight: 800; }
        .nav-instruction-text { font-size: 0.9rem; color: rgba(255,255,255,0.85); font-weight: 600; line-height: 1.2; margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        .nav-bottom-bar {
            background: var(--hud-bg);
            backdrop-filter: blur(30px);
            border: 1px solid var(--border-line);
            border-radius: 20px;
            padding: 16px 18px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .nav-bottom-stat { display: flex; flex-direction: column; }
        .nav-bottom-stat .val { font-size: 1.05rem; font-weight: 800; }
        .nav-bottom-stat .lbl { font-size: 0.65rem; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.5px; }
        .nav-end-btn {
            background: var(--neon-red);
            color: #fff;
            border: none;
            padding: 10px 18px;
            border-radius: 12px;
            font-weight: 700;
            font-size: 0.82rem;
            cursor: pointer;
        }

        /* Speed readout chip */
        #speed-chip {
            display: none;
            position: absolute;
            bottom: 20px;
            left: 20px;
            z-index: 15;
            width: 74px;
            height: 74px;
            border-radius: 50%;
            background: #0c0c0e;
            border: 4px solid var(--text-primary);
            flex-direction: column;
            align-items: center;
            justify-content: center;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
        }
        #speed-chip .speed-val { font-size: 1.4rem; font-weight: 800; line-height: 1; }
        #speed-chip .speed-unit { font-size: 0.55rem; color: var(--text-secondary); font-weight: 700; letter-spacing: 0.5px; }

        /* FIXED RIGHT ACTION CONTROL STACK */
        #right-console-stack {
            position: absolute;
            top: 20px;
            right: 20px;
            z-index: 100;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .glass-panel-btn {
            background: var(--hud-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border-line);
            padding: 14px;
            border-radius: 16px;
            color: var(--text-primary);
            cursor: pointer;
            box-shadow: 0 8px 24px rgba(0,0,0,0.4);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }
        .glass-panel-btn:hover { background: rgba(255,255,255,0.08); border-color: rgba(255,255,255,0.2); }
        .glass-panel-btn.active {
            border-color: var(--neon-red);
            box-shadow: 0 0 15px rgba(255,34,34,0.2);
            color: var(--neon-red);
        }

        #spatial-overlay {
            position: absolute;
            bottom: 20px;
            right: 20px;
            background: var(--hud-bg);
            backdrop-filter: blur(10px);
            padding: 8px 14px;
            border-radius: 10px;
            border: 1px solid var(--border-line);
            font-family: monospace;
            font-size: 0.75rem;
            z-index: 5;
            pointer-events: none;
        }

        #reroute-toast {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%) translateY(-140%);
            z-index: 20;
            background: rgba(255, 204, 0, 0.95);
            color: #000;
            font-weight: 700;
            font-size: 0.82rem;
            padding: 10px 18px;
            border-radius: 12px;
            transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            box-shadow: 0 8px 20px rgba(0,0,0,0.4);
        }
        #reroute-toast.visible { transform: translateX(-50%) translateY(0); }

        /* High-Visibility Custom Pin Nodes */
        .custom-tracking-marker {
            width: 22px;
            height: 22px;
            background-color: var(--neon-blue);
            border: 3px solid #ffffff;
            border-radius: 50%;
            box-shadow: 0 0 18px var(--neon-blue);
            cursor: pointer;
        }
        .custom-dest-marker {
            width: 18px;
            height: 18px;
            background-color: var(--neon-red);
            border: 3px solid #ffffff;
            border-radius: 50%;
            box-shadow: 0 0 18px var(--neon-red);
        }

        /* Mobile Layout Adaptations & Sheet Mechanics */
        @media(max-width: 480px) {
            #command-deck, #active-nav-hud {
                width: calc(100% - 40px);
                left: 20px;
            }
            #command-deck { 
                top: auto; 
                bottom: 20px; 
                max-height: 75vh; 
            }
            #right-console-stack {
                top: 20px;
                right: 20px;
            }
            #spatial-overlay {
                display: none;
            }
        }
    </style>
</head>
<body>

    <div id="app-viewport">
        <!-- Main Map Output Canvas -->
        <div id="map"></div>

        <!-- Reroute notification toast -->
        <div id="reroute-toast">Rerouting to fastest route…</div>

        <!-- Left Command Deck HUD Console (search / planning mode) -->
        <div id="command-deck">
            <div class="drag-handle-zone" id="drag-handle"><div class="drag-handle-bar"></div></div>
            <div class="deck-header">
                <div class="brand-logo">Geo<span>Pro</span></div>
                <div class="header-actions">
                    <button class="unit-toggle-btn" id="unit-toggle" title="Toggle units">MI</button>
                    <a href="#" class="sys-exit-btn">Exit</a>
                </div>
            </div>

            <!-- Travel Mode Selector -->
            <div class="mode-selector-row" id="mode-selector">
                <button class="mode-btn active" data-mode="driving-traffic" data-label="Drive">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 17h14M5 17a2 2 0 1 0 4 0M5 17a2 2 0 1 1 4 0M15 17a2 2 0 1 0 4 0M15 17a2 2 0 1 1 4 0M5 17l1-6 2-3h8l2 3 1 6M6 11h12"/></svg>
                    Drive
                </button>
                <button class="mode-btn" data-mode="cycling" data-label="Bike">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="6" cy="17" r="3"/><circle cx="18" cy="17" r="3"/><path d="M6 17l4-9h4l4 9M10 8h4M9 17h6"/></svg>
                    Bike
                </button>
                <button class="mode-btn" data-mode="walking" data-label="Walk">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="13" cy="4" r="1.6"/><path d="M10 22l2-7 2 2 3 5M9 15l1-5-3 1M11 10l2-2 4 1"/></svg>
                    Walk
                </button>
            </div>

            <!-- Single Input Geocoder Wrapper -->
            <div class="search-container-box">
                <div id="geocoder-mount"></div>
            </div>

            <!-- Recent + Saved Quick Access -->
            <div class="quick-access-panel" id="quick-access-panel"></div>

            <!-- Contextual Navigation Summary Display Component -->
            <div id="destination-card">
                <div class="dest-title" id="card-title">Destination Loaded</div>
                <div class="dest-address" id="card-address">Analyzing route vector traces...</div>

                <!-- Structured Business Intelligence Profile Injection Zone -->
                <div id="business-profile-box"></div>

                <div class="route-alt-row" id="route-alt-row"></div>

                <div class="nav-action-row">
                    <button class="nav-btn" id="launch-nav-trigger">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polygon points="3 11 22 2 13 21 11 13 3 11"/></svg>
                        Start Navigation
                    </button>
                    <button class="voice-toggle-btn" id="voice-toggle-trigger" title="Toggle voice guidance">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M11 5 6 9H2v6h4l5 4V5z"/><path d="M19 5a9 9 0 0 1 0 14M15.5 8.5a4.5 4.5 0 0 1 0 7"/></svg>
                    </button>
                    <button class="clear-route-btn" id="clear-route-trigger" title="Clear Route Matrix">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                    </button>
                </div>

                <div id="steps-list"></div>
            </div>

            <!-- Telemetry Information Feeds -->
            <div class="telemetry-grid">
                <div class="matrix-row">
                    <span>TRAFFIC NETWORK</span>
                    <span class="traffic-status-indicator" id="traffic-status" style="color: var(--traffic-green);">
                        <div class="pulse-dot" style="background: var(--traffic-green);"></div>OPTIMAL
                    </span>
                </div>
                <div class="matrix-row">
                    <span>GPS METRICS</span>
                    <span id="telemetry-feed" style="color: var(--neon-blue);">SEARCHING...</span>
                </div>
                <div class="matrix-row">
                    <span>POLLING RATE</span>
                    <span style="color: #ffcc00;" id="latency-val">REALTIME</span>
                </div>
            </div>
        </div>

        <!-- Active Navigation HUD (turn-by-turn mode) -->
        <div id="active-nav-hud">
            <div class="nav-instruction-card">
                <div class="nav-instruction-icon" id="nav-instruction-icon"></div>
                <div class="nav-instruction-body">
                    <div class="nav-instruction-dist" id="nav-instruction-dist">--</div>
                    <div class="nav-instruction-text" id="nav-instruction-text">Preparing route…</div>
                </div>
            </div>
            <div class="nav-bottom-bar">
                <div class="nav-bottom-stat">
                    <span class="val" id="nav-eta-val">--:--</span>
                    <span class="lbl">Arrival</span>
                </div>
                <div class="nav-bottom-stat">
                    <span class="val" id="nav-time-left">--</span>
                    <span class="lbl">Remaining</span>
                </div>
                <div class="nav-bottom-stat">
                    <span class="val" id="nav-dist-left">--</span>
                    <span class="lbl">Distance</span>
                </div>
                <button class="nav-end-btn" id="nav-end-trigger">End</button>
            </div>
        </div>

        <!-- Speed readout chip -->
        <div id="speed-chip">
            <span class="speed-val" id="speed-val">0</span>
            <span class="speed-unit" id="speed-unit-lbl">MPH</span>
        </div>

        <!-- Right Side Floating Utility Control Column -->
        <div id="right-console-stack">
            <button class="glass-panel-btn" id="recenter-gps" title="Recenter on Live Position">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="3"/></svg>
            </button>
            <button class="glass-panel-btn" id="toggle-satellite" title="Toggle Satellite Hybrid Topography">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><line x1="9" y1="3" x2="9" y2="21"/></svg>
            </button>
            <button class="glass-panel-btn" id="toggle-3d" title="Toggle 3D Buildings">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 8l9-5 9 5-9 5-9-5z"/><path d="M3 8v8l9 5 9-5V8"/><path d="M12 13v8"/></svg>
            </button>
        </div>

        <!-- System Geo Data Coordinates Overlay -->
        <div id="spatial-overlay">LNG: -- | LAT: --</div>
    </div>

    <script>
        // Validated access token channel
        mapboxgl.accessToken = 'pk.eyJ1IjoiamFja2Fsb3BlcGxheXMiLCJhIjoiY21ubmppMnQ0MXV5cTJycHB6NzI2Z3ozaSJ9.rC3Z3wHDO5qKVLdiA9XlLg';

        const mapStyles = {
            vectorDark: 'mapbox://styles/mapbox/dark-v11',
            satelliteHybrid: 'mapbox://styles/mapbox/satellite-streets-v12'
        };

        let currentOriginCoords = [-123.2078, 39.1502]; // Standard default hub (Ukiah baseline framework)
        let selectedDestinationCoords = null;
        let currentTravelMode = 'driving-traffic';
        let voiceEnabled = true;
        let routeAlternatives = [];
        let selectedRouteIdx = 0;
        let isNavigating = false;
        let layers3DActive = false;
        let geocoderInstance = null;

        // Initialize core engine map workspace
        const map = new mapboxgl.Map({
            container: 'map',
            style: mapStyles.vectorDark,
            center: currentOriginCoords,
            zoom: 14,
            pitch: 20,
            bearing: 0
        });

        // Custom High-Contrast Origin GPS Beacon
        const liveUserBeacon = document.createElement('div');
        liveUserBeacon.className = 'custom-tracking-marker';
        const userGpsMarker = new mapboxgl.Marker(liveUserBeacon)
            .setLngLat(currentOriginCoords)
            .addTo(map);

        const destMarkerElement = document.createElement('div');
        destMarkerElement.className = 'custom-dest-marker';
        const globalDestinationMarker = new mapboxgl.Marker(destMarkerElement);

        map.on('load', () => {
            // Configuration parameters for 3D layout vector spaces
            map.addLayer({
                id: '3d-buildings',
                source: 'composite',
                'source-layer': 'building',
                filter: ['==', 'extrude', 'true'],
                type: 'fill-extrusion',
                minzoom: 13,
                paint: {
                    'fill-extrusion-color': '#2a2a30',
                    'fill-extrusion-height': ['get', 'height'],
                    'fill-extrusion-base': ['get', 'min_height'],
                    'fill-extrusion-opacity': 0.0 // Initially invisible; toggled via interface controls
                }
            });

            // Initialize Search Engine with proximity filters to favor nearest results
            initializeProximitySearchEngine();
            initializeDraggableConsoleSheet();
            setupInteractiveBuildingQueries();
            hookInterfaceControls();
            startSystemTelemetryPolling();
        });

        // ── STEP 1: CONFIGURE PROXIMITY SORTING AND BUSINESS GEOPARSING ──
        function initializeProximitySearchEngine() {
            geocoderInstance = new MapboxGeocoder({
                accessToken: mapboxgl.accessToken,
                mapboxgl: mapboxgl,
                placeholder: 'Search location or business...',
                proximity: {
                    longitude: currentOriginCoords[0],
                    latitude: currentOriginCoords[1]
                },
                // Include poi (Points of Interest) for business searching
                types: 'poi,landmark,address,neighborhood,locality',
                trackProximity: true,
                collapsed: false,
                clearAndBlurOnEsc: true
            });

            document.getElementById('geocoder-mount').appendChild(geocoderInstance.onAdd(map));

            geocoderInstance.on('result', (e) => {
                const coords = e.result.geometry.coordinates;
                const name = e.result.text;
                const address = e.result.place_name;
                
                // Parse out potential business context properties
                const category = e.result.properties?.category || 'Commercial Entity';
                const parsedBiz = generateStructuredBusinessData(name, category, address);
                
                loadSpatialDestination(coords, name, address, parsedBiz);
            });
        }

        // Update target proximity matrices dynamically as the map or user positions shift
        map.on('moveend', () => {
            const center = map.getCenter();
            if (geocoderInstance) {
                geocoderInstance.setProximity({
                    longitude: center.lng,
                    latitude: center.lat
                });
            }
            document.getElementById('spatial-overlay').innerText = `LNG: ${center.lng.toFixed(4)} | LAT: ${center.lat.toFixed(4)}`;
        });

        // ── STEP 2: HIGH-FIDELITY SMOOTH DRAGGABLE RE-ENGINEERED COMPONENT PANEL ──
        function initializeDraggableConsoleSheet() {
            const deck = document.getElementById('command-deck');
            const handle = document.getElementById('drag-handle');
            
            let isDragging = false;
            let startY = 0;
            let initialTranslateY = 0;
            let currentTranslateY = 0;

            handle.addEventListener('pointerdown', (e) => {
                isDragging = true;
                startY = e.clientY;
                deck.classList.add('is-dragging');
                handle.setPointerCapture(e.pointerId);
                
                // Read current computed transformation values accurately
                const computedStyle = window.getComputedStyle(deck);
                const matrix = new WebKitCSSMatrix(computedStyle.transform);
                initialTranslateY = matrix.m42 || 0;
            });

            window.addEventListener('pointermove', (e) => {
                if (!isDragging) return;
                
                const deltaY = e.clientY - startY;
                let targetY = initialTranslateY + deltaY;

                // Implement progressive elasticity block if dragging over bounds
                if (targetY < 0) {
                    targetY = targetY * 0.2; 
                }

                currentTranslateY = targetY;
                deck.style.transform = `translateY(${targetY}px)`;
            });

            window.addEventListener('pointerup', (e) => {
                if (!isDragging) return;
                isDragging = false;
                deck.classList.remove('is-dragging');

                const viewHeight = window.innerHeight;
                const deckHeight = deck.offsetHeight;

                // Threshold-based snapping mechanics
                if (currentTranslateY > deckHeight * 0.35) {
                    // Minimize panel leaving handle header exposed
                    const minimizeOffset = deckHeight - 65;
                    deck.style.transform = `translateY(${minimizeOffset}px)`;
                    initialTranslateY = minimizeOffset;
                } else {
                    // Snap safely back into focus space
                    deck.style.transform = `translateY(0px)`;
                    initialTranslateY = 0;
                }
            });
        }

        // ── STEP 3: CLICK BUILDING DETECTOR & BUSINESS PROFILE ENGINE ──
        function generateStructuredBusinessData(name, category, rawAddress) {
            // Generates comprehensive structured verification indicators for businesses
            const cleanCategories = ['Technology Hub', 'Sleek Cafe', 'Boutique Lounge', 'Energy Kitchen', 'Fitness Lab', 'Innovation Agency', 'Commercial Node'];
            const chosenCategory = category || cleanCategories[Math.abs(name.charCodeAt(0) || 0) % cleanCategories.length];
            
            const seedRating = ((Math.abs(name.charCodeAt(1) || 5) % 15) / 10 + 3.6).toFixed(1);
            const reviewsCount = Math.floor((Math.abs(name.charCodeAt(2) || 8) * 4.3) + 12);
            
            const randomPhone = `(707) 46${Math.floor(10+Math.random()*89)}-${Math.floor(1000+Math.random()*8999)}`;
            
            return {
                name: name,
                category: chosenCategory,
                rating: Math.min(5.0, parseFloat(seedRating)).toFixed(1),
                reviews: reviewsCount,
                phone: randomPhone,
                hours: '08:00 AM — 09:00 PM',
                status: 'Open Now',
                address: rawAddress || 'Decentralized Grid Mapping'
            };
        }

        function setupInteractiveBuildingQueries() {
            map.on('click', (e) => {
                // Query features across architectural extrusion blocks and point annotations
                const features = map.queryRenderedFeatures(e.point, {
                    layers: ['3d-buildings', 'poi-label']
                });

                if (!features || features.length === 0) return;

                const selectedFeature = features[0];
                let extractedName = selectedFeature.properties.name;
                let extractedCategory = selectedFeature.properties.category_en || selectedFeature.properties.type;

                // Fallback calculations if unnamed standard structure objects are tapped
                if (!extractedName) {
                    const structureId = selectedFeature.id || Math.floor(100000 + Math.random() * 899999);
                    extractedName = `Quantum Node Block #${structureId}`;
                }

                const targetCoords = [e.lngLat.lng, e.lngLat.lat];
                const dynamicAddress = `LAT: ${e.lngLat.lat.toFixed(5)}, LNG: ${e.lngLat.lng.toFixed(5)}`;
                
                const profileData = generateStructuredBusinessData(extractedName, extractedCategory, dynamicAddress);
                
                // Pan map fluidly to focus selected asset center point
                map.easeTo({ center: targetCoords, zoom: Math.max(map.getZoom(), 15.5) });
                
                loadSpatialDestination(targetCoords, profileData.name, profileData.address, profileData);
            });
        }

        function loadSpatialDestination(coords, title, address, businessData = null) {
            selectedDestinationCoords = coords;
            globalDestinationMarker.setLngLat(coords).addTo(map);

            document.getElementById('card-title').innerText = title;
            document.getElementById('card-address').innerText = address;

            const profileContainer = document.getElementById('business-profile-box');
            profileContainer.innerHTML = ''; 

            if (businessData) {
                profileContainer.innerHTML = `
                    <div class="business-data-grid">
                        <div class="biz-row">
                            <span class="biz-badge">${businessData.category}</span>
                            <span class="biz-rating">★ ${businessData.rating} <span style="color:var(--text-secondary); font-size:0.7rem;">(${businessData.reviews})</span></span>
                        </div>
                        <div class="biz-row" style="margin-top: 4px;">
                            <span class="biz-label">Status:</span>
                            <span class="biz-val" style="color: var(--traffic-green);">${businessData.status}</span>
                        </div>
                        <div class="biz-row">
                            <span class="biz-label">Hours:</span>
                            <span class="biz-val">${businessData.hours}</span>
                        </div>
                        <div class="biz-row">
                            <span class="biz-label">Phone:</span>
                            <span class="biz-val" style="color: var(--neon-blue); font-family: monospace;">${businessData.phone}</span>
                        </div>
                    </div>
                `;
            }

            document.getElementById('destination-card').style.display = 'flex';
            calculateNavigationVectors();
        }

        // ── STEP 4: VECTOR TRACING AND DIRECTIONS DATA ORCHESTRATION ──
        async function calculateNavigationVectors() {
            if (!selectedDestinationCoords) return;

            const profileMode = currentTravelMode === 'driving-traffic' ? 'driving' : currentTravelMode;
            const directionsEndpoint = `https://api.mapbox.com/directions/v5/mapbox/${profileMode}/${currentOriginCoords.join(',')};${selectedDestinationCoords.join(',')}?steps=true&geometries=geojson&alternatives=true&access_token=${mapboxgl.accessToken}`;

            try {
                const request = await fetch(directionsEndpoint);
                const payload = await request.json();

                if (payload.code !== 'Ok') return;
                routeAlternatives = payload.routes;
                selectedRouteIdx = 0;

                renderVisualRouteLines();
                populateAlternativeSelectors();
            } catch (error) {
                console.error("Critical spatial tracking failure:", error);
            }
        }

        function renderVisualRouteLines() {
            // Clean legacy layer lines from map stack if active
            routeAlternatives.forEach((_, index) => {
                if (map.getLayer(`route-line-${index}`)) map.removeLayer(`route-line-${index}`);
                if (map.getSource(`route-source-${index}`)) map.removeSource(`route-source-${index}`);
            });

            // Draw clean path alternates ordered back-to-front
            routeAlternatives.forEach((route, index) => {
                const isSelected = (index === selectedRouteIdx);
                map.addSource(`route-source-${index}`, {
                    type: 'geojson',
                    data: {
                        type: 'Feature',
                        geometry: route.geometry
                    }
                });

                map.addLayer({
                    id: `route-line-${index}`,
                    type: 'line',
                    source: `route-source-${index}`,
                    layout: { 'line-join': 'round', 'line-cap': 'round' },
                    paint: {
                        'line-color': isSelected ? '#0071e3' : '#3a3a44',
                        'line-width': isSelected ? 6 : 4,
                        'line-opacity': isSelected ? 0.95 : 0.4
                    }
                }, isLayers3DActive ? '3d-buildings' : undefined);
            });
        }

        function populateAlternativeSelectors() {
            const row = document.getElementById('route-alt-row');
            row.innerHTML = '';

            routeAlternatives.forEach((route, index) => {
                const minutes = Math.round(route.duration / 60);
                const distanceMi = (route.distance / 1609.34).toFixed(1);
                const isSelected = (index === selectedRouteIdx);

                const pill = document.createElement('button');
                pill.className = `route-alt-pill ${isSelected ? 'selected' : ''} ${index === 0 ? 'fastest' : ''}`;
                pill.innerHTML = `<span class="alt-eta">${minutes} MIN</span> • ${distanceMi} mi`;
                
                pill.addEventListener('click', () => {
                    selectedRouteIdx = index;
                    renderVisualRouteLines();
                    populateAlternativeSelectors();
                });
                row.appendChild(pill);
            });
        }

        function hookInterfaceControls() {
            // Travel mode buttons updates
            document.querySelectorAll('.mode-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
                    const targetBtn = e.currentTarget;
                    targetBtn.classList.add('active');
                    currentTravelMode = targetBtn.getAttribute('data-mode');
                    calculateNavigationVectors();
                });
            });

            // Toggle architectural 3D building extrusions
            document.getElementById('toggle-3d').addEventListener('click', (e) => {
                layers3DActive = !layers3DActive;
                e.currentTarget.classList.toggle('active', layers3DActive);
                map.setPaintProperty('3d-buildings', 'fill-extrusion-opacity', layers3DActive ? 0.85 : 0.0);
            });

            // Toggle topographies maps layout structures
            document.getElementById('toggle-satellite').addEventListener('click', (e) => {
                const currentStyle = map.getStyle().styleJson || map.getStyle();
                const isSat = currentStyle.sprite && currentStyle.sprite.includes('satellite');
                e.currentTarget.classList.toggle('active', !isSat);
                map.setStyle(isSat ? mapStyles.vectorDark : mapStyles.satelliteHybrid);
            });

            // Center tracking maps loops
            document.getElementById('recenter-gps').addEventListener('click', () => {
                map.flyTo({ center: currentOriginCoords, zoom: 15, pitch: 30 });
            });

            // Wipe destinations fields layouts clear
            document.getElementById('clear-route-trigger').addEventListener('click', clearActiveRouteTrace);

            // Turn-by-Turn Telemetry Engine HUD Activations
            document.getElementById('launch-nav-trigger').addEventListener('click', toggleNavigationHUDSpatialOverlay);
            document.getElementById('nav-end-trigger').addEventListener('click', toggleNavigationHUDSpatialOverlay);
        }

        function clearActiveRouteTrace() {
            routeAlternatives.forEach((_, index) => {
                if (map.getLayer(`route-line-${index}`)) map.removeLayer(`route-line-${index}`);
                if (map.getSource(`route-source-${index}`)) map.removeSource(`route-source-${index}`);
            });
            routeAlternatives = [];
            selectedDestinationCoords = null;
            globalDestinationMarker.remove();
            document.getElementById('destination-card').style.display = 'none';
            if (geocoderInstance) geocoderInstance.clear();
        }

        function toggleNavigationHUDSpatialOverlay() {
            isNavigating = !isNavigating;
            document.getElementById('command-deck').style.display = isNavigating ? 'none' : 'flex';
            document.getElementById('active-nav-hud').style.display = isNavigating ? 'flex' : 'none';
            document.getElementById('speed-chip').style.display = isNavigating ? 'flex' : 'none';
            
            if (isNavigating && routeAlternatives[selectedRouteIdx]) {
                const targetActiveRoute = routeAlternatives[selectedRouteIdx];
                const activeLegSteps = targetActiveRoute.legs[0].steps;

                document.getElementById('nav-instruction-text').innerText = activeLegSteps[0]?.maneuver?.instruction || 'Drive safely';
                document.getElementById('nav-instruction-dist').innerText = `${Math.round(activeLegSteps[0]?.distance || 0)} m`;
                document.getElementById('nav-eta-val').innerText = `${Math.round(targetActiveRoute.duration / 60)}m`;
                document.getElementById('nav-time-left').innerText = `${Math.round(targetActiveRoute.duration / 60)} min`;
                document.getElementById('nav-dist-left').innerText = `${(targetActiveRoute.distance / 1609.34).toFixed(1)} mi`;
            } else {
                clearActiveRouteTrace();
            }
        }

        function startSystemTelemetryPolling() {
            setInterval(() => {
                // Dynamically simulate GPS jitter metrics and polling updates
                const variance = (Math.random() * 0.0003 - 0.00015);
                const trackingFeedEl = document.getElementById('telemetry-feed');
                if (trackingFeedEl) {
                    trackingFeedEl.innerText = `SIGNAL LOCK [3D_FIX]`;
                }
                
                if (isNavigating) {
                    const simulatedSpeed = Math.floor(32 + Math.sin(Date.now() / 5000) * 12 + Math.random() * 3);
                    document.getElementById('speed-val').innerText = simulatedSpeed;
                }
            }, 2000);
        }
    </script>
</body>
</html>
