<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GeoPro Workspace with Navigation</title>
    
    <!-- Mapbox GL JS Core Engine -->
    <script src="https://api.mapbox.com/mapbox-gl-js/v3.3.0/mapbox-gl.js"></script>
    <link href="https://api.mapbox.com/mapbox-gl-js/v3.3.0/mapbox-gl.css" rel="stylesheet" />

    <!-- Official Mapbox GL Directions Routing Plugin -->
    <script src="https://api.mapbox.com/mapbox-gl-js/plugins/mapbox-gl-directions/v4.3.1/mapbox-gl-directions.js"></script>
    <link rel="stylesheet" href="https://api.mapbox.com/mapbox-gl-js/plugins/mapbox-gl-directions/v4.3.1/mapbox-gl-directions.css" type="text/css" />

    <style>
        :root {
            --bg-color: #0a0a0a;
            --panel-bg: #111111;
            --accent-color: #ff2222;
            --border-color: #222222;
            --text-color: #e5e5e5;
            --text-muted: #666;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body, html {
            width: 100%;
            height: 100vh;
            overflow: hidden;
            background-color: var(--bg-color);
            color: var(--text-color);
        }

        #workspace-container {
            display: flex;
            width: 100%;
            height: 100vh;
            position: relative;
        }

        #mobile-menu-trigger {
            display: none;
            position: absolute;
            top: 14px;
            left: 14px;
            z-index: 30;
            background: var(--panel-bg);
            border: 1px solid var(--border-color);
            color: var(--text-color);
            padding: 10px 16px;
            border-radius: 4px;
            font-size: 0.8rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        #sidebar {
            width: 340px;
            height: 100%;
            background-color: var(--panel-bg);
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            z-index: 20;
            box-shadow: 10px 0 30px rgba(0,0,0,0.6);
            transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .sidebar-header {
            padding: 24px 20px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .sidebar-header h1 {
            font-size: 1.1rem;
            font-weight: 800;
            letter-spacing: 1.5px;
            text-transform: uppercase;
        }

        .sidebar-header h1 span { color: var(--accent-color); }

        .back-home {
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.75rem;
            text-transform: uppercase;
            border: 1px solid var(--border-color);
            padding: 5px 10px;
            border-radius: 4px;
            font-weight: 600;
        }

        .sidebar-content {
            padding: 20px;
            flex-grow: 1;
            overflow-y: auto;
        }

        .control-group { margin-bottom: 28px; }

        .control-group h3 {
            font-size: 0.75rem;
            text-transform: uppercase;
            color: var(--text-muted);
            letter-spacing: 1px;
            margin-bottom: 12px;
        }

        .search-wrapper { margin-bottom: 24px; min-height: 40px; }
        
        /* ── MAPBOX DIRECTIONS DARK THEME OVERRIDES ── */
        .mapboxgl-ctrl-directions {
            width: 100% !important;
            max-width: 100% !important;
            background-color: transparent !important;
            box-shadow: none !important;
            margin: 0 !important;
        }
        .mapboxgl-ctrl-directions .mapboxgl-ctrl-geocoder {
            background-color: #161616 !important;
            border: 1px solid var(--border-color) !important;
            border-radius: 4px !important;
            margin-bottom: 8px !important;
        }
        .mapboxgl-ctrl-directions input[type="text"] {
            color: var(--text-color) !important;
            padding: 10px 10px 10px 40px !important;
            font-size: 0.85rem !important;
            height: 40px !important;
        }
        .mapboxgl-ctrl-directions .directions-control-inputs {
            padding: 0 !important;
            background: transparent !important;
        }
        .mapboxgl-ctrl-directions .mapboxgl-ctrl-geocoder--icon-search {
            fill: var(--text-muted) !important;
            top: 10px !important;
        }
        .mapboxgl-ctrl-directions .directions-icon {
            top: 10px !important;
        }
        /* Hide profiling buttons to clean up sidebar layout space */
        .mapboxgl-ctrl-directions .directions-control-profiles {
            display: none !important;
        }
        .mapboxgl-ctrl-directions .directions-control-instructions {
            background-color: #141414 !important;
            border: 1px solid var(--border-color) !important;
            color: var(--text-color) !important;
            border-radius: 4px;
            margin-top: 10px;
            max-height: 200px;
            overflow-y: auto;
        }
        .mapboxgl-ctrl-directions .mapbox-directions-instruction {
            border-bottom: 1px solid #1a1a1a !important;
            color: var(--text-color) !important;
        }
        .mapboxgl-ctrl-directions .mapbox-directions-instruction:hover {
            background-color: #1c1c1c !important;
        }

        .toggle-container {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: #161616;
            padding: 14px 12px;
            border-radius: 4px;
            border: 1px solid var(--border-color);
        }

        .action-btn {
            width: 100%;
            background: #1a1a1a;
            color: var(--text-color);
            border: 1px solid var(--border-color);
            padding: 12px;
            border-radius: 4px;
            font-size: 0.8rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            transition: all 0.2s ease;
            margin-bottom: 12px;
        }

        .action-btn.active {
            background: var(--accent-color);
            color: #fff;
            border-color: transparent;
            box-shadow: 0 0 15px rgba(255, 34, 34, 0.3);
        }

        .metrics-board {
            background: #161616;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            padding: 14px;
            font-family: monospace;
            font-size: 0.8rem;
        }
        .metric-line { display: flex; justify-content: space-between; margin-bottom: 6px; }
        .metric-val { color: var(--accent-color); font-weight: bold; }

        #map { flex-grow: 1; height: 100%; position: relative; background-color: #0e0e0e; }

        #geo-overlay {
            position: absolute;
            bottom: 24px;
            right: 24px;
            background: rgba(10, 10, 10, 0.85);
            padding: 10px 16px;
            border-radius: 4px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.8rem;
            pointer-events: none;
            z-index: 5;
        }

        .custom-user-marker {
            display: block;
            width: 16px;
            height: 16px;
            background-color: #ff2222;
            border: 2px solid #ffffff;
            border-radius: 50%;
            box-shadow: 0 0 10px #ff2222, 0 0 20px #ff2222;
            cursor: pointer;
        }

        @media (max-width: 768px) {
            #mobile-menu-trigger { display: block; }
            #sidebar {
                position: absolute;
                top: 0;
                left: 0;
                width: 280px;
                transform: translateX(-100%);
            }
            #sidebar.open { transform: translateX(0); box-shadow: 15px 0 30px rgba(0,0,0,0.8); }
        }
    </style>
</head>
<body>

    <div id="workspace-container">
        <button id="mobile-menu-trigger">Menu</button>

        <div id="sidebar">
            <div class="sidebar-header">
                <h1>Geo<span>Pro</span></h1>
                <a href="index.html" class="back-home">Exit</a>
            </div>
            
            <div class="sidebar-content">
                <!-- Swapped out simple search for the Directions/Routing Interface Anchor -->
                <div class="control-group">
                    <h3>Navigation & Search</h3>
                    <div id="search-container" class="search-wrapper"></div>
                </div>

                <div class="control-group">
                    <h3>Data Layers</h3>
                    <label class="toggle-container">
                        <span class="toggle-label">3D Building Extrusions</span>
                        <input type="checkbox" id="layer-toggle-3d" checked>
                    </label>
                </div>

                <div class="control-group">
                    <h3>Telemetry Pipeline</h3>
                    <button id="gps-init-btn" class="action-btn">
                        Initialize GPS Tracking
                    </button>
                    
                    <div class="metrics-board">
                        <div class="metric-line">
                            <span>TRACKING ENGINE:</span>
                            <span class="metric-val" id="gps-status">OFFLINE</span>
                        </div>
                        <div class="metric-line">
                            <span>LATITUDE:</span>
                            <span class="metric-val" id="telemetry-lat">0.00000</span>
                        </div>
                        <div class="metric-line">
                            <span>LONGITUDE:</span>
                            <span class="metric-val" id="telemetry-lng">0.00000</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div id="map">
            <div id="geo-overlay">LNG: -123.2078 | LAT: 39.1502</div>
        </div>
    </div>

    <script>
        mapboxgl.accessToken = 'pk.eyJ1IjoiamFja2Fsb3BlcGxheXMiLCJhIjoiY21ubmppMnQ0MXV5cTJycHB6NzI2Z3ozaSJ9.rC3Z3wHDO5qKVLdiA9XlLg';

        const map = new mapboxgl.Map({
            container: 'map',
            style: 'mapbox://styles/mapbox/dark-v11', 
            center: [-123.2078, 39.1502],
            zoom: 14.5,
            pitch: 50,
            bearing: -12
        });

        const menuBtn = document.getElementById('mobile-menu-trigger');
        const sidebar = document.getElementById('sidebar');
        const gpsBtn = document.getElementById('gps-init-btn');
        
        menuBtn.addEventListener('click', () => {
            sidebar.classList.toggle('open');
            menuBtn.innerText = sidebar.classList.contains('open') ? 'Close' : 'Menu';
        });

        // ── Initialize Advanced Routing Architecture ──
        let directions = null;
        try {
            directions = new MapboxDirections({
                accessToken: mapboxgl.accessToken,
                unit: 'imperial',
                profile: 'mapbox/driving',
                alternatives: false,
                congestion: true,
                controls: { inputs: true, instructions: true, profileSwitcher: false }
            });
            
            // Mount the direction finder fields cleanly inside the layout panel container
            document.getElementById('search-container').appendChild(directions.onAdd(map));
        } catch(e) {
            console.error("Directions engine failed to assemble:", e);
        }

        // Live Telemetry Engine State Management
        let livePosition = null;
        let isTrackingActive = false; 
        let isFollowingActive = false; 
        let isMarkerAdded = false; 
        
        const markerElement = document.createElement('div');
        markerElement.className = 'custom-user-marker';
        const locationMarker = new mapboxgl.Marker({ element: markerElement });

        function startTelemetryPipeline() {
            if (window.isSecureContext === false) {
                document.getElementById('gps-status').innerText = 'SECURE_ERR';
                alert("🚨 SECURITY BLOCK:\nGeolocation requires HTTPS or localhost connections on mobile browsers.");
                return;
            }

            if (!('geolocation' in navigator)) {
                document.getElementById('gps-status').innerText = 'NOT_SUPPORTED';
                alert("🚨 HARDWARE ERROR:\nGeolocation engine unavailable on this browser variant.");
                return;
            }

            document.getElementById('gps-status').innerText = 'PROMPTING...';
            
            navigator.geolocation.watchPosition(
                (position) => {
                    livePosition = [position.coords.longitude, position.coords.latitude];
                    document.getElementById('gps-status').innerText = 'ACTIVE_100MS';
                    
                    if (!isTrackingActive) {
                        isTrackingActive = true;
                        isFollowingActive = true;
                        gpsBtn.classList.add('active');
                        gpsBtn.innerText = 'Stop Following';
                        
                        // Automatically pipe your freshly pulled coordinates straight into the routing engine's origin field!
                        if (directions) {
                            directions.setOrigin(livePosition);
                        }
                    }
                },
                (error) => {
                    console.error('GPS Link Exception:', error);
                    document.getElementById('gps-status').innerText = 'HARDWARE_ERR';
                },
                { enableHighAccuracy: true, timeout: 15000, maximumAge: 0 }
            );

            // High-Frequency 100ms Rendering Sync Loop
            setInterval(() => {
                if (livePosition) {
                    locationMarker.setLngLat(livePosition);
                    
                    if (!isMarkerAdded) {
                        locationMarker.addTo(map);
                        isMarkerAdded = true;
                    }
                    
                    if (isFollowingActive) {
                        map.setCenter(livePosition);
                    }
                    
                    document.getElementById('telemetry-lat').innerText = livePosition[1].toFixed(5);
                    document.getElementById('telemetry-lng').innerText = livePosition[0].toFixed(5);
                }
            }, 100);
        }

        // State Machine Controller Interface
        gpsBtn.addEventListener('click', () => {
            if (!isTrackingActive) {
                startTelemetryPipeline();
            } else {
                isFollowingActive = !isFollowingActive;
                
                if (isFollowingActive) {
                    gpsBtn.innerText = 'Stop Following';
                    gpsBtn.classList.add('active');
                    if (livePosition) {
                        map.flyTo({ center: livePosition, zoom: 16, essential: true });
                    }
                } else {
                    gpsBtn.innerText = 'Follow Location';
                    gpsBtn.classList.remove('active');
                }
            }
        });

        map.on('load', () => {
            map.addLayer({
                'id': '3d-buildings',
                'source': 'composite',
                'source-layer': 'building',
                'filter': ['==', 'extrude', 'true'],
                'type': 'fill-extrusion',
                'minzoom': 14,
                'paint': {
                    'fill-extrusion-color': '#1a1a1a',
                    'fill-extrusion-height': ['get', 'height'],
                    'fill-extrusion-base': ['get', 'min_height'],
                    'fill-extrusion-opacity': 0.85
                }
            });
        });

        const updateOverlay = (lngLat) => {
            document.getElementById('geo-overlay').innerHTML = 
                `LNG: ${lngLat.lng.toFixed(4)} | LAT: ${lngLat.lat.toFixed(4)}`;
        };

        map.on('mousemove', (e) => updateOverlay(e.lngLat));
        map.on('touchmove', (e) => updateOverlay(e.lngLat));
    </script>
</body>
</html>
