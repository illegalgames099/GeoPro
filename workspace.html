<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GeoPro Quantum Navigation System</title>

    <!-- Mapbox GL JS Core Engine Bundle -->
    <script src="https://api.mapbox.com/mapbox-gl-js/v3.3.0/mapbox-gl.js"></script>
    <link href="https://api.mapbox.com/mapbox-gl-js/v3.3.0/mapbox-gl.css" rel="stylesheet" />

    <!-- Modern Mapbox Search JS Engine Bundle -->
    <script id="search-js" defer src="https://api.mapbox.com/search-js/v1.5.0/web.js"></script>

    <style>
        :root {
            --bg-pure: #050507;
            --hud-bg: rgba(6, 6, 8, 0.82);
            --card-surface: rgba(18, 18, 24, 0.65);
            --neon-red: #ff1e1e;
            --neon-red-glow: rgba(255, 30, 30, 0.35);
            --border-glow: rgba(255, 30, 30, 0.12);
            --border-line: rgba(255, 255, 255, 0.07);
            --text-primary: #ffffff;
            --text-secondary: #92929a;
            --traffic-green: #2cd152;
            --glass-blur: blur(25px) saturate(210%);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", Roboto, sans-serif;
            letter-spacing: -0.3px;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: var(--bg-pure);
            color: var(--text-primary);
        }

        #app-viewport {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
        }

        #map {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: var(--bg-pure);
            z-index: 1;
        }

        button { font: inherit; background: none; border: none; }

        /* ── TACTICAL HUD COMMAND SHEET ── */
        #command-deck {
            position: absolute;
            top: 24px;
            left: 24px;
            width: 400px;
            max-height: calc(100vh - 48px);
            z-index: 10;
            background: var(--hud-bg);
            backdrop-filter: var(--glass-blur);
            -webkit-backdrop-filter: var(--glass-blur);
            border: 1px solid var(--border-line);
            border-radius: 28px;
            padding: 24px;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.8), 0 0 50px var(--border-glow);
            display: flex;
            flex-direction: column;
            gap: 20px;
            overflow-y: auto;
            transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1), height 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .drag-handle-zone {
            width: 100%;
            padding: 4px 0 12px 0;
            margin-top: -10px;
            display: flex;
            justify-content: center;
            cursor: grab;
            touch-action: none;
        }
        .drag-handle-zone:active { cursor: grabbing; }
        .drag-handle-bar {
            width: 48px;
            height: 4px;
            background: rgba(255, 255, 255, 0.18);
            border-radius: 2px;
        }

        #command-deck.is-dragging { transition: none !important; }

        .deck-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .brand-logo {
            font-size: 1.5rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            background: linear-gradient(135deg, #fff 60%, var(--neon-red));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Mode Array */
        .mode-selector-row {
            display: flex;
            gap: 6px;
            background: rgba(0, 0, 0, 0.4);
            padding: 4px;
            border-radius: 16px;
            border: 1px solid var(--border-line);
        }
        .mode-btn {
            flex: 1;
            color: var(--text-secondary);
            padding: 12px 8px;
            border-radius: 12px;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            font-size: 0.72rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            transition: all 0.25s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .mode-btn svg { stroke: var(--text-secondary); fill: none; transition: transform 0.25s ease; }
        .mode-btn:hover svg { transform: translateY(-1px); }
        .mode-btn.active {
            background: var(--neon-red-glow);
            color: var(--text-primary);
            border: 1px solid rgba(255, 30, 30, 0.25);
        }
        .mode-btn.active svg { stroke: var(--neon-red); }

        /* Modern Search Input Control Override */
        .search-container-box { width: 100%; position: relative; }
        #geocoder-mount { width: 100%; }
        mapboxgl-search-box, mapboxsearch-search-box {
            width: 100% !important;
            max-width: 100% !important;
            --mapbox-search-box-background: var(--card-surface);
            --mapbox-search-box-text: var(--text-primary);
            --mapbox-search-box-placeholder-text: var(--text-secondary);
            --mapbox-search-box-border: 1px solid var(--border-line);
            --mapbox-search-box-border-radius: 16px;
            --mapbox-search-box-results-background: #0b0b0f;
            --mapbox-search-box-result-text: var(--text-primary);
            --mapbox-search-box-result-hover-background: rgba(255, 255, 255, 0.05);
            --mapbox-search-box-icon-fill: var(--text-secondary);
            --mapbox-search-box-shadow: none;
        }

        /* Hotkey Discovery Chips */
        .category-chips-row {
            display: flex;
            gap: 8px;
            overflow-x: auto;
            scrollbar-width: none;
        }
        .category-chips-row::-webkit-scrollbar { display: none; }
        .category-search-pill {
            background: var(--card-surface);
            border: 1px solid var(--border-line);
            color: var(--text-primary);
            padding: 10px 16px;
            border-radius: 14px;
            font-size: 0.82rem;
            font-weight: 600;
            cursor: pointer;
            white-space: nowrap;
            transition: all 0.2s ease;
        }
        .category-search-pill:hover {
            background: rgba(255, 255, 255, 0.06);
            border-color: var(--neon-red);
        }

        /* Navigation Matrix / Destination Data Engine UI */
        #destination-card {
            background: var(--card-surface);
            border: 1px solid var(--border-line);
            border-radius: 20px;
            padding: 20px;
            display: none;
            flex-direction: column;
            gap: 16px;
        }
        .dest-title { font-size: 1.2rem; font-weight: 800; color: var(--text-primary); }
        .dest-address { font-size: 0.88rem; color: var(--text-secondary); line-height: 1.4; }

        .spatial-data-grid {
            background: rgba(0, 0, 0, 0.25);
            border: 1px solid var(--border-line);
            border-radius: 14px;
            padding: 14px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            font-size: 0.82rem;
        }
        .space-row { display: flex; justify-content: space-between; align-items: center; }
        .space-label { color: var(--text-secondary); text-transform: uppercase; font-size: 0.72rem; font-weight: 700; letter-spacing: 0.5px; }
        .space-val { font-family: monospace; font-weight: 600; color: var(--text-primary); }

        .route-alt-row { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 2px; }
        .route-alt-pill {
            flex-shrink: 0; background: rgba(255,255,255,0.03); border: 1px solid var(--border-line);
            color: var(--text-secondary); padding: 10px 16px; border-radius: 12px; font-size: 0.8rem; font-weight: 700; cursor: pointer;
            transition: all 0.2s ease;
        }
        .route-alt-pill.selected { border-color: var(--neon-red); color: var(--text-primary); background: var(--neon-red-glow); }

        .nav-action-row { display: flex; gap: 10px; }
        .nav-btn {
            flex: 1; background: var(--neon-red); color: #fff; padding: 14px;
            border-radius: 14px; font-size: 0.92rem; font-weight: 700; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px;
            box-shadow: 0 6px 20px var(--neon-red-glow);
            transition: transform 0.2s, background 0.2s;
        }
        .nav-btn:block { transform: scale(0.98); }
        .clear-route-btn { background: rgba(255,255,255,0.05); border: 1px solid var(--border-line); color: var(--text-primary); width: 54px; border-radius: 14px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: background 0.2s; }
        .clear-route-btn:hover { background: rgba(255,255,255,0.1); }

        /* Hardware Telemetry Monitors */
        .telemetry-grid {
            display: flex;
            flex-direction: column;
            gap: 10px;
            background: rgba(0, 0, 0, 0.3);
            padding: 16px;
            border-radius: 18px;
            border: 1px solid var(--border-line);
        }
        .matrix-row { display: flex; justify-content: space-between; font-size: 0.75rem; letter-spacing: 0.5px; }
        .matrix-row span:first-child { color: var(--text-secondary); font-weight: 700; text-transform: uppercase; }
        .matrix-row span:last-child { font-family: monospace; font-weight: 700; }

        /* ── IN-FLIGHT ACTIVE GUIDANCE INTERFACE ── */
        #active-nav-hud {
            display: none; position: absolute; top: 24px; left: 24px; width: 400px; z-index: 15; flex-direction: column; gap: 12px;
        }
        .nav-instruction-card { background: linear-gradient(145deg, rgba(255,30,30,0.22), var(--hud-bg)); backdrop-filter: var(--glass-blur); -webkit-backdrop-filter: var(--glass-blur); border: 1px solid rgba(255,255,255,0.1); border-radius: 24px; padding: 24px; display: flex; align-items: center; gap: 16px; box-shadow: 0 20px 40px rgba(0,0,0,0.5); }
        .nav-instruction-body { flex: 1; }
        .nav-instruction-dist { font-size: 1.8rem; font-weight: 900; letter-spacing: -0.5px; color: var(--text-primary); }
        .nav-instruction-text { font-size: 0.95rem; color: rgba(255,255,255,0.9); font-weight: 600; margin-top: 2px; }
        .nav-bottom-bar { background: var(--hud-bg); backdrop-filter: var(--glass-blur); -webkit-backdrop-filter: var(--glass-blur); border: 1px solid var(--border-line); border-radius: 22px; padding: 18px 20px; display: flex; align-items: center; justify-content: space-between; box-shadow: 0 20px 40px rgba(0,0,0,0.5); }
        .nav-bottom-stat { display: flex; flex-direction: column; }
        .nav-bottom-stat .val { font-size: 1.15rem; font-weight: 800; color: var(--text-primary); }
        .nav-bottom-stat .lbl { font-size: 0.65rem; color: var(--text-secondary); text-transform: uppercase; font-weight: 700; margin-top: 1px; }
        .nav-end-btn { background: #282830; color: #fff; border: 1px solid var(--border-line); padding: 12px 20px; border-radius: 14px; font-weight: 700; font-size: 0.88rem; cursor: pointer; transition: background 0.2s; }
        .nav-end-btn:hover { background: #34343e; }

        #speed-chip {
            display: none; position: absolute; bottom: 24px; left: 24px; z-index: 15; width: 84px; height: 84px; border-radius: 50%; background: #060608; border: 4px solid var(--neon-red); flex-direction: column; align-items: center; justify-content: center;
            box-shadow: 0 0 25px rgba(255, 30, 30, 0.3), inset 0 0 10px rgba(255, 30, 30, 0.2);
        }
        #speed-chip .speed-val { font-size: 1.7rem; font-weight: 900; line-height: 1; color: var(--text-primary); font-family: monospace; }
        #speed-chip .speed-unit { font-size: 0.6rem; color: var(--text-secondary); font-weight: 800; text-transform: uppercase; margin-top: 2px; }

        /* ── SYSTEM MATRIX CONTROL OVERLAYS ── */
        #right-console-stack {
            position: absolute; top: 24px; right: 24px; z-index: 100; display: flex; flex-direction: column; gap: 10px;
        }
        .glass-panel-btn {
            background: var(--hud-bg); backdrop-filter: var(--glass-blur); -webkit-backdrop-filter: var(--glass-blur); border: 1px solid var(--border-line); width: 50px; height: 50px; border-radius: 16px; color: var(--text-primary); cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.2s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .glass-panel-btn:hover { background: rgba(255,255,255,0.08); border-color: rgba(255,255,255,0.2); transform: scale(1.04); }
        .glass-panel-btn.active { border-color: var(--neon-red); color: var(--neon-red); box-shadow: 0 0 15px var(--neon-red-glow); }

        #spatial-overlay { position: absolute; bottom: 24px; right: 24px; background: var(--hud-bg); backdrop-filter: blur(10px); padding: 10px 16px; border-radius: 12px; border: 1px solid var(--border-line); font-family: monospace; font-size: 0.78rem; font-weight: 600; color: var(--text-secondary); z-index: 5; }

        /* Hardware Render Node Pin Markers */
        .custom-dest-marker { width: 20px; height: 20px; background-color: #ffffff; border: 5px solid var(--neon-red); border-radius: 50%; box-shadow: 0 0 25px var(--neon-red); }

        @media(max-width: 480px) {
            #command-deck, #active-nav-hud { width: 100%; left: 0; right: 0; }
            #command-deck { 
                bottom: 0; 
                top: auto; 
                height: 50vh;
                max-height: 88vh; 
                border-radius: 28px 28px 0 0;
                box-shadow: 0 -15px 40px rgba(0,0,0,0.6);
                padding: 20px;
            }
            #active-nav-hud { top: 12px; padding: 0 12px; }
            #speed-chip { bottom: calc(50vh + 16px); right: 16px; left: auto; }
        }
    </style>
</head>
<body>

    <div id="app-viewport">
        <!-- Core WebGL Projection Field -->
        <div id="map"></div>

        <!-- System Orchestration Sheet -->
        <div id="command-deck">
            <div class="drag-handle-zone" id="drag-handle"><div class="drag-handle-bar"></div></div>
            <div class="deck-header">
                <div class="brand-logo">GeoPro Quantum</div>
            </div>

            <!-- Profile Matrix Controls -->
            <div class="mode-selector-row" id="mode-selector">
                <button class="mode-btn active" data-mode="driving-traffic">
                    <svg width="18" height="18" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path d="M5 17h14M5 17a2 2 0 1 0 4 0M15 17a2 2 0 1 0 4 0M5 17l1-6 2-3h8l2 3 1 6M6 11h12"/></svg>
                    Drive
                </button>
                <button class="mode-btn" data-mode="cycling">
                    <svg width="18" height="18" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><circle cx="6" cy="17" r="3"/><circle cx="18" cy="17" r="3"/><path d="M6 17l4-9h4l4 9"/></svg>
                    Transit
                </button>
                <button class="mode-btn" data-mode="walking">
                    <svg width="18" height="18" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><circle cx="13" cy="4" r="1.6"/><path d="M10 22l2-7 2 2 3 5"/></svg>
                    Pedestrian
                </button>
            </div>

            <!-- Geocoding Network Hook -->
            <div class="search-container-box">
                <div id="geocoder-mount"></div>
            </div>

            <!-- Quick Macro Discovery Nodes -->
            <div class="category-chips-row">
                <button class="category-search-pill" data-query="Charging Stations">⚡ Power Stations</button>
                <button class="category-search-pill" data-query="Food">🍔 Provisions</button>
                <button class="category-search-pill" data-query="Coffee">☕ Fuel/Coffee</button>
            </div>

            <!-- Destination Vector Information -->
            <div id="destination-card">
                <div class="dest-title" id="card-title">Target Node</div>
                <div class="dest-address" id="card-address">Scanning positional coordinates...</div>
                <div id="spatial-profile-box"></div>
                <div class="route-alt-row" id="route-alt-row"></div>
                <div class="nav-action-row">
                    <button class="nav-btn" id="launch-nav-trigger">Initialize Guidance</button>
                    <button class="clear-route-btn" id="clear-route-trigger">✖</button>
                </div>
            </div>

            <!-- Network Diagnostic Telemetry -->
            <div class="telemetry-grid">
                <div class="matrix-row">
                    <span>Routing Core</span>
                    <span id="traffic-status" style="color: var(--traffic-green);">ONLINE [OPTIMAL]</span>
                </div>
                <div class="matrix-row">
                    <span>GPS Telemetry</span>
                    <span id="telemetry-feed" style="color: var(--neon-red);">ACQUIRING POSITION...</span>
                </div>
            </div>
        </div>

        <!-- Active Guidance HUD Overlay -->
        <div id="active-nav-hud">
            <div class="nav-instruction-card">
                <div class="nav-instruction-body">
                    <div class="nav-instruction-dist" id="nav-instruction-dist">--</div>
                    <div class="nav-instruction-text" id="nav-instruction-text">Calculating optimal trace vectors...</div>
                </div>
            </div>
            <div class="nav-bottom-bar">
                <div class="nav-bottom-stat"><span class="val" id="nav-eta-val">--:--</span><span class="lbl">ETA</span></div>
                <div class="nav-bottom-stat"><span class="val" id="nav-time-left">--</span><span class="lbl">Remaining</span></div>
                <div class="nav-bottom-stat"><span class="val" id="nav-dist-left">--</span><span class="lbl">Range</span></div>
                <button class="nav-end-btn" id="nav-end-trigger">Abort</button>
            </div>
        </div>

        <!-- Velocimeter Node -->
        <div id="speed-chip"><span class="speed-val" id="speed-val">0</span><span class="speed-unit">MPH</span></div>

        <!-- Global Layer Control Deck Matrix -->
        <div id="right-console-stack">
            <button class="glass-panel-btn" id="recenter-gps" title="Force Recenter Matrix">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="3"/></svg>
            </button>
            <button class="glass-panel-btn" id="toggle-satellite" title="Satellite Raster Hook">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><line x1="9" y1="3" x2="9" y2="21"/></svg>
            </button>
            <button class="glass-panel-btn" id="toggle-3d" title="Structural 3D Projection Engine">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M3 8l9-5 9 5-9 5-9-5z"/><path d="M3 8v8l9 5 9-5V8"/></svg>
            </button>
        </div>

        <!-- Live Vector Track Display Overlay -->
        <div id="spatial-overlay">LNG: -- | LAT: --</div>
    </div>

    <script>
        mapboxgl.accessToken = 'pk.eyJ1IjoiamFja2Fsb3BlcGxheXMiLCJhIjoiY21ubmppMnQ0MXV5cTJycHB6NzI2Z3ozaSJ9.rC3Z3wHDO5qKVLdiA9XlLg';

        const mapStyles = {
            vectorDark: 'mapbox://styles/mapbox/dark-v11',
            satelliteHybrid: 'mapbox://styles/mapbox/satellite-streets-v12'
        };

        let currentOriginCoords = [-123.2078, 39.1502]; 
        let lastKnownCoords = null;
        let selectedDestinationCoords = null;
        let currentTravelMode = 'driving-traffic';
        let routeAlternatives = [];
        let selectedRouteIdx = 0;
        let isNavigating = false;
        let layers3DActive = false;
        let isSatelliteActive = false;
        let geocoderInstance = null;
        
        let mapCenteredOnLiveGPS = false; 
        let userInterruptedTracking = false;
        let hardwareHeading = 0;

        const map = new mapboxgl.Map({
            container: 'map',
            style: mapStyles.vectorDark,
            center: currentOriginCoords,
            zoom: 14,
            pitch: 25,
            bearing: 0,
            antialias: true
        });

        const destMarkerElement = document.createElement('div');
        destMarkerElement.className = 'custom-dest-marker';
        const globalDestinationMarker = new mapboxgl.Marker(destMarkerElement);

        // Frame-locked WebGL rendering pipeline engine hooks
        map.on('style.load', () => {
            initializeNativeTrackingLayers();
            registerGlobal3DTerrainEngine();
            register3DBuildingsArchitecturalLayer();
            if (selectedDestinationCoords) {
                renderVisualRouteLines();
            }
        });

        map.on('load', () => {
            initializeProximitySearchEngine();
            initializeDraggableConsoleSheet();
            setupInteractiveBuildingQueries();
            hookInterfaceControls();
            initializeLiveGPSHardware();

            map.on('dragstart', () => { userInterruptedTracking = true; });
            map.on('zoomstart', () => { userInterruptedTracking = true; });
            map.on('pitchstart', () => { userInterruptedTracking = true; });
        });

        // Frame-locked GPU native tracking dot compilation pipeline
        function initializeNativeTrackingLayers() {
            if (map.getSource('live-user-source')) return;

            map.addSource('live-user-source', {
                type: 'geojson',
                data: {
                    type: 'Feature',
                    properties: { heading: 0 },
                    geometry: { type: 'Point', coordinates: currentOriginCoords }
                }
            });

            map.addLayer({
                id: 'user-beacon-glow',
                type: 'circle',
                source: 'live-user-source',
                paint: {
                    'circle-radius': ['interpolate', ['linear'], ['zoom'], 10, 16, 18, 32],
                    'circle-color': '#ff1e1e',
                    'circle-opacity': 0.3,
                    'circle-blur': 0.75
                }
            });

            map.addLayer({
                id: 'user-beacon-stroke',
                type: 'circle',
                source: 'live-user-source',
                paint: {
                    'circle-radius': ['interpolate', ['linear'], ['zoom'], 10, 8, 18, 13],
                    'circle-color': '#ffffff'
                }
            });

            map.addLayer({
                id: 'user-beacon-core',
                type: 'circle',
                source: 'live-user-source',
                paint: {
                    'circle-radius': ['interpolate', ['linear'], ['zoom'], 10, 5, 18, 9],
                    'circle-color': '#ff1e1e'
                }
            });
        }

        function syncWebGLTrackingTelemetry() {
            const trackingSource = map.getSource('live-user-source');
            if (trackingSource) {
                trackingSource.setData({
                    type: 'Feature',
                    properties: { heading: hardwareHeading },
                    geometry: { type: 'Point', coordinates: currentOriginCoords }
                });
            }
        }

        function initializeLiveGPSHardware() {
            if (!navigator.geolocation) {
                document.getElementById('telemetry-feed').innerText = "HARDWARE UNSUPPORTED";
                return;
            }

            navigator.geolocation.getCurrentPosition(handleGPSMoveUpdate, null, {
                enableHighAccuracy: false,
                maximumAge: 300000, 
                timeout: 2000
            });

            navigator.geolocation.getCurrentPosition(handleGPSMoveUpdate, handleGPSTrackingError, { enableHighAccuracy: true });
            navigator.geolocation.watchPosition(handleGPSMoveUpdate, handleGPSTrackingError, { enableHighAccuracy: true });
        }

        function calculateMetricGap(coord1, coord2) {
            const R = 6371000; 
            const dLat = (coord2[1] - coord1[1]) * Math.PI / 180;
            const dLon = (coord2[0] - coord1[0]) * Math.PI / 180;
            const a = Math.sin(dLat / 2) * Math.sin(dLat / 2) +
                      Math.cos(coord1[1] * Math.PI / 180) * Math.cos(coord2[1] * Math.PI / 180) *
                      Math.sin(dLon / 2) * Math.sin(dLon / 2);
            return R * (2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a)));
        }

        function handleGPSMoveUpdate(position) {
            currentOriginCoords = [position.coords.longitude, position.coords.latitude];
            syncWebGLTrackingTelemetry();
            
            document.getElementById('telemetry-feed').innerText = "LOCK ACQUIRED";
            document.getElementById('telemetry-feed').style.color = "var(--traffic-green)";
            
            if (position.coords.speed !== null && position.coords.speed !== undefined && position.coords.speed >= 0) {
                const mph = Math.round(position.coords.speed * 2.23694);
                document.getElementById('speed-val').innerText = mph;
            }

            let userHeading = position.coords.heading;
            if ((userHeading === null || userHeading === undefined || isNaN(userHeading)) && lastKnownCoords) {
                const dLon = (currentOriginCoords[0] - lastKnownCoords[0]) * Math.PI / 180;
                const lat1 = lastKnownCoords[1] * Math.PI / 180;
                const lat2 = currentOriginCoords[1] * Math.PI / 180;
                const y = Math.sin(dLon) * Math.cos(lat2);
                const x = Math.cos(lat1) * Math.sin(lat2) - Math.sin(lat1) * Math.cos(lat2) * Math.cos(dLon);
                userHeading = (Math.atan2(y, x) * 180 / Math.PI + 360) % 360;
            }

            if (userHeading !== null && userHeading !== undefined && !isNaN(userHeading)) {
                hardwareHeading = userHeading;
                syncWebGLTrackingTelemetry();
                if (isNavigating && !userInterruptedTracking) {
                    map.easeTo({ bearing: userHeading, duration: 250 });
                }
            }

            updateSearchProximityBias();

            if (isNavigating && routeAlternatives[selectedRouteIdx]) {
                const traceSegments = routeAlternatives[selectedRouteIdx].geometry.coordinates;
                let minimumDeviationMeters = Infinity;
                for (let i = 0; i < traceSegments.length; i++) {
                    const deviation = calculateMetricGap(currentOriginCoords, traceSegments[i]);
                    if (deviation < minimumDeviationMeters) minimumDeviationMeters = deviation;
                }
                if (minimumDeviationMeters > 40) calculateNavigationVectors();
            }

            if (!mapCenteredOnLiveGPS || (isNavigating && !userInterruptedTracking)) {
                map.flyTo({ center: currentOriginCoords, zoom: isNavigating ? 17.5 : 14.5, essential: true });
                mapCenteredOnLiveGPS = true;
            }

            lastKnownCoords = [...currentOriginCoords];
        }

        function handleGPSTrackingError(err) {
            console.warn(`Hardware telemetry exception: ${err.message}`);
            if(!mapCenteredOnLiveGPS) {
                document.getElementById('telemetry-feed').innerText = "HARDWARE OFFLINE";
                document.getElementById('telemetry-feed').style.color = "var(--neon-red)";
            }
        }

        function registerGlobal3DTerrainEngine() {
            if (isSatelliteActive) {
                if (!map.getSource('mapbox-dem')) {
                    map.addSource('mapbox-dem', {
                        'type': 'raster-dem',
                        'url': 'mapbox://mapbox.mapbox-terrain-dem-v1',
                        'tileSize': 512
                    });
                }
                map.setTerrain({ 'source': 'mapbox-dem', 'exaggeration': 1.3 });
            } else {
                map.setTerrain(null);
            }
        }

        function register3DBuildingsArchitecturalLayer() {
            if (map.getLayer('3d-buildings')) return;

            map.addLayer({
                id: '3d-buildings',
                source: 'composite',
                'source-layer': 'building',
                filter: ['==', 'extrude', 'true'],
                type: 'fill-extrusion',
                minzoom: 13,
                paint: {
                    'fill-extrusion-color': isSatelliteActive ? '#ffffff' : '#1e1e24',
                    'fill-extrusion-height': ['get', 'height'],
                    'fill-extrusion-base': ['get', 'min_height'],
                    'fill-extrusion-opacity': layers3DActive ? (isSatelliteActive ? 0.5 : 0.85) : 0.0
                }
            });
        }

        function initializeProximitySearchEngine() {
            const script = document.getElementById('search-js');
            const initSearchBox = () => {
                if (typeof mapboxsearch === 'undefined' || !mapboxsearch.MapboxSearchBox) {
                    setTimeout(initSearchBox, 50);
                    return;
                }
                const container = document.getElementById('geocoder-mount');
                if (!container) return;
                container.innerHTML = ''; 
                
                geocoderInstance = new mapboxsearch.MapboxSearchBox();
                geocoderInstance.accessToken = mapboxgl.accessToken;
                geocoderInstance.options = { types: 'address,poi,neighborhood', proximity: currentOriginCoords };
                geocoderInstance.mapboxgl = mapboxgl;
                geocoderInstance.marker = false; 
                container.appendChild(geocoderInstance);
                
                geocoderInstance.addEventListener('retrieve', (e) => {
                    let feature = null;
                    if (e.detail && e.detail.features && e.detail.features.length > 0) {
                        feature = e.detail.features[0];
                    } else if (e.detail && e.detail.geometry) {
                        feature = e.detail;
                    }
                    if (feature && feature.geometry && feature.geometry.coordinates) {
                        const coords = feature.geometry.coordinates;
                        const name = feature.properties?.name || feature.text || "Target Core Node";
                        const address = feature.properties?.full_address || feature.place_name || "";
                        userInterruptedTracking = true; 
                        map.flyTo({ center: coords, zoom: 15.5, essential: true });
                        loadSpatialDestination(coords, name, address);
                    }
                });
            };
            if (script) { if (typeof mapboxsearch !== 'undefined') { initSearchBox(); } else { script.onload = initSearchBox; } } else { initSearchBox(); }
        }

        function updateSearchProximityBias() {
            if (geocoderInstance && geocoderInstance.options) {
                geocoderInstance.options = { ...geocoderInstance.options, proximity: currentOriginCoords };
            }
        }

        document.querySelectorAll('.category-search-pill').forEach(pill => {
            pill.addEventListener('click', () => {
                const queryTarget = pill.getAttribute('data-query');
                if (geocoderInstance) {
                    geocoderInstance.value = queryTarget;
                    geocoderInstance.focus();
                    if (typeof geocoderInstance.search === 'function') {
                        geocoderInstance.search();
                    } else {
                        const inputEvent = new Event('input', { bubbles: true });
                        const innerInput = geocoderInstance.shadowRoot?.querySelector('input') || geocoderInstance.querySelector('input');
                        if (innerInput) innerInput.dispatchEvent(inputEvent);
                    }
                }
            });
        });

        function setupInteractiveBuildingQueries() {
            map.on('click', (e) => {
                const features = map.queryRenderedFeatures(e.point, { layers: ['3d-buildings', 'poi-label'] });
                const targetCoords = [e.lngLat.lng, e.lngLat.lat];
                let name = "Selected Target Vector";
                let address = `LAT: ${e.lngLat.lat.toFixed(5)} | LNG: ${e.lngLat.lng.toFixed(5)}`;
                
                if (features && features.length > 0) {
                    name = features[0].properties.name || "Structural Entity Pin";
                }
                
                userInterruptedTracking = true;
                map.easeTo({ center: targetCoords, zoom: Math.max(map.getZoom(), 16) });
                loadSpatialDestination(targetCoords, name, address);
            });
        }

        function loadSpatialDestination(coords, title, address) {
            selectedDestinationCoords = coords;
            globalDestinationMarker.setLngLat(coords).addTo(map);

            document.getElementById('card-title').innerText = title;
            document.getElementById('card-address').innerText = address;

            const profileContainer = document.getElementById('spatial-profile-box');
            profileContainer.innerHTML = `
                <div class="spatial-data-grid">
                    <div class="space-row">
                        <span class="space-label">Target Nodes:</span>
                        <span class="space-val">${coords[0].toFixed(5)}, ${coords[1].toFixed(5)}</span>
                    </div>
                </div>
            `;

            document.getElementById('destination-card').style.display = 'flex';
            calculateNavigationVectors();
        }

        async function calculateNavigationVectors() {
            if (!selectedDestinationCoords) return;
            const profileMode = currentTravelMode === 'driving-traffic' ? 'driving' : currentTravelMode;
            const directionsEndpoint = `https://api.mapbox.com/directions/v5/mapbox/${profileMode}/${currentOriginCoords.join(',')};${selectedDestinationCoords.join(',')}?steps=true&geometries=geojson&alternatives=true&access_token=${mapboxgl.accessToken}`;

            try {
                const request = await fetch(directionsEndpoint);
                const payload = await request.json();
                if (payload.code !== 'Ok') return;
                routeAlternatives = payload.routes;
                
                if (selectedRouteIdx >= routeAlternatives.length) selectedRouteIdx = 0;

                renderVisualRouteLines();
                populateAlternativeSelectors();
                
                if (isNavigating) updateActiveHUDLayout(routeAlternatives[selectedRouteIdx]);
            } catch (error) {
                console.error("Critical routing hardware connection error:", error);
            }
        }

        function renderVisualRouteLines() {
            routeAlternatives.forEach((_, index) => {
                if (map.getLayer(`route-line-${index}`)) map.removeLayer(`route-line-${index}`);
                if (map.getSource(`route-source-${index}`)) map.removeSource(`route-source-${index}`);
            });

            routeAlternatives.forEach((route, index) => {
                const isSelected = (index === selectedRouteIdx);
                map.addSource(`route-source-${index}`, {
                    type: 'geojson',
                    data: { type: 'Feature', geometry: route.geometry }
                });

                map.addLayer({
                    id: `route-line-${index}`,
                    type: 'line',
                    source: `route-source-${index}`,
                    layout: { 'line-join': 'round', 'line-cap': 'round' },
                    paint: {
                        'line-color': isSelected ? '#ff1e1e' : '#2c2c35',
                        'line-width': isSelected ? 6 : 4,
                        'line-opacity': isSelected ? 0.95 : 0.4
                    }
                }, map.getLayer('3d-buildings') ? '3d-buildings' : undefined);
            });
        }

        function populateAlternativeSelectors() {
            const row = document.getElementById('route-alt-row');
            row.innerHTML = '';
            routeAlternatives.forEach((route, index) => {
                const minutes = Math.round(route.duration / 60);
                const isSelected = (index === selectedRouteIdx);
                const pill = document.createElement('button');
                pill.className = `route-alt-pill ${isSelected ? 'selected' : ''}`;
                pill.innerHTML = `${minutes} MIN`;
                pill.addEventListener('click', () => {
                    selectedRouteIdx = index;
                    renderVisualRouteLines();
                    populateAlternativeSelectors();
                });
                row.appendChild(pill);
            });
        }

        function updateActiveHUDLayout(route) {
            if (!route) return;
            document.getElementById('nav-instruction-text').innerText = route.legs[0].steps[0]?.maneuver?.instruction || 'Proceed down the highlighted corridor';
            document.getElementById('nav-instruction-dist').innerText = `${Math.round(route.legs[0].steps[0]?.distance || 50)} m`;
            document.getElementById('nav-eta-val').innerText = `${Math.round(route.duration / 60)}m`;
            document.getElementById('nav-time-left').innerText = `${Math.round(route.duration / 60)} min`;
            document.getElementById('nav-dist-left').innerText = `${(route.distance / 1609.34).toFixed(1)} mi`;
        }

        function hookInterfaceControls() {
            document.querySelectorAll('.mode-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
                    e.currentTarget.classList.add('active');
                    currentTravelMode = e.currentTarget.getAttribute('data-mode');
                    calculateNavigationVectors();
                });
            });

            document.getElementById('toggle-3d').addEventListener('click', (e) => {
                layers3DActive = !layers3DActive;
                e.currentTarget.classList.toggle('active', layers3DActive);
                if (map.getLayer('3d-buildings')) {
                    map.setPaintProperty('3d-buildings', 'fill-extrusion-opacity', layers3DActive ? (isSatelliteActive ? 0.5 : 0.85) : 0.0);
                }
            });

            document.getElementById('toggle-satellite').addEventListener('click', (e) => {
                isSatelliteActive = !isSatelliteActive;
                e.currentTarget.classList.toggle('active', isSatelliteActive);
                map.setStyle(isSatelliteActive ? mapStyles.satelliteHybrid : mapStyles.vectorDark);
            });

            document.getElementById('recenter-gps').addEventListener('click', () => {
                userInterruptedTracking = false; 
                map.flyTo({ center: currentOriginCoords, zoom: isNavigating ? 17.5 : 15, pitch: isNavigating ? 55 : 30 });
            });

            document.getElementById('clear-route-trigger').addEventListener('click', clearActiveRouteTrace);
            document.getElementById('launch-nav-trigger').addEventListener('click', toggleNavigationHUD);
            document.getElementById('nav-end-trigger').addEventListener('click', toggleNavigationHUD);
        }

        function clearActiveRouteTrace() {
            routeAlternatives.forEach((_, index) => {
                if (map.getLayer(`route-line-${index}`)) map.removeLayer(`route-line-${index}`);
                if (map.getSource(`route-source-${index}`)) map.removeSource(`route-source-${index}`);
            });
            routeAlternatives = [];
            selectedDestinationCoords = null;
            globalDestinationMarker.remove();
            document.getElementById('destination-card').style.display = 'none';
            if (geocoderInstance) geocoderInstance.value = '';
            map.easeTo({ pitch: 25, bearing: 0 });
        }

        function toggleNavigationHUD() {
            isNavigating = !isNavigating;
            userInterruptedTracking = false; 
            document.getElementById('command-deck').style.display = isNavigating ? 'none' : 'flex';
            document.getElementById('active-nav-hud').style.display = isNavigating ? 'flex' : 'none';
            document.getElementById('speed-chip').style.display = isNavigating ? 'flex' : 'none';
            
            if (isNavigating && routeAlternatives[selectedRouteIdx]) {
                map.easeTo({ center: currentOriginCoords, zoom: 17.5, pitch: 55, duration: 800 });
                updateActiveHUDLayout(routeAlternatives[selectedRouteIdx]);
            } else {
                clearActiveRouteTrace();
            }
        }

        function initializeDraggableConsoleSheet() {
            const deck = document.getElementById('command-deck');
            const handle = document.getElementById('drag-handle');
            let isDragging = false, startY = 0, startHeight = 0, startTransformY = 0;

            handle.addEventListener('pointerdown', (e) => {
                isDragging = true; startY = e.clientY;
                deck.classList.add('is-dragging'); handle.setPointerCapture(e.pointerId);
                const isMobile = window.innerWidth <= 480;
                if (isMobile) { startHeight = deck.offsetHeight; } else {
                    const matrix = new WebKitCSSMatrix(window.getComputedStyle(deck).transform);
                    startTransformY = matrix.m42 || 0;
                }
            });

            window.addEventListener('pointermove', (e) => {
                if (!isDragging) return;
                const deltaY = e.clientY - startY;
                const isMobile = window.innerWidth <= 480;

                if (isMobile) {
                    const targetHeight = startHeight - deltaY;
                    deck.style.height = `${Math.max(120, Math.min(window.innerHeight * 0.88, targetHeight))}px`;
                    deck.style.transform = 'none'; 
                } else {
                    let targetY = startTransformY + deltaY;
                    if (targetY < 0) targetY *= 0.2; 
                    deck.style.transform = `translateY(${targetY}px)`;
                }
            });

            window.addEventListener('pointerup', () => {
                if (!isDragging) return; isDragging = false; deck.classList.remove('is-dragging');
                if (window.innerWidth > 480) {
                    const matrix = new WebKitCSSMatrix(window.getComputedStyle(deck).transform);
                    if ((matrix.m42 || 0) > 200) { deck.style.transform = `translateY(calc(100vh - 140px))`; } 
                    else { deck.style.transform = `translateY(0px)`; }
                }
            });
        }

        map.on('mousemove', (e) => {
            document.getElementById('spatial-overlay').innerText = `LNG: ${e.lngLat.lng.toFixed(5)} | LAT: ${e.lngLat.lat.toFixed(5)}`;
        });
    </script>
