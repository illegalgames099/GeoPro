<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GeoPro Open-Source Tactical Platform</title>

    <!-- Mapbox GL JS Core Engine -->
    <script src="https://api.mapbox.com/mapbox-gl-js/v3.3.0/mapbox-gl.js"></script>
    <link href="https://api.mapbox.com/mapbox-gl-js/v3.3.0/mapbox-gl.css" rel="stylesheet" />

    <style>
        :root {
            --bg-pure: #050507;
            --hud-bg: rgba(10, 10, 14, 0.88);
            --card-surface: rgba(20, 20, 25, 0.65);
            --neon-red: #ff2222;
            --neon-glow: rgba(255, 34, 34, 0.25);
            --border-line: rgba(255, 255, 255, 0.08);
            --text-primary: #ffffff;
            --text-secondary: #9a9a12;
            --text-muted: #6e6e73;
            --traffic-green: #30d158;
        }

        .pure-cyber-dark {
            --bg-pure: #000000;
            --hud-bg: rgba(5, 5, 5, 0.95);
            --card-surface: rgba(10, 10, 12, 0.8);
            --border-line: rgba(255, 34, 34, 0.15);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", Roboto, sans-serif;
            letter-spacing: -0.3px;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: var(--bg-pure);
            color: var(--text-primary);
        }

        #app-viewport {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
        }

        #map {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: var(--bg-pure);
            z-index: 1;
        }

        button { font: inherit; background: none; border: none; cursor: pointer; color: inherit; }

        /* ── HUD COMMAND DECK ── */
        #command-deck {
            position: absolute;
            top: 20px;
            left: 20px;
            width: 400px;
            max-height: calc(100vh - 40px);
            z-index: 10;
            background: var(--hud-bg);
            backdrop-filter: blur(35px) saturate(220%);
            -webkit-backdrop-filter: blur(35px) saturate(220%);
            border: 1px solid var(--border-line);
            border-radius: 28px;
            padding: 24px;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.8), 0 0 50px var(--neon-glow);
            display: flex;
            flex-direction: column;
            gap: 18px;
            overflow-y: auto;
            transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1), opacity 0.3s ease;
        }

        .drag-handle-zone {
            width: 100%;
            padding: 6px 0;
            margin-top: -12px;
            display: flex;
            justify-content: center;
            cursor: grab;
            touch-action: none;
        }
        .drag-handle-zone:active { cursor: grabbing; }
        .drag-handle-bar {
            width: 48px;
            height: 4px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 2px;
        }

        .deck-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .brand-logo {
            font-size: 1.5rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 1.5px;
        }
        .brand-logo span { color: var(--neon-red); text-shadow: 0 0 15px rgba(255,34,34,0.6); }

        .header-utility-tray {
            display: flex;
            gap: 6px;
        }

        .mini-tray-btn {
            background: var(--card-surface);
            border: 1px solid var(--border-line);
            padding: 6px 10px;
            border-radius: 10px;
            font-size: 0.75rem;
            font-weight: 700;
            transition: all 0.2s;
        }
        .mini-tray-btn:hover { border-color: var(--neon-red); }

        /* Sequential Multi-Stop Queue Pipeline */
        .waypoint-manager {
            display: flex;
            flex-direction: column;
            gap: 8px;
            background: rgba(0,0,0,0.25);
            padding: 12px;
            border-radius: 16px;
            border: 1px solid var(--border-line);
        }
        .waypoint-node {
            display: flex;
            align-items: center;
            gap: 10px;
            background: var(--card-surface);
            padding: 10px 14px;
            border-radius: 12px;
            border: 1px solid var(--border-line);
            font-size: 0.85rem;
        }
        .waypoint-badge {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: var(--neon-red);
            font-size: 0.7rem;
            font-weight: 800;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .waypoint-text { flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .waypoint-remove { color: var(--text-muted); font-weight: bold; }
        .waypoint-remove:hover { color: var(--neon-red); }

        /* Travel Mode Selector Matrix */
        .mode-selector-row {
            display: flex;
            gap: 6px;
            background: rgba(0,0,0,0.4);
            padding: 4px;
            border-radius: 16px;
            border: 1px solid var(--border-line);
        }
        .mode-btn {
            flex: 1;
            padding: 12px 6px;
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            font-size: 0.7rem;
            font-weight: 700;
            color: var(--text-muted);
            transition: all 0.25s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .mode-btn svg { stroke: var(--text-muted); fill: none; transition: stroke 0.25s; }
        .mode-btn.active {
            background: rgba(255, 34, 34, 0.15);
            color: var(--neon-red);
            box-shadow: inset 0 0 8px rgba(255,34,34,0.1);
        }
        .mode-btn.active svg { stroke: var(--neon-red); }

        /* ── FULLY FREE OPEN-SOURCE GEOPRO SEARCH ENGINE ── */
        .search-container-box { width: 100%; position: relative; }
        .osm-search-wrapper {
            display: flex;
            background: var(--card-surface);
            border: 1px solid var(--border-line);
            border-radius: 16px;
            padding: 4px;
            align-items: center;
        }
        .osm-search-input {
            flex: 1;
            background: transparent;
            border: none;
            outline: none;
            color: var(--text-primary);
            padding: 10px 14px;
            font-size: 0.9rem;
        }
        .osm-search-input::placeholder { color: var(--text-muted); }
        .osm-search-clear {
            padding: 0 12px;
            color: var(--text-muted);
            font-weight: bold;
            display: none;
        }
        
        /* Free Local Dropdown Suggestions Menu */
        .osm-results-panel {
            position: absolute;
            top: 100%;
            left: 0;
            width: 100%;
            background: #0f0f14;
            border: 1px solid var(--border-line);
            border-radius: 16px;
            margin-top: 8px;
            max-height: 240px;
            overflow-y: auto;
            z-index: 120;
            display: none;
            box-shadow: 0 15px 30px rgba(0,0,0,0.5);
        }
        .osm-result-row {
            padding: 12px 16px;
            font-size: 0.85rem;
            border-bottom: 1px solid rgba(255,255,255,0.03);
            cursor: pointer;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .osm-result-row:hover { background: rgba(255,255,255,0.06); color: var(--neon-red); }

        /* Context Processing Destination Card */
        #destination-card {
            background: linear-gradient(145deg, var(--card-surface), rgba(15,15,20,0.4));
            border: 1px solid var(--border-line);
            border-radius: 20px;
            padding: 20px;
            display: none;
            flex-direction: column;
            gap: 14px;
        }
        .dest-title { font-size: 1.15rem; font-weight: 800; }
        .dest-address { font-size: 0.85rem; color: var(--text-muted); line-height: 1.4; }

        .route-alt-row { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 2px; }
        .route-alt-pill {
            flex-shrink: 0; background: rgba(255,255,255,0.04); border: 1px solid var(--border-line);
            padding: 10px 14px; border-radius: 12px; font-size: 0.75rem; font-weight: 700;
        }
        .route-alt-pill.selected { border-color: var(--neon-red); color: var(--neon-red); background: rgba(255, 34, 34, 0.12); }

        .nav-action-row { display: flex; gap: 10px; }
        .nav-btn {
            flex: 1; background: var(--neon-red); padding: 14px;
            border-radius: 14px; font-size: 0.9rem; font-weight: 700; display: flex; align-items: center; justify-content: center; gap: 8px;
            box-shadow: 0 8px 24px rgba(255, 34, 34, 0.35);
        }
        .add-stop-btn {
            background: rgba(255,255,255,0.06); border: 1px solid var(--border-line); padding: 14px; border-radius: 14px; font-size: 0.85rem; font-weight: 600;
        }
        .add-stop-btn:hover { background: rgba(255,255,255,0.1); }
        .clear-route-btn { background: rgba(255,255,255,0.05); border: 1px solid var(--border-line); width: 52px; border-radius: 14px; display: flex; align-items: center; justify-content: center; }

        /* Hardware Matrix Logs */
        .telemetry-grid {
            display: flex;
            flex-direction: column;
            gap: 6px;
            background: rgba(0,0,0,0.3);
            padding: 14px;
            border-radius: 18px;
            border: 1px solid var(--border-line);
            font-family: monospace;
            font-size: 0.75rem;
        }
        .matrix-row { display: flex; justify-content: space-between; }
        .matrix-row span:first-child { color: var(--text-muted); }

        /* Tactical Navigation Instrument HUD Overlay */
        #active-nav-hud {
            display: none; position: absolute; top: 20px; left: 20px; width: 400px; z-index: 15; flex-direction: column; gap: 12px;
        }
        .nav-instruction-card { background: linear-gradient(165deg, rgba(255,34,34,0.22), rgba(10,10,14,0.95)); backdrop-filter: blur(40px); border: 1px solid rgba(255,255,255,0.12); border-radius: 24px; padding: 24px; display: flex; align-items: center; gap: 20px; box-shadow: 0 20px 50px rgba(0,0,0,0.6); }
        .nav-instruction-body { flex: 1; }
        .nav-instruction-dist { font-size: 1.8rem; font-weight: 900; letter-spacing: -0.5px; }
        .nav-instruction-text { font-size: 0.95rem; rgba(255,255,255,0.9); font-weight: 600; margin-top: 2px; }
        .nav-bottom-bar { background: var(--hud-bg); backdrop-filter: blur(40px); border: 1px solid var(--border-line); border-radius: 22px; padding: 18px 20px; display: flex; align-items: center; justify-content: space-between; }
        .nav-bottom-stat { display: flex; flex-direction: column; }
        .nav-bottom-stat .val { font-size: 1.2rem; font-weight: 900; }
        .nav-bottom-stat .lbl { font-size: 0.65rem; color: var(--text-muted); text-transform: uppercase; font-weight: 700; margin-top: 2px; }
        .nav-end-btn { background: #2c2c35; border: 1px solid var(--border-line); padding: 12px 20px; border-radius: 14px; font-weight: 700; }

        /* Speedometer Module */
        #speed-chip {
            display: none; position: absolute; bottom: 30px; left: 30px; z-index: 15; width: 90px; height: 90px; border-radius: 50%; background: #08080c; border: 4px solid var(--neon-red); flex-direction: column; align-items: center; justify-content: center;
            box-shadow: 0 0 25px var(--neon-glow);
        }
        #speed-chip .speed-val { font-size: 1.8rem; font-weight: 900; line-height: 1; }
        #speed-chip .speed-unit { font-size: 0.6rem; color: var(--text-muted); font-weight: 800; margin-top: 2px; }

        /* Control Utilities Deck Array */
        #right-console-stack {
            position: absolute; top: 20px; right: 20px; z-index: 100; display: flex; flex-direction: column; gap: 12px;
        }
        .glass-panel-btn {
            background: var(--hud-bg); backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px); border: 1px solid var(--border-line); width: 50px; height: 50px; border-radius: 16px; display: flex; align-items: center; justify-content: center; transition: all 0.2s cubic-bezier(0.16, 1, 0.3, 1);
            font-size: 1.25rem;
        }
        .glass-panel-btn:hover { background: rgba(255,255,255,0.08); transform: scale(1.05); }
        .glass-panel-btn.active { border-color: var(--neon-red); color: var(--neon-red); box-shadow: 0 0 15px var(--neon-glow); }

        #spatial-overlay { position: absolute; bottom: 25px; right: 25px; background: var(--hud-bg); backdrop-filter: blur(15px); padding: 10px 16px; border-radius: 12px; border: 1px solid var(--border-line); font-family: monospace; font-size: 0.75rem; z-index: 5; }

        /* Dynamic Visual Radar Ring */
        @keyframes radarPulse {
            0% { transform: scale(1); opacity: 0.7; }
            100% { transform: scale(3.5); opacity: 0; }
        }
        .radar-pulse-ring {
            position: absolute; width: 100px; height: 100px; border: 2px solid var(--neon-red); border-radius: 50%; pointer-events: none; z-index: 2; display: none; transform-origin: center; animation: radarPulse 1.8s cubic-bezier(0.1, 0.8, 0.3, 1) infinite;
        }

        @media(max-width: 480px) {
            #command-deck, #active-nav-hud { width: calc(100% - 30px); left: 15px; right: 15px; }
            #command-deck { bottom: 15px; top: auto; height: 50vh; max-height: 85vh; border-radius: 28px; }
        }
    </style>
</head>
<body class="">

    <div id="app-viewport">
        <div id="map"></div>
        <div id="radar-glow" class="radar-pulse-ring"></div>

        <!-- System Architecture Command Deck -->
        <div id="command-deck">
            <div class="drag-handle-zone" id="drag-handle"><div class="drag-handle-bar"></div></div>
            <div class="deck-header">
                <div class="brand-logo">Geo<span>Pro</span></div>
                <div class="header-utility-tray">
                    <button class="mini-tray-btn" id="toggle-night-mode" title="Toggle Pure Cyber Night Mode">🕶️</button>
                    <button class="mini-tray-btn" id="export-telemetry" title="Save Telemetry Log Snapshot">💾</button>
                </div>
            </div>

            <!-- Sequential Multi-Stop Queue Pipeline -->
            <div class="waypoint-manager" id="waypoint-box" style="display: none;"></div>

            <!-- Engineering Travel Selection Matrix -->
            <div class="mode-selector-row" id="mode-selector">
                <button class="mode-btn active" data-mode="driving-traffic">
                    <svg width="18" height="18" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M5 17h14M5 17a2 2 0 1 0 4 0M15 17a2 2 0 1 0 4 0M5 17l1-6 2-3h8l2 3 1 6M6 11h12"/></svg>
                    Drive
                </button>
                <button class="mode-btn" data-mode="cycling">
                    <svg width="18" height="18" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><circle cx="6" cy="17" r="3"/><circle cx="18" cy="17" r="3"/><path d="M6 17l4-9h4l4 9"/></svg>
                    Bike
                </button>
                <button class="mode-btn" data-mode="walking">
                    <svg width="18" height="18" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><circle cx="13" cy="4" r="1.6"/><path d="M10 22l2-7 2 2 3 5"/></svg>
                    Walk
                </button>
            </div>

            <!-- 100% Free Open-Source Input Engine Panel -->
            <div class="search-container-box">
                <div class="osm-search-wrapper">
                    <input type="text" class="osm-search-input" id="osm-input-field" placeholder="Search coordinates, address, grid node...">
                    <button class="osm-search-clear" id="osm-clear-btn">✖</button>
                </div>
                <div class="osm-results-panel" id="osm-results-dropdown"></div>
            </div>

            <!-- Dynamic Interactive Destination Processing Card -->
            <div id="destination-card">
                <div class="dest-title" id="card-title">Node Selected</div>
                <div class="dest-address" id="card-address">Awaiting sequence instruction...</div>
                <div class="route-alt-row" id="route-alt-row"></div>
                <div class="nav-action-row">
                    <button class="nav-btn" id="launch-nav-trigger">Launch System Nav</button>
                    <button class="add-stop-btn" id="add-waypoint-trigger">+ Add Stop</button>
                    <button class="clear-route-btn" id="clear-route-trigger">✖</button>
                </div>
            </div>

            <!-- Active Avionics System Logs -->
            <div class="telemetry-grid">
                <div class="matrix-row"><span>GEO SUBSYSTEM</span><span id="traffic-status" style="color: var(--traffic-green);">OSM NOMINATIM ENGINE</span></div>
                <div class="matrix-row"><span>HARDWARE ENGINE</span><span id="telemetry-feed" style="color: var(--neon-red);">SYNCHRONIZING BEACON TRACKS...</span></div>
            </div>
        </div>

        <!-- Full Tactical Navigation Instrument HUD Overlay -->
        <div id="active-nav-hud">
            <div class="nav-instruction-card">
                <div class="nav-instruction-body">
                    <div class="nav-instruction-dist" id="nav-instruction-dist">--</div>
                    <div class="nav-instruction-text" id="nav-instruction-text">Routing trajectory trace...</div>
                </div>
            </div>
            <div class="nav-bottom-bar">
                <div class="nav-bottom-stat"><span class="val" id="nav-eta-val">--:--</span><span class="lbl">ETA</span></div>
                <div class="nav-bottom-stat"><span class="val" id="nav-time-left">--</span><span class="lbl">Time</span></div>
                <div class="nav-bottom-stat"><span class="val" id="nav-dist-left">--</span><span class="lbl">Dist</span></div>
                <button class="nav-end-btn" id="nav-end-trigger">Kill Session</button>
            </div>
        </div>

        <!-- Telemetry Data Chips -->
        <div id="speed-chip"><span class="speed-val" id="speed-val">0</span><span class="speed-unit">MPH</span></div>

        <!-- Right Side Utility Console Array Stack -->
        <div id="right-console-stack">
            <button class="glass-panel-btn" id="recenter-gps" title="Force Beacon Re-Center">🎯</button>
            <button class="glass-panel-btn" id="lock-true-north" title="Lock Bearing to True North ($0^\circ$)">🧭</button>
            <button class="glass-panel-btn" id="radar-toggle" title="Radar Spatial Scan">📡</button>
            <button class="glass-panel-btn" id="toggle-satellite" title="Satellite Orbital Feed">🛰️</button>
            <button class="glass-panel-btn" id="toggle-3d" title="3D Volumetric Extrusions">🏙️</button>
        </div>

        <div id="spatial-overlay">X: -- | Y: --</div>
    </div>

    <script>
        // Keep your base map tile rendering token intact
        mapboxgl.accessToken = 'pk.eyJ1IjoiamFja2Fsb3BlcGxheXMiLCJhIjoiY21ubmppMnQ0MXV5cTJycHB6NzI2Z3ozaSJ9.rC3Z3wHDO5qKVLdiA9XlLg';

        const mapStyles = {
            vectorDark: 'mapbox://styles/mapbox/dark-v11',
            satelliteHybrid: 'mapbox://styles/mapbox/satellite-streets-v12'
        };

        let currentOriginCoords = [-123.2078, 39.1502]; 
        let lastKnownCoords = null;
        let selectedDestinationCoords = null;
        let currentTravelMode = 'driving-traffic';
        let routeAlternatives = [];
        let selectedRouteIdx = 0;
        
        let intermediateWaypoints = [];
        let waypointMarkersArray = [];

        let isNavigating = false;
        let layers3DActive = false;
        let isSatelliteActive = false;
        let radarActive = false;
        let mapCenteredOnLiveGPS = false; 
        let userInterruptedTracking = false;
        let hardwareHeading = 0;
        let searchDebounceTimeout = null;

        const map = new mapboxgl.Map({
            container: 'map',
            style: mapStyles.vectorDark,
            center: currentOriginCoords,
            zoom: 14,
            pitch: 30,
            bearing: 0,
            antialias: true
        });

        map.on('style.load', () => {
            initializeNativeTrackingLayers();
            registerGlobal3DTerrainEngine();
            register3DBuildingsArchitecturalLayer();
            if (selectedDestinationCoords || intermediateWaypoints.length > 0) {
                calculateNavigationVectors();
            }
        });

        map.on('load', () => {
            initializeFreeOSMSearchEngine();
            initializeDraggableConsoleSheet();
            setupInteractiveBuildingQueries();
            hookInterfaceControls();
            initializeLiveGPSHardware();

            map.on('dragstart', () => { userInterruptedTracking = true; });
            map.on('zoomstart', () => { userInterruptedTracking = true; });
            map.on('pitchstart', () => { userInterruptedTracking = true; });
        });

        function initializeNativeTrackingLayers() {
            if (map.getSource('live-user-source')) return;

            map.addSource('live-user-source', {
                type: 'geojson',
                data: {
                    type: 'Feature',
                    properties: { heading: 0 },
                    geometry: { type: 'Point', coordinates: currentOriginCoords }
                }
            });

            map.addLayer({
                id: 'user-beacon-glow',
                type: 'circle',
                source: 'live-user-source',
                paint: {
                    'circle-radius': ['interpolate', ['linear'], ['zoom'], 10, 16, 18, 32],
                    'circle-color': '#ff2222',
                    'circle-opacity': 0.3,
                    'circle-blur': 0.7
                }
            });

            map.addLayer({
                id: 'user-beacon-stroke',
                type: 'circle',
                source: 'live-user-source',
                paint: {
                    'circle-radius': ['interpolate', ['linear'], ['zoom'], 10, 8, 18, 14],
                    'circle-color': '#ffffff'
                }
            });

            map.addLayer({
                id: 'user-beacon-core',
                type: 'circle',
                source: 'live-user-source',
                paint: {
                    'circle-radius': ['interpolate', ['linear'], ['zoom'], 10, 5, 18, 10],
                    'circle-color': '#ff2222'
                }
            });
        }

        function syncWebGLTrackingTelemetry() {
            const trackingSource = map.getSource('live-user-source');
            if (trackingSource) {
                trackingSource.setData({
                    type: 'Feature',
                    properties: { heading: hardwareHeading },
                    geometry: { type: 'Point', coordinates: currentOriginCoords }
                });
            }
            if (radarActive) updateRadarScreenProjection();
        }

        function initializeLiveGPSHardware() {
            if (!navigator.geolocation) {
                document.getElementById('telemetry-feed').innerText = "HARDWARE FAULT: NO GPS UNIT";
                return;
            }
            navigator.geolocation.getCurrentPosition(handleGPSMoveUpdate, handleGPSTrackingError, { enableHighAccuracy: true });
            navigator.geolocation.watchPosition(handleGPSMoveUpdate, handleGPSTrackingError, { enableHighAccuracy: true });
        }

        function handleGPSMoveUpdate(position) {
            currentOriginCoords = [position.coords.longitude, position.coords.latitude];
            syncWebGLTrackingTelemetry();
            
            document.getElementById('telemetry-feed').innerText = "SECURE TELEMETRY LOCK LINK [OK]";
            document.getElementById('telemetry-feed').style.color = "var(--traffic-green)";
            
            if (position.coords.speed !== null && position.coords.speed >= 0) {
                document.getElementById('speed-val').innerText = Math.round(position.coords.speed * 2.23694);
            }

            if (!mapCenteredOnLiveGPS || (isNavigating && !userInterruptedTracking)) {
                map.flyTo({ center: currentOriginCoords, zoom: isNavigating ? 17.5 : 14.5, essential: true });
                mapCenteredOnLiveGPS = true;
            }
            lastKnownCoords = [...currentOriginCoords];
        }

        function handleGPSTrackingError(err) {
            console.warn(`Telemetry core exception drop: ${err.message}`);
        }

        /* ── COMPLETELY FREE OPEN STREET MAP NOMINATIM EXECUTION LOOP ── */
        function initializeFreeOSMSearchEngine() {
            const inputField = document.getElementById('osm-input-field');
            const clearBtn = document.getElementById('osm-clear-btn');
            const dropdown = document.getElementById('osm-results-dropdown');

            inputField.addEventListener('input', (e) => {
                const searchString = e.target.value.trim();
                clearBtn.style.display = searchString.length > 0 ? 'block' : 'none';
                
                clearTimeout(searchDebounceTimeout);
                if (searchString.length < 3) {
                    dropdown.style.display = 'none';
                    return;
                }

                // Debounce queries to prevent hitting lookup thresholds
                searchDebounceTimeout = setTimeout(() => {
                    executeOSMNominatimLookup(searchString);
                }, 350);
            });

            clearBtn.addEventListener('click', () => {
                inputField.value = '';
                clearBtn.style.display = 'none';
                dropdown.style.display = 'none';
            });

            // Close results container on outer click
            document.addEventListener('click', (e) => {
                if (!e.target.closest('.search-container-box')) {
                    dropdown.style.display = 'none';
                }
            });
        }

        async function executeOSMNominatimLookup(queryString) {
            const dropdown = document.getElementById('osm-results-dropdown');
            // Inject user proximity metrics directly into query vectors to bias regional node lookup results
            const endpoint = `https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(queryString)}&viewbox=${currentOriginCoords[0]-0.5},${currentOriginCoords[1]+0.5},${currentOriginCoords[0]+0.5},${currentOriginCoords[1]-0.5}&bounded=0&limit=6`;

            try {
                const response = await fetch(endpoint, {
                    headers: { 'User-Agent': 'GeoProTacticalNavigationEngine/1.0' }
                });
                const matches = await response.json();
                
                if (!matches || matches.length === 0) {
                    dropdown.innerHTML = `<div class="osm-result-row" style="color:var(--text-muted); cursor:default;">No records matching trace vector</div>`;
                    dropdown.style.display = 'block';
                    return;
                }

                dropdown.innerHTML = '';
                matches.forEach(item => {
                    const row = document.createElement('div');
                    row.className = 'osm-result-row';
                    row.innerText = item.display_name;
                    row.addEventListener('click', () => {
                        const targetLon = parseFloat(item.lon);
                        const targetLat = parseFloat(item.lat);
                        const cleanName = item.name || "Target Vector Node";
                        
                        dropdown.style.display = 'none';
                        document.getElementById('osm-input-field').value = item.display_name;
                        userInterruptedTracking = true;
                        
                        map.flyTo({ center: [targetLon, targetLat], zoom: 15.5 });
                        loadSpatialDestination([targetLon, targetLat], cleanName, item.display_name);
                    });
                    dropdown.appendChild(row);
                });
                dropdown.style.display = 'block';
            } catch (err) {
                console.error("OSM Spatial lookup framework exception:", err);
            }
        }

        function registerGlobal3DTerrainEngine() {
            if (isSatelliteActive) {
                if (!map.getSource('mapbox-dem')) {
                    map.addSource('mapbox-dem', {
                        'type': 'raster-dem',
                        'url': 'mapbox://mapbox.mapbox-terrain-dem-v1',
                        'tileSize': 512
                    });
                }
                map.setTerrain({ 'source': 'mapbox-dem', 'exaggeration': 1.3 });
            } else {
                map.setTerrain(null);
            }
        }

        function register3DBuildingsArchitecturalLayer() {
            if (map.getLayer('3d-buildings')) return;
            map.addLayer({
                id: '3d-buildings',
                source: 'composite',
                'source-layer': 'building',
                filter: ['==', 'extrude', 'true'],
                type: 'fill-extrusion',
                minzoom: 13,
                paint: {
                    'fill-extrusion-color': isSatelliteActive ? '#ffffff' : '#1e1e24',
                    'fill-extrusion-height': ['get', 'height'],
                    'fill-extrusion-base': ['get', 'min_height'],
                    'fill-extrusion-opacity': layers3DActive ? 0.85 : 0.0
                }
            });
        }

        function setupInteractiveBuildingQueries() {
            map.on('click', (e) => {
                const features = map.queryRenderedFeatures(e.point, { layers: ['3d-buildings'] });
                const targetCoords = [e.lngLat.lng, e.lngLat.lat];
                let name = features.length > 0 ? "Target Structural Entity" : "Selected Grid Coordinates";
                let address = `LAT: ${e.lngLat.lat.toFixed(5)} | LNG: ${e.lngLat.lng.toFixed(5)}`;
                userInterruptedTracking = true;
                loadSpatialDestination(targetCoords, name, address);
            });
        }

        function loadSpatialDestination(coords, title, address) {
            selectedDestinationCoords = coords;
            document.getElementById('card-title').innerText = title;
            document.getElementById('card-address').innerText = address;
            document.getElementById('destination-card').style.display = 'flex';
            calculateNavigationVectors();
        }

        function appendCurrentNodeToSequenceStack() {
            if (!selectedDestinationCoords) return;
            
            const nodeLabel = document.getElementById('card-title').innerText;
            intermediateWaypoints.push({
                coords: [...selectedDestinationCoords],
                label: nodeLabel
            });

            const markerEl = document.createElement('div');
            markerEl.style.width = '14px';
            markerEl.style.height = '14px';
            markerEl.style.backgroundColor = '#ffffff';
            markerEl.style.border = '3px solid #ff2222';
            markerEl.style.borderRadius = '50%';
            markerEl.style.boxShadow = '0 0 12px var(--neon-red)';
            
            const marker = new mapboxgl.Marker(markerEl)
                .setLngLat(selectedDestinationCoords)
                .addTo(map);
                
            waypointMarkersArray.push(marker);
            updateWaypointQueueUI();
            
            selectedDestinationCoords = null;
            document.getElementById('destination-card').style.display = 'none';
            document.getElementById('osm-input-field').value = '';
            document.getElementById('osm-clear-btn').style.display = 'none';
            
            calculateNavigationVectors();
        }

        function updateWaypointQueueUI() {
            const box = document.getElementById('waypoint-box');
            if (intermediateWaypoints.length === 0) {
                box.style.display = 'none';
                return;
            }
            box.style.display = 'flex';
            box.innerHTML = '';
            intermediateWaypoints.forEach((wp, idx) => {
                const item = document.createElement('div');
                item.className = 'waypoint-node';
                item.innerHTML = `
                    <div class="waypoint-badge">${idx + 1}</div>
                    <div class="waypoint-text">${wp.label}</div>
                    <button class="waypoint-remove" onclick="event.stopPropagation(); removeSequenceNodeIndex(${idx})">✖</button>
                `;
                box.appendChild(item);
            });
        }

        window.removeSequenceNodeIndex = function(index) {
            if(waypointMarkersArray[index]) waypointMarkersArray[index].remove();
            waypointMarkersArray.splice(index, 1);
            intermediateWaypoints.splice(index, 1);
            updateWaypointQueueUI();
            calculateNavigationVectors();
        };

        async function calculateNavigationVectors() {
            let coordinateSequenceString = currentOriginCoords.join(',');
            
            if (intermediateWaypoints.length > 0) {
                coordinateSequenceString += ';' + intermediateWaypoints.map(wp => wp.coords.join(',')).join(';');
            }
            if (selectedDestinationCoords) {
                coordinateSequenceString += ';' + selectedDestinationCoords.join(',');
            } else if (intermediateWaypoints.length === 0) {
                clearActiveRouteTrace();
                return;
            }

            const profileMode = currentTravelMode === 'driving-traffic' ? 'driving' : currentTravelMode;
            const endpoint = `https://api.mapbox.com/directions/v5/mapbox/${profileMode}/${coordinateSequenceString}?steps=true&geometries=geojson&alternatives=true&access_token=${mapboxgl.accessToken}`;

            try {
                const response = await fetch(endpoint);
                const payload = await response.json();
                if (payload.code !== 'Ok') return;
                routeAlternatives = payload.routes;
                renderVisualRouteLines();
                populateAlternativeSelectors();
                
                if (isNavigating) updateActiveHUDLayout(routeAlternatives[selectedRouteIdx]);
            } catch (err) {
                console.error("Critical directions sequence fault:", err);
            }
        }

        function renderVisualRouteLines() {
            for (let i = 0; i < 5; i++) {
                if (map.getLayer(`route-line-${i}`)) map.removeLayer(`route-line-${i}`);
                if (map.getSource(`route-source-${i}`)) map.removeSource(`route-source-${i}`);
            }

            routeAlternatives.forEach((route, index) => {
                if (index > 2) return; 
                const isSelected = (index === selectedRouteIdx);
                map.addSource(`route-source-${index}`, {
                    type: 'geojson',
                    data: { type: 'Feature', geometry: route.geometry }
                });

                map.addLayer({
                    id: `route-line-${index}`,
                    type: 'line',
                    source: `route-source-${index}`,
                    layout: { 'line-join': 'round', 'line-cap': 'round' },
                    paint: {
                        'line-color': isSelected ? '#ff2222' : '#2d2d38',
                        'line-width': isSelected ? 7 : 4,
                        'line-opacity': isSelected ? 0.95 : 0.4
                    }
                }, map.getLayer('3d-buildings') ? '3d-buildings' : undefined);
            });
        }

        function populateAlternativeSelectors() {
            const row = document.getElementById('route-alt-row');
            if(!row) return;
            row.innerHTML = '';
            routeAlternatives.forEach((route, index) => {
                if (index > 2) return;
                const isSelected = (index === selectedRouteIdx);
                const pill = document.createElement('button');
                pill.className = `route-alt-pill ${isSelected ? 'selected' : ''}`;
                pill.innerHTML = `${Math.round(route.duration / 60)} MIN`;
                pill.addEventListener('click', () => {
                    selectedRouteIdx = index;
                    renderVisualRouteLines();
                    populateAlternativeSelectors();
                });
                row.appendChild(pill);
            });
        }

        function updateActiveHUDLayout(route) {
            if (!route) return;
            document.getElementById('nav-instruction-text').innerText = route.legs[0]?.steps[0]?.maneuver?.instruction || 'Proceed safely along the path trajectory';
            document.getElementById('nav-instruction-dist').innerText = `${Math.round(route.legs[0]?.steps[0]?.distance || 100)} m`;
            document.getElementById('nav-eta-val').innerText = `${Math.round(route.duration / 60)}m`;
            document.getElementById('nav-time-left').innerText = `${Math.round(route.duration / 60)} min`;
            document.getElementById('nav-dist-left').innerText = `${(route.distance / 1609.34).toFixed(1)} mi`;
        }

        function updateRadarScreenProjection() {
            const screenCoords = map.project(currentOriginCoords);
            const radar = document.getElementById('radar-glow');
            radar.style.left = `${screenCoords.x - 50}px`;
            radar.style.top = `${screenCoords.y - 50}px`;
        }

        function exportTelemetryMetricsSnapshot() {
            const logsData = {
                timestamp: new Date().toISOString(),
                liveLocation: currentOriginCoords,
                activeSequenceNodes: intermediateWaypoints,
                computedRouteTracksCount: routeAlternatives.length
            };
            const dataBlob = new Blob([JSON.stringify(logsData, null, 2)], { type: 'application/json' });
            const temporaryAnchorElement = document.createElement('a');
            temporaryAnchorElement.href = URL.createObjectURL(dataBlob);
            temporaryAnchorElement.download = `geopro_telemetry_snapshot_${Math.floor(Date.now()/1000)}.json`;
            temporaryAnchorElement.click();
        }

        function hookInterfaceControls() {
            document.getElementById('add-waypoint-trigger').addEventListener('click', appendCurrentNodeToSequenceStack);

            document.querySelectorAll('.mode-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
                    e.currentTarget.classList.add('active');
                    currentTravelMode = e.currentTarget.getAttribute('data-mode');
                    calculateNavigationVectors();
                });
            });

            document.getElementById('toggle-night-mode').addEventListener('click', () => {
                document.body.classList.toggle('pure-cyber-dark');
            });

            document.getElementById('export-telemetry').addEventListener('click', exportTelemetryMetricsSnapshot);

            document.getElementById('lock-true-north').addEventListener('click', () => {
                map.easeTo({ bearing: 0, pitch: 30, duration: 500 });
            });

            document.getElementById('radar-toggle').addEventListener('click', (e) => {
                radarActive = !radarActive;
                e.currentTarget.classList.toggle('active', radarActive);
                document.getElementById('radar-glow').style.display = radarActive ? 'block' : 'none';
                if (radarActive) updateRadarScreenProjection();
            });

            document.getElementById('toggle-3d').addEventListener('click', (e) => {
                layers3DActive = !layers3DActive;
                e.currentTarget.classList.toggle('active', layers3DActive);
                if (map.getLayer('3d-buildings')) {
                    map.setPaintProperty('3d-buildings', 'fill-extrusion-opacity', layers3DActive ? 0.85 : 0.0);
                }
            });

            document.getElementById('toggle-satellite').addEventListener('click', (e) => {
                isSatelliteActive = !isSatelliteActive;
                e.currentTarget.classList.toggle('active', isSatelliteActive);
                map.setStyle(isSatelliteActive ? mapStyles.satelliteHybrid : mapStyles.vectorDark);
            });

            document.getElementById('recenter-gps').addEventListener('click', () => {
                userInterruptedTracking = false; 
                map.flyTo({ center: currentOriginCoords, zoom: isNavigating ? 18 : 15, pitch: isNavigating ? 55 : 30 });
            });

            document.getElementById('clear-route-trigger').addEventListener('click', clearActiveRouteTrace);
            document.getElementById('launch-nav-trigger').addEventListener('click', toggleNavigationHUD);
            document.getElementById('nav-end-trigger').addEventListener('click', toggleNavigationHUD);
        }

        function clearActiveRouteTrace() {
            waypointMarkersArray.forEach(m => m.remove());
            waypointMarkersArray = [];
            intermediateWaypoints = [];
            updateWaypointQueueUI();

            for (let i = 0; i < 5; i++) {
                if (map.getLayer(`route-line-${i}`)) map.removeLayer(`route-line-${i}`);
                if (map.getSource(`route-source-${i}`)) map.removeSource(`route-source-${i}`);
            }
            routeAlternatives = [];
            selectedDestinationCoords = null;
            document.getElementById('destination-card').style.display = 'none';
            document.getElementById('osm-input-field').value = '';
            document.getElementById('osm-clear-btn').style.display = 'none';
            map.easeTo({ pitch: 30, bearing: 0 });
        }

        function toggleNavigationHUD() {
            isNavigating = !isNavigating;
            userInterruptedTracking = false; 
            document.getElementById('command-deck').style.display = isNavigating ? 'none' : 'flex';
            document.getElementById('active-nav-hud').style.display = isNavigating ? 'flex' : 'none';
            document.getElementById('speed-chip').style.display = isNavigating ? 'flex' : 'none';
            
            if (isNavigating && routeAlternatives[selectedRouteIdx]) {
                map.easeTo({ center: currentOriginCoords, zoom: 18, pitch: 55, duration: 800 });
                updateActiveHUDLayout(routeAlternatives[selectedRouteIdx]);
            } else {
                clearActiveRouteTrace();
            }
        }

        function initializeDraggableConsoleSheet() {
            const deck = document.getElementById('command-deck');
            const handle = document.getElementById('drag-handle');
            let isDragging = false, startY = 0, startHeight = 0;

            handle.addEventListener('pointerdown', (e) => {
                isDragging = true; startY = e.clientY;
                handle.setPointerCapture(e.pointerId);
                if (window.innerWidth <= 480) startHeight = deck.offsetHeight;
            });

            window.addEventListener('pointermove', (e) => {
                if (!isDragging || window.innerWidth > 480) return;
                const deltaY = e.clientY - startY;
                deck.style.height = `${Math.max(140, Math.min(window.innerHeight * 0.85, startHeight - deltaY))}px`;
            });

            window.addEventListener('pointerup', () => { isDragging = false; });
        }

        map.on('move', () => { if (radarActive) updateRadarScreenProjection(); });
        map.on('mousemove', (e) => {
            document.getElementById('spatial-overlay').innerText = `X: ${e.lngLat.lng.toFixed(5)} | Y: ${e.lngLat.lat.toFixed(5)}`;
        });
    </script>
</body>
