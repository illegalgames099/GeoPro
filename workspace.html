<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GeoPro - Advanced Search & Map Platform</title>
    
    <!-- Mapbox GL JS Styles and Scripts -->
    <link href="https://api.mapbox.com/mapbox-gl-js/v3.10.0/mapbox-gl.css" rel="stylesheet">
    <script src="https://api.mapbox.com/mapbox-gl-js/v3.10.0/mapbox-gl.js"></script>
    
    <!-- Mapbox Search JS Web Component -->
    <script src="https://api.mapbox.com/search-js/v1.5.0/web.js" defer></script>

    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #111;
        }

        .app-container {
            width: 100%;
            height: 100%;
            position: relative;
        }

        /* Fixed absolute rendering path prevents map canvas collapse bugs */
        #map {
            position: absolute;
            top: 0;
            bottom: 0;
            left: 0;
            right: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        /* Floating GeoPro Control Header Block */
        .control-stack {
            position: absolute;
            top: 16px;
            left: 50%;
            transform: translateX(-50%);
            width: 92%;
            max-width: 460px;
            z-index: 10;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        /* Search Input Anchor Tuning */
        #search-box-anchor {
            width: 100%;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.25);
            border-radius: 8px;
            overflow: hidden;
        }

        /* Category Action Buttons Container */
        .category-row {
            display: flex;
            gap: 8px;
            overflow-x: auto;
            padding: 4px 2px;
            scrollbar-width: none;
        }
        .category-row::-webkit-scrollbar {
            display: none;
        }

        .category-pill {
            background: rgba(20, 20, 20, 0.85);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.15);
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 500;
            cursor: pointer;
            white-space: nowrap;
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .category-pill:hover {
            background: #cc0000;
            border-color: #ff3333;
            transform: translateY(-1px);
        }
        .category-pill:active {
            transform: translateY(1px);
        }

        /* Precision Drag Sheet Layout Configuration */
        .bottom-sheet {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: 220px; 
            min-height: 80px;
            max-height: 85vh;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-top: 1px solid rgba(0,0,0,0.1);
            border-radius: 20px 20px 0 0;
            z-index: 20;
            display: flex;
            flex-direction: column;
            box-shadow: 0 -6px 24px rgba(0, 0, 0, 0.15);
            transition: transform 0.1s linear;
        }

        .drag-handle {
            width: 100%;
            height: 28px;
            cursor: ns-resize;
            display: flex;
            align-items: center;
            justify-content: center;
            touch-action: none;
            user-select: none;
        }

        .handle-bar {
            width: 46px;
            height: 5px;
            background: #bbb;
            border-radius: 3px;
            transition: background 0.2s;
        }
        .drag-handle:hover .handle-bar {
            background: #888;
        }

        .sheet-content {
            flex: 1;
            overflow-y: auto;
            padding: 0 24px 24px 24px;
            -webkit-overflow-scrolling: touch;
        }

        .sheet-title {
            font-size: 1.2rem;
            font-weight: 700;
            color: #111;
            margin-bottom: 6px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .brand-badge {
            font-size: 0.75rem;
            background: #cc0000;
            color: white;
            padding: 3px 8px;
            border-radius: 4px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .sheet-body {
            color: #444;
            font-size: 0.95rem;
            line-height: 1.6;
        }

        .placeholder-box {
            height: 260px; 
            margin-top: 16px; 
            background: #fcfcfc; 
            border: 2px dashed #ddd; 
            border-radius: 8px;
            display: flex; 
            align-items: center; 
            justify-content: center; 
            color: #aaa;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>

<div class="app-container">
    
    <!-- GeoPro Primary Interactive Interface Layers -->
    <div class="control-stack">
        <div id="search-box-anchor"></div>
        
        <div class="category-row">
            <button class="category-pill" data-query="Gas Stations">⛽ Gas</button>
            <button class="category-pill" data-query="Restaurants">🍔 Food</button>
            <button class="category-pill" data-query="Coffee">☕ Coffee</button>
            <button class="category-pill" data-query="Hotels">🏨 Hotels</button>
        </div>
    </div>

    <!-- Map Elements Render Target -->
    <div id="map"></div>

    <!-- Premium Draggable Metadata Sheet Container -->
    <div class="bottom-sheet" id="bottomSheet">
        <div class="drag-handle" id="dragHandle">
            <div class="handle-bar"></div>
        </div>
        <div class="sheet-content">
            <div class="sheet-title">
                <span>Location Metrics</span>
                <span class="brand-badge">GeoPro Engine</span>
            </div>
            <div class="sheet-body">
                <p>
                    Interactive spatial query telemetry and real-time mapping indexes render inside this panel layer. Drag the access handle upward to smoothly maximize the content matrix view viewport windows.
                </p>
                <div class="placeholder-box">
                    (No active tracking node selected)
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    // System tokens verified and stored globally
    const MAPBOX_ACCESS_TOKEN = 'pk.eyJ1IjoiaWxsZWdhbGdhbWVzIiwiYSI6ImNscWxpZTh4bzA1YTAydG1hbXh4M3I1N2IifQ.0X3gK_2w8A0V6W9j9O8-4A'; 
    mapboxgl.accessToken = MAPBOX_ACCESS_TOKEN;

    let map = null;
    let searchBox = null;
    const defaultCenterLocation = [-123.2078, 39.1503]; // Standard initialization alignment coordinates

    // Safely spins up the Mapbox GL JS engine
    function initMap() {
        try {
            map = new mapboxgl.Map({
                container: 'map',
                style: 'mapbox://styles/mapbox/streets-v12',
                center: defaultCenterLocation,
                zoom: 13,
                attributionControl: false
            });

            map.addControl(new mapboxgl.NavigationControl(), 'bottom-right');

            // Bias search proximity when panning or shifting center point finishes
            map.on('moveend', () => {
                const currentCenter = map.getCenter().toArray();
                if (searchBox && searchBox.options) {
                    searchBox.options = { ...searchBox.options, proximity: currentCenter };
                }
            });
        } catch (error) {
            console.error("GeoPro Error: Map core initialization failed -> Check access tokens bounds configuration.", error);
        }
    }

    // Resolves cross-browser Search Web Component class compilation models
    function initSearchBox() {
        try {
            let searchBoxInstance = null;

            // Look up every possible namespace variant to prevent CDN execution crashes
            if (typeof mapboxsearch !== 'undefined' && mapboxsearch.MapboxSearchBox) {
                searchBoxInstance = new mapboxsearch.MapboxSearchBox();
            } else if (typeof MapboxSearchBox !== 'undefined') {
                searchBoxInstance = new MapboxSearchBox();
            } else {
                searchBoxInstance = document.createElement('mapbox-search-box');
            }

            if (!searchBoxInstance) throw new Error("SearchBox component constructor unavailable.");

            searchBox = searchBoxInstance;
            searchBox.accessToken = MAPBOX_ACCESS_TOKEN;
            searchBox.options = { proximity: defaultCenterLocation, language: 'en' };
            
            // Connect structural engines together
            searchBox.mapboxgl = mapboxgl;
            searchBox.bindMap(map);

            document.getElementById('search-box-anchor').appendChild(searchBox);
            bindCategoryPills();

        } catch (error) {
            console.error("GeoPro Error: Web Search component setup failed -> Check dependency assets load channels.", error);
        }
    }

    // Manages clean category data parsing triggers
    function bindCategoryPills() {
        document.querySelectorAll('.category-pill').forEach(pill => {
            pill.addEventListener('click', () => {
                const queryStr = pill.getAttribute('data-query');
                
                if (searchBox) {
                    searchBox.value = queryStr;
                    searchBox.focus();

                    // Programmatic search execution framework fallback matching all builds
                    if (typeof searchBox.search === 'function') {
                        searchBox.search();
                    } else {
                        const nativeInputEvent = new Event('input', { bubbles: true });
                        const targets = searchBox.shadowRoot?.querySelector('input') || searchBox.querySelector('input');
                        if (targets) {
                            targets.dispatchEvent(nativeInputEvent);
                        }
                    }
                }
            });
        });
    }

    // High performance Drag/Gesture Mathematics setup
    function initDraggableSheetFramework() {
        const sheet = document.getElementById('bottomSheet');
        const handle = document.getElementById('dragHandle');
        
        let activeDrag = false;
        let originY = 0;
        let baseHeight = 0;

        const updateSheetHeight = (currentClientY) => {
            const movementDelta = originY - currentClientY;
            const targetCalculatedHeight = Math.max(80, Math.min(window.innerHeight * 0.85, baseHeight + movementDelta));
            sheet.style.height = `${targetCalculatedHeight}px`;
        };

        // Desktop Mouse Triggers
        handle.addEventListener('mousedown', (e) => {
            activeDrag = true;
            originY = e.clientY;
            baseHeight = sheet.offsetHeight;
            sheet.style.transition = 'none';
        });

        // Mobile Screen Multi-Touch Triggers
        handle.addEventListener('touchstart', (e) => {
            activeDrag = true;
            originY = e.touches[0].clientY;
            baseHeight = sheet.offsetHeight;
            sheet.style.transition = 'none';
        }, { passive: true });

        document.addEventListener('mousemove', (e) => {
            if (!activeDrag) return;
            updateSheetHeight(e.clientY);
        });

        document.addEventListener('touchmove', (e) => {
            if (!activeDrag) return;
            updateSheetHeight(e.touches[0].clientY);
        }, { passive: true });

        const terminateDragGesture = () => {
            if (!activeDrag) return;
            activeDrag = false;
            sheet.style.transition = 'height 0.2s cubic-bezier(0.25, 1, 0.5, 1)';
        };

        document.addEventListener('mouseup', terminateDragGesture);
        document.addEventListener('touchend', terminateDragGesture);
    }

    // Unified sequencing structure prevents race condition compilation crashes
    window.addEventListener('load', () => {
        initMap();
        initSearchBox();
        initDraggableSheetFramework();
    });
</script>
</body>
</html>
