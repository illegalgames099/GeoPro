<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <title>GeoPro - 3D World Navigation Engine</title>
    <meta name="viewport" content="initial-scale=1,maximum-scale=1,user-scalable=no" />
    
    <link href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css" rel="stylesheet" />
    <script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>

    <style>
        :root {
            --bg-primary: #050505;
            --bg-panel: rgba(10, 10, 12, 0.75);
            --bg-panel-solid: #0f0f13;
            --border-color: rgba(255, 51, 51, 0.25);
            --action-red: #ff3333;
            --action-red-glow: rgba(255, 51, 51, 0.4);
            --text-primary: #f5f5f7;
            --text-secondary: #c5c5ca;
            --text-muted: #62626e;
            --font-monospace: 'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: var(--bg-primary);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        #map {
            position: absolute;
            top: 0;
            bottom: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        .hud-system-header {
            position: absolute;
            top: 16px;
            left: 16px;
            right: 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 10;
            pointer-events: none;
        }

        .hud-module {
            background: var(--bg-panel);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 10px 16px;
            pointer-events: auto;
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.6);
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .brand-node {
            font-family: var(--font-monospace);
            font-weight: 900;
            letter-spacing: 1px;
            color: var(--text-primary);
            font-size: 0.95rem;
        }

        .brand-node span {
            color: var(--action-red);
        }

        #coordinate-overlay-tracker {
            font-family: var(--font-monospace);
            font-size: 0.75rem;
            color: var(--text-secondary);
        }

        #telemetry-status-node {
            font-family: var(--font-monospace);
            font-size: 0.7rem;
            font-weight: bold;
            color: var(--action-red);
            text-transform: uppercase;
        }

        .floating-side-actions {
            position: absolute;
            right: 16px;
            top: 50%;
            transform: translateY(-50%);
            display: flex;
            flex-direction: column;
            gap: 12px;
            z-index: 10;
        }

        .side-btn {
            background: var(--bg-panel);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            width: 48px;
            height: 48px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-primary);
            cursor: pointer;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.6);
            transition: all 0.2s ease;
        }

        .side-btn:hover {
            background: #1a1a22;
            border-color: var(--action-red);
        }

        .side-btn.active-state {
            color: var(--action-red);
            border-color: rgba(255, 51, 51, 0.6);
            box-shadow: 0 0 16px rgba(255, 51, 51, 0.25);
        }

        #control-panel-deck {
            position: absolute;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%) translateY(0px);
            width: 440px;
            max-width: calc(100vw - 32px);
            background: var(--bg-panel);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.8);
            z-index: 10;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            transition: transform 0.35s cubic-bezier(0.25, 1, 0.5, 1);
        }

        #control-panel-deck.dragging {
            transition: none;
        }

        #control-panel-deck.minimized {
            transform: translateX(-50%) translateY(calc(100% - 28px));
        }

        #drag-handle {
            width: 100%;
            height: 28px;
            background: transparent;
            cursor: grab;
            display: flex;
            align-items: center;
            justify-content: center;
            border-bottom: 1px solid rgba(255, 51, 51, 0.1);
            touch-action: none; 
        }

        #drag-handle::before {
            content: '';
            width: 42px;
            height: 5px;
            background: #3a3a45;
            border-radius: 3px;
            transition: background 0.2s;
        }

        #drag-handle:hover::before {
            background: var(--action-red);
        }

        .workspace-content-body {
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            max-height: 75vh;
            overflow-y: auto;
            opacity: 1;
            transition: opacity 0.2s ease;
        }

        #control-panel-deck.minimized .workspace-content-body {
            opacity: 0;
            pointer-events: none;
        }

        .search-engine-wrap {
            position: relative;
            display: flex;
            width: 100%;
        }

        .search-engine-wrap input {
            width: 100%;
            background: var(--bg-panel-solid);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 12px 14px;
            color: var(--text-primary);
            font-size: 0.88rem;
            outline: none;
            transition: border-color 0.15s ease;
        }

        .search-engine-wrap input:focus {
            border-color: var(--action-red);
            box-shadow: 0 0 8px rgba(255, 51, 51, 0.2);
        }

        .suggest-dropdown-matrix {
            position: absolute;
            top: calc(100% + 6px);
            left: 0;
            right: 0;
            background: var(--bg-panel-solid);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            max-height: 200px;
            overflow-y: auto;
            display: none;
            z-index: 100;
            box-shadow: 0 8px 24px rgba(0,0,0,0.6);
        }

        .osm-suggest-item {
            padding: 10px 14px;
            color: var(--text-secondary);
            font-size: 0.82rem;
            cursor: pointer;
            border-bottom: 1px solid rgba(255,255,255,0.02);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .osm-suggest-item:hover {
            background: rgba(255, 51, 51, 0.1);
            color: var(--text-primary);
        }

        #context-destination-panel {
            background: var(--bg-panel-solid);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 12px;
            display: none;
            align-items: flex-start;
            gap: 12px;
        }

        .meta-vector-icon {
            width: 20px;
            height: 20px;
            margin-top: 2px;
            flex-shrink: 0;
        }

        .meta-vector-info-stack {
            flex-grow: 1;
            overflow: hidden;
        }

        #node-panel-title {
            color: var(--text-primary);
            font-size: 0.85rem;
            font-weight: bold;
            margin-bottom: 2px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        #node-panel-address {
            color: var(--text-muted);
            font-size: 0.78rem;
            line-height: 1.3;
        }

        #route-variants-dashboard {
            display: none;
            flex-direction: column;
            gap: 6px;
            background: var(--bg-panel-solid);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 10px;
        }

        .route-badge-row {
            display: flex;
            flex-direction: column;
            gap: 4px;
            padding: 8px;
            background: rgba(255, 51, 51, 0.05);
            border-radius: 6px;
            font-size: 0.78rem;
        }

        .directions-manifest {
            margin-top: 10px;
            border-top: 1px solid var(--border-color);
            padding-top: 10px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            max-height: 220px;
            overflow-y: auto;
        }

        .direction-step {
            display: flex;
            gap: 10px;
            align-items: flex-start;
            padding: 6px 4px;
            border-bottom: 1px solid rgba(255,255,255,0.02);
            color: var(--text-secondary);
            font-size: 0.8rem;
            cursor: pointer;
        }

        .direction-step:hover {
            background: rgba(255, 51, 51, 0.08);
            color: var(--text-primary);
        }

        .step-index {
            background: var(--action-red);
            color: #ffffff;
            font-family: var(--font-monospace);
            font-size: 0.7rem;
            min-width: 18px;
            height: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 4px;
            font-weight: bold;
            flex-shrink: 0;
        }

        .step-text {
            flex-grow: 1;
            line-height: 1.3;
        }

        .workspace-hardware-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
        }

        .hud-btn {
            background: var(--bg-panel-solid);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 10px;
            color: var(--text-secondary);
            font-size: 0.75rem;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            transition: all 0.15s ease;
        }

        .hud-btn:hover {
            background: #1a1a22;
            color: var(--text-primary);
            border-color: var(--action-red);
        }

        #launch-routing-action {
            grid-column: span 2;
            background: var(--action-red);
            color: #ffffff;
            border: none;
            padding: 14px;
            font-size: 0.85rem;
            font-weight: bold;
            letter-spacing: 0.5px;
            box-shadow: 0 4px 12px var(--action-red-glow);
        }

        #launch-routing-action:hover {
            background: #ff4d4d;
        }

        .custom-spatial-marker {
            transform: translate(-50%, -100%);
        }

        .live-gps-beacon-node {
            width: 18px;
            height: 18px;
            background: var(--action-red);
            border: 3px solid #050505;
            border-radius: 50%;
            box-shadow: 0 0 16px var(--action-red-glow);
        }
    </style>
</head>
<body>

    <div id="map"></div>

    <div class="hud-system-header">
        <div class="hud-module">
            <div class="brand-node">GEO<span>PRO</span></div>
            <div style="width: 1px; height: 14px; background: var(--border-color);"></div>
            <div id="telemetry-status-node">BOOTING NAVIGATION...</div>
        </div>

        <div id="coordinate-overlay-tracker" class="hud-module">
            X: --.----- | Y: --.-----
        </div>
    </div>

    <div class="floating-side-actions">
        <button id="force-gps-recenter" class="side-btn active-state" title="Recenter & Follow GPS">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"></circle><circle cx="12" cy="12" r="3"></circle></svg>
        </button>
        <button id="compass-orientation-lock" class="side-btn" title="Reset North">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="3 11 22 2 13 21 11 13 3 11"></polygon></svg>
        </button>
    </div>

    <div id="control-panel-deck">
        <div id="drag-handle"></div>
        <div class="workspace-content-body">
            
            <div class="search-engine-wrap">
                <input type="text" id="osm-engine-input" placeholder="Search target location or city..." autocomplete="off"/>
                <div id="osm-engine-dropdown" class="suggest-dropdown-matrix"></div>
            </div>

            <div id="context-destination-panel">
                <svg class="meta-vector-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z" fill="#ff3333"/>
                </svg>
                <div class="meta-vector-info-stack">
                    <div id="node-panel-title">Selected Matrix Node</div>
                    <div id="node-panel-address">Tracking calculations offline...</div>
                </div>
            </div>

            <div id="route-variants-dashboard"></div>

            <div class="workspace-hardware-row">
                <button id="toggle-satellite-view" class="hud-btn">
                    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"></path></svg>
                    3D SATELLITE
                </button>
                <button id="flush-workspace-trigger" class="hud-btn">
                    CLEAR WORKSPACE
                </button>

                <button id="launch-routing-action" class="hud-btn" style="display:none;">
                    GET DIRECTIONS
                </button>
            </div>

        </div>
    </div>

    <script>
        let defaultUserCoordinates = [-122.084, 37.422]; 
        let currentLiveGpsPosition = null; 
        let targetSelectedCoordinates = null;
        let querySearchDebounceTimer = null;
         
        let activeMapMarker = null; 
        let userLocationBeaconMarker = null;
        let activeRouteDataStore = []; 
        let satelliteModeActive = false;
        let cameraTrackingMode = true; 
        
        let lastGpsTimestamp = null;
        let gpsVelocityVector = { lng: 0, lat: 0 };
        let currentVehicleHeading = 0;

        const HIGH_PERFORMANCE_DARK_STYLE = 'https://basemaps.cartocdn.com/gl/dark-matter-gl-style/style.json';

        const map = new maplibregl.Map({
            container: 'map',
            style: HIGH_PERFORMANCE_DARK_STYLE, 
            center: defaultUserCoordinates, 
            zoom: 3, 
            pitch: 65,
            maxPitch: 85,
            bearing: 0,
            antialias: true,
            fadeDuration: 50,
            crossSourceCollisions: false
        });

        function createCustomMarkerElement() {
            const el = document.createElement('div');
            el.className = 'custom-spatial-marker';
            el.innerHTML = `
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <circle cx="12" cy="12" r="8" fill="#ff3333" fill-opacity="0.3"/>
                    <circle cx="12" cy="12" r="4" fill="#ff3333"/>
                    <circle cx="12" cy="12" r="3.5" stroke="#050505" stroke-width="1"/>
                </svg>
            `;
            return el;
        }

        function calculateBearingAngle(p1, p2) {
            const lng1 = p1[0] * Math.PI / 180;
            const lat1 = p1[1] * Math.PI / 180;
            const lng2 = p2[0] * Math.PI / 180;
            const lat2 = p2[1] * Math.PI / 180;
            const dLng = lng2 - lng1;
            const y = Math.sin(dLng) * Math.cos(lat2);
            const x = Math.cos(lat1) * Math.sin(lat2) - Math.sin(lat1) * Math.cos(lat2) * Math.cos(dLng);
            const bearing = Math.atan2(y, x) * 180 / Math.PI;
            return (bearing + 360) % 360;
        }

        map.on('load', () => {
            initTacticalPanelDraggingPhysics();
            initAutonomousSearchMatrix();
            initDirectMapInputListeners();
            initHardwareConsoleTriggers();
            injectRealtime3DWorldAssets();
            establishLiveHardwarePositioningStream();

            map.setFog({
                'color': '#050505',
                'high-color': '#0f0f13',
                'space-color': '#000000',
                'horizon-blend': 0.05
            });

            map.on('mousemove', (e) => {
                const overlay = document.getElementById('coordinate-overlay-tracker');
                if (overlay) overlay.innerText = `X: ${e.lngLat.lng.toFixed(5)} | Y: ${e.lngLat.lat.toFixed(5)}`;
            });

            const cancelTracking = () => {
                if (cameraTrackingMode) {
                    cameraTrackingMode = false;
                    const recenterBtn = document.getElementById('force-gps-recenter');
                    if (recenterBtn) recenterBtn.classList.remove('active-state');
                }
            };

            map.on('dragstart', cancelTracking);
            map.on('zoomstart', cancelTracking);
            map.on('rotatestart', cancelTracking);
            map.on('pitchstart', cancelTracking);
        });

        map.on('styledata', () => {
            injectRealtime3DWorldAssets();
            redrawActiveRoutePipelines();
        });

        map.on('error', (e) => {
            console.error('MapLibre error:', e && e.error ? e.error : e);
        });

        function injectRealtime3DWorldAssets() {
            const styleSources = map.getStyle().sources;
            if (!styleSources) return;
            
            const sourceKey = Object.keys(styleSources).find(key => styleSources[key].type === 'vector');
            if (!sourceKey || !map.getSource(sourceKey)) return;

            const layers = map.getStyle().layers;
            let labelLayerId;
            for (let i = 0; i < layers.length; i++) {
                if (layers[i].type === 'symbol' && layers[i].layout && layers[i].layout['text-field']) {
                    labelLayerId = layers[i].id;
                    break;
                }
            }

            if (!map.getLayer('spatial-3d-buildings')) {
                map.addLayer({
                    'id': 'spatial-3d-buildings',
                    'source': sourceKey,
                    'source-layer': 'building',
                    'type': 'fill-extrusion',
                    'minzoom': 15, 
                    'paint': {
                        'fill-extrusion-color': satelliteModeActive ? '#1a1a20' : '#111115',
                        'fill-extrusion-height': ['coalesce', ['get', 'height'], ['get', 'render_height'], 14],
                        'fill-extrusion-base': ['coalesce', ['get', 'min_height'], ['get', 'render_min_height'], 0],
                        'fill-extrusion-opacity': 0.85,
                        'fill-extrusion-vertical-gradient': true
                    }
                }, labelLayerId);
            }
        }

        async function handleRoutingButtonClick() {
            const btn = document.getElementById('launch-routing-action');
            if (!btn) return;

            btn.innerText = "COMPUTING PATH TRAJECTORY...";
            btn.style.opacity = "0.6";
             
            let originCoords = currentLiveGpsPosition;
            if (!originCoords) {
                const mapCenter = map.getCenter();
                originCoords = [mapCenter.lng, mapCenter.lat];
            }
             
            const routingQueryUrl = `https://router.project-osrm.org/route/v1/driving/${originCoords.join(',')};${targetSelectedCoordinates.join(',')}?overview=full&geometries=geojson&steps=true`;
             
            try {
                clearActiveRouteLayers();
                activeRouteDataStore = [];

                const stream = await fetch(routingQueryUrl);
                const results = await stream.json();
                
                if (results.code === 'Ok' && results.routes && results.routes.length > 0) {
                    const primaryRoute = results.routes[0];
                    
                    let parsedInstructions = [];
                    if (primaryRoute.legs && primaryRoute.legs[0].steps) {
                        parsedInstructions = primaryRoute.legs[0].steps.map(step => {
                            let modifier = step.maneuver.modifier ? ` ${step.maneuver.modifier}` : '';
                            let type = step.maneuver.type === 'turn' ? 'Turn' : step.maneuver.type;
                            let street = step.name ? ` onto ${step.name}` : '';
                            let rawMessage = `${type}${modifier}${street}`;
                            
                            if (step.maneuver.type === 'depart') rawMessage = `Follow target vector from ${step.name || 'current coordinates'}`;
                            if (step.maneuver.type === 'arrive') rawMessage = "Target location node reached";

                            return {
                                text: rawMessage.charAt(0).toUpperCase() + rawMessage.slice(1),
                                distance: step.distance,
                                coordinates: step.maneuver.location
                            };
                        }).filter(item => item.text);
                    }

                    activeRouteDataStore = [{
                        index: 0,
                        geometry: primaryRoute.geometry, 
                        duration: primaryRoute.duration,
                        distance: primaryRoute.distance,
                        steps: parsedInstructions
                    }];
                }
            } catch (err) { 
                console.error("OSRM route fault.", err);
            }

            redrawActiveRoutePipelines();
            renderRouteDashboardUI();
            
            if (activeRouteDataStore.length > 0) {
                const coords = activeRouteDataStore[0].geometry.coordinates;
                if (coords.length > 1) {
                    const initialAngle = calculateBearingAngle(coords[0], coords[1]);
                    map.flyTo({
                        center: coords[0],
                        zoom: 17.5,
                        pitch: 70,
                        bearing: initialAngle,
                        duration: 1200
                    });
                }
                document.getElementById('control-panel-deck').classList.add('minimized');
            }
            btn.style.display = "none"; 
        }

        function redrawActiveRoutePipelines() {
            if (!activeRouteDataStore || activeRouteDataStore.length === 0) return;
            if (!map.isStyleLoaded()) return;

            activeRouteDataStore.forEach((r) => {
                const baseCoords = r.geometry.coordinates;
                const srcId = `src-active-route-${r.index}`;

                if (!map.getSource(srcId)) {
                    map.addSource(srcId, { 
                        type: 'geojson', 
                        data: { type: 'Feature', geometry: { type: 'LineString', coordinates: baseCoords } } 
                    });
                }

                if (!map.getLayer(`layer-route-casing-${r.index}`)) {
                    map.addLayer({
                        id: `layer-route-casing-${r.index}`,
                        type: 'line',
                        source: srcId,
                        layout: { 'line-join': 'round', 'line-cap': 'round' },
                        paint: {
                            'line-color': '#ff3333',
                            'line-width': ['interpolate', ['linear'], ['zoom'], 12, 8, 16, 16, 20, 36],
                            'line-opacity': 0.25,
                            'line-blur': 12
                        }
                    });
                }

                if (!map.getLayer(`layer-route-core-${r.index}`)) {
                    map.addLayer({
                        id: `layer-route-core-${r.index}`,
                        type: 'line',
                        source: srcId,
                        layout: { 'line-join': 'round', 'line-cap': 'round' },
                        paint: {
                            'line-color': '#ff3333', 
                            'line-width': ['interpolate', ['linear'], ['zoom'], 12, 3, 16, 6, 20, 12],
                            'line-opacity': 1.0
                        }
                    });
                }
            });
        }

        function renderRouteDashboardUI() {
            const dashboard = document.getElementById('route-variants-dashboard');
            if (!dashboard) return;
            dashboard.innerHTML = '';
            dashboard.style.display = 'flex';

            activeRouteDataStore.forEach((r) => {
                const mins = Math.max(1, Math.round(r.duration / 60));
                const miles = (r.distance / 1609.34).toFixed(1);
                 
                const metricsRow = document.createElement('div');
                metricsRow.className = 'route-badge-row';
                metricsRow.innerHTML = `
                    <div>
                        <span class="badge-tag-label" style="color: var(--action-red); font-weight: bold; font-family: var(--font-monospace); font-size:0.7rem;">
                            ★ ROAD-ALIGNED SYSTEM PATH
                        </span>
                        <div style="color: var(--text-primary); margin-top: 4px; font-size: 0.95rem; font-weight: bold;">
                            ${mins} mins <span style="color: var(--text-muted); font-weight: normal; font-size: 0.8rem;">(${miles} mi)</span>
                        </div>
                    </div>
                `;
                dashboard.appendChild(metricsRow);

                if (r.steps && r.steps.length > 0) {
                    const manifestContainer = document.createElement('div');
                    manifestContainer.className = 'directions-manifest';
                    
                    r.steps.forEach((step, stepIndex) => {
                        const stepEl = document.createElement('div');
                        stepEl.className = 'direction-step';
                        
                        const stepMiles = (step.distance / 1609.34).toFixed(2);
                        const distanceDisplay = step.distance > 0 ? `${stepMiles} mi` : '';

                        stepEl.innerHTML = `
                            <div class="step-index">${stepIndex + 1}</div>
                            <div class="step-text">${step.text}</div>
                            <div class="step-distance">${distanceDisplay}</div>
                        `;

                        stepEl.addEventListener('click', () => {
                            cameraTrackingMode = false;
                            document.getElementById('force-gps-recenter').classList.remove('active-state');
                            let targetStepBearing = currentVehicleHeading;
                            
                            if (stepIndex < r.steps.length - 1) {
                                targetStepBearing = calculateBearingAngle(step.coordinates, r.steps[stepIndex + 1].coordinates);
                            }

                            map.flyTo({
                                center: step.coordinates,
                                zoom: 18,
                                pitch: 70,
                                bearing: targetStepBearing,
                                duration: 800
                            });
                        });

                        manifestContainer.appendChild(stepEl);
                    });
                    
                    dashboard.appendChild(manifestContainer);
                }
            });
        }

        function clearActiveRouteLayers() {
            for (let idx = 0; idx < 10; idx++) {
                const elements = [`layer-route-casing-${idx}`, `layer-route-core-${idx}`];
                elements.forEach(id => { if (map.getLayer(id)) map.removeLayer(id); });
                const sources = [`src-active-route-${idx}`];
                sources.forEach(id => { if (map.getSource(id)) map.removeSource(id); });
            }
        }

        function establishLiveHardwarePositioningStream() {
            const diagnosticStatus = document.getElementById('telemetry-status-node');
            if (!diagnosticStatus) return;
            if (!navigator.geolocation) { diagnosticStatus.innerText = "SENSOR FAULT"; return; }

            let initialLockAcquired = false;

            navigator.geolocation.watchPosition(
                (position) => {
                    const lon = position.coords.longitude;
                    const lat = position.coords.latitude;
                    const incomingLoc = [lon, lat];
                    const now = performance.now();
                    
                    diagnosticStatus.innerText = "GPS TRACKING ACTIVE";
                    diagnosticStatus.style.color = "var(--action-red)";

                    // Fixed: Eliminate GPS rubber-banding glitch on boot
                    if (!initialLockAcquired) {
                        initialLockAcquired = true;
                        currentLiveGpsPosition = incomingLoc;
                        lastGpsTimestamp = now;

                        if (position.coords.heading !== null && !isNaN(position.coords.heading)) {
                            currentVehicleHeading = position.coords.heading;
                        }

                        if (!userLocationBeaconMarker) {
                            const beaconEl = document.createElement('div');
                            beaconEl.className = 'live-gps-beacon-node';
                            userLocationBeaconMarker = new maplibregl.Marker({ element: beaconEl })
                                .setLngLat(currentLiveGpsPosition)
                                .addTo(map);
                        }

                        // JUMP instantly instead of easing across the map
                        map.jumpTo({ center: currentLiveGpsPosition, zoom: 17.5, pitch: 70, bearing: currentVehicleHeading });
                        return; 
                    }

                    if (lastGpsTimestamp && currentLiveGpsPosition) {
                        const elapsedSecs = (now - lastGpsTimestamp) / 1000;
                        if (elapsedSecs > 0) {
                            gpsVelocityVector.lng = (lon - currentLiveGpsPosition[0]) / elapsedSecs;
                            gpsVelocityVector.lat = (lat - currentLiveGpsPosition[1]) / elapsedSecs;
                        }
                    }

                    if (position.coords.heading !== null && !isNaN(position.coords.heading)) {
                        currentVehicleHeading = position.coords.heading;
                    } else if (currentLiveGpsPosition) {
                        currentVehicleHeading = calculateBearingAngle(currentLiveGpsPosition, incomingLoc);
                    }

                    currentLiveGpsPosition = incomingLoc;
                    lastGpsTimestamp = now;

                    if (userLocationBeaconMarker) {
                        userLocationBeaconMarker.setLngLat(currentLiveGpsPosition);
                    }

                    if (cameraTrackingMode) {
                        map.easeTo({
                            center: currentLiveGpsPosition,
                            pitch: 70,
                            bearing: currentVehicleHeading,
                            zoom: 17.5,
                            duration: 500
                        });
                    }
                },
                (error) => { 
                    diagnosticStatus.innerText = "LOCAL SIMULATION ACTIVE"; 
                    diagnosticStatus.style.color = "#ff9500";
                },
                { enableHighAccuracy: true, timeout: 6000, maximumAge: 0 }
            );

            function executePredictiveTrackingFrame() {
                if (cameraTrackingMode && currentLiveGpsPosition && lastGpsTimestamp && initialLockAcquired) {
                    const frameTime = performance.now();
                    const deltaSec = (frameTime - lastGpsTimestamp) / 1000;
                    
                    // Fixed: Only predict if the time gap is realistic to prevent infinite scrolling
                    if (deltaSec > 0.3 && deltaSec < 2.0) {
                        const predictedLng = currentLiveGpsPosition[0] + (gpsVelocityVector.lng * 0.016);
                        const predictedLat = currentLiveGpsPosition[1] + (gpsVelocityVector.lat * 0.016);
                        
                        currentLiveGpsPosition = [predictedLng, predictedLat];
                        if (userLocationBeaconMarker) userLocationBeaconMarker.setLngLat(currentLiveGpsPosition);
                        
                        map.setCenter(currentLiveGpsPosition);
                    }
                }
                requestAnimationFrame(executePredictiveTrackingFrame);
            }
            requestAnimationFrame(executePredictiveTrackingFrame);
        }

        function initHardwareConsoleTriggers() {
            const compassBtn = document.getElementById('compass-orientation-lock');
            if (compassBtn) {
                compassBtn.addEventListener('click', () => {
                    map.easeTo({ bearing: 0 });
                });
            }
             
            const recenterBtn = document.getElementById('force-gps-recenter');
            if (recenterBtn) {
                recenterBtn.addEventListener('click', () => {
                    cameraTrackingMode = true; 
                    recenterBtn.classList.add('active-state');
                    if (currentLiveGpsPosition) {
                        map.flyTo({ 
                            center: currentLiveGpsPosition, 
                            zoom: 17.5, 
                            pitch: 70, 
                            bearing: currentVehicleHeading, 
                            duration: 600 
                        });
                    }
                });
            }

            const satelliteBtn = document.getElementById('toggle-satellite-view');
            if (satelliteBtn) {
                satelliteBtn.addEventListener('click', () => {
                    satelliteModeActive = !satelliteModeActive;
                    clearActiveRouteLayers(); 

                    if (satelliteModeActive) {
                        satelliteBtn.style.borderColor = 'var(--action-red)';
                        satelliteBtn.style.color = 'var(--action-red)';

                        map.setStyle({
                            'version': 8,
                            'sources': {
                                'satellite-imagery-tiles': {
                                    'type': 'raster',
                                    'tiles': ['https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}'],
                                    'tileSize': 256,
                                    'attribution': 'Esri'
                                },
                                'terrain-dem-mesh': {
                                    'type': 'raster-dem',
                                    'tiles': ['https://s3.amazonaws.com/elevation-tiles-prod/terrarium/{z}/{x}/{y}.png'],
                                    'tileSize': 256,
                                    'encoding': 'terrarium',
                                    'maxzoom': 15
                                }
                            },
                            'layers': [
                                {
                                    'id': 'satellite-reality-layer',
                                    'type': 'raster',
                                    'source': 'satellite-imagery-tiles'
                                }
                            ],
                            'terrain': {
                                'source': 'terrain-dem-mesh',
                                'exaggeration': 1.6
                            }
                        });
                    } else {
                        satelliteBtn.style.borderColor = '';
                        satelliteBtn.style.color = '';
                        if (map.getTerrain()) map.setTerrain(null);
                        map.setStyle(HIGH_PERFORMANCE_DARK_STYLE);
                    }
                });
            }

            const routingBtn = document.getElementById('launch-routing-action');
            if (routingBtn) {
                routingBtn.addEventListener('click', handleRoutingButtonClick);
            }
            
            const flushBtn = document.getElementById('flush-workspace-trigger');
            if (flushBtn) {
                flushBtn.addEventListener('click', () => {
                    clearActiveRouteLayers();
                    activeRouteDataStore = [];
                    if (activeMapMarker) { activeMapMarker.remove(); activeMapMarker = null; }
                    document.getElementById('context-destination-panel').style.display = 'none';
                    document.getElementById('osm-engine-input').value = '';
                    document.getElementById('launch-routing-action').style.display = 'none';
                    document.getElementById('route-variants-dashboard').style.display = 'none';
                    document.getElementById('control-panel-deck').classList.remove('minimized');
                    targetSelectedCoordinates = null;
                });
            }
        }

        function initTacticalPanelDraggingPhysics() {
            const panel = document.getElementById('control-panel-deck');
            const handle = document.getElementById('drag-handle');
            if (!panel || !handle) return;
            
            let isDragging = false, startY = 0;

            handle.addEventListener('mousedown', startDrag);
            window.addEventListener('mousemove', processDrag);
            window.addEventListener('mouseup', endDrag);
            handle.addEventListener('touchstart', (e) => startDrag(e.touches[0]), { passive: true });
            window.addEventListener('touchmove', (e) => processDrag(e.touches[0]), { passive: false });
            window.addEventListener('touchend', endDrag);

            handle.addEventListener('click', () => {
                if (!isDragging) {
                    panel.classList.toggle('minimized');
                    panel.style.transform = '';
                }
            });

            function startDrag(e) { 
                isDragging = true; 
                startY = e.clientY; 
                panel.classList.add('dragging'); 
            }
            
            function processDrag(e) {
                if (!isDragging) return;
                let deltaY = e.clientY - startY;
                
                if (panel.classList.contains('minimized')) {
                    if (deltaY < 0) {
                        panel.style.transform = `translateX(-50%) translateY(calc(100% - 28px + ${deltaY}px))`;
                    }
                } else {
                    if (deltaY > 0) {
                        panel.style.transform = `translateX(-50%) translateY(${deltaY}px)`;
                    }
                }
            }
            
            function endDrag(e) {
                if (!isDragging) return; 
                isDragging = false; 
                panel.classList.remove('dragging');
                panel.style.transform = '';

                let deltaY = (e.changedTouches ? e.changedTouches[0].clientY : e.clientY) - startY;

                if (panel.classList.contains('minimized')) {
                    if (deltaY < -50) panel.classList.remove('minimized');
                } else {
                    if (deltaY > 50) panel.classList.add('minimized');
                }
            }
        }

        function initAutonomousSearchMatrix() {
            const input = document.getElementById('osm-engine-input');
            const dropdown = document.getElementById('osm-engine-dropdown');
            if (!input || !dropdown) return;

            input.addEventListener('input', (e) => {
                const queryVal = e.target.value.trim();
                clearTimeout(querySearchDebounceTimer);
                if (queryVal.length < 3) { dropdown.style.display = 'none'; return; }
                 
                querySearchDebounceTimer = setTimeout(async () => {
                    try {
                        let searchApiUrl = `https://photon.komoot.io/api/?q=${encodeURIComponent(queryVal)}&limit=5`;
                        if (currentLiveGpsPosition) searchApiUrl += `&lon=${currentLiveGpsPosition[0]}&lat=${currentLiveGpsPosition[1]}`;
                        const response = await fetch(searchApiUrl);
                        const payload = await response.json();
                        if (!payload.features || payload.features.length === 0) { dropdown.style.display = 'none'; return; }
                         
                        dropdown.innerHTML = '';
                        payload.features.forEach(feature => {
                            const segmentItem = document.createElement('div');
                            segmentItem.className = 'osm-suggest-item';
                            const p = feature.properties;
                            const labeledLocation = [p.name, p.city, p.state].filter(Boolean).join(', ');
                            segmentItem.innerText = labeledLocation;
                             
                            segmentItem.addEventListener('click', () => {
                                const targetLoc = feature.geometry.coordinates;
                                dropdown.style.display = 'none';
                                input.value = labeledLocation;
                                
                                cameraTrackingMode = false;
                                document.getElementById('force-gps-recenter').classList.remove('active-state');

                                map.flyTo({ center: targetLoc, zoom: 17, pitch: 65 });
                                triggerWorkspaceTargetDeck(targetLoc, p.name || "Target Vector", labeledLocation);
                            });
                            dropdown.appendChild(segmentItem);
                        });
                        dropdown.style.display = 'block';
                    } catch (err) {}
                }, 250);
            });
        }

        function initDirectMapInputListeners() {
            map.on('click', async (e) => {
                const pinpoint = [e.lngLat.lng, e.lngLat.lat];
                document.getElementById('control-panel-deck').classList.remove('minimized');

                triggerWorkspaceTargetDeck(pinpoint, "Target Spatial Vector", `Lat: ${pinpoint[1].toFixed(5)}, Lon: ${pinpoint[0].toFixed(5)}`);
                try {
                    const lookup = await fetch(`https://photon.komoot.io/api/?lon=${pinpoint[0]}&lat=${pinpoint[1]}`);
                    const details = await lookup.json();
                    if (details.features && details.features.length > 0) {
                        const p = details.features[0].properties;
                        const addressString = [p.name, p.street, p.city].filter(Boolean).join(', ');
                        triggerWorkspaceTargetDeck(pinpoint, p.name || "Identified Point", addressString || "Raw Matrix Grid Reference");
                    }
                } catch(error){}
            });
        }

        function triggerWorkspaceTargetDeck(coords, title, details) {
            clearActiveRouteLayers();
            activeRouteDataStore = [];
            targetSelectedCoordinates = coords;
            
            document.getElementById('node-panel-title').innerText = title;
            document.getElementById('node-panel-address').innerText = details;
            document.getElementById('context-destination-panel').style.display = 'flex';
            
            const routingBtn = document.getElementById('launch-routing-action');
            routingBtn.style.display = 'block';
            routingBtn.innerText = "GET DIRECTIONS";

            document.getElementById('route-variants-dashboard').style.display = 'none';

            if (activeMapMarker) activeMapMarker.remove();
            activeMapMarker = new maplibregl.Marker({ element: createCustomMarkerElement() })
                .setLngLat(coords)
                .addTo(map);
        }
    </script>
