<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <title>GeoPro - Mapping Engine Workspace</title>
    <meta name="viewport" content="initial-scale=1,maximum-scale=1,user-scalable=no" />
    
    <!-- MapLibre Core Dependencies -->
    <link href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css" rel="stylesheet" />
    <script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>

    <style>
        :root {
            --bg-primary: #111114;
            --bg-panel: #16161a;
            --bg-panel-solid: #1c1c22;
            --border-color: #2a2a32;
            --action-red: #ff3333;
            --action-red-glow: rgba(255, 51, 51, 0.35);
            --text-primary: #f5f5f7;
            --text-secondary: #c5c5ca;
            --text-muted: #72727e;
            --font-monospace: 'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: var(--bg-primary);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        #map {
            position: absolute;
            top: 0;
            bottom: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        .hud-system-header {
            position: absolute;
            top: 16px;
            left: 16px;
            right: 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 10;
            pointer-events: none;
        }

        .hud-module {
            background: rgba(22, 22, 26, 0.85);
            backdrop-filter: blur(12px);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 10px 16px;
            pointer-events: auto;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .brand-node {
            font-family: var(--font-monospace);
            font-weight: 900;
            letter-spacing: 1px;
            color: var(--text-primary);
            font-size: 0.95rem;
        }

        .brand-node span {
            color: var(--action-red);
        }

        #coordinate-overlay-tracker {
            font-family: var(--font-monospace);
            font-size: 0.75rem;
            color: var(--text-secondary);
            background: rgba(12, 12, 14, 0.9);
            border: 1px solid var(--border-color);
        }

        #telemetry-status-node {
            font-family: var(--font-monospace);
            font-size: 0.7rem;
            font-weight: bold;
            color: #007aff;
            text-transform: uppercase;
        }

        #control-panel-deck {
            position: absolute;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%) translateY(0px);
            width: 440px;
            max-width: calc(100vw - 32px);
            background: rgba(22, 22, 26, 0.92);
            backdrop-filter: blur(16px);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.6);
            z-index: 10;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            transition: transform 0.2s cubic-bezier(0.1, 0.8, 0.25, 1);
        }

        #control-panel-deck.snapping {
            transition: transform 0.35s cubic-bezier(0.25, 1, 0.5, 1);
        }

        #drag-handle {
            width: 100%;
            height: 24px;
            background: var(--bg-panel);
            cursor: grab;
            display: flex;
            align-items: center;
            justify-content: center;
            border-bottom: 1px solid rgba(255,255,255,0.03);
        }

        #drag-handle::before {
            content: '';
            width: 36px;
            height: 4px;
            background: #3a3a44;
            border-radius: 2px;
        }

        #drag-handle:active {
            cursor: grabbing;
        }

        .workspace-content-body {
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .search-engine-wrap {
            position: relative;
            display: flex;
            width: 100%;
        }

        .search-engine-wrap input {
            width: 100%;
            background: #0e0e11;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 12px 14px;
            color: var(--text-primary);
            font-size: 0.88rem;
            outline: none;
            transition: border-color 0.15s ease;
        }

        .search-engine-wrap input:focus {
            border-color: var(--action-red);
        }

        .suggest-dropdown-matrix {
            position: absolute;
            top: calc(100% + 6px);
            left: 0;
            right: 0;
            background: var(--bg-panel-solid);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            max-height: 200px;
            overflow-y: auto;
            display: none;
            z-index: 100;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
        }

        .osm-suggest-item {
            padding: 10px 14px;
            color: var(--text-secondary);
            font-size: 0.82rem;
            cursor: pointer;
            border-bottom: 1px solid rgba(255,255,255,0.02);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .osm-suggest-item:hover {
            background: rgba(255, 51, 51, 0.08);
            color: var(--text-primary);
        }

        #context-destination-panel {
            background: #0e0e11;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 12px;
            display: none;
            align-items: flex-start;
            gap: 12px;
        }

        .meta-vector-icon {
            width: 20px;
            height: 20px;
            margin-top: 2px;
            flex-shrink: 0;
        }

        .meta-vector-info-stack {
            flex-grow: 1;
            overflow: hidden;
        }

        #node-panel-title {
            color: var(--text-primary);
            font-size: 0.85rem;
            font-weight: bold;
            margin-bottom: 2px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        #node-panel-address {
            color: var(--text-muted);
            font-size: 0.78rem;
            line-height: 1.3;
        }

        #route-variants-dashboard {
            display: none;
            flex-direction: column;
            gap: 6px;
            background: #0e0e11;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 10px;
        }

        .route-badge-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px;
            background: rgba(255,255,255,0.02);
            border-radius: 6px;
            font-size: 0.78rem;
        }

        /* Traffic Matrix Dashboard Controls */
        .traffic-matrix-control {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #0e0e11;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 8px 12px;
            font-size: 0.78rem;
            color: var(--text-secondary);
        }

        .traffic-matrix-control input[type="range"] {
            accent-color: var(--action-red);
            cursor: pointer;
            width: 140px;
        }

        .workspace-hardware-row {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 8px;
        }

        .hud-btn {
            background: var(--bg-panel-solid);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 10px;
            color: var(--text-secondary);
            font-size: 0.75rem;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            transition: all 0.15s ease;
        }

        .hud-btn:hover {
            background: #24242c;
            color: var(--text-primary);
            border-color: #3e3e4a;
        }

        #launch-routing-action {
            grid-column: span 3;
            background: var(--action-red);
            color: #ffffff;
            border: none;
            padding: 14px;
            font-size: 0.85rem;
            font-weight: bold;
            letter-spacing: 0.5px;
            box-shadow: 0 4px 12px var(--action-red-glow);
        }

        #launch-routing-action:hover {
            background: #ff4d4d;
            box-shadow: 0 6px 16px rgba(255, 51, 51, 0.5);
        }

        .custom-spatial-marker {
            cursor: pointer;
            transform: translate(-50%, -100%);
        }

        .live-gps-beacon-node {
            width: 16px;
            height: 16px;
            background: #007aff;
            border: 3px solid #ffffff;
            border-radius: 50%;
            box-shadow: 0 0 14px rgba(0, 122, 255, 0.8);
            transition: transform 0.1s linear;
        }
    </style>
</head>
<body>

    <div id="map"></div>

    <div class="hud-system-header">
        <div class="hud-module">
            <div class="brand-node">GEO<span>PRO</span></div>[cite: 1]
            <div style="width: 1px; height: 14px; background: var(--border-color);"></div>[cite: 1]
            <div id="telemetry-status-node">BOOTING SYSTEM...</div>[cite: 1]
        </div>

        <div id="coordinate-overlay-tracker" class="hud-module">[cite: 1]
            X: --.----- | Y: --.-----
        </div>
    </div>

    <div id="control-panel-deck">[cite: 1]
        <div id="drag-handle"></div>[cite: 1]
        <div class="workspace-content-body">[cite: 1]
            
            <div class="search-engine-wrap">[cite: 1]
                <input type="text" id="osm-engine-input" placeholder="Search target vector coordinate pattern..." autocomplete="off"/>[cite: 1]
                <div id="osm-engine-dropdown" class="suggest-dropdown-matrix"></div>[cite: 1]
            </div>

            <div id="context-destination-panel">[cite: 1]
                <svg class="meta-vector-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">[cite: 1]
                    <path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z" fill="#ff3333"/>[cite: 1]
                </svg>
                <div class="meta-vector-info-stack">[cite: 1]
                    <div id="node-panel-title">Selected Matrix Node</div>[cite: 1]
                    <div id="node-panel-address">Tracking calculations offline...</div>[cite: 1]
                </div>
            </div>

            <!-- Dynamic Traffic Modifier Matrix Input -->
            <div class="traffic-matrix-control">
                <label>3D Traffic Congestion</label>
                <input type="range" id="traffic-matrix-density" min="1" max="3" value="2" step="1">
            </div>

            <div id="route-variants-dashboard"></div>[cite: 1]

            <div class="workspace-hardware-row">[cite: 1]
                <button id="toggle-satellite-view" class="hud-btn">[cite: 1]
                    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"></path></svg>[cite: 1]
                    SATELLITE
                </button>
                <button id="compass-orientation-lock" class="hud-btn">[cite: 1]
                    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="3 11 22 2 13 21 11 13 3 11"></polygon></svg>[cite: 1]
                    NORTH
                </button>
                <button id="force-gps-recenter" class="hud-btn">[cite: 1]
                    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"></circle><circle cx="12" cy="12" r="3"></circle></svg>[cite: 1]
                    RECENTER
                </button>

                <button id="launch-routing-action" class="hud-btn" style="display:none;">[cite: 1]
                    CALCULATE VECTOR ROUTE
                </button>
                <button id="flush-workspace-trigger" class="hud-btn" style="grid-column: span 3; background: transparent; border-color: rgba(255,255,255,0.05); color: var(--text-muted);">[cite: 1]
                    CLEAR ACTIVE WORKSPACE
                </button>
            </div>

        </div>
    </div>

    <script>
        let defaultUserCoordinates = [-122.084, 37.422]; [cite: 1]
        let currentLiveGpsPosition = null; [cite: 1]
        let targetSelectedCoordinates = null;[cite: 1]
        let querySearchDebounceTimer = null;[cite: 1]
         
        let activeMapMarker = null; [cite: 1]
        let userLocationBeaconMarker = null;[cite: 1]
        let activeRouteDataStore = []; [cite: 1]
        let satelliteModeActive = false;[cite: 1]

        let isNavigating = false;[cite: 1]
        let navigationAnimationId = null;[cite: 1]
        let currentRouteStepIndex = 0;[cite: 1]
        let cameraTrackingMode = true; [cite: 1]

        // 3D Lane & Traffic Animation Engine State Variables
        let trafficFlowDensity = 2; // 1 = Low, 2 = Moderate, 3 = Heavy Gridlock
        let laneAnimationTicker = 0;
        let trafficEngineLoopId = null;
        let activeTrafficPointsGeoJSON = { type: 'FeatureCollection', features: [] };

        const REGULAR_MAP_STYLE = 'https://tiles.openfreemap.org/styles/liberty';[cite: 1]

        const map = new maplibregl.Map({
            container: 'map',
            style: REGULAR_MAP_STYLE, 
            center: defaultUserCoordinates, 
            zoom: 2, 
            pitch: 50, 
            bearing: 0,
            antialias: true
        });[cite: 1]

        function createCustomMarkerElement() {
            const el = document.createElement('div');[cite: 1]
            el.className = 'custom-spatial-marker';[cite: 1]
            el.innerHTML = `
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <circle cx="12" cy="12" r="8" fill="#ff3333" fill-opacity="0.3"/>
                    <circle cx="12" cy="12" r="4" fill="#ff3333"/>
                    <circle cx="12" cy="12" r="3.5" stroke="#ffffff" stroke-width="1"/>
                </svg>
            `;[cite: 1]
            return el;[cite: 1]
        }

        function computeBearingAngle(start, end) {
            const radiansToDegrees = 180 / Math.PI;[cite: 1]
            const lat1 = start[1] * Math.PI / 180;[cite: 1]
            const lat2 = end[1] * Math.PI / 180;[cite: 1]
            const dLon = (end[0] - start[0]) * Math.PI / 180;[cite: 1]
            
            const y = Math.sin(dLon) * Math.cos(lat2);[cite: 1]
            const x = Math.cos(lat1) * Math.sin(lat2) - Math.sin(lat1) * Math.cos(lat2) * Math.cos(dLon);[cite: 1]
            
            return (Math.atan2(y, x) * radiansToDegrees + 360) % 360;[cite: 1]
        }

        /**
         * Mathematical Coordinate Offset Engine
         * Creates explicit secondary tracking coordinate pairs running parallel to basic lines
         */
        function calculateParallelOffsetLane(coordinates, offsetMeters) {
            const offsetDegreeFactor = offsetMeters / 111320; 
            const resultantPoints = [];

            for (let i = 0; i < coordinates.length; i++) {
                let dx = 0, dy = 0;
                
                if (i < coordinates.length - 1) {
                    dx = coordinates[i+1][0] - coordinates[i][0];
                    dy = coordinates[i+1][1] - coordinates[i][1];
                } else if (i > 0) {
                    dx = coordinates[i][0] - coordinates[i-1][0];
                    dy = coordinates[i][1] - coordinates[i-1][1];
                }

                const segmentLength = Math.sqrt(dx * dx + dy * dy);
                if (segmentLength === 0) {
                    resultantPoints.push([...coordinates[i]]);
                    continue;
                }

                // Compute normal perpendicular line vectors
                const nx = -dy / segmentLength;
                const ny = dx / segmentLength;

                resultantPoints.push([
                    coordinates[i][0] + nx * offsetDegreeFactor,
                    coordinates[i][1] + ny * offsetDegreeFactor
                ]);
            }
            return resultantPoints;
        }

        map.on('load', () => {
            initTacticalPanelDraggingPhysics();[cite: 1]
            initAutonomousSearchMatrix();[cite: 1]
            initDirectMapInputListeners();[cite: 1]
            initHardwareConsoleTriggers();[cite: 1]
            injectRealtime3DGeometryAndLanes();[cite: 1]
            establishLiveHardwarePositioningStream();[cite: 1]

            // Monitor Density Matrix Inputs
            document.getElementById('traffic-matrix-density').addEventListener('input', (e) => {
                trafficFlowDensity = parseInt(e.target.value);
                if (activeRouteDataStore.length > 0) {
                    renderRouteDashboardUI();
                }
            });

            map.on('mousemove', (e) => {
                const overlay = document.getElementById('coordinate-overlay-tracker');[cite: 1]
                if (overlay) {[cite: 1]
                    overlay.innerText = `X: ${e.lngLat.lng.toFixed(5)} | Y: ${e.lngLat.lat.toFixed(5)}`;[cite: 1]
                }
            });[cite: 1]

            map.on('dragstart', () => {
                if (!isNavigating) cameraTrackingMode = false;[cite: 1]
            });[cite: 1]
        });

        map.on('style.data', () => {
            injectRealtime3DGeometryAndLanes();[cite: 1]
            redrawActiveRoutePipelines();[cite: 1]
        });

        function injectRealtime3DGeometryAndLanes() {
            const styleSources = map.getStyle().sources;[cite: 1]
            if (!styleSources) return;[cite: 1]
            const sourceKey = Object.keys(styleSources).find(key => styleSources[key].type === 'vector') || 'openfreemap';[cite: 1]

            if (!map.getSource(sourceKey)) return;[cite: 1]

            if (!map.getLayer('spatial-3d-lanes')) {[cite: 1]
                map.addLayer({[cite: 1]
                    'id': 'spatial-3d-lanes',[cite: 1]
                    'source': sourceKey,[cite: 1]
                    'source-layer': 'transportation',[cite: 1]
                    'type': 'line',[cite: 1]
                    'filter': ['==', '$geometryType', 'LineString'],[cite: 1]
                    'layout': {[cite: 1]
                        'line-join': 'round',[cite: 1]
                        'line-cap': 'round'[cite: 1]
                    },[cite: 1]
                    'paint': {[cite: 1]
                        'line-color': satelliteModeActive ? '#ff2a2a' : '#ee3333',[cite: 1]
                        'line-width': [[cite: 1]
                            'interpolate', ['linear'], ['zoom'],[cite: 1]
                            12, 1,[cite: 1]
                            15, 3,[cite: 1]
                            18, 12[cite: 1]
                        ],[cite: 1]
                        'line-opacity': satelliteModeActive ? 0.65 : 0.15[cite: 1]
                    }[cite: 1]
                });[cite: 1]
            }[cite: 1]

            if (!map.getLayer('spatial-3d-buildings')) {[cite: 1]
                map.addLayer({[cite: 1]
                    'id': 'spatial-3d-buildings',[cite: 1]
                    'source': sourceKey,[cite: 1]
                    'source-layer': 'building',[cite: 1]
                    'type': 'fill-extrusion',[cite: 1]
                    'minzoom': 13,[cite: 1]
                    'paint': {[cite: 1]
                        'fill-extrusion-color': satelliteModeActive ? '#1a1a1f' : '#cbd2db',[cite: 1]
                        'fill-extrusion-height': ['coalesce', ['get', 'height'], ['get', 'render_height'], 15],[cite: 1]
                        'fill-extrusion-base': ['coalesce', ['get', 'min_height'], ['get', 'render_min_height'], 0],[cite: 1]
                        'fill-extrusion-opacity': satelliteModeActive ? 0.80 : 0.45[cite: 1]
                    }[cite: 1]
                });[cite: 1]
            }[cite: 1]
        }

        async function handleRoutingButtonClick() {
            const btn = document.getElementById('launch-routing-action');[cite: 1]
            if (!btn) return;[cite: 1]

            if (activeRouteDataStore.length > 0 && !isNavigating) {[cite: 1]
                startRouteSimulation();[cite: 1]
                return;[cite: 1]
            }[cite: 1]

            if (isNavigating) {[cite: 1]
                stopRouteSimulation();[cite: 1]
                return;[cite: 1]
            }[cite: 1]

            btn.innerText = "COMPUTING...";[cite: 1]
            btn.style.opacity = "0.6";[cite: 1]
             
            let originCoords = currentLiveGpsPosition;[cite: 1]
            if (!originCoords) {[cite: 1]
                const mapCenter = map.getCenter();[cite: 1]
                originCoords = [mapCenter.lng, mapCenter.lat];[cite: 1]
            }[cite: 1]
             
            const routingQueryUrl = `https://router.project-osrm.org/route/v1/driving/${originCoords.join(',')};${targetSelectedCoordinates.join(',')}?overview=full&geometries=geojson&alternatives=true`;[cite: 1]
             
            try {
                clearActiveRouteLayers();[cite: 1]
                activeRouteDataStore = [];[cite: 1]

                const controller = new AbortController();[cite: 1]
                const timeoutId = setTimeout(() => controller.abort(), 3500);[cite: 1]

                const stream = await fetch(routingQueryUrl, { signal: controller.signal });[cite: 1]
                clearTimeout(timeoutId);[cite: 1]
                
                const results = await stream.json();[cite: 1]
                
                if (results.code === 'Ok' && results.routes && results.routes.length > 0) {[cite: 1]
                    activeRouteDataStore = results.routes.map((route, idx) => ({
                        index: idx,[cite: 1]
                        geometry: route.geometry,[cite: 1]
                        duration: route.duration,[cite: 1]
                        distance: route.distance,[cite: 1]
                        isFallback: false[cite: 1]
                    }));[cite: 1]
                } else {
                    generateLocalGridRouteFallback(originCoords, targetSelectedCoordinates);[cite: 1]
                }
            } catch (err) { 
                generateLocalGridRouteFallback(originCoords, targetSelectedCoordinates);[cite: 1]
            }

            redrawActiveRoutePipelines();[cite: 1]
            renderRouteDashboardUI();[cite: 1]
            
            btn.innerText = "START SIMULATION";[cite: 1]
            btn.style.background = "#28a745"; [cite: 1]
            btn.style.boxShadow = "0 6px 16px rgba(40, 167, 69, 0.4)";[cite: 1]
            btn.style.opacity = "1.0";[cite: 1]
        }

        function startRouteSimulation() {
            if (activeRouteDataStore.length === 0) return;[cite: 1]
            
            const routeCoordinates = activeRouteDataStore[0].geometry.coordinates;[cite: 1]
            if (!routeCoordinates || routeCoordinates.length === 0) return;[cite: 1]

            isNavigating = true;[cite: 1]
            cameraTrackingMode = true;[cite: 1]
            currentRouteStepIndex = 0;[cite: 1]
            
            const btn = document.getElementById('launch-routing-action');[cite: 1]
            if (btn) {[cite: 1]
                btn.innerText = "HALT SIMULATION";[cite: 1]
                btn.style.background = "#dc3545"; [cite: 1]
                btn.style.boxShadow = "0 6px 16px rgba(220, 53, 69, 0.4)";[cite: 1]
            }[cite: 1]

            const statusNode = document.getElementById('telemetry-status-node');[cite: 1]
            if (statusNode) {[cite: 1]
                statusNode.innerText = "NAVIGATING (SIM)";[cite: 1]
                statusNode.style.color = "#28a745";[cite: 1]
            }[cite: 1]

            function frame() {
                if (!isNavigating) return;[cite: 1]

                if (currentRouteStepIndex < routeCoordinates.length) {[cite: 1]
                    const currentPos = routeCoordinates[currentRouteStepIndex];[cite: 1]
                    
                    if (userLocationBeaconMarker) {[cite: 1]
                        userLocationBeaconMarker.setLngLat(currentPos);[cite: 1]
                    }[cite: 1]

                    let targetBearing = map.getBearing();[cite: 1]
                    if (currentRouteStepIndex < routeCoordinates.length - 1) {[cite: 1]
                        targetBearing = computeBearingAngle(currentPos, routeCoordinates[currentRouteStepIndex + 1]);[cite: 1]
                    }[cite: 1]
                    
                    map.easeTo({
                        center: currentPos,
                        zoom: 17.5, // Tighter lock for 3D Lane vision
                        pitch: 60,
                        bearing: targetBearing,

        function generateLocalGridRouteFallback(start, end) {
            const midPoint1 = [end[0], start[1]]; [cite: 1]
            const midPoint2 = [start[0] + (end[0] - start[0]) * 0.5, start[1] + (end[1] - start[1]) * 0.5];[cite: 1]

            const mockGeometry = {
                type: "LineString",[cite: 1]
                coordinates: [start, midPoint2, midPoint1, end][cite: 1]
            };

            const dLng = end[0] - start[0];[cite: 1]
            const dLat = end[1] - start[1];[cite: 1]
            const rawDistanceMeters = Math.sqrt(dLng * dLng + dLat * dLat) * 111000; [cite: 1]

            activeRouteDataStore = [[cite: 1]
                {
                    index: 0,[cite: 1]
                    geometry: mockGeometry,[cite: 1]
                    duration: (rawDistanceMeters / 13.4), [cite: 1]
                    distance: rawDistanceMeters,[cite: 1]
                    isFallback: true[cite: 1]
                }
            ];
        }

                const lanesData = [

        /**
         * Autonomous Procedural Traffic Simulator Loop
         * Generates and updates real-time moving traffic entities natively
         */
        function animateClientTrafficFlow(center, left, right) {
            if (activeRouteDataStore.length === 0) {
                trafficEngineLoopId = null;
                return;
            }

            laneAnimationTicker += 0.0018; 
            const features = [];
            
            // Adjust loop metrics based on control configurations
            let vehicleSpeedModifier = 1.0;
            let stressColor = '#22c55e'; // Green

            if (trafficFlowDensity === 2) {
                vehicleSpeedModifier = 0.6;
                stressColor = '#eab308'; // Yellow
            } else if (trafficFlowDensity === 3) {
                vehicleSpeedModifier = 0.15;
                stressColor = '#ff3333'; // Heavy Red
            }

            const activeLanes = [left, center, right];
            const maxProceduralVehicles = 15 * trafficFlowDensity;

            for (let i = 0; i < maxProceduralVehicles; i++) {
                const laneIdx = i % 3;
                const targetedLaneCoords = activeLanes[laneIdx];
                if (!targetedLaneCoords || targetedLaneCoords.length < 2) continue;

                // Stagger progress along coordinates via linear progression metrics
                const rawProgressFactor = (laneAnimationTicker * (1 + (i * 0.04) * vehicleSpeedModifier)) % 1.0;
                
                // Map fractional value cleanly directly to geographic geometry indexes
                const exactFloatingIdx = rawProgressFactor * (targetedLaneCoords.length - 1);
                const baseIdx = Math.floor(exactFloatingIdx);
                const nextIdx = Math.min(baseIdx + 1, targetedLaneCoords.length - 1);
                const interpolationWeight = exactFloatingIdx - baseIdx;

                const p1 = targetedLaneCoords[baseIdx];
                const p2 = targetedLaneCoords[nextIdx];

                if (p1 && p2) {
                    const interpolatedLng = p1[0] + (p2[0] - p1[0]) * interpolationWeight;
                    const interpolatedLat = p1[1] + (p2[1] - p1[1]) * interpolationWeight;

                    // Mixed color arrays to make matrix rendering dynamic
                    let actualColor = stressColor;
                    if (trafficFlowDensity === 2) {
                        actualColor = i % 2 === 0 ? '#22c55e' : '#eab308';
                    } else if (trafficFlowDensity === 3) {
                        actualColor = i % 3 === 0 ? '#eab308' : '#ff3333';
                    }

                    features.push({
                        type: 'Feature',
                        geometry: { type: 'Point', coordinates: [interpolatedLng, interpolatedLat] },
                        properties: { color: actualColor }
                    });
                }
            }

            activeTrafficPointsGeoJSON.features = features;

            activeRouteDataStore.forEach(r => {
                const sourceInstance = map.getSource(`traffic-dots-src-${r.index}`);
                if (sourceInstance) sourceInstance.setData(activeTrafficPointsGeoJSON);
            });

            trafficEngineLoopId = requestAnimationFrame(() => animateClientTrafficFlow(center, left, right));
        }

        function initTacticalPanelDraggingPhysics() {
            const panel = document.getElementById('control-panel-deck');[cite: 1]
            const handle = document.getElementById('drag-handle');[cite: 1]
            if (!panel || !handle) return;[cite: 1]
            
            let isDragging = false, startY = 0, currentTranslateY = 0, lastTranslateY = 0;[cite: 1]

            handle.addEventListener('mousedown', startDrag);[cite: 1]
            window.addEventListener('mousemove', processDrag);[cite: 1]
            window.addEventListener('mouseup', endDrag);[cite: 1]
            handle.addEventListener('touchstart', (e) => startDrag(e.touches[0]), { passive: true });[cite: 1]
            window.addEventListener('touchmove', (e) => processDrag(e.touches[0]), { passive: false });[cite: 1]
            window.addEventListener('touchend', endDrag);[cite: 1]

            function startDrag(e) { isDragging = true; startY = e.clientY; panel.classList.remove('snapping'); }[cite: 1]
            function processDrag(e) {
                if (!isDragging) return;[cite: 1]
                let nextY = lastTranslateY + (e.clientY - startY);[cite: 1]
                if (nextY < -150) nextY = -150; if (nextY > 400) nextY = 400;[cite: 1]
                currentTranslateY = nextY;[cite: 1]
                panel.style.transform = `translateX(-50%) translateY(${currentTranslateY}px)`;[cite: 1]
            }
            function endDrag() {
                if (!isDragging) return; isDragging = false; panel.classList.add('snapping');[cite: 1]
                if (currentTranslateY > 150) currentTranslateY = 320;[cite: 1]
                else if (currentTranslateY < -50) currentTranslateY = -80;[cite: 1]
                else currentTranslateY = 0;[cite: 1]
                panel.style.transform = `translateX(-50%) translateY(${currentTranslateY}px)`;[cite: 1]
                lastTranslateY = currentTranslateY;[cite: 1]
            }
        }

        function initAutonomousSearchMatrix() {

            input.addEventListener('input', (e) => {

                clearTimeout(querySearchDebounceTimer);[cite: 1]
                if (queryVal.length < 3) { dropdown.style.display = 'none'; return; }[cite: 1]
                 
                querySearchDebounceTimer = setTimeout(async () => {
                    try {

                        if (currentLiveGpsPosition) searchApiUrl += `&lon=${currentLiveGpsPosition[0]}&lat=${currentLiveGpsPosition[1]}`;[cite: 1]
                        const response = await fetch(searchApiUrl);[cite: 1]
                        const payload = await response.json();[cite: 1]
                        if (!payload.features || payload.features.length === 0) { dropdown.style.display = 'none'; return; }[cite: 1]
                         
                        dropdown.innerHTML = '';[cite: 1]
                        payload.features.forEach(feature => {
                            const segmentItem = document.createElement('div');[cite: 1]

                            segmentItem.innerText = labeledLocation;[cite: 1]

                            });

            });
