<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GeoPro | Spatial Workspace</title>

    <!-- MapLibre GL JS Core -->
    <script src="https://unpkg.com/maplibre-gl@4.1.2/dist/maplibre-gl.js"></script>
    <link href="https://unpkg.com/maplibre-gl@4.1.2/dist/maplibre-gl.css" rel="stylesheet" />

    <style>
        :root {
            --bg-base: #020203;
            --bg-panel: rgba(12, 12, 16, 0.82);
            --bg-surface: rgba(255, 255, 255, 0.04);
            --bg-surface-hover: rgba(255, 255, 255, 0.08);
            --action-red: #ff2222;
            --action-red-glow: rgba(255, 34, 34, 0.4);
            --border-subtle: rgba(255, 255, 255, 0.08);
            --text-main: #ffffff;
            --text-secondary: #a0a0ab;
            --text-muted: #52525b;
            --accent-green: #30d158;
            --sidebar-width: 380px;
            --apple-easing: cubic-bezier(0.25, 1, 0.5, 1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", Roboto, sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        body, html { width: 100%; height: 100%; overflow: hidden; background-color: var(--bg-base); }

        #app-viewport { position: relative; width: 100%; height: 100%; }
        #map { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }

        button { font: inherit; background: none; border: none; cursor: pointer; color: inherit; transition: all 0.3s var(--apple-easing); }
        input { font: inherit; }

        /* FIXED LOWER-LEFT INTERACTIVE PANEL */
        #control-panel-deck {
            position: absolute; bottom: 32px; left: 32px; width: var(--sidebar-width); max-height: calc(100% - 64px); z-index: 10;
            background: var(--bg-panel); backdrop-filter: blur(40px) saturate(210%); -webkit-backdrop-filter: blur(40px) saturate(210%);
            border: 1px solid var(--border-subtle); border-radius: 24px; box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
            display: flex; flex-direction: column; overflow: hidden; transform: translateY(0); user-select: none;
        }

        #control-panel-deck.snapping { transition: transform 0.45s var(--apple-easing); }

        .drag-handle-bar { width: 100%; padding: 16px 0 6px 0; display: flex; justify-content: center; align-items: center; cursor: grab; }
        .drag-handle-pill { width: 36px; height: 5px; background: rgba(255, 255, 255, 0.12); border-radius: 10px; }
        .drag-handle-bar:hover .drag-handle-pill { background: rgba(255, 255, 255, 0.25); }

        .panel-scrollable-body { flex: 1; overflow-y: auto; padding: 0 24px 24px 24px; display: flex; flex-direction: column; gap: 20px; }
        .panel-branding-header { display: flex; align-items: center; justify-content: space-between; }
        .brand-logo { font-size: 1.25rem; font-weight: 700; text-transform: uppercase; }
        .brand-logo span { color: var(--action-red); text-shadow: 0 0 15px var(--action-red-glow); }

        .search-field-container { position: relative; width: 100%; }
        .search-input-wrapper { display: flex; background: var(--bg-surface); border: 1px solid var(--border-subtle); border-radius: 14px; padding: 2px; align-items: center; }
        .search-input-node { flex: 1; background: transparent; border: none; outline: none; color: var(--text-main); padding: 12px 16px; font-size: 0.95rem; }
        .search-input-node::placeholder { color: var(--text-muted); }

        .osm-dropdown-menu { position: absolute; top: 100%; left: 0; width: 100%; background: rgba(15, 15, 20, 0.95); border: 1px solid var(--border-subtle); border-radius: 14px; margin-top: 8px; max-height: 240px; overflow-y: auto; z-index: 150; display: none; }
        .osm-suggest-item { padding: 12px 18px; font-size: 0.9rem; cursor: pointer; color: var(--text-secondary); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .osm-suggest-item:hover { background: rgba(255, 34, 34, 0.1); color: var(--text-main); }

        #context-destination-panel { background: rgba(255, 255, 255, 0.02); border: 1px solid var(--border-subtle); border-radius: 18px; padding: 18px; display: none; flex-direction: column; gap: 16px; }
        .panel-header-title { font-size: 1.05rem; font-weight: 600; }
        .panel-address-sub { font-size: 0.85rem; color: var(--text-secondary); line-height: 1.45; }
        
        .action-button-matrix { display: flex; gap: 10px; }
        .primary-action-btn { flex: 1; background: var(--action-red); padding: 14px; border-radius: 12px; font-size: 0.9rem; font-weight: 600; text-align: center; box-shadow: 0 4px 12px var(--action-red-glow); }
        .primary-action-btn:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(255, 34, 34, 0.5); }
        
        .kill-action-btn { background: rgba(255,255,255,0.04); border: 1px solid var(--border-subtle); width: 48px; border-radius: 12px; display: flex; align-items: center; justify-content: center; }
        .kill-action-btn:hover { border-color: var(--action-red); color: var(--action-red); }

        .hardware-diagnostics-deck { background: rgba(0, 0, 0, 0.15); border: 1px solid var(--border-subtle); border-radius: 14px; padding: 14px; display: flex; flex-direction: column; gap: 8px; font-size: 0.75rem; }
        .diagnostic-row { display: flex; justify-content: space-between; align-items: center; }
        .diagnostic-row span:first-child { color: var(--text-muted); text-transform: uppercase; }
        .diagnostic-row span:last-child { color: var(--text-secondary); font-family: monospace; }

        #right-floating-console-stack { position: absolute; top: 32px; right: 32px; z-index: 100; display: flex; flex-direction: column; gap: 10px; }
        .console-action-btn-node { background: var(--bg-panel); border: 1px solid var(--border-subtle); width: 46px; height: 46px; border-radius: 14px; display: flex; align-items: center; justify-content: center; font-size: 1.1rem; box-shadow: 0 10px 25px rgba(0,0,0,0.3); }
        .console-action-btn-node:hover { background: var(--bg-surface-hover); transform: scale(1.04); }

        /* LIVE TELEMETRY MARKER STYLES */
        .telemetry-pulse-marker { width: 20px; height: 20px; position: relative; }
        .telemetry-pulse-core { width: 14px; height: 14px; background: var(--action-red); border: 2px solid #ffffff; border-radius: 50%; position: absolute; top: 3px; left: 3px; z-index: 2; }
        .telemetry-pulse-ring { width: 32px; height: 32px; background: rgba(255, 34, 34, 0.25); border-radius: 50%; position: absolute; top: -6px; left: -6px; animation: pulseGlow 1.8s infinite ease-out; z-index: 1; }
        @keyframes pulseGlow { 0% { transform: scale(0.4); opacity: 1; } 100% { transform: scale(1.6); opacity: 0; } }

        @media (max-width: 500px) {
            #control-panel-deck { width: calc(100% - 32px) !important; left: 16px !important; bottom: 16px !important; }
        }
    </style>
</head>
<body>

    <div id="app-viewport">
        <div id="map"></div>

        <div id="control-panel-deck">
            <div class="drag-handle-bar" id="drag-handle"><div class="drag-handle-pill"></div></div>
            <div class="panel-scrollable-body">
                <div class="panel-branding-header">
                    <div class="brand-logo">Geo<span>Pro</span></div>
                </div>

                <div class="search-field-container">
                    <div class="search-input-wrapper">
                        <input type="text" class="search-input-node" id="osm-engine-input" placeholder="Search destinations...">
                    </div>
                    <div class="osm-dropdown-menu" id="osm-engine-dropdown"></div>
                </div>

                <div id="context-destination-panel">
                    <div class="panel-header-title" id="node-panel-title">Target Node</div>
                    <div class="panel-address-sub" id="node-panel-address">Resolving data...</div>
                    <div class="action-button-matrix">
                        <button class="primary-action-btn" id="launch-routing-action">Generate Route</button>
                        <button class="kill-action-btn" id="flush-workspace-trigger">✖</button>
                    </div>
                </div>

                <div class="hardware-diagnostics-deck">
                    <div class="diagnostic-row"><span>GPS Tracking Status</span><span id="gps-status-label" style="color: #ffaa00;">MOCK INTERACTIVE OVERRIDE</span></div>
                    <div class="diagnostic-row"><span>Tile Core</span><span>MapLibre v4</span></div>
                </div>
            </div>
        </div>

        <div id="right-floating-console-stack">
            <button class="console-action-btn-node" id="force-gps-recenter" title="Recenter to Origin">🎯</button>
            <button class="console-action-btn-node" id="compass-orientation-lock" title="True North">🧭</button>
        </div>
    </div>

    <script>
        const map = new maplibregl.Map({
            container: 'map',
            style: 'https://tiles.openfreemap.org/styles/dark', 
            center: [-123.2078, 39.1502], 
            zoom: 13.5,
            pitch: 35,
            bearing: 0,
            antialias: true
        });

        // Initialize with default fallback coordinates
        let defaultUserCoordinates = [-123.2078, 39.1502];
        let targetSelectedCoordinates = null;
        let querySearchDebounceTimer = null;
        let livePositionTelemetryMarkerNode = null;

        map.on('load', () => {
            initPremiumTelemetryMarker();
            initTacticalPanelDraggingPhysics();
            initAutonomousSearchMatrix();
            initDirectMapInputListeners();
            initHardwareConsoleTriggers();
            attemptNativeWebGPS();
        });

        function initPremiumTelemetryMarker() {
            const markerContainer = document.createElement('div');
            markerContainer.className = 'telemetry-pulse-marker';
            const pulseRing = document.createElement('div'); pulseRing.className = 'telemetry-pulse-ring';
            const pulseCore = document.createElement('div'); pulseCore.className = 'telemetry-pulse-core';
            markerContainer.appendChild(pulseRing); markerContainer.appendChild(pulseCore);

            livePositionTelemetryMarkerNode = new maplibregl.Marker({ element: markerContainer })
                .setLngLat(defaultUserCoordinates)
                .addTo(map);
        }

        // Native Browser Geolocation Stream API
        function attemptNativeWebGPS() {
            if ("geolocation" in navigator) {
                navigator.geolocation.watchPosition(
                    (position) => {
                        defaultUserCoordinates = [position.coords.longitude, position.coords.latitude];
                        livePositionTelemetryMarkerNode.setLngLat(defaultUserCoordinates);
                        document.getElementById('gps-status-label').innerText = "LIVE BROWSER CONNECTED";
                        document.getElementById('gps-status-label').style.color = "#30d158";
                    },
                    (error) => {
                        console.warn("Hardware/Browser GPS denied or unavailable. Running mock anchor override.");
                    },
                    { enableHighAccuracy: true, timeout: 10000, maximumAge: 0 }
                );
            }
        }

        function initTacticalPanelDraggingPhysics() {
            const panel = document.getElementById('control-panel-deck');
            const handle = document.getElementById('drag-handle');
            let isDragging = false, startY = 0, currentTranslateY = 0, lastTranslateY = 0;

            handle.addEventListener('mousedown', startDrag);
            window.addEventListener('mousemove', processDrag);
            window.addEventListener('mouseup', endDrag);
            handle.addEventListener('touchstart', (e) => { startDrag(e.touches[0]); }, { passive: true });
            window.addEventListener('touchmove', (e) => { processDrag(e.touches[0]); }, { passive: false });
            window.addEventListener('touchend', endDrag);

            function startDrag(e) { isDragging = true; startY = e.clientY; panel.classList.remove('snapping'); }
            function processDrag(e) {
                if (!isDragging) return;
                let nextY = lastTranslateY + (e.clientY - startY);
                if (nextY < -120) nextY = -120; if (nextY > 380) nextY = 380;
                currentTranslateY = nextY;
                panel.style.transform = `translateY(${currentTranslateY}px)`;
            }
            function endDrag() {
                if (!isDragging) return; isDragging = false; panel.classList.add('snapping');
                if (currentTranslateY > 120) currentTranslateY = 320;
                else if (currentTranslateY < -40) currentTranslateY = -80;
                else currentTranslateY = 0;
                panel.style.transform = `translateY(${currentTranslateY}px)`;
                lastTranslateY = currentTranslateY;
            }
        }

        function initAutonomousSearchMatrix() {
            const input = document.getElementById('osm-engine-input');
            const dropdown = document.getElementById('osm-engine-dropdown');

            input.addEventListener('input', (e) => {
                const queryVal = e.target.value.trim();
                clearTimeout(querySearchDebounceTimer);
                if (queryVal.length < 3) { dropdown.style.display = 'none'; return; }
                
                querySearchDebounceTimer = setTimeout(async () => {
                    try {
                        const response = await fetch(`https://photon.komoot.io/api/?q=${encodeURIComponent(queryVal)}&limit=5`);
                        const payload = await response.json();
                        if (!payload.features || payload.features.length === 0) { dropdown.style.display = 'none'; return; }
                        
                        dropdown.innerHTML = '';
                        payload.features.forEach(feature => {
                            const segmentItem = document.createElement('div');
                            segmentItem.className = 'osm-suggest-item';
                            const p = feature.properties;
                            const labeledLocation = [p.name, p.city, p.state].filter(Boolean).join(', ');
                            segmentItem.innerText = labeledLocation;
                            
                            segmentItem.addEventListener('click', () => {
                                const targetLoc = feature.geometry.coordinates;
                                dropdown.style.display = 'none'; input.value = labeledLocation;
                                map.flyTo({ center: targetLoc, zoom: 15, duration: 2000 });
                                triggerWorkspaceTargetDeck(targetLoc, p.name || "Target Vector", labeledLocation);
                            });
                            dropdown.appendChild(segmentItem);
                        });
                        dropdown.style.display = 'block';
                    } catch (err) { console.error(err); }
                }, 250);
            });
        }

        function initDirectMapInputListeners() {
            map.on('click', async (e) => {
                const pinpoint = [e.lngLat.lng, e.lngLat.lat];
                
                // CRITICAL FALLBACK FUNCTIONALITY: Shift-Click sets origin point if GPS fails
                if (e.originalEvent.shiftKey) {
                    defaultUserCoordinates = pinpoint;
                    livePositionTelemetryMarkerNode.setLngLat(defaultUserCoordinates);
                    return;
                }

                triggerWorkspaceTargetDeck(pinpoint, "Selected Coordinate Node", `Lat: ${pinpoint[1].toFixed(5)}, Lon: ${pinpoint[0].toFixed(5)}`);
                try {
                    const lookup = await fetch(`https://photon.komoot.io/api/?lon=${pinpoint[0]}&lat=${pinpoint[1]}`);
                    const details = await lookup.json();
                    if (details.features && details.features.length > 0) {
                        const p = details.features[0].properties;
                        const addressString = [p.name, p.street, p.postcode].filter(Boolean).join(', ');
                        triggerWorkspaceTargetDeck(pinpoint, p.name || "Map Node Context", addressString || "Raw Matrix Point");
                    }
                } catch(error){}
            });
        }

        function triggerWorkspaceTargetDeck(coords, title, details) {
            targetSelectedCoordinates = coords;
            document.getElementById('node-panel-title').innerText = title;
            document.getElementById('node-panel-address').innerText = details;
            document.getElementById('context-destination-panel').style.display = 'flex';
        }

        async function runLocalSpatialRouteCalculation() {
            if (!targetSelectedCoordinates) return;
            const routingQueryUrl = `https://router.project-osrm.org/route/v1/driving/${defaultUserCoordinates.join(',')};${targetSelectedCoordinates.join(',')}?overview=full&geometries=geojson`;
            
            try {
                const stream = await fetch(routingQueryUrl);
                const results = await stream.json();
                if (results.code !== 'Ok' || !results.routes[0]) return;
                
                const pathGeometry = results.routes[0].geometry;
                if (map.getLayer('active-route-line')) map.removeLayer('active-route-line');
                if (map.getSource('active-route-source')) map.removeSource('active-route-source');
                
                map.addSource('active-route-source', { type: 'geojson', data: { type: 'Feature', geometry: pathGeometry } });
                map.addLayer({
                    id: 'active-route-line', type: 'line', source: 'active-route-source',
                    paint: { 'line-color': '#ff2222', 'line-width': 6, 'line-opacity': 0.95 },
                    layout: { 'line-cap': 'round', 'line-join': 'round' }
                });

                const coordinates = pathGeometry.coordinates;
                const bounds = coordinates.reduce((acc, coord) => acc.extend(coord), new maplibregl.LngLatBounds(coordinates[0], coordinates[0]));
                map.fitBounds(bounds, { padding: 80, duration: 1500 });
            } catch (err) { console.error(err); }
        }

        function initHardwareConsoleTriggers() {
            document.getElementById('compass-orientation-lock').addEventListener('click', () => map.easeTo({ bearing: 0, pitch: 35, duration: 800 }));
            document.getElementById('force-gps-recenter').addEventListener('click', () => map.flyTo({ center: defaultUserCoordinates, zoom: 14.5, duration: 1200 }));
            document.getElementById('launch-routing-action').addEventListener('click', runLocalSpatialRouteCalculation);
            document.getElementById('flush-workspace-trigger').addEventListener('click', () => {
                if (map.getLayer('active-route-line')) map.removeLayer('active-route-line');
                if (map.getSource('active-route-source')) map.removeSource('active-route-source');
                document.getElementById('context-destination-panel').style.display = 'none';
                targetSelectedCoordinates = null;
            });
        }
    </script>
</body>
</html>
