<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GeoPro Workspace</title>
    
    <!-- Mapbox GL JS Core -->
    <script src="https://api.mapbox.com/mapbox-gl-js/v3.3.0/mapbox-gl.js"></script>
    <link href="https://api.mapbox.com/mapbox-gl-js/v3.3.0/mapbox-gl.css" rel="stylesheet" />

    <!-- Mapbox Geocoder Search Plugin -->
    <script src="https://api.mapbox.com/mapbox-gl-geocoder/v5.0.0/mapbox-gl-geocoder.min.js"></script>
    <link rel="stylesheet" href="https://api.mapbox.com/mapbox-gl-geocoder/v5.0.0/mapbox-gl-geocoder.css" type="text/css" />

    <style>
        :root {
            --bg-color: #0a0a0a;
            --panel-bg: #111111;
            --accent-color: #ff2222;
            --accent-dim: #991111;
            --border-color: #222222;
            --text-color: #e5e5e5;
            --text-muted: #666;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body, html {
            width: 100%;
            height: 100vh;
            overflow: hidden;
            background-color: var(--bg-color);
            color: var(--text-color);
        }

        #workspace-container {
            display: flex;
            width: 100%;
            height: 100vh;
            position: relative;
        }

        /* Floating Mobile Menu Trigger Button */
        #mobile-menu-trigger {
            display: none;
            position: absolute;
            top: 14px;
            left: 14px;
            z-index: 30;
            background: var(--panel-bg);
            border: 1px solid var(--border-color);
            color: var(--text-color);
            padding: 10px 16px;
            border-radius: 4px;
            font-size: 0.8rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            transition: border-color 0.2s;
        }

        #mobile-menu-trigger:has(.active-state) {
            border-color: var(--accent-color);
        }

        /* Sidebar Control Center Layout */
        #sidebar {
            width: 340px;
            height: 100%;
            background-color: var(--panel-bg);
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            z-index: 20;
            box-shadow: 10px 0 30px rgba(0,0,0,0.6);
            transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .sidebar-header {
            padding: 24px 20px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .sidebar-header h1 {
            font-size: 1.1rem;
            font-weight: 800;
            letter-spacing: 1.5px;
            text-transform: uppercase;
        }

        .sidebar-header h1 span {
            color: var(--accent-color);
        }

        .back-home {
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.75rem;
            text-transform: uppercase;
            border: 1px solid var(--border-color);
            padding: 5px 10px;
            border-radius: 4px;
            font-weight: 600;
            transition: all 0.2s ease;
        }

        .back-home:hover {
            color: var(--text-color);
            border-color: var(--text-muted);
        }

        .sidebar-content {
            padding: 20px;
            flex-grow: 1;
            overflow-y: auto;
        }

        .control-group {
            margin-bottom: 28px;
        }

        .control-group h3 {
            font-size: 0.75rem;
            text-transform: uppercase;
            color: var(--text-muted);
            letter-spacing: 1px;
            margin-bottom: 12px;
        }

        /* Search Interface Mount Point Overrides */
        .search-wrapper {
            margin-bottom: 24px;
        }
        .mapboxgl-ctrl-geocoder {
            width: 100% !important;
            max-width: 100% !important;
            background-color: #161616 !important;
            border: 1px solid var(--border-color) !important;
            border-radius: 4px !important;
            box-shadow: none !important;
        }
        .mapboxgl-ctrl-geocoder--input {
            color: var(--text-color) !important;
            padding: 10px 10px 10px 40px !important;
            font-size: 0.85rem !important;
        }
        .mapboxgl-ctrl-geocoder--input:focus {
            outline: none !important;
            border-color: var(--accent-color) !important;
        }
        .mapboxgl-ctrl-geocoder--icon-search {
            fill: var(--text-muted) !important;
            top: 10px !important;
        }

        /* Interface Toggle Layouts */
        .toggle-container {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: #161616;
            padding: 14px 12px;
            border-radius: 4px;
            border: 1px solid var(--border-color);
            margin-bottom: 10px;
            cursor: pointer;
            transition: background 0.2s;
        }

        /* Action Buttons */
        .action-btn {
            width: 100%;
            background: #1a1a1a;
            color: var(--text-color);
            border: 1px solid var(--border-color);
            padding: 12px;
            border-radius: 4px;
            font-size: 0.8rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            transition: all 0.2s ease;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .action-btn:hover {
            border-color: var(--accent-color);
            background: rgba(255, 34, 34, 0.05);
        }

        .action-btn.active {
            background: var(--accent-color);
            color: #fff;
            border-color: transparent;
            box-shadow: 0 0 15px rgba(255, 34, 34, 0.3);
        }

        /* System Metrics Board */
        .metrics-board {
            background: #161616;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            padding: 14px;
            font-family: monospace;
            font-size: 0.8rem;
        }
        .metric-line {
            display: flex;
            justify-content: space-between;
            margin-bottom: 6px;
        }
        .metric-line:last-child { margin-bottom: 0; }
        .metric-val { color: var(--accent-color); font-weight: bold; }

        /* Map Window */
        #map {
            flex-grow: 1;
            height: 100%;
            position: relative;
            background-color: #0e0e0e;
        }

        /* Live Tracking Display Overlay */
        #geo-overlay {
            position: absolute;
            bottom: 24px;
            right: 24px;
            background: rgba(10, 10, 10, 0.85);
            padding: 10px 16px;
            border-radius: 4px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.8rem;
            color: var(--text-color);
            pointer-events: none;
            z-index: 5;
            backdrop-filter: blur(5px);
            letter-spacing: 0.5px;
        }

        /* Custom High-Frequency Location Pulse Marker */
        .custom-user-marker {
            width: 16px;
            height: 16px;
            background-color: var(--accent-color);
            border: 2px solid #ffffff;
            border-radius: 50%;
            box-shadow: 0 0 12px var(--accent-color);
            position: relative;
        }
        .custom-user-marker::after {
            content: '';
            position: absolute;
            width: 32px;
            height: 32px;
            border: 2px solid var(--accent-color);
            border-radius: 50%;
            top: -10px;
            left: -10px;
            animation: markerPulse 1.2s infinite ease-out;
            opacity: 0;
        }
        @keyframes markerPulse {
            0% { transform: scale(0.5); opacity: 0.8; }
            100% { transform: scale(1.8); opacity: 0; }
        }

        /* Mobile Viewport Architecture Overrides */
        @media (max-width: 768px) {
            #mobile-menu-trigger {
                display: block;
            }
            #sidebar {
                position: absolute;
                top: 0;
                left: 0;
                width: 280px;
                transform: translateX(-100%);
                box-shadow: none;
            }
            #sidebar.open {
                transform: translateX(0);
                box-shadow: 15px 0 30px rgba(0,0,0,0.8);
            }
            #geo-overlay {
                font-size: 0.7rem;
                padding: 6px 10px;
                bottom: 30px;
                right: 10px;
            }
        }
    </style>
</head>
<body>

    <div id="workspace-container">
        <!-- Responsive Menu Controller Toggle -->
        <button id="mobile-menu-trigger" aria-label="Toggle Control Panel">Menu</button>

        <!-- Application Control Core -->
        <div id="sidebar">
            <div class="sidebar-header">
                <h1>Geo<span>Pro</span></h1>
                <a href="index.html" class="back-home">Exit</a>
            </div>
            
            <div class="sidebar-content">
                <!-- Dedicated Search Architecture Mount -->
                <div class="control-group">
                    <h3>Spatial Directory Search</h3>
                    <div id="search-container" class="search-wrapper"></div>
                </div>

                <div class="control-group">
                    <h3>Data Layers</h3>
                    <label class="toggle-container">
                        <span class="toggle-label">3D Building Extrusions</span>
                        <div class="switch">
                            <input type="checkbox" id="layer-toggle-3d" checked>
                            <span class="slider"></span>
                        </div>
                    </label>
                </div>

                <div class="control-group">
                    <h3>100ms Telemetry Pipeline</h3>
                    <!-- Direct User Action Prompt Component for GPS Request -->
                    <button id="gps-init-btn" class="action-btn">
                        Initialize GPS Tracking
                    </button>
                    
                    <div class="metrics-board">
                        <div class="metric-line">
                            <span>GPS FEED STABLE:</span>
                            <span class="metric-val" id="gps-status">LOCKED</span>
                        </div>
                        <div class="metric-line">
                            <span>LATITUDE:</span>
                            <span class="metric-val" id="telemetry-lat">0.00000</span>
                        </div>
                        <div class="metric-line">
                            <span>LONGITUDE:</span>
                            <span class="metric-val" id="telemetry-lng">0.00000</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Render Viewport -->
        <div id="map">
            <div id="geo-overlay">LNG: -123.2078 | LAT: 39.1502</div>
        </div>
    </div>

    <script>
        mapboxgl.accessToken = 'pk.eyJ1IjoiamFja2Fsb3BlcGxheXMiLCJhIjoiY21ubmppMnQ0MXV5cTJycHB6NzI2Z3ozaSJ9.rC3Z3wHDO5qKVLdiA9XlLg';

        // 1. Initialize Core Map Engine Pipeline
        const map = new mapboxgl.Map({
            container: 'map',
            style: 'mapbox://styles/mapbox/dark-v11', 
            center: [-123.2078, 39.1502],
            zoom: 14.5,
            pitch: 50,
            bearing: -12
        });

        // Mobile Sidebar Transition Interface Handler Logic
        const menuBtn = document.getElementById('mobile-menu-trigger');
        const sidebar = document.getElementById('sidebar');
        const gpsBtn = document.getElementById('gps-init-btn');
        
        menuBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            sidebar.classList.toggle('open');
            menuBtn.innerText = sidebar.classList.contains('open') ? 'Close' : 'Menu';
        });

        map.on('click', () => {
            if (window.innerWidth <= 768 && sidebar.classList.contains('open')) {
                sidebar.classList.remove('open');
                menuBtn.innerText = 'Menu';
            }
        });

        // 2. Mount Geocoding Address & Business Search
        const geocoder = new MapboxGeocoder({
            accessToken: mapboxgl.accessToken,
            mapboxgl: mapboxgl,
            placeholder: 'Search buildings, businesses...',
            marker: { color: '#ff2222' },
            collapsed: false
        });
        document.getElementById('search-container').appendChild(geocoder.onAdd(map));

        geocoder.on('result', () => {
            if (window.innerWidth <= 768) {
                sidebar.classList.remove('open');
                menuBtn.innerText = 'Menu';
            }
        });

        // 3. User-Triggered High-Frequency Telemetry Setup
        let livePosition = null;
        let isTrackingActive = false;
        const markerElement = document.createElement('div');
        markerElement.className = 'custom-user-marker';
        const locationMarker = new mapboxgl.Marker({ element: markerElement });

        function startTelemetryPipeline() {
            if ('geolocation' in navigator) {
                document.getElementById('gps-status').innerText = 'PROMPTING...';
                
                // This call fires the browser's hardware location request popup frame
                navigator.geolocation.watchPosition(
                    (position) => {
                        livePosition = [position.coords.longitude, position.coords.latitude];
                        document.getElementById('gps-status').innerText = 'ACTIVE_ON_TICK';
                        
                        if (!isTrackingActive) {
                            isTrackingActive = true;
                            gpsBtn.classList.add('active');
                            gpsBtn.innerText = 'Center on My Location';
                        }
                    },
                    (error) => {
                        console.warn('Telemetry connection dropped: ', error.message);
                        document.getElementById('gps-status').innerText = 'DENIED_OR_FAIL';
                        gpsBtn.innerText = 'GPS Initialization Failed';
                        gpsBtn.classList.remove('active');
                    },
                    { enableHighAccuracy: true, timeout: 10000, maximumAge: 0 }
                );

                // 100ms Synchronous Hardware Refresh Loop Process
                setInterval(() => {
                    if (livePosition) {
                        locationMarker.setLngLat(livePosition);
                        
                        if (!locationMarker.getMap()) {
                            locationMarker.addTo(map);
                            map.flyTo({ center: livePosition, zoom: 16, essential: true });
                        }
                        
                        document.getElementById('telemetry-lat').innerText = livePosition[1].toFixed(5);
                        document.getElementById('telemetry-lng').innerText = livePosition[0].toFixed(5);
                    }
                }, 100);
            } else {
                document.getElementById('gps-status').innerText = 'UNSUPPORTED';
                gpsBtn.innerText = 'GPS Hardware Missing';
            }
        }

        // Direct interaction event handler listener required by mobile environments
        gpsBtn.addEventListener('click', () => {
            if (!isTrackingActive) {
                startTelemetryPipeline();
            } else if (livePosition) {
                // If permission is already functional, pan straight back to user position frames
                map.flyTo({ center: livePosition, zoom: 16, essential: true });
                if (window.innerWidth <= 768) {
                    sidebar.classList.remove('open');
                    menuBtn.innerText = 'Menu';
                }
            }
        });

        map.on('load', () => {
            const layers = map.getStyle().layers;
            let labelLayerId;
            
            for (let i = 0; i < layers.length; i++) {
                if (layers[i].type === 'symbol' && layers[i].layout && layers[i].layout['text-field']) {
                    labelLayerId = layers[i].id;
                    break;
                }
            }

            // Inject 3D Mesh Geometry Layer into Engine
            map.addLayer({
                'id': '3d-buildings',
                'source': 'composite',
                'source-layer': 'building',
                'filter': ['==', 'extrude', 'true'],
                'type': 'fill-extrusion',
                'minzoom': 14,
                'paint': {
                    'fill-extrusion-color': '#1a1a1a',
                    'fill-extrusion-height': [
                        'interpolate', ['linear'], ['zoom'],
                        14, 0,
                        14.5, ['get', 'height']
                    ],
                    'fill-extrusion-base': [
                        'interpolate', ['linear'], ['zoom'],
                        14, 0,
                        14.5, ['get', 'min_height']
                    ],
                    'fill-extrusion-opacity': 0.85
                }
            }, labelLayerId);

            document.getElementById('layer-toggle-3d').addEventListener('change', (e) => {
                map.setLayoutProperty('3d-buildings', 'visibility', e.target.checked ? 'visible' : 'none');
            });
        });

        const updateOverlay = (lngLat) => {
            document.getElementById('geo-overlay').innerHTML = 
                `LNG: ${lngLat.lng.toFixed(4)} | LAT: ${lngLat.lat.toFixed(4)}`;
        };

        map.on('mousemove', (e) => updateOverlay(e.lngLat));
        map.on('touchmove', (e) => updateOverlay(e.lngLat));
    </script>
</body>
</html>
