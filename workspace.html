<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GeoPro | High-Fidelity Tactical Navigation Platform</title>

    <!-- Mapbox GL JS Core Engine -->
    <script src="https://api.mapbox.com/mapbox-gl-js/v3.3.0/mapbox-gl.js"></script>
    <link href="https://api.mapbox.com/mapbox-gl-js/v3.3.0/mapbox-gl.css" rel="stylesheet" />

    <style>
        :root {
            --bg-base: #060608;
            --bg-panel: rgba(10, 10, 12, 0.85);
            --bg-surface: rgba(22, 22, 26, 0.6);
            --bg-surface-hover: rgba(35, 35, 42, 0.8);
            --action-red: #ff2222;
            --action-red-glow: rgba(255, 34, 34, 0.3);
            --border-subtle: rgba(255, 255, 255, 0.07);
            --border-active: rgba(255, 34, 34, 0.4);
            --text-main: #ffffff;
            --text-secondary: #a0a0ab;
            --text-muted: #52525b;
            --accent-green: #30d158;
            
            --sidebar-width: 420px;
        }

        .pure-cyber-dark {
            --bg-base: #000000;
            --bg-panel: rgba(5, 5, 5, 0.98);
            --bg-surface: rgba(12, 12, 14, 0.85);
            --border-subtle: rgba(255, 34, 34, 0.15);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", Roboto, monospace;
            letter-spacing: -0.2px;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: var(--bg-base);
            color: var(--text-main);
        }

        #app-viewport {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
        }

        #map {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: var(--bg-base);
            z-index: 1;
        }

        button { font: inherit; background: none; border: none; cursor: pointer; color: inherit; transition: all 0.2s cubic-bezier(0.16, 1, 0.3, 1); }
        input { font: inherit; }

        /* ── HIGH FIDELITY LEFT SIDEBAR SYSTEMS COMMAND ── */
        #control-sidebar {
            position: absolute;
            top: 20px;
            left: 20px;
            bottom: 20px;
            width: var(--sidebar-width);
            z-index: 10;
            background: var(--bg-panel);
            backdrop-filter: blur(30px) saturate(200%);
            -webkit-backdrop-filter: blur(30px) saturate(200%);
            border: 1px solid var(--border-subtle);
            border-radius: 24px;
            box-shadow: 0 40px 80px rgba(0, 0, 0, 0.8), 0 0 40px rgba(0, 0, 0, 0.5);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .sidebar-scroll-content {
            flex: 1;
            overflow-y: auto;
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        /* Custom Modern Scrollbar */
        .sidebar-scroll-content::-webkit-scrollbar { width: 6px; }
        .sidebar-scroll-content::-webkit-scrollbar-track { background: transparent; }
        .sidebar-scroll-content::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }

        .sidebar-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding-bottom: 4px;
        }

        .brand-logo {
            font-size: 1.4rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 1.5px;
        }
        .brand-logo span { color: var(--action-red); text-shadow: 0 0 15px var(--action-red-glow); }

        .utility-row-actions { display: flex; gap: 8px; }
        .util-circle-btn {
            background: var(--bg-surface);
            border: 1px solid var(--border-subtle);
            width: 38px;
            height: 38px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1rem;
        }
        .util-circle-btn:hover { border-color: var(--action-red); color: var(--action-red); background: var(--bg-surface-hover); }

        /* 100% Free Osm Nominatim Architecture Input */
        .search-system-wrapper { position: relative; width: 100%; }
        .search-input-field-row {
            display: flex;
            background: var(--bg-surface);
            border: 1px solid var(--border-subtle);
            border-radius: 16px;
            padding: 4px;
            align-items: center;
            transition: all 0.2s;
        }
        .search-input-field-row:focus-within {
            border-color: var(--action-red);
            box-shadow: 0 0 12px rgba(255, 34, 34, 0.15);
            background: var(--bg-surface-hover);
        }
        .search-input-node {
            flex: 1;
            background: transparent;
            border: none;
            outline: none;
            color: var(--text-main);
            padding: 12px 14px;
            font-size: 0.9rem;
            font-weight: 500;
        }
        .search-input-node::placeholder { color: var(--text-muted); }
        
        .clear-search-node-btn {
            padding: 0 14px;
            color: var(--text-muted);
            font-size: 0.8rem;
            display: none;
        }
        .clear-search-node-btn:hover { color: var(--action-red); }

        /* Free Dropdown Suggestions Panel Overlay */
        .osm-dropdown-menu {
            position: absolute;
            top: 100%;
            left: 0;
            width: 100%;
            background: #0b0b0e;
            border: 1px solid var(--border-subtle);
            border-radius: 16px;
            margin-top: 8px;
            max-height: 260px;
            overflow-y: auto;
            z-index: 120;
            display: none;
            box-shadow: 0 20px 40px rgba(0,0,0,0.6);
        }
        .osm-suggest-item {
            padding: 14px 18px;
            font-size: 0.85rem;
            border-bottom: 1px solid rgba(255,255,255,0.02);
            cursor: pointer;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            color: var(--text-secondary);
        }
        .osm-suggest-item:hover { background: rgba(255, 34, 34, 0.08); color: var(--action-red); }

        /* Travel Matrix Selector Grid */
        .travel-matrix-box {
            display: flex;
            gap: 6px;
            background: rgba(0,0,0,0.3);
            padding: 4px;
            border-radius: 16px;
            border: 1px solid var(--border-subtle);
        }
        .matrix-btn-node {
            flex: 1;
            padding: 12px 4px;
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
            color: var(--text-muted);
        }
        .matrix-btn-node svg { stroke: var(--text-muted); fill: none; transition: stroke 0.2s; }
        .matrix-btn-node.active {
            background: rgba(255, 34, 34, 0.12);
            color: var(--action-red);
            border: 1px solid rgba(255, 34, 34, 0.2);
        }
        .matrix-btn-node.active svg { stroke: var(--action-red); }

        /* Dynamic Context Workspace Destination Card */
        #context-destination-panel {
            background: linear-gradient(135deg, var(--bg-surface), rgba(10,10,14,0.2));
            border: 1px solid var(--border-subtle);
            border-radius: 20px;
            padding: 20px;
            display: none;
            flex-direction: column;
            gap: 16px;
            transition: all 0.3s;
        }
        .panel-header-title { font-size: 1.1rem; font-weight: 800; color: var(--text-main); }
        .panel-address-sub { font-size: 0.85rem; color: var(--text-secondary); line-height: 1.45; }

        .alternatives-container { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 2px; }
        .alt-route-pill {
            flex-shrink: 0; background: rgba(255,255,255,0.03); border: 1px solid var(--border-subtle);
            padding: 10px 14px; border-radius: 12px; font-size: 0.75rem; font-weight: 700; color: var(--text-secondary);
        }
        .alt-route-pill.selected { border-color: var(--action-red); color: var(--action-red); background: rgba(255, 34, 34, 0.12); box-shadow: 0 0 10px rgba(255,34,34,0.1); }

        .action-button-matrix { display: flex; gap: 10px; }
        .primary-action-btn {
            flex: 2; background: var(--action-red); padding: 14px; border-radius: 14px; font-size: 0.85rem; font-weight: 700;
            display: flex; align-items: center; justify-content: center; gap: 8px; box-shadow: 0 8px 24px var(--action-red-glow);
        }
        .secondary-action-btn {
            flex: 1; background: rgba(255,255,255,0.05); border: 1px solid var(--border-subtle); padding: 14px; border-radius: 14px; font-size: 0.85rem; font-weight: 600;
        }
        .secondary-action-btn:hover { background: rgba(255,255,255,0.09); border-color: var(--text-secondary); }
        .kill-action-btn { background: rgba(255,255,255,0.04); border: 1px solid var(--border-subtle); width: 50px; border-radius: 14px; display: flex; align-items: center; justify-content: center; }
        .kill-action-btn:hover { border-color: var(--action-red); color: var(--action-red); }

        /* Sequence Multi-Stop Pipeline */
        .pipeline-manager-box {
            display: flex;
            flex-direction: column;
            gap: 8px;
            background: rgba(0,0,0,0.2);
            padding: 12px;
            border-radius: 16px;
            border: 1px solid var(--border-subtle);
        }
        .pipeline-item-row {
            display: flex;
            align-items: center;
            gap: 12px;
            background: var(--bg-surface);
            padding: 12px 14px;
            border-radius: 12px;
            border: 1px solid var(--border-subtle);
            font-size: 0.85rem;
        }
        .pipeline-badge { width: 22px; height: 22px; border-radius: 50%; background: var(--action-red); font-size: 0.7rem; font-weight: 900; display: flex; align-items: center; justify-content: center; }
        .pipeline-string { flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: var(--text-main); font-weight: 500; }
        .pipeline-node-remove { color: var(--text-muted); font-size: 1rem; }
        .pipeline-node-remove:hover { color: var(--action-red); }

        /* Hardware Diagnostics Telemetry Subsystem Panel */
        .hardware-diagnostics-deck {
            background: #09090c;
            border: 1px solid var(--border-subtle);
            border-radius: 18px;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            font-family: monospace;
            font-size: 0.75rem;
        }
        .diagnostic-row { display: flex; justify-content: space-between; align-items: center; }
        .diagnostic-row span:first-child { color: var(--text-muted); text-transform: uppercase; font-weight: 600; }
        .diagnostic-row span:last-child { color: var(--text-secondary); font-weight: bold; }

        /* ── DYNAMIC NAVIGATION INSTRUMENT DECK MODAL ── */
        #active-navigation-hud-overlay {
            display: none; position: absolute; top: 20px; left: 20px; width: var(--sidebar-width); z-index: 15; flex-direction: column; gap: 12px;
        }
        .nav-instruction-banner { background: linear-gradient(165deg, rgba(255,34,34,0.25), #0a0a0d); backdrop-filter: blur(35px); border: 1px solid rgba(255,255,255,0.12); border-radius: 24px; padding: 24px; display: flex; flex-direction: column; gap: 4px; box-shadow: 0 30px 60px rgba(0,0,0,0.7); }
        .nav-banner-metrics { font-size: 1.9rem; font-weight: 900; letter-spacing: -0.5px; color: var(--text-main); }
        .nav-banner-instruction-string { font-size: 0.95rem; color: var(--text-secondary); line-height: 1.4; font-weight: 500; }
        
        .nav-telemetry-strip { background: var(--bg-panel); backdrop-filter: blur(35px); border: 1px solid var(--border-subtle); border-radius: 20px; padding: 18px 20px; display: flex; align-items: center; justify-content: space-between; }
        .strip-metric-node { display: flex; flex-direction: column; }
        .strip-metric-node .metric-val { font-size: 1.25rem; font-weight: 900; color: var(--text-main); }
        .strip-metric-node .metric-lbl { font-size: 0.65rem; color: var(--text-muted); text-transform: uppercase; font-weight: 700; margin-top: 3px; }
        .kill-session-action-trigger { background: #222227; border: 1px solid var(--border-subtle); padding: 12px 18px; border-radius: 12px; font-size: 0.8rem; font-weight: 700; text-transform: uppercase; }
        .kill-session-action-trigger:hover { background: var(--action-red); border-color: var(--action-red); }

        /* Integrated Velocity Cockpit Speedometer */
        #velocity-hud-chip {
            display: none; position: absolute; bottom: 30px; left: 30px; z-index: 15; width: 95px; height: 95px; border-radius: 50%; background: #07070a; border: 4px solid var(--action-red); flex-direction: column; align-items: center; justify-content: center;
            box-shadow: 0 0 30px var(--action-red-glow);
        }
        #velocity-hud-chip .velocity-readout-val { font-size: 1.9rem; font-weight: 900; line-height: 1; color: var(--text-main); }
        #velocity-hud-chip .velocity-readout-lbl { font-size: 0.6rem; color: var(--text-muted); font-weight: 800; margin-top: 2px; }

        /* ── FLIGHT UTILITY CONTROL STACK CONSOLE ── */
        #right-floating-console-stack {
            position: absolute; top: 20px; right: 20px; z-index: 100; display: flex; flex-direction: column; gap: 10px;
        }
        .console-action-btn-node {
            background: var(--bg-panel); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border: 1px solid var(--border-subtle); width: 48px; height: 48px; border-radius: 14px; display: flex; align-items: center; justify-content: center; transition: all 0.2s cubic-bezier(0.16, 1, 0.3, 1);
            font-size: 1.15rem;
        }
        .console-action-btn-node:hover { background: var(--bg-surface-hover); border-color: var(--text-secondary); transform: translateY(-2px); }
        .console-action-btn-node.active { border-color: var(--action-red); color: var(--action-red); box-shadow: 0 0 15px var(--action-red-glow); }

        /* True Heading Compass Node Layer Display */
        .compass-dial-ring { position: relative; width: 22px; height: 22px; transition: transform 0.1s linear; }

        #coordinate-overlay-tracker { position: absolute; bottom: 25px; right: 25px; background: var(--bg-panel); backdrop-filter: blur(10px); padding: 10px 16px; border-radius: 12px; border: 1px solid var(--border-subtle); font-family: monospace; font-size: 0.75rem; z-index: 5; color: var(--text-secondary); }

        @keyframes radarPing {
            0% { transform: scale(1); opacity: 0.7; }
            100% { transform: scale(3.8); opacity: 0; }
        }
        .radar-spatial-ping-ring {
            position: absolute; width: 100px; height: 100px; border: 2px solid var(--action-red); border-radius: 50%; pointer-events: none; z-index: 2; display: none; transform-origin: center; animation: radarPing 1.6s cubic-bezier(0.1, 0.8, 0.3, 1) infinite;
        }

        @media(max-width: 480px) {
            #control-sidebar, #active-navigation-hud-overlay { width: calc(100% - 30px); left: 15px; right: 15px; }
            #control-sidebar { bottom: 15px; top: auto; max-height: 60vh; border-radius: 24px; }
        }
    </style>
</head>
<body>

    <div id="app-viewport">
        <!-- Interactive Vector Engine Canvas -->
        <div id="map"></div>
        <div id="radar-ping-node" class="radar-spatial-ping-ring"></div>

        <!-- High Fidelity Left Sidebar Controls Core -->
        <div id="control-sidebar">
            <div class="sidebar-scroll-content">
                
                <div class="sidebar-header">
                    <div class="brand-logo">Geo<span>Pro</span></div>
                    <div class="utility-row-actions">
                        <button class="util-circle-btn" id="night-mode-toggle" title="Toggle Pure Cyber Profile">🕶️</button>
                        <button class="util-circle-btn" id="telemetry-snapshot-export" title="Export System Workspace Logs">💾</button>
                    </div>
                </div>

                <!-- 100% Free Open-Source OSM Nominatim Engine Input Field -->
                <div class="search-system-wrapper">
                    <div class="search-input-field-row">
                        <input type="text" class="search-input-node" id="osm-engine-input" placeholder="Search grid node, physical target, trace...">
                        <button class="clear-search-node-btn" id="osm-engine-clear">✖</button>
                    </div>
                    <div class="osm-dropdown-menu" id="osm-engine-dropdown"></div>
                </div>

                <!-- Sequential Multi-Stop Pipeline Manager -->
                <div class="pipeline-manager-box" id="pipeline-wrapper" style="display: none;"></div>

                <!-- Travel Optimization Routing Profiles Matrix -->
                <div class="travel-matrix-box" id="routing-profile-matrix">
                    <button class="matrix-btn-node active" data-mode="driving-traffic">
                        <svg width="18" height="18" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M5 17h14M5 17a2 2 0 1 0 4 0M15 17a2 2 0 1 0 4 0M5 17l1-6 2-3h8l2 3 1 6M6 11h12"/></svg>
                        Drive
                    </button>
                    <button class="matrix-btn-node" data-mode="cycling">
                        <svg width="18" height="18" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><circle cx="6" cy="17" r="3"/><circle cx="18" cy="17" r="3"/><path d="M6 17l4-9h4l4 9"/></svg>
                        Bike
                    </button>
                    <button class="matrix-btn-node" data-mode="walking">
                        <svg width="18" height="18" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><circle cx="13" cy="4" r="1.6"/><path d="M10 22l2-7 2 2 3 5"/></svg>
                        Walk
                    </button>
                </div>

                <!-- Interactive Spatial Context Workcard Panel -->
                <div id="context-destination-panel">
                    <div class="panel-header-title" id="node-panel-title">Target Vector</div>
                    <div class="panel-address-sub" id="node-panel-address">Analyzing matrix coordinates...</div>
                    <div class="alternatives-container" id="alternatives-pills-row"></div>
                    <div class="action-button-matrix">
                        <button class="primary-action-btn" id="launch-navigation-session">Launch Navigation</button>
                        <button class="secondary-action-btn" id="append-pipeline-node">+ Stop</button>
                        <button class="kill-action-btn" id="flush-workspace-trigger">✖</button>
                    </div>
                </div>

                <!-- Avionics Hardware Diagnostics Matrix Logs -->
                <div class="hardware-diagnostics-deck">
                    <div class="diagnostic-row"><span>Geocoding Engine</span><span style="color: var(--accent-green);">OSM NOMINATIM [FREE]</span></div>
                    <div class="diagnostic-row"><span>Orientation Lock</span><span id="hardware-bearing-telemetry">000° ABSOLUTE</span></div>
                    <div class="diagnostic-row"><span>Avionics Stream</span><span id="hardware-stream-status" style="color: var(--action-red);">AWAITING BEACON SYNC</span></div>
                </div>

            </div>
        </div>

        <!-- Active Avionics Tactical Navigation Flight HUD Overlay -->
        <div id="active-navigation-hud-overlay">
            <div class="nav-instruction-banner">
                <div class="nav-banner-metrics" id="hud-step-distance">--</div>
                <div class="nav-banner-instruction-string" id="hud-step-instruction">Calculating course vector tracks...</div>
            </div>
            <div class="nav-telemetry-strip">
                <div class="strip-metric-node"><span class="metric-val" id="hud-eta-clock">--:--</span><span class="metric-lbl">ETA</span></div>
                <div class="strip-metric-node"><span class="metric-val" id="hud-duration-countdown">--</span><span class="metric-lbl">Duration</span></div>
                <div class="strip-metric-node"><span class="metric-val" id="hud-distance-remaining">--</span><span class="metric-lbl">Distance</span></div>
                <button class="kill-session-action-trigger" id="terminate-navigation-session">Kill</button>
            </div>
        </div>

        <!-- Integrated Cockpit Velocity Readout Chip -->
        <div id="velocity-hud-chip"><span class="velocity-readout-val" id="velocity-readout-val">0</span><span class="velocity-readout-lbl">MPH</span></div>

        <!-- Right Floating Tactical Command Toolstack Array Console -->
        <div id="right-floating-console-stack">
            <button class="console-action-btn-node" id="force-gps-recenter" title="Recenter Engine onto GPS Coordinates">🎯</button>
            <button class="console-action-btn-node" id="compass-orientation-lock" title="Lock Bearing to True North ($0^\circ$)">
                <svg class="compass-dial-ring" id="compass-svg-dial" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                    <polygon points="12,2 16,9 12,7 8,9" fill="var(--action-red)" stroke="var(--action-red)"/>
                    <polygon points="12,22 16,15 12,17 8,15" fill="var(--text-muted)" stroke="var(--text-muted)"/>
                </svg>
            </button>
            <button class="console-action-btn-node" id="radar-scanner-toggle" title="Toggle Radar Scanning Spatial Profile">📡</button>
            <button class="console-action-btn-node" id="satellite-feed-toggle" title="Toggle Orbital Satellite Layers">🛰️</button>
            <button class="console-action-btn-node" id="extrusion-3d-toggle" title="Toggle Volumetric Architectural 3D Extrusions">🏙️</button>
        </div>

        <div id="coordinate-overlay-tracker">X: -- | Y: --</div>
    </div>

    <script>
        // Token configuration architecture for rendering geographic tile layers
        mapboxgl.accessToken = 'pk.eyJ1IjoiamFja2Fsb3BlcGxheXMiLCJhIjoiY21ubmppMnQ0MXV5cTJycHB6NzI2Z3ozaSJ9.rC3Z3wHDO5qKVLdiA9XlLg';

        const mapGraphicStyles = {
            darkVector: 'mapbox://styles/mapbox/dark-v11',
            satelliteStreets: 'mapbox://styles/mapbox/satellite-streets-v12'
        };

        // Default local base engine initialization vector
        let userCurrentPositionCoordinates = [-123.2078, 39.1502]; 
        let temporaryTargetDestinationCoords = null;
        let activeSelectedRoutingProfile = 'driving-traffic';
        let routingSolutionsArray = [];
        let chosenActiveRouteSegmentIdx = 0;
        
        let chronologicalSequenceWaypoints = [];
        let graphicalWaypointsRenderArray = [];

        let applicationNavigationStateActive = false;
        let architectural3DExtrusionsActive = false;
        let orbitalSatelliteLayerActive = false;
        let localRadarPulseScannerActive = false;
        let engineLockStateOnLiveGPS = false; 
        let operatorManualMapInteractionInterrupted = false;
        let deviceHardwareHeadingDegrees = 0;
        let openSourceSearchDebounceTimer = null;

        const map = new mapboxgl.Map({
            container: 'map',
            style: mapGraphicStyles.darkVector,
            center: userCurrentPositionCoordinates,
            zoom: 14,
            pitch: 30,
            bearing: 0,
            antialias: true
        });

        map.on('style.load', () => {
            provisionLivePositionTrackingLayers();
            executeVolumetric3DLightingCalculations();
            if (temporaryTargetDestinationCoords || chronologicalSequenceWaypoints.length > 0) {
                processTacticalRoutingNetworkVectors();
            }
        });

        map.on('load', () => {
            provisionFreeOSMNominatimEngine();
            bindDynamicMapQueryInteractions();
            bindConsoleInterfaceControlTriggers();
            mountHardwareTelemetryBeacons();

            map.on('dragstart', () => { operatorManualMapInteractionInterrupted = true; });
            map.on('zoomstart', () => { operatorManualMapInteractionInterrupted = true; });
            map.on('pitchstart', () => { operatorManualMapInteractionInterrupted = true; });
            map.on('rotate', () => {
                const updatedBearing = map.getBearing();
                document.getElementById('compass-svg-dial').style.transform = `rotate(${-updatedBearing}deg)`;
                document.getElementById('hardware-bearing-telemetry').innerText = `${Math.floor((updatedBearing + 360) % 360).toString().padStart(3, '0')}° ABSOLUTE`;
            });
        });

        function provisionLivePositionTrackingLayers() {
            if (map.getSource('live-hardware-beacon-source')) return;

            map.addSource('live-hardware-beacon-source', {
                type: 'geojson',
                data: {
                    type: 'Feature',
                    geometry: { type: 'Point', coordinates: userCurrentPositionCoordinates }
                }
            });

            map.addLayer({
                id: 'beacon-pulse-glow',
                type: 'circle',
                source: 'live-hardware-beacon-source',
                paint: {
                    'circle-radius': ['interpolate', ['linear'], ['zoom'], 10, 18, 18, 36],
                    'circle-color': '#ff2222',
                    'circle-opacity': 0.25,
                    'circle-blur': 0.8
                }
            });

            map.addLayer({
                id: 'beacon-stroke-profile',
                type: 'circle',
                source: 'live-hardware-beacon-source',
                paint: {
                    'circle-radius': ['interpolate', ['linear'], ['zoom'], 10, 8, 18, 13],
                    'circle-color': '#ffffff'
                }
            });

            map.addLayer({
                id: 'beacon-core-dot',
                type: 'circle',
                source: 'live-hardware-beacon-source',
                paint: {
                    'circle-radius': ['interpolate', ['linear'], ['zoom'], 10, 5, 18, 9],
                    'circle-color': '#ff2222'
                }
            });
        }

        function refreshHardwareBeaconLayerData() {
            const structuralSource = map.getSource('live-hardware-beacon-source');
            if (structuralSource) {
                structuralSource.setData({
                    type: 'Feature',
                    geometry: { type: 'Point', coordinates: userCurrentPositionCoordinates }
                });
            }
            if (localRadarPulseScannerActive) refreshRadarScreenPulseCoordinates();
        }

        function mountHardwareTelemetryBeacons() {
            if (!navigator.geolocation) {
                document.getElementById('hardware-stream-status').innerText = "GEO INTERFACE HARDWARE FAULT";
                return;
            }
            navigator.geolocation.getCurrentPosition(processIncomingHardwarePosition, handleHardwareBeaconException, { enableHighAccuracy: true });
            navigator.geolocation.watchPosition(processIncomingHardwarePosition, handleHardwareBeaconException, { enableHighAccuracy: true });
            
            if (window.DeviceOrientationEvent) {
                window.addEventListener('deviceorientationabsolute', (e) => {
                    if (e.alpha !== null) {
                        deviceHardwareHeadingDegrees = 360 - e.alpha;
                        if (applicationNavigationStateActive && !operatorManualMapInteractionInterrupted) {
                            map.easeTo({ bearing: deviceHardwareHeadingDegrees, duration: 100 });
                        }
                    }
                }, true);
            }
        }

        function processIncomingHardwarePosition(position) {
            userCurrentPositionCoordinates = [position.coords.longitude, position.coords.latitude];
            refreshHardwareBeaconLayerData();
            
            const logFeed = document.getElementById('hardware-stream-status');
            logFeed.innerText = "BEACON DATA LINK COMPLIANT";
            logFeed.style.color = "var(--accent-green)";
            
            if (position.coords.speed !== null && position.coords.speed >= 0) {
                document.getElementById('velocity-readout-val').innerText = Math.round(position.coords.speed * 2.23694);
            }

            if (!engineLockStateOnLiveGPS || (applicationNavigationStateActive && !operatorManualMapInteractionInterrupted)) {
                map.flyTo({ center: userCurrentPositionCoordinates, zoom: applicationNavigationStateActive ? 17.5 : 14.5, essential: true });
                engineLockStateOnLiveGPS = true;
            }
        }

        function handleHardwareBeaconException(error) {
            console.warn(`Avionics telemetry baseline drop exception: ${error.message}`);
        }

        /* ── COMPLETELY FREE OPEN STREET MAP NOMINATIM INFRASTRUCTURE ENGINE ── */
        function provisionFreeOSMNominatimEngine() {
            const inputNode = document.getElementById('osm-engine-input');
            const clearBtn = document.getElementById('osm-engine-clear');
            const dropdownPanel = document.getElementById('osm-engine-dropdown');

            inputNode.addEventListener('input', (e) => {
                const searchString = e.target.value.trim();
                clearBtn.style.display = searchString.length > 0 ? 'block' : 'none';
                
                clearTimeout(openSourceSearchDebounceTimer);
                if (searchString.length < 3) {
                    dropdownPanel.style.display = 'none';
                    return;
                }

                openSourceSearchDebounceTimer = setTimeout(() => {
                    executeNominatimDataFetch(searchString);
                }, 300);
            });

            clearBtn.addEventListener('click', () => {
                inputNode.value = '';
                clearBtn.style.display = 'none';
                dropdownPanel.style.display = 'none';
            });

            document.addEventListener('click', (event) => {
                if (!event.target.closest('.search-system-wrapper')) {
                    dropdownPanel.style.display = 'none';
                }
            });
        }

        async function executeNominatimDataFetch(query) {
            const panel = document.getElementById('osm-engine-dropdown');
            const queryURL = `https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(query)}&viewbox=${userCurrentPositionCoordinates[0]-0.6},${userCurrentPositionCoordinates[1]+0.6},${userCurrentPositionCoordinates[0]+0.6},${userCurrentPositionCoordinates[1]-0.6}&bounded=0&limit=6`;

            try {
                const request = await fetch(queryURL, { headers: { 'User-Agent': 'GeoProTacticalFramework/2.0' } });
                const matchingNodes = await request.json();
                
                if (!matchingNodes || matchingNodes.length === 0) {
                    panel.innerHTML = `<div class="osm-suggest-item" style="color:var(--text-muted); cursor:default;">No records matching search criteria</div>`;
                    panel.style.display = 'block';
                    return;
                }

                panel.innerHTML = '';
                matchingNodes.forEach(node => {
                    const optionRow = document.createElement('div');
                    optionRow.className = 'osm-suggest-item';
                    optionRow.innerText = node.display_name;
                    optionRow.addEventListener('click', () => {
                        const lon = parseFloat(node.lon);
                        const lat = parseFloat(node.lat);
                        const cleanLabelName = node.name || "Identified Spatial Node";
                        
                        panel.style.display = 'none';
                        document.getElementById('osm-engine-input').value = node.display_name;
                        operatorManualMapInteractionInterrupted = true;
                        
                        map.flyTo({ center: [lon, lat], zoom: 15 });
                        displayInteractiveWorkspacePanel([lon, lat], cleanLabelName, node.display_name);
                    });
                    panel.appendChild(optionRow);
                });
                panel.style.display = 'block';
            } catch (err) {
                console.error("OSM Nominatim communications engine failure:", err);
            }
        }

        /* ── 100% FREE CLIENT REVERSE GEOCODING ENGINE INTERACTIVE EVENT ── */
        function bindDynamicMapQueryInteractions() {
            map.on('click', async (e) => {
                const layers = map.getLayer('3d-buildings') ? ['3d-buildings'] : [];
                const structures = map.queryRenderedFeatures(e.point, { layers: layers });
                const geographicCoordinates = [e.lngLat.lng, e.lngLat.lat];
                
                operatorManualMapInteractionInterrupted = true;
                
                let workspaceTitle = structures.length > 0 ? "Target Structural Entity" : "Selected Grid Node Coordinates";
                let workspaceSubtext = `LAT: ${e.lngLat.lat.toFixed(5)} | LNG: ${e.lngLat.lng.toFixed(5)}`;
                
                displayInteractiveWorkspacePanel(geographicCoordinates, workspaceTitle, workspaceSubtext);

                // Run an asynchronous background reverse-geocoding trace to resolve structural names without an API key
                try {
                    const reverseQueryURL = `https://nominatim.openstreetmap.org/reverse?format=json&lat=${e.lngLat.lat}&lon=${e.lngLat.lng}&zoom=18`;
                    const request = await fetch(reverseQueryURL, { headers: { 'User-Agent': 'GeoProTacticalFramework/2.0' } });
                    const structuralResolution = await request.json();
                    if (structuralResolution && structuralResolution.display_name) {
                        displayInteractiveWorkspacePanel(
                            geographicCoordinates, 
                            structuralResolution.name || workspaceTitle, 
                            structuralResolution.display_name
                        );
                    }
                } catch(error) {
                    console.warn("Reverse address layer resolution exception bypassed:", error);
                }
            });
        }

        function displayInteractiveWorkspacePanel(coords, title, address) {
            temporaryTargetDestinationCoords = coords;
            document.getElementById('node-panel-title').innerText = title;
            document.getElementById('node-panel-address').innerText = address;
            document.getElementById('context-destination-panel').style.display = 'flex';
            processTacticalRoutingNetworkVectors();
        }

        function appendSelectedNodeToPipelineQueue() {
            if (!temporaryTargetDestinationCoords) return;
            
            const structuralNameLabel = document.getElementById('node-panel-title').innerText;
            chronologicalSequenceWaypoints.push({
                coords: [...temporaryTargetDestinationCoords],
                label: structuralNameLabel
            });

            const markerElementNode = document.createElement('div');
            markerElementNode.style.width = '16px';
            markerElementNode.style.height = '16px';
            markerElementNode.style.backgroundColor = '#ffffff';
            markerElementNode.style.border = '4px solid #ff2222';
            markerElementNode.style.borderRadius = '50%';
            markerElementNode.style.boxShadow = '0 0 15px var(--action-red)';
            
            const mapboxMarkerInstance = new mapboxgl.Marker(markerElementNode)
                .setLngLat(temporaryTargetDestinationCoords)
                .addTo(map);
                
            graphicalWaypointsRenderArray.push(mapboxMarkerInstance);
            refreshSequencePipelineUI();
            
            temporaryTargetDestinationCoords = null;
            document.getElementById('context-destination-panel').style.display = 'none';
            document.getElementById('osm-engine-input').value = '';
            document.getElementById('osm-engine-clear').style.display = 'none';
            
            processTacticalRoutingNetworkVectors();
        }

        function refreshSequencePipelineUI() {
            const pipelineContainer = document.getElementById('pipeline-wrapper');
            if (chronologicalSequenceWaypoints.length === 0) {
                pipelineContainer.style.display = 'none';
                return;
            }
            pipelineContainer.style.display = 'flex';
            pipelineContainer.innerHTML = '';
            chronologicalSequenceWaypoints.forEach((waypoint, index) => {
                const elementRow = document.createElement('div');
                elementRow.className = 'pipeline-item-row';
                elementRow.innerHTML = `
                    <div class="pipeline-badge">${index + 1}</div>
                    <div class="pipeline-string">${waypoint.label}</div>
                    <button class="pipeline-node-remove" onclick="event.stopPropagation(); removePipelineQueueSegmentIndex(${index})">✖</button>
                `;
                pipelineContainer.appendChild(elementRow);
            });
        }

        window.removePipelineQueueSegmentIndex = function(index) {
            if(graphicalWaypointsRenderArray[index]) graphicalWaypointsRenderArray[index].remove();
            graphicalWaypointsRenderArray.splice(index, 1);
            chronologicalSequenceWaypoints.splice(index, 1);
            refreshSequencePipelineUI();
            processTacticalRoutingNetworkVectors();
        };

        async function processTacticalRoutingNetworkVectors() {
            let geometricRoutingString = userCurrentPositionCoordinates.join(',');
            
            if (chronologicalSequenceWaypoints.length > 0) {
                geometricRoutingString += ';' + chronologicalSequenceWaypoints.map(wp => wp.coords.join(',')).join(';');
            }
            if (temporaryTargetDestinationCoords) {
                geometricRoutingString += ';' + temporaryTargetDestinationCoords.join(',');
            } else if (chronologicalSequenceWaypoints.length === 0) {
                clearActiveRouteTraceSystemLayers();
                return;
            }

            const activeProfileStr = activeSelectedRoutingProfile === 'driving-traffic' ? 'driving' : activeSelectedRoutingProfile;
            const directionsQueryAPIEndpoint = `https://api.mapbox.com/directions/v5/mapbox/${activeProfileStr}/${geometricRoutingString}?steps=true&geometries=geojson&alternatives=true&access_token=${mapboxgl.accessToken}`;

            try {
                const webResponse = await fetch(directionsQueryAPIEndpoint);
                const payloadResponse = await webResponse.json();
                if (payloadResponse.code !== 'Ok') return;
                routingSolutionsArray = payloadResponse.routes;
                drawGeographicalRouteTracks();
                generateAlternativeRoutePills();
                
                if (applicationNavigationStateActive) refreshDynamicHUDAvionics(routingSolutionsArray[chosenActiveRouteSegmentIdx]);
            } catch (err) {
                console.error("Tactical network operations failure:", err);
            }
        }

        function drawGeographicalRouteTracks() {
            for (let i = 0; i < 5; i++) {
                if (map.getLayer(`route-vector-line-${i}`)) map.removeLayer(`route-vector-line-${i}`);
                if (map.getSource(`route-vector-source-${i}`)) map.removeSource(`route-vector-source-${i}`);
            }

            routingSolutionsArray.forEach((route, index) => {
                if (index > 2) return; 
                const layerIsCurrentlySelected = (index === chosenActiveRouteSegmentIdx);
                map.addSource(`route-vector-source-${index}`, {
                    type: 'geojson',
                    data: { type: 'Feature', geometry: route.geometry }
                });

                map.addLayer({
                    id: `route-vector-line-${index}`,
                    type: 'line',
                    source: `route-vector-source-${index}`,
                    layout: { 'line-join': 'round', 'line-cap': 'round' },
                    paint: {
                        'line-color': layerIsCurrentlySelected ? '#ff2222' : '#22222b',
                        'line-width': layerIsCurrentlySelected ? 6 : 4,
                        'line-opacity': layerIsCurrentlySelected ? 0.95 : 0.35
                    }
                }, map.getLayer('3d-buildings') ? '3d-buildings' : undefined);
            });
        }

        function generateAlternativeRoutePills() {
            const parentContainerRow = document.getElementById('alternatives-pills-row');
            if(!parentContainerRow) return;
            parentContainerRow.innerHTML = '';
            routingSolutionsArray.forEach((route, index) => {
                if (index > 2) return;
                const activeStateFlag = (index === chosenActiveRouteSegmentIdx);
                const selectionPillButton = document.createElement('button');
                selectionPillButton.className = `alt-route-pill ${activeStateFlag ? 'selected' : ''}`;
                selectionPillButton.innerHTML = `${Math.round(route.duration / 60)} MIN`;
                selectionPillButton.addEventListener('click', () => {
                    chosenActiveRouteSegmentIdx = index;
                    drawGeographicalRouteTracks();
                    generateAlternativeRoutePills();
                });
                parentContainerRow.appendChild(selectionPillButton);
            });
        }

        function refreshDynamicHUDAvionics(route) {
            if (!route) return;
            document.getElementById('hud-step-instruction').innerText = route.legs[0]?.steps[0]?.maneuver?.instruction || 'Follow established geospatial baseline';
            document.getElementById('hud-step-distance').innerText = `${Math.round(route.legs[0]?.steps[0]?.distance || 50)} m`;
            document.getElementById('hud-eta-clock').innerText = `${Math.round(route.duration / 60)}m`;
            document.getElementById('hud-duration-countdown').innerText = `${Math.round(route.duration / 60)} min`;
            document.getElementById('hud-distance-remaining').innerText = `${(route.distance / 1609.34).toFixed(1)} mi`;
        }

        function refreshRadarScreenPulseCoordinates() {
            const pixelProjectionMatrix = map.project(userCurrentPositionCoordinates);
            const radarElementNode = document.getElementById('radar-ping-node');
            radarElementNode.style.left = `${pixelProjectionMatrix.x - 50}px`;
            radarElementNode.style.top = `${pixelProjectionMatrix.y - 50}px`;
        }

        function triggerLocalDiskSnapshotExport() {
            const diagnosticBlobData = {
                platformSignature: "GeoPro Autonomous Core",
                compiledZuluTimestamp: new Date().toISOString(),
                liveBeaconCoordinates: userCurrentPositionCoordinates,
                queuedPipelineWaypointsCount: chronologicalSequenceWaypoints.length,
                resolvedRouteVectorsCount: routingSolutionsArray.length
            };
            const outputStringBlob = new Blob([JSON.stringify(diagnosticBlobData, null, 2)], { type: 'application/json' });
            const temporaryAnchorElement = document.createElement('a');
            temporaryAnchorElement.href = URL.createObjectURL(outputStringBlob);
            temporaryAnchorElement.download = `geopro_operational_snapshot_${Math.floor(Date.now()/1000)}.json`;
            temporaryAnchorElement.click();
        }

        function executeVolumetric3DLightingCalculations() {
            if (map.getLayer('3d-buildings')) return;
            map.addLayer({
                id: '3d-buildings',
                source: 'composite',
                'source-layer': 'building',
                filter: ['==', 'extrude', 'true'],
                type: 'fill-extrusion',
                minzoom: 13,
                paint: {
                    'fill-extrusion-color': orbitalSatelliteLayerActive ? '#ffffff' : '#141419',
                    'fill-extrusion-height': ['get', 'height'],
                    'fill-extrusion-base': ['get', 'min_height'],
                    'fill-extrusion-opacity': architectural3DExtrusionsActive ? 0.88 : 0.0
                }
            });

            // Inject vector mathematical shadows onto 3D structures for high spatial accuracy
            map.setLight({
                anchor: 'viewport',
                color: '#ffffff',
                intensity: 0.45,
                position: [1.1, 90, 45] 
            });
        }

        function bindConsoleInterfaceControlTriggers() {
            document.getElementById('append-pipeline-node').addEventListener('click', appendSelectedNodeToPipelineQueue);

            document.querySelectorAll('.matrix-btn-node').forEach(btn => {
                btn.addEventListener('click', (event) => {
                    document.querySelectorAll('.matrix-btn-node').forEach(b => b.classList.remove('active'));
                    event.currentTarget.classList.add('active');
                    activeSelectedRoutingProfile = event.currentTarget.getAttribute('data-mode');
                    processTacticalRoutingNetworkVectors();
                });
            });

            document.getElementById('night-mode-toggle').addEventListener('click', () => {
                document.body.classList.toggle('pure-cyber-dark');
            });

            document.getElementById('telemetry-snapshot-export').addEventListener('click', triggerLocalDiskSnapshotExport);

            document.getElementById('compass-orientation-lock').addEventListener('click', () => {
                map.easeTo({ bearing: 0, pitch: 30, duration: 600 });
            });

            document.getElementById('radar-scanner-toggle').addEventListener('click', (e) => {
                localRadarPulseScannerActive = !localRadarPulseScannerActive;
                e.currentTarget.classList.toggle('active', localRadarPulseScannerActive);
                document.getElementById('radar-ping-node').style.display = localRadarPulseScannerActive ? 'block' : 'none';
                if (localRadarPulseScannerActive) refreshRadarScreenPulseCoordinates();
            });

            document.getElementById('extrusion-3d-toggle').addEventListener('click', (e) => {
                architectural3DExtrusionsActive = !architectural3DExtrusionsActive;
                e.currentTarget.classList.toggle('active', architectural3DExtrusionsActive);
                if (map.getLayer('3d-buildings')) {
                    map.setPaintProperty('3d-buildings', 'fill-extrusion-opacity', architectural3DExtrusionsActive ? 0.88 : 0.0);
                }
            });

            document.getElementById('satellite-feed-toggle').addEventListener('click', (e) => {
                orbitalSatelliteLayerActive = !orbitalSatelliteLayerActive;
                e.currentTarget.classList.toggle('active', orbitalSatelliteLayerActive);
                map.setStyle(orbitalSatelliteLayerActive ? mapGraphicStyles.satelliteStreets : mapGraphicStyles.darkVector);
            });

            document.getElementById('force-gps-recenter').addEventListener('click', () => {
                operatorManualMapInteractionInterrupted = false; 
                map.flyTo({ center: userCurrentPositionCoordinates, zoom: applicationNavigationStateActive ? 18 : 14.5, pitch: applicationNavigationStateActive ? 55 : 30 });
            });

            document.getElementById('flush-workspace-trigger').addEventListener('click', clearActiveRouteTraceSystemLayers);
            document.getElementById('launch-navigation-session').addEventListener('click', toggleTacticalNavigationHUDOverlay);
            document.getElementById('terminate-navigation-session').addEventListener('click', toggleTacticalNavigationHUDOverlay);
        }

        function clearActiveRouteTraceSystemLayers() {
            graphicalWaypointsRenderArray.forEach(marker => marker.remove());
            graphicalWaypointsRenderArray = [];
            chronologicalSequenceWaypoints = [];
            refreshSequencePipelineUI();

            for (let i = 0; i < 5; i++) {
                if (map.getLayer(`route-vector-line-${i}`)) map.removeLayer(`route-vector-line-${i}`);
                if (map.getSource(`route-vector-source-${i}`)) map.removeSource(`route-vector-source-${i}`);
            }
            routingSolutionsArray = [];
            temporaryTargetDestinationCoords = null;
            document.getElementById('context-destination-panel').style.display = 'none';
            document.getElementById('osm-engine-input').value = '';
            document.getElementById('osm-engine-clear').style.display = 'none';
            map.easeTo({ pitch: 30, bearing: 0 });
        }

        function toggleTacticalNavigationHUDOverlay() {
            applicationNavigationStateActive = !applicationNavigationStateActive;
            operatorManualMapInteractionInterrupted = false; 
            
            document.getElementById('control-sidebar').style.transform = applicationNavigationStateActive ? 'translateX(-460px)' : 'translateX(0)';
            document.getElementById('active-navigation-hud-overlay').style.display = applicationNavigationStateActive ? 'flex' : 'none';
            document.getElementById('velocity-hud-chip').style.display = applicationNavigationStateActive ? 'flex' : 'none';
            
            if (applicationNavigationStateActive && routingSolutionsArray[chosenActiveRouteSegmentIdx]) {
                map.easeTo({ center: userCurrentPositionCoordinates, zoom: 18, pitch: 55, duration: 800 });
                refreshDynamicHUDAvionics(routingSolutionsArray[chosenActiveRouteSegmentIdx]);
            } else {
                clearActiveRouteTraceSystemLayers();
            }
        }

        map.on('move', () => { if (localRadarPulseScannerActive) refreshRadarScreenPulseCoordinates(); });
        map.on('mousemove', (event) => {
            document.getElementById('coordinate-overlay-tracker').innerText = `X: ${event.lngLat.lng.toFixed(5)} | Y: ${event.lngLat.lat.toFixed(5)}`;
        });
    </script>
</body>
</html>
