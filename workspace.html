<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GeoPro Navigation Workspace</title>
    
    <!-- Mapbox GL JS Core Engine -->
    <script src="https://api.mapbox.com/mapbox-gl-js/v3.3.0/mapbox-gl.js"></script>
    <link href="https://api.mapbox.com/mapbox-gl-js/v3.3.0/mapbox-gl.css" rel="stylesheet" />

    <!-- Official Mapbox GL Directions Routing Plugin -->
    <script src="https://api.mapbox.com/mapbox-gl-js/plugins/mapbox-gl-directions/v4.3.1/mapbox-gl-directions.js"></script>
    <link rel="stylesheet" href="https://api.mapbox.com/mapbox-gl-js/plugins/mapbox-gl-directions/v4.3.1/mapbox-gl-directions.css" type="text/css" />

    <style>
        :root {
            --bg-color: #050505;
            --panel-bg: rgba(18, 18, 18, 0.75);
            --accent-color: #ff2222;
            --border-color: rgba(255, 255, 255, 0.08);
            --text-color: #f5f5f7;
            --text-muted: #86868b;
            --card-bg: rgba(30, 30, 30, 0.4);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", "Segoe UI", Roboto, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body, html {
            width: 100%;
            height: 100vh;
            overflow: hidden;
            background-color: var(--bg-color);
            color: var(--text-color);
        }

        #workspace-container {
            display: flex;
            width: 100%;
            height: 100vh;
            position: relative;
        }

        #mobile-menu-trigger {
            display: none;
            position: absolute;
            top: 16px;
            left: 16px;
            z-index: 30;
            background: var(--panel-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border-color);
            color: var(--text-color);
            padding: 12px 18px;
            border-radius: 12px;
            font-size: 0.8rem;
            font-weight: 600;
            letter-spacing: 0.5px;
            cursor: pointer;
            box-shadow: 0 4px 30px rgba(0,0,0,0.4);
        }

        /* ── APPLE MAPS GLASSMORPHIC SIDEBAR PANEL ── */
        #sidebar {
            width: 360px;
            height: calc(100% - 32px);
            margin: 16px;
            background: var(--panel-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            z-index: 20;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
            transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            position: absolute;
            top: 0;
            left: 0;
        }

        .sidebar-header {
            padding: 24px 24px 16px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .sidebar-header h1 {
            font-size: 1.25rem;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        .sidebar-header h1 span { color: var(--accent-color); }

        .back-home {
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.75rem;
            border: 1px solid var(--border-color);
            padding: 6px 12px;
            border-radius: 8px;
            font-weight: 500;
            background: rgba(255,255,255,0.03);
            transition: all 0.2s;
        }
        .back-home:hover {
            background: rgba(255,255,255,0.08);
            color: var(--text-color);
        }

        .sidebar-content {
            padding: 0 24px 24px 24px;
            flex-grow: 1;
            overflow-y: auto;
        }

        .control-group { margin-bottom: 24px; }

        .control-group h3 {
            font-size: 0.75rem;
            text-transform: uppercase;
            color: var(--text-muted);
            letter-spacing: 0.5px;
            margin-bottom: 10px;
            font-weight: 600;
        }

        .search-wrapper { margin-bottom: 16px; min-height: 40px; }
        
        /* ── DIRECTIONS CONTROLLER LAYOUT DESIGN SYSTEM ── */
        .mapboxgl-ctrl-directions {
            width: 100% !important;
            max-width: 100% !important;
            background-color: transparent !important;
            box-shadow: none !important;
            margin: 0 !important;
        }
        .mapboxgl-ctrl-directions .mapboxgl-ctrl-geocoder {
            background-color: var(--card-bg) !important;
            border: 1px solid var(--border-color) !important;
            border-radius: 12px !important;
            margin-bottom: 10px !important;
            transition: border-color 0.2s;
        }
        .mapboxgl-ctrl-directions .mapboxgl-ctrl-geocoder:focus-within {
            border-color: rgba(255, 34, 34, 0.4) !important;
        }
        .mapboxgl-ctrl-directions input[type="text"] {
            color: var(--text-color) !important;
            padding: 12px 12px 12px 42px !important;
            font-size: 0.9rem !important;
            height: 44px !important;
            background-color: transparent !important;
        }
        .mapboxgl-ctrl-directions .directions-control-inputs {
            padding: 0 !important;
            background: transparent !important;
            position: relative;
        }
        .mapboxgl-ctrl-directions .mapboxgl-ctrl-geocoder--icon-search {
            fill: var(--text-muted) !important;
            top: 12px !important;
            left: 14px !important;
        }
        .mapboxgl-ctrl-directions .directions-icon {
            top: 12px !important;
            left: 12px !important;
        }
        
        /* Premium Modality Tabs Switcher Styling */
        .mapboxgl-ctrl-directions .directions-control-profiles {
            display: flex !important;
            background: rgba(0, 0, 0, 0.3) !important;
            border: 1px solid var(--border-color) !important;
            border-radius: 10px !important;
            overflow: hidden;
            padding: 2px !important;
            margin-bottom: 16px !important;
        }
        .mapboxgl-ctrl-directions .directions-control-profiles input[type="radio"] {
            display: none !important;
        }
        .mapboxgl-ctrl-directions .directions-control-profiles label {
            flex: 1 !important;
            background: transparent !important;
            color: var(--text-muted) !important;
            text-align: center !important;
            padding: 8px 0 !important;
            font-size: 0.75rem !important;
            font-weight: 600 !important;
            cursor: pointer !important;
            margin: 0 !important;
            border-radius: 8px !important;
            transition: all 0.2s cubic-bezier(0.25, 1, 0.5, 1) !important;
        }
        .mapboxgl-ctrl-directions .directions-control-profiles input[type="radio"]:checked + label {
            background: rgba(255, 255, 255, 0.1) !important;
            color: var(--text-color) !important;
            box-shadow: 0 2px 8px rgba(0,0,0,0.2) !important;
        }

        /* Micro-Instruction Step Panel */
        .mapboxgl-ctrl-directions .directions-control-instructions {
            background-color: var(--card-bg) !important;
            border: 1px solid var(--border-color) !important;
            color: var(--text-color) !important;
            border-radius: 14px;
            margin-top: 12px;
            max-height: 220px;
            overflow-y: auto;
        }
        .mapboxgl-ctrl-directions .mapbox-directions-instruction {
            border-bottom: 1px solid var(--border-color) !important;
            color: var(--text-color) !important;
            padding: 12px 14px !important;
            font-size: 0.85rem !important;
        }
        .mapboxgl-ctrl-directions .mapbox-directions-instruction:hover {
            background-color: rgba(255,255,255,0.02) !important;
        }
        .mapboxgl-ctrl-directions .mapbox-directions-steps {
            background: transparent !important;
        }

        /* ── SEARCH AUTOCOMPLETE SUGGESTIONS PORTAL FIXED OVERRIDES ── */
        .mapboxgl-ctrl-directions .suggestions,
        .mapboxgl-ctrl-geocoder .suggestions,
        .suggestions {
            background-color: #161618 !important;
            border: 1px solid rgba(255,255,255,0.12) !important;
            border-radius: 12px !important;
            box-shadow: 0 12px 40px rgba(0,0,0,0.6) !important;
            z-index: 9999 !important;
            padding: 6px !important;
            list-style: none !important;
            margin-top: 4px !important;
        }
        .mapboxgl-ctrl-directions .suggestions > li,
        .mapboxgl-ctrl-geocoder .suggestions > li {
            padding: 0 !important;
            margin: 0 !important;
            background-color: transparent !important;
            border-radius: 8px !important;
            overflow: hidden !important;
        }
        .mapboxgl-ctrl-directions .suggestions > li > a,
        .mapboxgl-ctrl-geocoder .suggestions > li > a,
        .suggestions > li > a {
            color: var(--text-color) !important;
            padding: 10px 14px !important;
            font-size: 0.85rem !important;
            display: block !important;
            text-decoration: none !important;
        }
        .mapboxgl-ctrl-directions .suggestions > .active > a,
        .mapboxgl-ctrl-directions .suggestions > li > a:hover,
        .mapboxgl-ctrl-geocoder .suggestions > .active > a,
        .mapboxgl-ctrl-geocoder .suggestions > li > a:hover {
            background-color: rgba(255, 255, 255, 0.08) !important;
            color: #ffffff !important;
        }

        .toggle-container {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: var(--card-bg);
            padding: 14px 16px;
            border-radius: 12px;
            border: 1px solid var(--border-color);
        }

        .action-btn {
            width: 100%;
            background: var(--card-bg);
            color: var(--text-color);
            border: 1px solid var(--border-color);
            padding: 14px;
            border-radius: 12px;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            margin-bottom: 12px;
        }
        .action-btn:hover {
            background: rgba(255,255,255,0.05);
            border-color: rgba(255,255,255,0.15);
        }
        .action-btn.active {
            background: var(--accent-color);
            color: #fff;
            border-color: transparent;
            box-shadow: 0 4px 20px rgba(255, 34, 34, 0.4);
        }

        .metrics-board {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 14px 16px;
            font-family: -apple-system, system-ui, sans-serif;
            font-size: 0.8rem;
        }
        .metric-line { display: flex; justify-content: space-between; margin-bottom: 8px; }
        .metric-line:last-child { margin-bottom: 0; }
        .metric-line span:first-child { color: var(--text-muted); font-weight: 500; }
        .metric-val { color: var(--text-color); font-weight: 600; font-family: monospace; }
        #gps-status.active-status { color: #34c759; font-weight: bold; }

        #map { flex-grow: 1; height: 100%; position: relative; background-color: #000; }

        /* ── FLOATING PREMIUM LAYER CONTROLLER CONSOLE ── */
        #map-style-console {
            position: absolute;
            top: 16px;
            right: 16px;
            z-index: 10;
            background: rgba(20, 20, 20, 0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 4px;
            display: flex;
            gap: 4px;
            box-shadow: 0 4px 25px rgba(0,0,0,0.4);
        }
        .console-tab {
            background: transparent;
            border: none;
            color: var(--text-muted);
            padding: 8px 14px;
            border-radius: 8px;
            font-size: 0.75rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .console-tab:hover { color: var(--text-color); }
        .console-tab.active {
            background: rgba(255,255,255,0.12);
            color: #ffffff;
        }

        #geo-overlay {
            position: absolute;
            bottom: 24px;
            right: 24px;
            background: rgba(15, 15, 15, 0.85);
            backdrop-filter: blur(10px);
            padding: 8px 14px;
            border-radius: 8px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
            pointer-events: none;
            z-index: 5;
            letter-spacing: 0.5px;
        }

        .custom-user-marker {
            display: block;
            width: 18px;
            height: 18px;
            background-color: #ff2222;
            border: 2.5px solid #ffffff;
            border-radius: 50%;
            box-shadow: 0 0 12px #ff2222, 0 0 24px #ff2222;
            cursor: pointer;
        }

        @media (max-width: 768px) {
            #mobile-menu-trigger { display: block; }
            #sidebar {
                height: calc(100% - 80px);
                top: 64px;
                margin: 8px;
                width: calc(100% - 16px);
                transform: translateX(-110%);
            }
            #sidebar.open { transform: translateX(0); }
        }
    </style>
</head>
<body>

    <div id="workspace-container">
        <button id="mobile-menu-trigger">Navigation Menu</button>

        <!-- Dynamic Map Engine Controller Console -->
        <div id="map-style-console">
            <button class="console-tab active" onclick="switchMapStyle('dark')">Vector Dark</button>
            <button class="console-tab" onclick="switchMapStyle('satellite')">Satellite Hybrid</button>
        </div>

        <div id="sidebar">
            <div class="sidebar-header">
                <h1>Geo<span>Pro</span></h1>
                <a href="index.html" class="back-home">Exit Map</a>
            </div>
            
            <div class="sidebar-content">
                <div class="control-group">
                    <h3>Spatial Exploration Pipeline</h3>
                    <div id="search-container" class="search-wrapper"></div>
                </div>

                <div class="control-group">
                    <h3>Data Layers</h3>
                    <label class="toggle-container">
                        <span class="toggle-label">3D Building Extrusions</span>
                        <input type="checkbox" id="layer-toggle-3d" checked>
                    </label>
                </div>

                <div class="control-group">
                    <h3>Telemetry Link</h3>
                    <button id="gps-init-btn" class="action-btn">
                        Initialize Core GPS
                    </button>
                    
                    <div class="metrics-board">
                        <div class="metric-line">
                            <span>TRACKING ENGINE</span>
                            <span class="metric-val" id="gps-status">OFFLINE</span>
                        </div>
                        <div class="metric-line">
                            <span>LATITUDE</span>
                            <span class="metric-val" id="telemetry-lat">0.00000</span>
                        </div>
                        <div class="metric-line">
                            <span>LONGITUDE</span>
                            <span class="metric-val" id="telemetry-lng">0.00000</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div id="map">
            <div id="geo-overlay">LNG: -123.2078 | LAT: 39.1502</div>
        </div>
    </div>

    <script>
        mapboxgl.accessToken = 'pk.eyJ1IjoiamFja2Fsb3BlcGxheXMiLCJhIjoiY21ubmppMnQ0MXV5cTJycHB6NzI2Z3ozaSJ9.rC3Z3wHDO5qKVLdiA9XlLg';

        // Available Map Interfaces Map
        const mapStyles = {
            dark: 'mapbox://styles/mapbox/dark-v11',
            satellite: 'mapbox://styles/mapbox/satellite-streets-v12'
        };

        const map = new mapboxgl.Map({
            container: 'map',
            style: mapStyles.dark, 
            center: [-123.2078, 39.1502],
            zoom: 14.5,
            pitch: 45,
            bearing: -10
        });

        const menuBtn = document.getElementById('mobile-menu-trigger');
        const sidebar = document.getElementById('sidebar');
        const gpsBtn = document.getElementById('gps-init-btn');
        const layerToggle3d = document.getElementById('layer-toggle-3d');
        
        menuBtn.addEventListener('click', () => {
            sidebar.classList.toggle('open');
            menuBtn.innerText = sidebar.classList.contains('open') ? 'Close Panel' : 'Navigation Menu';
        });

        // ── Initialize Advanced Routing Architecture with Deep POI Tracking ──
        let directions = null;
        try {
            directions = new MapboxDirections({
                accessToken: mapboxgl.accessToken,
                unit: 'imperial',
                profile: 'mapbox/driving',
                alternatives: true,
                congestion: true,
                controls: { inputs: true, instructions: true, profileSwitcher: true },
                // Expanding discovery indexing criteria to explicitly capture businesses, structures, and POIs
                geocoder: {
                    types: 'poi,address,building,neighborhood,locality',
                    placeholder: 'Search business, address, or station...'
                }
            });
            
            document.getElementById('search-container').appendChild(directions.onAdd(map));
        } catch(e) {
            console.error("Directions engine failed to assemble:", e);
        }

        // Live Telemetry Engine State Management
        let livePosition = null;
        let isTrackingActive = false; 
        let isFollowingActive = false; 
        let isMarkerAdded = false; 
        
        const markerElement = document.createElement('div');
        markerElement.className = 'custom-user-marker';
        const locationMarker = new mapboxgl.Marker({ element: markerElement });

        function startTelemetryPipeline() {
            if (window.isSecureContext === false) {
                document.getElementById('gps-status').innerText = 'SECURE_ERR';
                alert("🚨 SECURITY BLOCK:\nGeolocation requires HTTPS or localhost connections on mobile browsers.");
                return;
            }

            if (!('geolocation' in navigator)) {
                document.getElementById('gps-status').innerText = 'NOT_SUPPORTED';
                return;
            }

            document.getElementById('gps-status').innerText = 'PROMPTING...';
            
            navigator.geolocation.watchPosition(
                (position) => {
                    livePosition = [position.coords.longitude, position.coords.latitude];
                    const statusEl = document.getElementById('gps-status');
                    statusEl.innerText = 'ACTIVE';
                    statusEl.classList.add('active-status');
                    
                    if (!isTrackingActive) {
                        isTrackingActive = true;
                        isFollowingActive = true;
                        gpsBtn.classList.add('active');
                        gpsBtn.innerText = 'Stop Following Position';
                        
                        if (directions) {
                            directions.setOrigin(livePosition);
                        }
                    }
                },
                (error) => {
                    console.error('GPS Link Exception:', error);
                    document.getElementById('gps-status').innerText = 'HARDWARE_ERR';
                },
                { enableHighAccuracy: true, timeout: 15000, maximumAge: 0 }
            );

            setInterval(() => {
                if (livePosition) {
                    locationMarker.setLngLat(livePosition);
                    
                    if (!isMarkerAdded) {
                        locationMarker.addTo(map);
                        isMarkerAdded = true;
                    }
                    
                    if (isFollowingActive) {
                        map.setCenter(livePosition);
                    }
                    
                    document.getElementById('telemetry-lat').innerText = livePosition[1].toFixed(5);
                    document.getElementById('telemetry-lng').innerText = livePosition[0].toFixed(5);
                }
            }, 100);
        }

        gpsBtn.addEventListener('click', () => {
            if (!isTrackingActive) {
                startTelemetryPipeline();
            } else {
                isFollowingActive = !isFollowingActive;
                
                if (isFollowingActive) {
                    gpsBtn.innerText = 'Stop Following Position';
                    gpsBtn.classList.add('active');
                    if (livePosition) {
                        map.flyTo({ center: livePosition, zoom: 16, essential: true });
                    }
                } else {
                    gpsBtn.innerText = 'Follow Position';
                    gpsBtn.classList.remove('active');
                }
            }
        });

        // 3D Building Injection Function Block
        function renderStructuralExtrusions() {
            if (!layerToggle3d.checked) return;
            
            // Check if source layer data structure exists before mounting layer
            if (map.getSource('composite') && !map.getLayer('3d-buildings')) {
                try {
                    map.addLayer({
                        'id': '3d-buildings',
                        'source': 'composite',
                        'source-layer': 'building',
                        'filter': ['==', 'extrude', 'true'],
                        'type': 'fill-extrusion',
                        'minzoom': 14,
                        'paint': {
                            'fill-extrusion-color': '#222224',
                            'fill-extrusion-height': ['get', 'height'],
                            'fill-extrusion-base': ['get', 'min_height'],
                            'fill-extrusion-opacity': 0.75
                        }
                    });
                } catch(e) {
                    console.warn("Extrusion compiler context bypassed on this style framework update.");
                }
            }
        }

        map.on('style.load', () => {
            renderStructuralExtrusions();
        });

        layerToggle3d.addEventListener('change', () => {
            if (layerToggle3d.checked) {
                renderStructuralExtrusions();
            } else {
                if (map.getLayer('3d-buildings')) map.removeLayer('3d-buildings');
            }
        });

        // ── Smooth Map Engine Core Style Switcher Function ──
        window.switchMapStyle = function(styleKey) {
            // Update tracking active tab indicator state styles
            const buttons = document.querySelectorAll('.console-tab');
            buttons.forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            
            if (mapStyles[styleKey]) {
                map.setStyle(mapStyles[styleKey]);
            }
        };

        const updateOverlay = (lngLat) => {
            document.getElementById('geo-overlay').innerHTML = 
                `LNG: ${lngLat.lng.toFixed(4)} | LAT: ${lngLat.lat.toFixed(4)}`;
        };

        map.on('mousemove', (e) => updateOverlay(e.lngLat));
        map.on('touchmove', (e) => updateOverlay(e.lngLat));
    </script>
</body>
</html>
