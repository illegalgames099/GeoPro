<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GeoPro Workspace</title>
    
    <!-- MapLibre GL JS -->
    <script src="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.js"></script>
    <link href="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.css" rel="stylesheet" />

    <style>
        :root {
            --bg-primary: #0a0a0a;
            --bg-surface: #141414;
            --accent-red: #ff2222;
            --text-main: #f5f5f7;
            --text-muted: #86868b;
            --border-color: #2c2c2e;
            --success-green: #30d158;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        body {
            background-color: var(--bg-primary);
            color: var(--text-main);
            overflow: hidden;
            height: 100vh;
            width: 100vw;
        }

        #app-container {
            display: flex;
            height: 100vh;
            width: 100vw;
            position: relative;
        }

        #map {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            z-index: 1;
        }

        /* Premium Dark UI Overlay HUD */
        .hud-panel {
            position: absolute;
            z-index: 10;
            background: rgba(20, 20, 20, 0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 16px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
        }

        #controls-panel {
            top: 20px;
            left: 20px;
            width: 340px;
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        #telemetry-panel {
            bottom: 20px;
            left: 20px;
            width: 340px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        h2 {
            font-size: 16px;
            font-weight: 600;
            letter-spacing: -0.02em;
            text-transform: uppercase;
            color: var(--text-main);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .search-box {
            position: relative;
            width: 100%;
        }

        input[type="text"] {
            width: 100%;
            background: #2c2c2e;
            border: 1px solid transparent;
            border-radius: 10px;
            padding: 12px 14px;
            color: var(--text-main);
            font-size: 14px;
            outline: none;
            transition: all 0.2s ease;
        }

        input[type="text"]:focus {
            border-color: var(--accent-red);
            background: #1c1c1e;
        }

        .btn {
            background: var(--accent-red);
            color: #ffffff;
            border: none;
            border-radius: 10px;
            padding: 12px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s ease;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 6px;
        }

        .btn:hover {
            opacity: 0.9;
        }

        .btn-secondary {
            background: #2c2c2e;
            border: 1px solid var(--border-color);
            color: var(--text-main);
        }

        .btn-secondary:hover {
            background: #3a3a3c;
        }

        .telemetry-row {
            display: flex;
            justify-content: space-between;
            font-size: 13px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            padding-bottom: 6px;
        }

        .telemetry-label {
            color: var(--text-muted);
        }

        .telemetry-value {
            font-family: monospace;
            font-weight: 500;
        }

        #gps-status-label {
            font-weight: 700;
            color: var(--accent-red);
        }

        /* Custom Location Marker Style */
        .user-position-marker {
            width: 20px;
            height: 20px;
            background: var(--accent-red);
            border: 3px solid #ffffff;
            border-radius: 50%;
            box-shadow: 0 0 10px rgba(255, 34, 34, 0.6);
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div id-="app-container">
        <!-- Interactive Map Frame -->
        <div id="map"></div>

        <!-- Upper Control Module -->
        <div id="controls-panel" class="hud-panel">
            <h2>Spatial Interface</h2>
            <div class="search-box">
                <input type="text" id="search-input" placeholder="Search coordinates or addresses..." />
            </div>
            <button class="btn" id="trigger-gps-btn" onclick="attemptNativeWebGPS()">
                Force GPS Sync Stream
            </button>
        </div>

        <!-- Lower Telemetry Matrix -->
        <div id="telemetry-panel" class="hud-panel">
            <h2>Live Telemetry Pipeline</h2>
            <div class="telemetry-row">
                <span class="telemetry-label">Signal Status</span>
                <span class="telemetry-value" id="gps-status-label">NOT INITIALIZED</span>
            </div>
            <div class="telemetry-row">
                <span class="telemetry-label">Latitude</span>
                <span class="telemetry-value" id="telemetry-lat">--.------</span>
            </div>
            <div class="telemetry-row">
                <span class="telemetry-label">Longitude</span>
                <span class="telemetry-value" id="telemetry-lng">--.------</span>
            </div>
            <div class="telemetry-row">
                <span class="telemetry-label">Tracking Stream</span>
                <span class="telemetry-value" id="telemetry-type">OFFLINE</span>
            </div>
            <button class="btn btn-secondary" style="margin-top: 4px; padding: 8px;" onclick="snapToUserLocation()">
                Snap Map to Target
            </button>
        </div>
    </div>

    <script>
        // Global State Registry
        let map;
        let defaultUserCoordinates = [-123.2078, 39.1502]; // Fallback Default Viewport Anchor
        let livePositionTelemetryMarkerNode = null;
        let activeWatchId = null;

        // Initialize Map Instance on DOM Load
        document.addEventListener("DOMContentLoaded", () => {
            map = new maplibregl.Map({
                container: 'map',
                style: 'https://basemaps.cartocdn.com/gl/dark-matter-gl-style/style.json', // Premium Dark Engine
                center: defaultUserCoordinates,
                zoom: 12,
                pitch: 45,
                bearing: 0,
                antialias: true
            });

            map.on('load', () => {
                console.log("Map engine successfully initialized.");
                
                // Add 3D Extrusion Layer for Architectural Geometry
                const layers = map.getStyle().layers;
                let labelLayerId;
                for (let i = 0; i < layers.length; i++) {
                    if (layers[i].type === 'symbol' && layers[i].layout['text-field']) {
                        labelLayerId = layers[i].id;
                        break;
                    }
                }

                map.addLayer({
                    'id': '3d-buildings',
                    'source': 'openmaptiles',
                    'source-layer': 'building',
                    'type': 'fill-extrusion',
                    'minzoom': 13,
                    'paint': {
                        'fill-extrusion-color': '#1a1a1c',
                        'fill-extrusion-height': ['get', 'render_height'],
                        'fill-extrusion-base': ['get', 'render_min_height'],
                        'fill-extrusion-opacity': 0.7
                    }
                }, labelLayerId);

                // Auto initialize coordinate tracking stream immediately on load
                attemptNativeWebGPS();
            });
        });

        /**
         * Bulletproof Geolocation Stream Script
         * Resolves permission lockouts, secure context checks, and falls back gracefully to coarse streams
         */
        function attemptNativeWebGPS() {
            const statusLabel = document.getElementById('gps-status-label');
            const trackingType = document.getElementById('telemetry-type');

            // Clear any lingering stream watch processes to prevent concurrent thread locking
            if (activeWatchId !== null) {
                navigator.geolocation.clearWatch(activeWatchId);
                activeWatchId = null;
            }

            // Security context check (Bypass allowed for localhost)
            if (window.location.protocol !== 'https:' && window.location.hostname !== 'localhost' && window.location.hostname !== '127.0.0.1') {
                console.error("GPS Error: Geolocation streams require HTTPS secure context environments.");
                statusLabel.innerText = "REQUIRES HTTPS SSL";
                statusLabel.style.color = "var(--accent-red)";
                trackingType.innerText = "BLOCKED";
                return;
            }

            if (!("geolocation" in navigator)) {
                statusLabel.innerText = "UNSUPPORTED HARDWARE";
                trackingType.innerText = "HARDWARE ABSENT";
                return;
            }

            statusLabel.innerText = "REQUESTING ACCESS...";
            statusLabel.style.color = "#ffcc00";

            // Profiles for tracking execution
            const preciseOptions = {
                enableHighAccuracy: true,
                timeout: 7000,          // Direct fail-fast window to drop down to cell/wifi if hardware GPS fails
                maximumAge: 0
            };

            const coarseOptions = {
                enableHighAccuracy: false,
                timeout: 10000,
                maximumAge: 30000
            };

            function successCallback(position) {
                const lng = position.coords.longitude;
                const lat = position.coords.latitude;
                defaultUserCoordinates = [lng, lat];
                
                // Update text strings inside UI
                document.getElementById('telemetry-lat').innerText = lat.toFixed(6);
                document.getElementById('telemetry-lng').innerText = lng.toFixed(6);
                
                statusLabel.innerText = "LIVE STREAM CONNECTED";
                statusLabel.style.color = "var(--success-green)";
                trackingType.innerText = position.coords.accuracy <= 30 ? "HIGH-PRECISION HARDWARE" : "COARSE NETWORK/WIFI";

                // Initialize or move the customized tracking node element
                if (!livePositionTelemetryMarkerNode) {
                    const el = document.createElement('div');
                    el.className = 'user-position-marker';
                    
                    livePositionTelemetryMarkerNode = new maplibregl.Marker({
                        element: el,
                        anchor: 'center'
                    })
                    .setLngLat(defaultUserCoordinates)
                    .addTo(map);
                } else {
                    livePositionTelemetryMarkerNode.setLngLat(defaultUserCoordinates);
                }
            }

            function errorCallback(error) {
                switch(error.code) {
                    case error.PERMISSION_DENIED:
                        console.warn("GPS Interface: Permission denied by client browser layout options.");
                        statusLabel.innerText = "ERROR: ACCESS DENIED";
                        statusLabel.style.color = "var(--accent-red)";
                        trackingType.innerText = "RESET PERMISSIONS";
                        break;
                    case error.POSITION_UNAVAILABLE:
                        console.warn("GPS Interface: Precision tracking down. Forking into coarse pipeline...");
                        statusLabel.innerText = "ROUTING COARSE STREAM...";
                        statusLabel.style.color = "#ffcc00";
                        
                        // Execute single-shot lower accuracy mesh fallback
                        navigator.geolocation.getCurrentPosition(successCallback, (err) => {
                            statusLabel.innerText = "HARDWARE UNREACHABLE";
                            statusLabel.style.color = "var(--accent-red)";
                            trackingType.innerText = "NO POSITION FOUND";
                        }, coarseOptions);
                        break;
                    case error.TIMEOUT:
                        console.warn("GPS Interface: Connection timeout waiting for satellite array.");
                        statusLabel.innerText = "ERROR: STREAM TIMEOUT";
                        statusLabel.style.color = "var(--accent-red)";
                        trackingType.innerText = "HARDWARE HUNG";
                        break;
                }
            }

            // Start hardware streaming tracker pipeline
            activeWatchId = navigator.geolocation.watchPosition(successCallback, errorCallback, preciseOptions);
        }

        /**
         * Re-centers the view matrix over current location coordinates
         */
        function snapToUserLocation() {
            if (map && defaultUserCoordinates) {
                map.flyTo({
                    center: defaultUserCoordinates,
                    zoom: 15,
                    essential: true,
                    pitch: 45,
                    speed: 1.2
                });
            }
        }
    </script>
</body>
</html>
