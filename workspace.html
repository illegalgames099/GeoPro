<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GeoPro Quantum Navigation</title>

    <!-- Mapbox GL JS Core Engine -->
    <script src="https://api.mapbox.com/mapbox-gl-js/v3.3.0/mapbox-gl.js"></script>
    <link href="https://api.mapbox.com/mapbox-gl-js/v3.3.0/mapbox-gl.css" rel="stylesheet" />

    <!-- Modern Mapbox Search JS Web Component Engine Bundle -->
    <script id="search-js" defer src="https://api.mapbox.com/search-js/v1.5.0/web.js"></script>

    <style>
        :root {
            --bg-pure: #000000;
            --hud-bg: rgba(10, 10, 12, 0.90);
            --card-surface: rgba(22, 22, 26, 0.75);
            --neon-red: #ff2222;
            --border-glow: rgba(255, 34, 34, 0.15);
            --border-line: rgba(255, 255, 255, 0.08);
            --text-primary: #ffffff;
            --text-secondary: #8e8e93;
            --traffic-green: #30d158;
            --traffic-yellow: #ffcc00;
            --traffic-red: #ff453a;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", Roboto, sans-serif;
            letter-spacing: -0.2px;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: var(--bg-pure);
            color: var(--text-primary);
        }

        #app-viewport {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
        }

        #map {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: var(--bg-pure);
            z-index: 1;
        }

        button { font: inherit; }

        /* ── HUD COMMAND DECK ── */
        #command-deck {
            position: absolute;
            top: 20px;
            left: 20px;
            width: 380px;
            max-height: calc(100vh - 40px);
            z-index: 10;
            background: var(--hud-bg);
            backdrop-filter: blur(30px) saturate(200%);
            -webkit-backdrop-filter: blur(30px) saturate(200%);
            border: 1px solid var(--border-line);
            border-radius: 24px;
            padding: 24px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.7), 0 0 40px var(--border-glow);
            display: flex;
            flex-direction: column;
            gap: 16px;
            transform: translateY(0px);
            transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1), height 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            overflow-y: auto;
        }

        .drag-handle-zone {
            width: 100%;
            padding: 10px 0;
            margin-top: -10px;
            display: flex;
            justify-content: center;
            cursor: grab;
            touch-action: none;
            user-select: none;
        }
        .drag-handle-zone:active { cursor: grabbing; }
        .drag-handle-bar {
            width: 44px;
            height: 5px;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 3px;
            pointer-events: none;
        }

        #command-deck.is-dragging { 
            transition: none !important; 
        }

        .deck-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .brand-logo {
            font-size: 1.35rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .brand-logo span { color: var(--neon-red); text-shadow: 0 0 10px rgba(255,34,34,0.4); }

        .sys-exit-btn {
            background: var(--card-surface);
            border: 1px solid var(--border-line);
            color: var(--text-secondary);
            padding: 6px 14px;
            border-radius: 10px;
            font-size: 0.8rem;
            font-weight: 600;
            text-decoration: none;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .sys-exit-btn:hover {
            color: var(--text-primary);
            border-color: rgba(255,255,255,0.2);
        }

        /* Travel Mode Selector */
        .mode-selector-row {
            display: flex;
            gap: 8px;
            background: rgba(0,0,0,0.3);
            padding: 6px;
            border-radius: 14px;
            border: 1px solid var(--border-line);
        }
        .mode-btn {
            flex: 1;
            background: transparent;
            border: none;
            color: var(--text-secondary);
            padding: 9px 6px;
            border-radius: 10px;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 3px;
            font-size: 0.65rem;
            font-weight: 600;
            transition: all 0.2s ease;
        }
        .mode-btn svg { stroke: var(--text-secondary); fill: none; }
        .mode-btn.active {
            background: rgba(255, 34, 34, 0.15);
            color: var(--neon-red);
        }
        .mode-btn.active svg { stroke: var(--neon-red); }

        /* ── MODERN SHADOW-DOM SEARCH BOX RULES ── */
        .search-container-box {
            width: 100%;
            position: relative;
        }
        #geocoder-mount {
            width: 100%;
        }
        mapboxgl-search-box, mapboxsearch-search-box {
            width: 100% !important;
            max-width: 100% !important;
            --mapbox-search-box-background: var(--card-surface);
            --mapbox-search-box-text: var(--text-primary);
            --mapbox-search-box-placeholder-text: var(--text-secondary);
            --mapbox-search-box-border: 1px solid var(--border-line);
            --mapbox-search-box-border-radius: 16px;
            --mapbox-search-box-results-background: var(--hud-bg);
            --mapbox-search-box-result-text: var(--text-primary);
            --mapbox-search-box-result-hover-background: rgba(255, 255, 255, 0.08);
            --mapbox-search-box-icon-fill: var(--text-secondary);
            --mapbox-search-box-shadow: none;
        }

        /* Category Chips Styling */
        .category-chips-row {
            display: flex;
            gap: 8px;
            overflow-x: auto;
            padding: 2px 0 6px 0;
            scrollbar-width: none;
        }
        .category-chips-row::-webkit-scrollbar { display: none; }
        
        .category-search-pill {
            background: rgba(22, 22, 26, 0.95);
            border: 1px solid rgba(255, 255, 255, 0.15);
            color: var(--text-primary);
            padding: 10px 18px;
            border-radius: 100px;
            font-size: 0.88rem;
            font-weight: 500;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            white-space: nowrap;
            transition: all 0.2s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .category-search-pill:hover {
            background: rgba(35, 35, 40, 1);
            border-color: var(--neon-red);
            transform: scale(1.02);
        }

        /* ── DESTINATION CARD DISPLAY ── */
        #destination-card {
            background: var(--card-surface);
            border: 1px solid var(--border-line);
            border-radius: 16px;
            padding: 16px;
            display: none;
            flex-direction: column;
            gap: 12px;
        }
        .dest-title { font-size: 1.05rem; font-weight: 700; color: var(--text-primary); }
        .dest-address { font-size: 0.85rem; color: var(--text-secondary); line-height: 1.3; }

        .spatial-data-grid {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid var(--border-line);
            border-radius: 12px;
            padding: 12px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            font-size: 0.8rem;
        }
        .space-row { display: flex; justify-content: space-between; align-items: center; }
        .space-label { color: var(--text-secondary); }
        .space-val { font-weight: 600; color: var(--text-primary); }

        .route-alt-row { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 4px; }
        .route-alt-pill {
            flex-shrink: 0; background: rgba(255,255,255,0.05); border: 1px solid var(--border-line);
            color: var(--text-secondary); padding: 8px 12px; border-radius: 12px; font-size: 0.75rem; font-weight: 600; cursor: pointer;
        }
        .route-alt-pill.selected { border-color: var(--neon-red); color: var(--text-primary); background: rgba(255, 34, 34, 0.18); }

        .nav-action-row { display: flex; gap: 10px; }
        .nav-btn {
            flex: 1; background: var(--neon-red); color: #fff; border: none; padding: 12px;
            border-radius: 12px; font-size: 0.88rem; font-weight: 600; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 6px;
            box-shadow: 0 0 12px rgba(255, 34, 34, 0.3);
        }
        .clear-route-btn { background: rgba(255,255,255,0.08); border: 1px solid var(--border-line); color: var(--text-primary); width: 48px; border-radius: 12px; cursor: pointer; display: flex; align-items: center; justify-content: center; }

        /* Telemetry Feeds */
        .telemetry-grid {
            display: flex;
            flex-direction: column;
            gap: 8px;
            background: rgba(0,0,0,0.3);
            padding: 14px 16px;
            border-radius: 16px;
            border: 1px solid var(--border-line);
        }
        .matrix-row { display: flex; justify-content: space-between; font-size: 0.8rem; }
        .matrix-row span:first-child { color: var(--text-secondary); }
        .matrix-row span:last-child { font-family: monospace; font-weight: 600; }

        /* Active HUD Navigation Elements */
        #active-nav-hud {
            display: none; position: absolute; top: 20px; left: 20px; width: 380px; z-index: 15; flex-direction: column; gap: 10px;
        }
        .nav-instruction-card { background: linear-gradient(160deg, rgba(255,34,34,0.25), rgba(10,10,12,0.92)); backdrop-filter: blur(30px); border: 1px solid rgba(255,255,255,0.12); border-radius: 24px; padding: 22px; display: flex; align-items: center; gap: 18px; }
        .nav-instruction-body { flex: 1; }
        .nav-instruction-dist { font-size: 1.6rem; font-weight: 800; }
        .nav-instruction-text { font-size: 0.9rem; color: rgba(255,255,255,0.85); font-weight: 600; }
        .nav-bottom-bar { background: var(--hud-bg); backdrop-filter: blur(30px); border: 1px solid var(--border-line); border-radius: 20px; padding: 16px 18px; display: flex; align-items: center; justify-content: space-between; }
        .nav-bottom-stat { display: flex; flex-direction: column; }
        .nav-bottom-stat .val { font-size: 1.05rem; font-weight: 800; }
        .nav-bottom-stat .lbl { font-size: 0.65rem; color: var(--text-secondary); text-transform: uppercase; }
        .nav-end-btn { background: #3a3a44; color: #fff; border: 1px solid var(--border-line); padding: 10px 18px; border-radius: 12px; font-weight: 700; cursor: pointer; }

        #speed-chip {
            display: none; position: absolute; bottom: 20px; left: 20px; z-index: 15; width: 74px; height: 74px; border-radius: 50%; background: #0c0c0e; border: 4px solid var(--neon-red); flex-direction: column; align-items: center; justify-content: center;
            box-shadow: 0 0 15px rgba(255, 34, 34, 0.2);
        }
        #speed-chip .speed-val { font-size: 1.4rem; font-weight: 800; line-height: 1; color: var(--text-primary); }
        #speed-chip .speed-unit { font-size: 0.55rem; color: var(--text-secondary); font-weight: 700; }

        /* Right Control Stack */
        #right-console-stack {
            position: absolute; top: 20px; right: 20px; z-index: 100; display: flex; flex-direction: column; gap: 12px;
        }
        .glass-panel-btn {
            background: var(--hud-bg); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border: 1px solid var(--border-line); padding: 14px; border-radius: 16px; color: var(--text-primary); cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.2s;
        }
        .glass-panel-btn:hover { background: rgba(255,255,255,0.08); }
        .glass-panel-btn.active { border-color: var(--neon-red); color: var(--neon-red); box-shadow: 0 0 10px rgba(255, 34, 34, 0.2); }

        #spatial-overlay { position: absolute; bottom: 20px; right: 20px; background: var(--hud-bg); backdrop-filter: blur(10px); padding: 8px 14px; border-radius: 10px; border: 1px solid var(--border-line); font-family: monospace; font-size: 0.75rem; z-index: 5; }

        /* Directional Dynamic Red Positioning Icon */
        .custom-tracking-marker {
            width: 24px;
            height: 24px;
            background-color: var(--neon-red);
            border: 3px solid #ffffff;
            border-radius: 50%;
            box-shadow: 0 0 20px var(--neon-red);
            position: relative;
            transition: transform 0.1s linear;
        }
        .custom-tracking-marker::after {
            content: '';
            position: absolute;
            top: -11px;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 0;
            border-left: 6px solid transparent;
            border-right: 6px solid transparent;
            border-bottom: 11px solid var(--neon-red);
        }

        .custom-dest-marker { width: 18px; height: 18px; background-color: #ffffff; border: 4px solid var(--neon-red); border-radius: 50%; box-shadow: 0 0 18px var(--neon-red); }

        @media(max-width: 480px) {
            #command-deck, #active-nav-hud { width: 100%; left: 0; right: 0; }
            #command-deck { 
                bottom: 0; 
                top: auto; 
                height: 45vh;
                max-height: 85vh; 
                border-radius: 24px 24px 0 0;
                box-shadow: 0 -10px 40px rgba(0,0,0,0.5);
            }
        }
    </style>
</head>
<body>

    <div id="app-viewport">
        <div id="map"></div>

        <!-- Command Deck Interface Sheet -->
        <div id="command-deck">
            <div class="drag-handle-zone" id="drag-handle"><div class="drag-handle-bar"></div></div>
            <div class="deck-header">
                <div class="brand-logo">Geo<span>Pro</span></div>
                <div class="header-actions">
                    <button class="sys-exit-btn">Exit</button>
                </div>
            </div>

            <!-- Travel Mode Elements Matrix -->
            <div class="mode-selector-row" id="mode-selector">
                <button class="mode-btn active" data-mode="driving-traffic">
                    <svg width="18" height="18" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M5 17h14M5 17a2 2 0 1 0 4 0M15 17a2 2 0 1 0 4 0M5 17l1-6 2-3h8l2 3 1 6M6 11h12"/></svg>
                    Drive
                </button>
                <button class="mode-btn" data-mode="cycling">
                    <svg width="18" height="18" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><circle cx="6" cy="17" r="3"/><circle cx="18" cy="17" r="3"/><path d="M6 17l4-9h4l4 9"/></svg>
                    Bike
                </button>
                <button class="mode-btn" data-mode="walking">
                    <svg width="18" height="18" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><circle cx="13" cy="4" r="1.6"/><path d="M10 22l2-7 2 2 3 5"/></svg>
                    Walk
                </button>
            </div>

            <!-- Modern Search Mount Workspace -->
            <div class="search-container-box">
                <div id="geocoder-mount"></div>
            </div>

            <!-- Category Fast Access Chips -->
            <div class="category-chips-row">
                <button class="category-search-pill" data-query="Food">🍔 Food</button>
                <button class="category-search-pill" data-query="Coffee">☕ Coffee</button>
                <button class="category-search-pill" data-query="Gas Station">⛽ Fuel</button>
            </div>

            <!-- Dynamic Context Destination Card -->
            <div id="destination-card">
                <div class="dest-title" id="card-title">Selected Node</div>
                <div class="dest-address" id="card-address">Analyzing route vector traces...</div>
                <div id="spatial-profile-box"></div>
                <div class="route-alt-row" id="route-alt-row"></div>
                <div class="nav-action-row">
                    <button class="nav-btn" id="launch-nav-trigger">Start Navigation</button>
                    <button class="clear-route-btn" id="clear-route-trigger">✖</button>
                </div>
            </div>

            <!-- Global Hardware Monitor Readings -->
            <div class="telemetry-grid">
                <div class="matrix-row">
                    <span>TRAFFIC NETWORK</span>
                    <span id="traffic-status" style="color: var(--traffic-green);">OPTIMAL</span>
                </div>
                <div class="matrix-row">
                    <span>GPS STATUS</span>
                    <span id="telemetry-feed" style="color: var(--neon-red);">SEARCHING LOCK...</span>
                </div>
            </div>
        </div>

        <!-- Active Tracking HUD -->
        <div id="active-nav-hud">
            <div class="nav-instruction-card">
                <div class="nav-instruction-body">
                    <div class="nav-instruction-dist" id="nav-instruction-dist">--</div>
                    <div class="nav-instruction-text" id="nav-instruction-text">Preparing route…</div>
                </div>
            </div>
            <div class="nav-bottom-bar">
                <div class="nav-bottom-stat"><span class="val" id="nav-eta-val">--:--</span><span class="lbl">Arrival</span></div>
                <div class="nav-bottom-stat"><span class="val" id="nav-time-left">--</span><span class="lbl">Remaining</span></div>
                <div class="nav-bottom-stat"><span class="val" id="nav-dist-left">--</span><span class="lbl">Distance</span></div>
                <button class="nav-end-btn" id="nav-end-trigger">End</button>
            </div>
        </div>

        <div id="speed-chip"><span class="speed-val" id="speed-val">0</span><span class="speed-unit">MPH</span></div>

        <!-- Right System Utility Column Structure -->
        <div id="right-console-stack">
            <button class="glass-panel-btn" id="recenter-gps" title="Recenter on Live Position">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="3"/></svg>
            </button>
            <button class="glass-panel-btn" id="toggle-satellite" title="Toggle Satellite Map Layer">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><line x1="9" y1="3" x2="9" y2="21"/></svg>
            </button>
            <button class="glass-panel-btn" id="toggle-3d" title="Toggle 3D Buildings">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 8l9-5 9 5-9 5-9-5z"/><path d="M3 8v8l9 5 9-5V8"/></svg>
            </button>
        </div>

        <div id="spatial-overlay">LNG: -- | LAT: --</div>
    </div>

    <script>
        mapboxgl.accessToken = 'pk.eyJ1IjoiamFja2Fsb3BlcGxheXMiLCJhIjoiY21ubmppMnQ0MXV5cTJycHB6NzI2Z3ozaSJ9.rC3Z3wHDO5qKVLdiA9XlLg';

        const mapStyles = {
            vectorDark: 'mapbox://styles/mapbox/dark-v11',
            satelliteHybrid: 'mapbox://styles/mapbox/satellite-streets-v12'
        };

        let currentOriginCoords = [-123.2078, 39.1502]; 
        let lastKnownCoords = null;
        let selectedDestinationCoords = null;
        let currentTravelMode = 'driving-traffic';
        let routeAlternatives = [];
        let selectedRouteIdx = 0;
        let isNavigating = false;
        let layers3DActive = false;
        let isSatelliteActive = false;
        let geocoderInstance = null;
        let mapCenteredOnLiveGPS = false; 

        const map = new mapboxgl.Map({
            container: 'map',
            style: mapStyles.vectorDark,
            center: currentOriginCoords,
            zoom: 14,
            pitch: 20,
            bearing: 0,
            antialias: true
        });

        // Instantiate Dynamic Red Arrow Marker Container
        const liveUserBeacon = document.createElement('div');
        liveUserBeacon.className = 'custom-tracking-marker';
        const userGpsMarker = new mapboxgl.Marker({ element: liveUserBeacon, rotationAlignment: 'map' })
            .setLngLat(currentOriginCoords)
            .addTo(map);

        const destMarkerElement = document.createElement('div');
        destMarkerElement.className = 'custom-dest-marker';
        const globalDestinationMarker = new mapboxgl.Marker(destMarkerElement);

        // Mapbox Redraw State Retention Engine
        map.on('style.load', () => {
            registerGlobal3DTerrainEngine();
            register3DBuildingsArchitecturalLayer();
            if (selectedDestinationCoords) {
                renderVisualRouteLines();
            }
        });

        map.on('load', () => {
            initializeProximitySearchEngine();
            initializeDraggableConsoleSheet();
            setupInteractiveBuildingQueries();
            hookInterfaceControls();
            initializeLiveGPSHardware();
        });

        function initializeLiveGPSHardware() {
            if (!navigator.geolocation) {
                document.getElementById('telemetry-feed').innerText = "GPS NOT SUPPORTED";
                return;
            }

            // STAGE 1: Ultra-Fast Location Grab
            // Uses zero-accuracy restrictions and heavily prioritizes cached coordinates to spin the viewport instantly.
            navigator.geolocation.getCurrentPosition(handleGPSMoveUpdate, null, {
                enableHighAccuracy: false,
                maximumAge: 120000, // Accepts locks up to 2 minutes old for absolute speed
                timeout: 3000
            });

            // STAGE 2: Precise High-Fidelity Pipeline Streams
            // Hooks background tracking matrices for fine accuracy updates, speedometers, and arrow tracking vectors.
            navigator.geolocation.getCurrentPosition(handleGPSMoveUpdate, handleGPSTrackingError, { enableHighAccuracy: true });
            navigator.geolocation.watchPosition(handleGPSMoveUpdate, handleGPSTrackingError, { enableHighAccuracy: true });
        }

        // Standard Metrical Vector Distance Utility (Haversine Implementation for Rerouting)
        function calculateMetricGap(coord1, coord2) {
            const R = 6371000; 
            const dLat = (coord2[1] - coord1[1]) * Math.PI / 180;
            const dLon = (coord2[0] - coord1[0]) * Math.PI / 180;
            const a = Math.sin(dLat / 2) * Math.sin(dLat / 2) +
                      Math.cos(coord1[1] * Math.PI / 180) * Math.cos(coord2[1] * Math.PI / 180) *
                      Math.sin(dLon / 2) * Math.sin(dLon / 2);
            return R * (2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a)));
        }

        function handleGPSMoveUpdate(position) {
            currentOriginCoords = [position.coords.longitude, position.coords.latitude];
            userGpsMarker.setLngLat(currentOriginCoords);
            
            document.getElementById('telemetry-feed').innerText = "GPS LOCK [ACTIVE]";
            document.getElementById('telemetry-feed').style.color = "var(--traffic-green)";
            
            // Speed telemetry configuration
            if (position.coords.speed !== null && position.coords.speed !== undefined && position.coords.speed >= 0) {
                const mph = Math.round(position.coords.speed * 2.23694);
                document.getElementById('speed-val').innerText = mph;
            }

            // Core Directional Facing Resolution
            let userHeading = position.coords.heading;
            if ((userHeading === null || userHeading === undefined || isNaN(userHeading)) && lastKnownCoords) {
                // Directional Fallback: Calculate displacement bearing relative to previous coordinate point
                const dLon = (currentOriginCoords[0] - lastKnownCoords[0]) * Math.PI / 180;
                const lat1 = lastKnownCoords[1] * Math.PI / 180;
                const lat2 = currentOriginCoords[1] * Math.PI / 180;
                const y = Math.sin(dLon) * Math.cos(lat2);
                const x = Math.cos(lat1) * Math.sin(lat2) - Math.sin(lat1) * Math.cos(lat2) * Math.cos(dLon);
                userHeading = (Math.atan2(y, x) * 180 / Math.PI + 360) % 360;
            }

            if (userHeading !== null && userHeading !== undefined && !isNaN(userHeading)) {
                userGpsMarker.setRotation(userHeading);
                if (isNavigating) {
                    map.easeTo({ bearing: userHeading, duration: 300 });
                }
            }

            updateSearchProximityBias();

            // Automatic Rerouting Engine Check
            if (isNavigating && routeAlternatives[selectedRouteIdx]) {
                const traceSegments = routeAlternatives[selectedRouteIdx].geometry.coordinates;
                let minimumDeviationMeters = Infinity;
                
                for (let i = 0; i < traceSegments.length; i++) {
                    const deviation = calculateMetricGap(currentOriginCoords, traceSegments[i]);
                    if (deviation < minimumDeviationMeters) minimumDeviationMeters = deviation;
                }
                
                // Trigger dynamic network recalculation if the user is further than 40 meters off-route
                if (minimumDeviationMeters > 40) {
                    console.log(`Off-route discrepancy verified: ${minimumDeviationMeters.toFixed(1)}m. Dispatching automatic trace recalculation.`);
                    calculateNavigationVectors();
                }
            }

            if (!mapCenteredOnLiveGPS) {
                map.flyTo({ center: currentOriginCoords, zoom: 14, pitch: 20, essential: true });
                mapCenteredOnLiveGPS = true;
            }

            lastKnownCoords = [...currentOriginCoords];
        }

        function handleGPSTrackingError(err) {
            console.warn(`Hardware telemetry exception: ${err.message}`);
            // Don't kill telemetry displays for occasional fast timeouts if data fallback stream works
            if(!mapCenteredOnLiveGPS) {
                document.getElementById('telemetry-feed').innerText = "GPS TIMEOUT / DENIED";
                document.getElementById('telemetry-feed').style.color = "var(--traffic-red)";
            }
        }

        function registerGlobal3DTerrainEngine() {
            if (isSatelliteActive) {
                if (!map.getSource('mapbox-dem')) {
                    map.addSource('mapbox-dem', {
                        'type': 'raster-dem',
                        'url': 'mapbox://mapbox.mapbox-terrain-dem-v1',
                        'tileSize': 512
                    });
                }
                map.setTerrain({ 'source': 'mapbox-dem', 'exaggeration': 1.4 });
            } else {
                map.setTerrain(null);
            }
        }

        function register3DBuildingsArchitecturalLayer() {
            if (map.getLayer('3d-buildings')) return;

            map.addLayer({
                id: '3d-buildings',
                source: 'composite',
                'source-layer': 'building',
                filter: ['==', 'extrude', 'true'],
                type: 'fill-extrusion',
                minzoom: 13,
                paint: {
                    'fill-extrusion-color': isSatelliteActive ? '#ffffff' : '#2a2a30',
                    'fill-extrusion-height': ['get', 'height'],
                    'fill-extrusion-base': ['get', 'min_height'],
                    'fill-extrusion-opacity': layers3DActive ? (isSatelliteActive ? 0.55 : 0.85) : 0.0
                }
            });
        }

        function initializeProximitySearchEngine() {
            const script = document.getElementById('search-js');
            const initSearchBox = () => {
                if (typeof mapboxsearch === 'undefined' || !mapboxsearch.MapboxSearchBox) {
                    setTimeout(initSearchBox, 50);
                    return;
                }
                const container = document.getElementById('geocoder-mount');
                if (!container) return;
                container.innerHTML = ''; 
                
                geocoderInstance = new mapboxsearch.MapboxSearchBox();
                geocoderInstance.accessToken = mapboxgl.accessToken;
                geocoderInstance.options = { types: 'address,poi,neighborhood', proximity: currentOriginCoords };
                geocoderInstance.mapboxgl = mapboxgl;
                geocoderInstance.marker = false; 
                container.appendChild(geocoderInstance);
                
                geocoderInstance.addEventListener('retrieve', (e) => {
                    let feature = null;
                    if (e.detail && e.detail.features && e.detail.features.length > 0) {
                        feature = e.detail.features[0];
                    } else if (e.detail && e.detail.geometry) {
                        feature = e.detail;
                    }
                    if (feature && feature.geometry && feature.geometry.coordinates) {
                        const coords = feature.geometry.coordinates;
                        const name = feature.properties?.name || feature.text || "Target Destination";
                        const address = feature.properties?.full_address || feature.place_name || "";
                        map.flyTo({ center: coords, zoom: 15, essential: true });
                        loadSpatialDestination(coords, name, address);
                    }
                });
            };
            if (script) { if (typeof mapboxsearch !== 'undefined') { initSearchBox(); } else { script.onload = initSearchBox; } } else { initSearchBox(); }
        }

        function updateSearchProximityBias() {
            if (geocoderInstance && geocoderInstance.options) {
                geocoderInstance.options = { ...geocoderInstance.options, proximity: currentOriginCoords };
            }
        }

        document.querySelectorAll('.category-search-pill').forEach(pill => {
            pill.addEventListener('click', () => {
                const queryTarget = pill.getAttribute('data-query');
                if (geocoderInstance) {
                    geocoderInstance.value = queryTarget;
                    geocoderInstance.focus();
                    if (typeof geocoderInstance.search === 'function') {
                        geocoderInstance.search();
                    } else {
                        const inputEvent = new Event('input', { bubbles: true });
                        const innerInput = geocoderInstance.shadowRoot?.querySelector('input') || geocoderInstance.querySelector('input');
                        if (innerInput) innerInput.dispatchEvent(inputEvent);
                    }
                }
            });
        });

        function setupInteractiveBuildingQueries() {
            map.on('click', (e) => {
                const features = map.queryRenderedFeatures(e.point, { layers: ['3d-buildings', 'poi-label'] });
                const targetCoords = [e.lngLat.lng, e.lngLat.lat];
                
                let name = "Selected Map Coordinates";
                let address = `LAT: ${e.lngLat.lat.toFixed(5)} | LNG: ${e.lngLat.lng.toFixed(5)}`;
                
                if (features && features.length > 0) {
                    name = features[0].properties.name || "Structural Entity Asset";
                }
                
                map.easeTo({ center: targetCoords, zoom: Math.max(map.getZoom(), 16) });
                loadSpatialDestination(targetCoords, name, address);
            });
        }

        function loadSpatialDestination(coords, title, address) {
            selectedDestinationCoords = coords;
            globalDestinationMarker.setLngLat(coords).addTo(map);

            document.getElementById('card-title').innerText = title;
            document.getElementById('card-address').innerText = address;

            const profileContainer = document.getElementById('spatial-profile-box');
            profileContainer.innerHTML = `
                <div class="spatial-data-grid">
                    <div class="space-row">
                        <span class="space-label">Target Vector:</span>
                        <span class="space-val">${coords[0].toFixed(4)}, ${coords[1].toFixed(4)}</span>
                    </div>
                </div>
            `;

            document.getElementById('destination-card').style.display = 'flex';
            calculateNavigationVectors();
        }

        async function calculateNavigationVectors() {
            if (!selectedDestinationCoords) return;
            const profileMode = currentTravelMode === 'driving-traffic' ? 'driving' : currentTravelMode;
            const directionsEndpoint = `https://api.mapbox.com/directions/v5/mapbox/${profileMode}/${currentOriginCoords.join(',')};${selectedDestinationCoords.join(',')}?steps=true&geometries=geojson&alternatives=true&access_token=${mapboxgl.accessToken}`;

            try {
                const request = await fetch(directionsEndpoint);
                const payload = await request.json();
                if (payload.code !== 'Ok') return;
                routeAlternatives = payload.routes;
                
                if (selectedRouteIdx >= routeAlternatives.length) {
                    selectedRouteIdx = 0;
                }

                renderVisualRouteLines();
                populateAlternativeSelectors();
                
                if (isNavigating) {
                    updateActiveHUDLayout(routeAlternatives[selectedRouteIdx]);
                }
            } catch (error) {
                console.error("Critical routing calculation exception:", error);
            }
        }

        function renderVisualRouteLines() {
            routeAlternatives.forEach((_, index) => {
                if (map.getLayer(`route-line-${index}`)) map.removeLayer(`route-line-${index}`);
                if (map.getSource(`route-source-${index}`)) map.removeSource(`route-source-${index}`);
            });

            routeAlternatives.forEach((route, index) => {
                const isSelected = (index === selectedRouteIdx);
                map.addSource(`route-source-${index}`, {
                    type: 'geojson',
                    data: { type: 'Feature', geometry: route.geometry }
                });

                map.addLayer({
                    id: `route-line-${index}`,
                    type: 'line',
                    source: `route-source-${index}`,
                    layout: { 'line-join': 'round', 'line-cap': 'round' },
                    paint: {
                        'line-color': isSelected ? '#ff2222' : '#3a3a44',
                        'line-width': isSelected ? 6 : 4,
                        'line-opacity': isSelected ? 0.95 : 0.35
                    }
                }, map.getLayer('3d-buildings') ? '3d-buildings' : undefined);
            });
        }

        function populateAlternativeSelectors() {
            const row = document.getElementById('route-alt-row');
            row.innerHTML = '';
            routeAlternatives.forEach((route, index) => {
                const minutes = Math.round(route.duration / 60);
                const isSelected = (index === selectedRouteIdx);
                const pill = document.createElement('button');
                pill.className = `route-alt-pill ${isSelected ? 'selected' : ''}`;
                pill.innerHTML = `${minutes} MIN`;
                pill.addEventListener('click', () => {
                    selectedRouteIdx = index;
                    renderVisualRouteLines();
                    populateAlternativeSelectors();
                });
                row.appendChild(pill);
            });
        }

        function updateActiveHUDLayout(route) {
            if (!route) return;
            document.getElementById('nav-instruction-text').innerText = route.legs[0].steps[0]?.maneuver?.instruction || 'Continue down the path';
            document.getElementById('nav-instruction-dist').innerText = `${Math.round(route.legs[0].steps[0]?.distance || 50)} m`;
            document.getElementById('nav-eta-val').innerText = `${Math.round(route.duration / 60)}m`;
            document.getElementById('nav-time-left').innerText = `${Math.round(route.duration / 60)} min`;
            document.getElementById('nav-dist-left').innerText = `${(route.distance / 1609.34).toFixed(1)} mi`;
        }

        function hookInterfaceControls() {
            document.querySelectorAll('.mode-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
                    e.currentTarget.classList.add('active');
                    currentTravelMode = e.currentTarget.getAttribute('data-mode');
                    calculateNavigationVectors();
                });
            });

            document.getElementById('toggle-3d').addEventListener('click', (e) => {
                layers3DActive = !layers3DActive;
                e.currentTarget.classList.toggle('active', layers3DActive);
                if (map.getLayer('3d-buildings')) {
                    map.setPaintProperty('3d-buildings', 'fill-extrusion-opacity', layers3DActive ? (isSatelliteActive ? 0.55 : 0.85) : 0.0);
                }
            });

            document.getElementById('toggle-satellite').addEventListener('click', (e) => {
                isSatelliteActive = !isSatelliteActive;
                e.currentTarget.classList.toggle('active', isSatelliteActive);
                map.setStyle(isSatelliteActive ? mapStyles.satelliteHybrid : mapStyles.vectorDark);
            });

            document.getElementById('recenter-gps').addEventListener('click', () => {
                map.flyTo({ center: currentOriginCoords, zoom: 15, pitch: 30 });
            });

            document.getElementById('clear-route-trigger').addEventListener('click', clearActiveRouteTrace);
            document.getElementById('launch-nav-trigger').addEventListener('click', toggleNavigationHUD);
            document.getElementById('nav-end-trigger').addEventListener('click', toggleNavigationHUD);
        }

        function clearActiveRouteTrace() {
            routeAlternatives.forEach((_, index) => {
                if (map.getLayer(`route-line-${index}`)) map.removeLayer(`route-line-${index}`);
                if (map.getSource(`route-source-${index}`)) map.removeSource(`route-source-${index}`);
            });
            routeAlternatives = [];
            selectedDestinationCoords = null;
            globalDestinationMarker.remove();
            document.getElementById('destination-card').style.display = 'none';
            if (geocoderInstance) geocoderInstance.value = '';
            map.easeTo({ pitch: 20, bearing: 0 });
        }

        function toggleNavigationHUD() {
            isNavigating = !isNavigating;
            document.getElementById('command-deck').style.display = isNavigating ? 'none' : 'flex';
            document.getElementById('active-nav-hud').style.display = isNavigating ? 'flex' : 'none';
            document.getElementById('speed-chip').style.display = isNavigating ? 'flex' : 'none';
            
            if (isNavigating && routeAlternatives[selectedRouteIdx]) {
                map.easeTo({ zoom: 17, pitch: 50, duration: 800 });
                updateActiveHUDLayout(routeAlternatives[selectedRouteIdx]);
            } else {
                clearActiveRouteTrace();
            }
        }

        function initializeDraggableConsoleSheet() {
            const deck = document.getElementById('command-deck');
            const handle = document.getElementById('drag-handle');
            let isDragging = false, startY = 0, startHeight = 0, startTransformY = 0;

            handle.addEventListener('pointerdown', (e) => {
                isDragging = true; startY = e.clientY;
                deck.classList.add('is-dragging'); handle.setPointerCapture(e.pointerId);
                const isMobile = window.innerWidth <= 480;
                if (isMobile) { startHeight = deck.offsetHeight; } else {
                    const matrix = new WebKitCSSMatrix(window.getComputedStyle(deck).transform);
                    startTransformY = matrix.m42 || 0;
                }
            });

            window.addEventListener('pointermove', (e) => {
                if (!isDragging) return;
                const deltaY = e.clientY - startY;
                const isMobile = window.innerWidth <= 480;

                if (isMobile) {
                    const targetHeight = startHeight - deltaY;
                    deck.style.height = `${Math.max(120, Math.min(window.innerHeight * 0.85, targetHeight))}px`;
                    deck.style.transform = 'none'; 
                } else {
                    let targetY = startTransformY + deltaY;
                    if (targetY < 0) targetY *= 0.2; 
                    deck.style.transform = `translateY(${targetY}px)`;
                }
            });

            window.addEventListener('pointerup', () => {
                if (!isDragging) return; isDragging = false; deck.classList.remove('is-dragging');
                if (window.innerWidth > 480) {
                    const matrix = new WebKitCSSMatrix(window.getComputedStyle(deck).transform);
                    if ((matrix.m42 || 0) > 180) { deck.style.transform = `translateY(calc(100vh - 120px))`; } 
                    else { deck.style.transform = `translateY(0px)`; }
                }
            });
        }

        map.on('mousemove', (e) => {
            document.getElementById('spatial-overlay').innerText = `LNG: ${e.lngLat.lng.toFixed(4)} | LAT: ${e.lngLat.lat.toFixed(4)}`;
        });
    </script>
