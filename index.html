<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GeoPro Engine Workspace</title>
    
    <!-- Mapbox GL JS -->
    <script src="https://api.mapbox.com/mapbox-gl-js/v3.3.0/mapbox-gl.js"></script>
    <link href="https://api.mapbox.com/mapbox-gl-js/v3.3.0/mapbox-gl.css" rel="stylesheet" />
    
    <!-- PMTiles Protocol Plugin -->
    <script src="https://unpkg.com/pmtiles@2.11.0/dist/index.js"></script>

    <style>
        :root {
            --bg-color: #0a0a0a;
            --panel-bg: #141414;
            --accent-color: #ff3333;
            --accent-hover: #cc0000;
            --text-color: #e0e0e0;
            --text-muted: #888;
            --border-color: #262626;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: var(--bg-color);
            color: var(--text-color);
        }

        #app-container {
            display: flex;
            width: 100%;
            height: 100%;
        }

        /* Sidebar Styling */
        #sidebar {
            width: 320px;
            background-color: var(--panel-bg);
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            z-index: 10;
            box-shadow: 5px 0 15px rgba(0,0,0,0.5);
        }

        .sidebar-header {
            padding: 20px;
            border-bottom: 1px solid var(--border-color);
        }

        .sidebar-header h1 {
            font-size: 1.2rem;
            font-weight: 700;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .sidebar-header h1 span {
            color: var(--accent-color);
        }

        .sidebar-content {
            padding: 20px;
            flex-grow: 1;
            overflow-y: auto;
        }

        .control-group {
            margin-bottom: 25px;
        }

        .control-group h3 {
            font-size: 0.85rem;
            text-transform: uppercase;
            color: var(--text-muted);
            letter-spacing: 0.5px;
            margin-bottom: 12px;
        }

        /* Custom Toggle Switches */
        .toggle-container {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: #1a1a1a;
            padding: 12px;
            border-radius: 6px;
            border: 1px solid var(--border-color);
            margin-bottom: 10px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .toggle-container:hover {
            background: #222;
        }

        .toggle-label {
            font-size: 0.9rem;
            font-weight: 500;
        }

        .switch {
            position: relative;
            display: inline-block;
            width: 40px;
            height: 20px;
        }

        .switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #333;
            transition: .3s;
            border-radius: 20px;
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 14px;
            width: 14px;
            left: 3px;
            bottom: 3px;
            background-color: white;
            transition: .3s;
            border-radius: 50%;
        }

        input:checked + .slider {
            background-color: var(--accent-color);
        }

        input:checked + .slider:before {
            transform: translateX(20px);
        }

        /* Map Container */
        #map {
            flex-grow: 1;
            height: 100%;
            position: relative;
        }

        /* Quick Coordinates Overlay */
        #geo-overlay {
            position: absolute;
            bottom: 20px;
            right: 20px;
            background: rgba(20, 20, 20, 0.85);
            padding: 8px 12px;
            border-radius: 4px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.8rem;
            pointer-events: none;
            z-index: 5;
        }
    </style>
</head>
<body>

    <div id-="app-container">
        <!-- Control Panel -->
        <div id="sidebar">
            <div class="sidebar-header">
                <h1>GeoPro // <span>Engine</span></h1>
            </div>
            
            <div class="sidebar-content">
                <div class="control-group">
                    <h3>Visualization Layers</h3>
                    
                    <!-- 3D Extrusion Toggle -->
                    <label class="toggle-container">
                        <span class="toggle-label">3D Building Extrusions</span>
                        <div class="switch">
                            <input type="checkbox" id="layer-toggle-3d" checked>
                            <span class="slider"></span>
                        </div>
                    </label>

                    <!-- PMTiles Infrastructure Toggle -->
                    <label class="toggle-container">
                        <span class="toggle-label">Local Infrastructure (PMTiles)</span>
                        <div class="switch">
                            <input type="checkbox" id="layer-toggle-pmtiles">
                            <span class="slider"></span>
                        </div>
                    </label>
                </div>
            </div>
        </div>

        <!-- Map Space -->
        <div id="map">
            <div id="geo-overlay">Lng: -123.2078 | Lat: 39.1502</div>
        </div>
    </div>

    <script>
        // REPLACE WITH YOUR ACTUAL MAPBOX ACCESS TOKEN
        mapboxgl.accessToken = 'pk.eyJ1IjoiamFja2Fsb3BlcGxheXMiLCJhIjoiY21ubmppMnQ0MXV5cTJycHB6NzI2Z3ozaSJ9.rC3Z3wHDO5qKVLdiA9XlLg';

        // 1. Register the PMTiles Protocol
        const protocol = new pmtiles.Protocol();
        mapboxgl.addProtocol("pmtiles", protocol.tile);

        // Define your PMTiles source URL here
        const pmtilesUrl = "pmtiles://https://your-server-or-bucket.com/infrastructure.pmtiles";

        // 2. Initialize Mapbox GL Engine centered on Ukiah, CA
        const map = new mapboxgl.Map({
            container: 'map',
            style: 'mapbox://styles/mapbox/dark-v11', // High contrast dark basemap
            center: [-123.2078, 39.1502], 
            zoom: 14,
            pitch: 45,
            bearing: -17.6
        });

        map.on('load', () => {
            // --- A. Setup 3D Building Extrusions ---
            // Fetch the default mapbox building layer and add custom extrusion settings
            const layers = map.getStyle().layers;
            const labelLayerId = layers.find(layer => layer.type === 'symbol' && layer.layout['text-field']).id;

            map.addLayer({
                'id': '3d-buildings',
                'source': 'composite',
                'source-layer': 'building',
                'filter': ['==', 'extrude', 'true'],
                'type': 'fill-extrusion',
                'minzoom': 15,
                'paint': {
                    'fill-extrusion-color': '#2b2b2b',
                    'fill-extrusion-height': [
                        'interpolate', ['linear'], ['zoom'],
                        15, 0,
                        15.05, ['get', 'height']
                    ],
                    'fill-extrusion-base': [
                        'interpolate', ['linear'], ['zoom'],
                        15, 0,
                        15.05, ['get', 'min_height']
                    ],
                    'fill-extrusion-opacity': 0.85
                }
            }, labelLayerId);


            // --- B. Setup PMTiles Vector Source & Custom Infrastructure Layer ---
            map.addSource('local-infrastructure-source', {
                type: 'vector',
                url: pmtilesUrl
            });

            // Example vector configuration layout (Adjust standard source-layer targets to match your actual PMTiles generation keys)
            map.addLayer({
                id: 'local-infrastructure-layer',
                source: 'local-infrastructure-source',
                'source-layer': 'layer1', // Change this to match your PMTiles source internal layer name
                type: 'line',
                layout: {
                    'line-join': 'round',
                    'line-cap': 'round'
                },
                paint: {
                    'line-color': '#ff3333', // Styled to match your branding
                    'line-width': 2.5,
                    'line-opacity': 0.9
                }
            });

            // Set initial visibility state of the PMTiles layer based on current checkbox status
            const pmtilesCheckbox = document.getElementById('layer-toggle-pmtiles');
            map.setLayoutProperty(
                'local-infrastructure-layer', 
                'visibility', 
                pmtilesCheckbox.checked ? 'visible' : 'none'
            );


            // --- C. Wiring up Interactive Event Listeners ---

            // Toggle logic for 3D Buildings
            document.getElementById('layer-toggle-3d').addEventListener('change', (e) => {
                map.setLayoutProperty('3d-buildings', 'visibility', e.target.checked ? 'visible' : 'none');
            });

            // Toggle logic for Local Infrastructure (PMTiles Vector Layer)
            pmtilesCheckbox.addEventListener('change', (e) => {
                map.setLayoutProperty('local-infrastructure-layer', 'visibility', e.target.checked ? 'visible' : 'none');
            });
        });

        // Dynamic coordinate tracker UI overlay
        map.on('mousemove', (e) => {
            document.getElementById('geo-overlay').innerHTML = 
                `Lng: ${e.lngLat.lng.toFixed(4)} | Lat: ${e.lngLat.lat.toFixed(4)}`;
        });
    </script>
</body>
</html>
