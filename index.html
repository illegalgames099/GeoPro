<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <title>GeoPro</title>
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover" />
    <meta name="theme-color" content="#050505" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="GeoPro" />

    <link href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css" rel="stylesheet" />
    <script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>

    <style>
        :root {
            --bg-primary: #050505;
            --bg-panel: rgba(10, 10, 12, 0.75);
            --bg-panel-solid: #0f0f13;
            --border-color: rgba(255, 51, 51, 0.25);
            --action-red: #ff3333;
            --action-red-glow: rgba(255, 51, 51, 0.4);
            --text-primary: #f5f5f7;
            --text-secondary: #c5c5ca;
            --text-muted: #62626e;
            --font-monospace: 'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: var(--bg-primary);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        #map {
            position: absolute;
            top: 0;
            bottom: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        .hud-system-header {
            position: absolute;
            top: 16px;
            left: 16px;
            right: 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 10;
            pointer-events: none;
        }

        .hud-module {
            background: var(--bg-panel);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 10px 16px;
            pointer-events: auto;
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.6);
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .brand-node {
            font-family: var(--font-monospace);
            font-weight: 900;
            letter-spacing: 1px;
            color: var(--text-primary);
            font-size: 0.95rem;
        }

        .brand-node span {
            color: var(--action-red);
        }

        #coordinate-overlay-tracker {
            font-family: var(--font-monospace);
            font-size: 0.75rem;
            color: var(--text-secondary);
            display: flex;
            flex-direction: column;
        }
        
        .snap-status {
            font-size: 0.6rem;
            color: var(--action-red);
            font-weight: bold;
        }

        #telemetry-status-node {
            font-family: var(--font-monospace);
            font-size: 0.7rem;
            font-weight: bold;
            color: var(--action-red);
            text-transform: uppercase;
        }

        .floating-side-actions {
            position: absolute;
            right: 16px;
            top: 50%;
            transform: translateY(-50%);
            display: flex;
            flex-direction: column;
            gap: 12px;
            z-index: 10;
        }

        .side-btn {
            background: var(--bg-panel);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            width: 48px;
            height: 48px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-primary);
            cursor: pointer;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.6);
            transition: all 0.2s ease;
        }

        .side-btn:hover {
            background: #1a1a22;
            border-color: var(--action-red);
        }

        .side-btn.active-state {
            color: var(--action-red);
            border-color: rgba(255, 51, 51, 0.6);
            box-shadow: 0 0 16px rgba(255, 51, 51, 0.25);
        }
    </style>
</head>
<body>

    <div id="map"></div>

    <div class="hud-system-header">
        <div class="hud-module">
            <div class="brand-node">Geo<span>PRO</span></div>
            <div style="width: 1px; height: 14px; background: var(--border-color);"></div>
            <div id="telemetry-status-node">3D ENGINE ONLINE</div>
        </div>
        <div id="coordinate-overlay-tracker" class="hud-module">
            <span>X: --.----- | Y: --.-----</span>
            <span class="snap-status">SNAP TO ROAD: ACTIVE</span>
        </div>
    </div>

    <div class="floating-side-actions">
        <button id="snap-toggle-btn" class="side-btn active-state" title="Toggle Snap to Road">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
        </button>
    </div>

    <script>
        let defaultUserCoordinates = [-122.084, 37.422];
        let roadsGeometryData = [];
        let snapToRoadActive = true;

        // 3D Style Configuration
        const MAP_STYLE_DARK = {
            'version': 8,
            'sources': {
                'osm-tiles': {
                    'type': 'raster',
                    'tiles': [
                        'https://a.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}.png',
                        'https://b.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}.png',
                        'https://c.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}.png'
                    ],
                    'tileSize': 256,
                    'attribution': '&copy; OpenStreetMap contributors'
                },
                'osm-roads': { 'type': 'geojson', 'data': { 'type': 'FeatureCollection', 'features': [] } },
                'osm-buildings': { 'type': 'geojson', 'data': { 'type': 'FeatureCollection', 'features': [] } },
                'osm-bridges': { 'type': 'geojson', 'data': { 'type': 'FeatureCollection', 'features': [] } },
                'osm-trees': { 'type': 'geojson', 'data': { 'type': 'FeatureCollection', 'features': [] } }
            },
            'layers': [
                {
                    'id': 'osm-tiles-layer',
                    'type': 'raster',
                    'source': 'osm-tiles',
                    'minzoom': 0,
                    'maxzoom': 20
                },
                // Realistic Streets (Thick textured lines)
                {
                    'id': 'street-surface',
                    'type': 'line',
                    'source': 'osm-roads',
                    'layout': { 'line-join': 'round', 'line-cap': 'round' },
                    'paint': {
                        'line-color': '#333333',
                        'line-width': ['interpolate', ['linear'], ['zoom'], 14, 2, 18, 12]
                    }
                },
                {
                    'id': 'street-markings',
                    'type': 'line',
                    'source': 'osm-roads',
                    'paint': {
                        'line-color': '#ffcc00',
                        'line-width': 1,
                        'line-dasharray': [3, 4]
                    }
                },
                // 3D Buildings
                {
                    'id': '3d-buildings',
                    'type': 'fill-extrusion',
                    'source': 'osm-buildings',
                    'paint': {
                        'fill-extrusion-color': ['get', 'color'],
                        'fill-extrusion-height': ['get', 'height'],
                        'fill-extrusion-base': ['get', 'min_height'],
                        'fill-extrusion-opacity': 0.9,
                        // Add realistic shading
                        'fill-extrusion-vertical-gradient': true 
                    }
                },
                // 3D Bridges (Extruded polygons)
                {
                    'id': '3d-bridges',
                    'type': 'fill-extrusion',
                    'source': 'osm-bridges',
                    'paint': {
                        'fill-extrusion-color': '#44444a',
                        'fill-extrusion-height': ['get', 'height'],
                        'fill-extrusion-base': ['get', 'min_height'],
                        'fill-extrusion-opacity': 1.0,
                        'fill-extrusion-vertical-gradient': true
                    }
                },
                // 3D Trees (Extruded cylinders simulating canopies)
                {
                    'id': '3d-trees',
                    'type': 'fill-extrusion',
                    'source': 'osm-trees',
                    'paint': {
                        'fill-extrusion-color': '#115522',
                        'fill-extrusion-height': ['get', 'height'],
                        'fill-extrusion-base': ['get', 'min_height'],
                        'fill-extrusion-opacity': 0.85,
                        'fill-extrusion-vertical-gradient': true
                    }
                }
            ]
        };

        const map = new maplibregl.Map({
            container: 'map',
            style: MAP_STYLE_DARK,
            center: defaultUserCoordinates,
            zoom: 17,
            pitch: 65, // High pitch for realistic 3D perspective
            bearing: -20,
            antialias: true
        });

        // Toggle Snap to Road Feature
        document.getElementById('snap-toggle-btn').addEventListener('click', (e) => {
            snapToRoadActive = !snapToRoadActive;
            e.currentTarget.classList.toggle('active-state');
            document.querySelector('.snap-status').textContent = snapToRoadActive ? 'SNAP TO ROAD: ACTIVE' : 'SNAP TO ROAD: INACTIVE';
            document.querySelector('.snap-status').style.color = snapToRoadActive ? 'var(--action-red)' : 'var(--text-muted)';
        });

        // ── Lightweight Geometry Math for 3D Generation ─────────────────────
        // Generates a rough circle polygon to represent a 3D tree
        function createTreePolygon(lon, lat, radiusInDegrees = 0.00003) {
            const points = 6; // Hexagon for performance
            const coords = [];
            for (let i = 0; i < points; i++) {
                const angle = (i / points) * (2 * Math.PI);
                coords.push([
                    lon + Math.cos(angle) * radiusInDegrees,
                    lat + Math.sin(angle) * radiusInDegrees
                ]);
            }
            coords.push(coords[0]); // Close polygon
            return [coords];
        }

        // Generates a buffered polygon from a street line to make 3D bridges
        function bufferLineToPolygon(lineCoords, widthInDegrees = 0.00004) {
            if (lineCoords.length < 2) return null;
            const leftCoords = [];
            const rightCoords = [];
            
            for (let i = 0; i < lineCoords.length - 1; i++) {
                const p1 = lineCoords[i];
                const p2 = lineCoords[i + 1];
                const angle = Math.atan2(p2[1] - p1[1], p2[0] - p1[0]);
                const perp = angle + Math.PI / 2;
                
                const dx = Math.cos(perp) * widthInDegrees;
                const dy = Math.sin(perp) * widthInDegrees;
                
                leftCoords.push([p1[0] + dx, p1[1] + dy]);
                rightCoords.push([p1[0] - dx, p1[1] - dy]);
                
                if (i === lineCoords.length - 2) {
                    leftCoords.push([p2[0] + dx, p2[1] + dy]);
                    rightCoords.push([p2[0] - dx, p2[1] - dy]);
                }
            }
            return [leftCoords.concat(rightCoords.reverse()).concat([leftCoords[0]])];
        }

        // ── Fetch and Process Real Life Infrastructure ──────────────────────
        async function fetchRealLifeVectorData() {
            const bounds = map.getBounds();
            
            // Expanded query to fetch Buildings, Roads, Bridges, and Trees
            const query = `[out:json][timeout:25];
                (
                  way["building"](${bounds.getSouth()},${bounds.getWest()},${bounds.getNorth()},${bounds.getEast()});
                  relation["building"](${bounds.getSouth()},${bounds.getWest()},${bounds.getNorth()},${bounds.getEast()});
                  way["highway"](${bounds.getSouth()},${bounds.getWest()},${bounds.getNorth()},${bounds.getEast()});
                  node["natural"="tree"](${bounds.getSouth()},${bounds.getWest()},${bounds.getNorth()},${bounds.getEast()});
                );
                out body; >; out skel qt;`;

            try {
                const response = await fetch('https://overpass-api.de/api/interpreter', {
                    method: 'POST',
                    body: query
                });
                const data = await response.json();
                renderVectorPayload(data);
            } catch (err) {
                console.error("Vector streaming engine degradation:", err);
            }
        }

        function renderVectorPayload(data) {
            const nodes = {};
            if (!data.elements) return;

            data.elements.forEach(el => {
                if (el.type === 'node') nodes[el.id] = [el.lon, el.lat];
            });

            const buildingFeatures = [];
            const roadFeatures = [];
            const bridgeFeatures = [];
            const treeFeatures = [];
            roadsGeometryData = []; // Clear for snapping logic
            
            data.elements.forEach(el => {
                // Trees
                if (el.type === 'node' && el.tags && el.tags.natural === 'tree') {
                    treeFeatures.push({
                        'type': 'Feature',
                        'properties': {
                            'height': parseFloat(el.tags.height || Math.random() * 5 + 3), // Tree height 3-8m
                            'min_height': 0
                        },
                        'geometry': {
                            'type': 'Polygon',
                            'coordinates': createTreePolygon(el.lon, el.lat)
                        }
                    });
                }

                // Ways (Buildings, Roads, Bridges)
                if ((el.type === 'way' || el.type === 'relation') && el.nodes) {
                    const coordinates = el.nodes.map(nId => nodes[nId]).filter(Boolean);
                    if (coordinates.length < 2) return;

                    const tags = el.tags || {};
                    
                    // 3D Buildings
                    if (tags.building) {
                        let height = parseFloat(tags.height || tags["building:levels"] * 3.5 || 12);
                        let minHeight = parseFloat(tags.min_height || tags["building:min_level"] * 3.5 || 0);
                        let color = tags["building:colour"] || '#2a2a35';
                        
                        buildingFeatures.push({
                            'type': 'Feature',
                            'properties': { 'height': height, 'min_height': minHeight, 'color': color },
                            'geometry': { 'type': 'Polygon', 'coordinates': [coordinates] }
                        });
                    }
                    
                    // Streets and Bridges
                    if (tags.highway) {
                        // Store road lines for the snap-to-road physics engine
                        for (let i = 0; i < coordinates.length - 1; i++) {
                            roadsGeometryData.push([coordinates[i], coordinates[i+1]]);
                        }

                        if (tags.bridge === "yes") {
                            // Convert bridge line to a 3D polygon
                            const bridgePoly = bufferLineToPolygon(coordinates);
                            if (bridgePoly) {
                                bridgeFeatures.push({
                                    'type': 'Feature',
                                    'properties': { 'height': 8, 'min_height': 5 }, // Lifted off the ground
                                    'geometry': { 'type': 'Polygon', 'coordinates': bridgePoly }
                                });
                            }
                        } else {
                            // Standard 2D ground roads
                            roadFeatures.push({
                                'type': 'Feature',
                                'properties': {},
                                'geometry': { 'type': 'LineString', 'coordinates': coordinates }
                            });
                        }
                    }
                }
            });

            // Update MapLibre Sources dynamically
            if (map.getSource('osm-buildings')) map.getSource('osm-buildings').setData({ 'type': 'FeatureCollection', 'features': buildingFeatures });
            if (map.getSource('osm-roads')) map.getSource('osm-roads').setData({ 'type': 'FeatureCollection', 'features': roadFeatures });
            if (map.getSource('osm-bridges')) map.getSource('osm-bridges').setData({ 'type': 'FeatureCollection', 'features': bridgeFeatures });
            if (map.getSource('osm-trees')) map.getSource('osm-trees').setData({ 'type': 'FeatureCollection', 'features': treeFeatures });
        }

        // ── Snap to Road Physics Engine ─────────────────────────────────────
        // Calculates the shortest distance from a point to a line segment
        function pointToSegmentDistance(p, v, w) {
            const l2 = Math.pow(v[0] - w[0], 2) + Math.pow(v[1] - w[1], 2);
            if (l2 === 0) return { dist: Math.hypot(p[0]-v[0], p[1]-v[1]), snap: v };
            let t = ((p[0] - v[0]) * (w[0] - v[0]) + (p[1] - v[1]) * (w[1] - v[1])) / l2;
            t = Math.max(0, Math.min(1, t));
            const snap = [v[0] + t * (w[0] - v[0]), v[1] + t * (w[1] - v[1])];
            return { dist: Math.hypot(p[0]-snap[0], p[1]-snap[1]), snap: snap };
        }

        // Assumes driver is on the road by finding the closest parsed street line
        function getSnappedCoordinates(lng, lat) {
            if (!snapToRoadActive || roadsGeometryData.length === 0) return [lng, lat];
            
            let minDist = Infinity;
            let bestSnap = [lng, lat];
            const p = [lng, lat];

            for (const segment of roadsGeometryData) {
                const result = pointToSegmentDistance(p, segment[0], segment[1]);
                if (result.dist < minDist) {
                    minDist = result.dist;
                    bestSnap = result.snap;
                }
            }
            
            // Only snap if within a reasonable distance (approx 50 meters)
            if (minDist < 0.0005) {
                return bestSnap;
            }
            return [lng, lat];
        }

        // ── Event Listeners ─────────────────────────────────────────────────
        map.on('moveend', () => {
            if (map.getZoom() >= 15) {
                fetchRealLifeVectorData();
            }
        });

        map.on('load', () => {
            fetchRealLifeVectorData();
            
            // Mouse tracker utilizing the new snap-to-road calculations
            map.on('mousemove', (e) => {
                let displayLng = e.lngLat.lng;
                let displayLat = e.lngLat.lat;

                if (snapToRoadActive) {
                    const snapped = getSnappedCoordinates(displayLng, displayLat);
                    displayLng = snapped[0];
                    displayLat = snapped[1];
                }

                document.querySelector('#coordinate-overlay-tracker span:first-child').textContent = 
                    `X: ${displayLng.toFixed(5)} | Y: ${displayLat.toFixed(5)}`;
            });
        });
    </script>
</body>
</html>
